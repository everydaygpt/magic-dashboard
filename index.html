<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creating Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.11.1/lib/msal-browser.min.js"></script>
  <style>
    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      background: var(--canvas);
      color: var(--text-primary);
      overflow: hidden;
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
    input, textarea, select { font: inherit; color: inherit; background: none; border: 0; padding: 0; outline: 0; resize: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.16); }

    :root,
    html[data-theme="work"] {
      --canvas: #0d1030;
      --panel: rgba(40, 42, 88, 0.6);
      --panel-solid: #202352;
      --card: rgba(56, 58, 108, 0.56);
      --card-hover: rgba(78, 82, 138, 0.82);
      --surface-sub: rgba(26, 28, 62, 0.6);
      --surface-elev: rgba(78, 82, 140, 0.95);
      --overlay: rgba(200, 210, 255, 0.05);
      --overlay-strong: rgba(200, 210, 255, 0.12);
      --border: rgba(180, 190, 255, 0.1);
      --border-strong: rgba(180, 190, 255, 0.22);
      --text-primary: #f5f5ff;
      --text-secondary: #a8aacf;
      --text-tertiary: #6c6f9a;
      --accent-from: #7c3aed;
      --accent-to: #ec4899;
      --danger: #f43f5e;
      --work: #60a5fa;
      --personal: #f97316;
      --blob-1: #8b5cf6;
      --blob-2: #f472b6;
      --blob-3: #22d3ee;
      --blob-opacity: 0.45;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --radius-card: 14px;
      --radius-col: 18px;
      --radius-panel: 22px;
      --snark-bg: rgba(13, 16, 48, 0.85);
    }

    html[data-theme="personal"] {
      /* Clean cool light — slate neutrals + the violet/pink accent gradient
         from dark mode for brand consistency. WCAG AA contrast. */
      --canvas: #F5F6FA;
      --panel: rgba(255, 255, 255, 0.92);
      --panel-solid: #FFFFFF;
      --card: #FFFFFF;
      --card-hover: #F1F2F8;
      --surface-sub: #FAFBFD;
      --surface-elev: #FFFFFF;
      --overlay: rgba(15, 23, 42, 0.04);
      --overlay-strong: rgba(15, 23, 42, 0.08);
      --border: rgba(148, 163, 184, 0.25);
      --border-strong: rgba(100, 116, 139, 0.45);
      --text-primary: #0F172A;
      --text-secondary: #475569;
      --text-tertiary: #94A3B8;
      --accent-from: #7c3aed;
      --accent-to: #ec4899;
      --danger: #dc2626;
      --work: #2563eb;
      --personal: #0d9488;
      --blob-1: #a78bfa;
      --blob-2: #f9a8d4;
      --blob-3: #7dd3fc;
      --blob-opacity: 0.20;
      --snark-bg: rgba(245, 246, 250, 0.9);
    }
    html[data-theme="personal"] .main-title {
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    html[data-theme="personal"] .rail-heading,
    html[data-theme="personal"] .rail-panel-title,
    html[data-theme="personal"] .plan-section-title {
      color: var(--text-secondary);
    }
    html[data-theme="personal"] .card {
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
      transition: transform 180ms var(--spring), box-shadow 180ms var(--ease), background 180ms var(--ease);
    }
    html[data-theme="personal"] .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08), 0 0 0 1px rgba(124, 58, 237, 0.15);
    }
    html[data-theme="personal"] .plan-card:hover {
      transform: translateY(-2px);
    }
    html[data-theme="personal"] .goal-card {
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    html[data-theme="personal"] #snark-bar {
      color: var(--text-tertiary);
    }
    html[data-theme="personal"] .context-pill.active {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.14), rgba(236, 72, 153, 0.14));
    }
    /* Schedule slot striping — subtle cool gray alternation */
    html[data-theme="personal"] .schedule-row:nth-child(even) .schedule-slot {
      background: rgba(241, 245, 249, 0.6);
    }
    html[data-theme="personal"] .schedule { background: rgba(250, 251, 253, 0.8); }
    html[data-theme="personal"] .schedule-row.now { background: rgba(124, 58, 237, 0.06); }
    html[data-theme="personal"] .schedule-hour {
      color: var(--text-primary);
      background: rgba(241, 245, 249, 0.7);
      border-right: 1px solid var(--border);
    }

    /* Morning Magic planner */
    .planner-wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; padding-bottom: 40px; }
    .planner-section { }
    .planner-section-head {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      padding-bottom: 10px; margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .planner-section-head .count {
      font-size: 10px; color: var(--text-tertiary);
      padding: 1px 6px; background: var(--overlay);
      border-radius: 4px;
    }
    .planner-field {
      display: flex; flex-direction: column;
      gap: 4px; margin-bottom: 14px;
    }
    .planner-field label {
      font-size: 12px; color: var(--text-secondary);
      font-weight: 500;
      display: flex; justify-content: space-between; align-items: center;
    }
    .planner-field .pull-btn {
      font-size: 10px; padding: 2px 8px;
      color: var(--text-tertiary); border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer;
    }
    .planner-field .pull-btn:hover { color: var(--accent-from); border-color: var(--accent-from); }
    .planner-field input, .planner-field textarea {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      font-size: 13px; color: var(--text-primary);
      transition: border-color 120ms var(--ease);
    }
    .planner-field input:focus, .planner-field textarea:focus {
      border-color: var(--border-strong);
    }
    .planner-field textarea { min-height: 60px; resize: vertical; line-height: 1.5; }
    .planner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
    .planner-grid .planner-field { margin-bottom: 0; }
    .linked-chips {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .linked-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 12px;
      font-size: 11px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(236, 72, 153, 0.15));
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
    }
    .linked-chip-icon { font-size: 10px; }
    .linked-chip-del { opacity: 0.5; }
    .linked-chip-del:hover { opacity: 1; color: var(--danger); }

    /* Nudge banner */
    .nudge-banner {
      position: relative;
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.14), rgba(236, 72, 153, 0.14));
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 14px;
      margin-bottom: -2px;
      backdrop-filter: blur(8px);
    }
    .nudge-banner-icon { font-size: 20px; }
    .nudge-banner-body { flex: 1; }
    .nudge-banner-title { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .nudge-banner-sub { font-size: 12px; color: var(--text-secondary); }
    .nudge-banner-open {
      padding: 6px 12px; font-size: 12px; font-weight: 600;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 8px; cursor: pointer;
      transition: transform 150ms var(--spring);
    }
    .nudge-banner-open:hover { transform: translateY(-1px); }
    .nudge-banner-close {
      width: 24px; height: 24px; border-radius: 6px;
      color: var(--text-tertiary); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .nudge-banner-close:hover { background: var(--overlay); color: var(--text-primary); }

    /* Auth gate */
    #auth-gate {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #0b0b14;
    }
    #auth-gate .gate-card {
      background: rgba(28, 28, 50, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 28px 32px;
      max-width: 320px; width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }
    #auth-gate .gate-emoji { font-size: 32px; margin-bottom: 10px; }
    #auth-gate h2 {
      margin: 0 0 4px;
      color: #f5f5f7;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-size: 18px;
      font-family: 'Inter', sans-serif;
    }
    #auth-gate .gate-sub {
      color: #9a9aaf; font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    #auth-gate input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #f5f5f7;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: 'Inter', sans-serif;
    }
    #auth-gate input:focus { outline: none; border-color: rgba(255, 255, 255, 0.25); }
    #auth-gate button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      border: 0; cursor: pointer;
      transition: transform 150ms cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
    }
    #auth-gate button:hover { transform: translateY(-1px); }
    #auth-err {
      color: #f43f5e; font-size: 12px; min-height: 18px;
      margin-top: 8px; font-style: italic;
    }

    /* Planner — today's list */
    .today-list {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px; margin-bottom: 18px;
    }
    .today-list-head {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      padding-bottom: 10px; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .today-list-head .count {
      font-size: 11px; padding: 2px 8px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 6px; font-weight: 600;
    }
    .today-list-group {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;
      margin: 10px 0 6px;
    }
    .today-list-group:first-child { margin-top: 0; }
    .today-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 6px; border-radius: 8px;
      cursor: pointer;
      transition: background 120ms;
    }
    .today-row:hover { background: var(--overlay); }
    .today-check {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border: 2px solid var(--border-strong);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: transparent;
      cursor: pointer;
      transition: all 150ms var(--spring);
      margin-top: 1px;
    }
    .today-row:hover .today-check { border-color: var(--accent-from); }
    .today-row.done .today-check {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent;
      color: white;
    }
    .today-title {
      flex: 1; font-size: 13px; line-height: 1.4;
      color: var(--text-primary);
    }
    .today-row.done .today-title {
      color: var(--text-tertiary);
      text-decoration: line-through;
    }
    .today-meta {
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      display: flex; gap: 6px; align-items: center;
    }
    .today-project-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
    }
    .today-empty {
      padding: 20px; text-align: center; font-style: italic;
      color: var(--text-tertiary); font-size: 12px;
    }

    /* Planner field: task + done indicators */
    .planner-field label .task-btn {
      font-size: 10px; padding: 2px 8px;
      margin-left: 6px;
      color: var(--text-tertiary); border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer;
    }
    .planner-field label .task-btn:hover { color: var(--accent-from); border-color: var(--accent-from); }
    .planner-field label .task-status {
      font-size: 11px;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .planner-field label .task-status.pending {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .planner-field label .task-status.done {
      color: #34d399;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    /* Subtasks */
    .subtasks-wrap {
      display: flex; flex-direction: column; gap: 4px;
      background: var(--overlay);
      border-radius: 10px;
      padding: 8px;
      margin-top: 6px;
    }
    .subtask-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 6px; border-radius: 6px;
      font-size: 13px;
      transition: background 120ms;
    }
    .subtask-row:hover { background: var(--overlay-strong); }
    .subtask-check {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid var(--border-strong);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: transparent;
      cursor: pointer;
      transition: all 150ms var(--spring);
    }
    .subtask-check.checked {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent; color: white;
    }
    .subtask-title {
      flex: 1; outline: 0; min-width: 0;
      word-break: break-word;
    }
    .subtask-title:focus {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      padding: 0 4px;
      margin: 0 -4px;
    }
    .subtask-row.done .subtask-title {
      color: var(--text-tertiary);
      text-decoration: line-through;
    }
    .subtask-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 150ms; flex-shrink: 0; }
    .subtask-row:hover .subtask-actions { opacity: 1; }
    .subtask-actions button {
      width: 20px; height: 20px; border-radius: 4px;
      font-size: 11px; color: var(--text-tertiary);
    }
    .subtask-actions button:hover { color: var(--text-primary); background: var(--overlay-strong); }
    .subtask-actions button.danger:hover { color: var(--danger); }
    .subtask-children { margin-left: 22px; display: flex; flex-direction: column; gap: 4px; }

    .subtask-bulk {
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px; margin-top: 6px;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }
    .subtask-bulk textarea {
      width: 100%; min-height: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .subtask-bulk .row { display: flex; gap: 6px; align-items: center; justify-content: space-between; }
    .subtask-bulk .hint {
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .subtask-bulk button {
      padding: 4px 10px; font-size: 11px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 6px; font-weight: 600;
    }

    /* Planner history */
    .history-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px; border-radius: 8px;
      font-size: 13px; cursor: pointer;
      transition: background 120ms;
    }
    .history-row:hover { background: var(--overlay); }
    .history-row.current { background: var(--overlay-strong); }
    .history-date {
      flex: 1; font-weight: 500;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .history-filled {
      font-size: 11px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .history-empty { color: var(--text-tertiary); font-style: italic; font-size: 12px; padding: 6px; }

    /* Check-in burst animation */
    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 20px;
      animation: burst-up 900ms var(--ease) forwards;
    }
    @keyframes burst-up {
      0%   { transform: translate(-50%, 0)     scale(0.6); opacity: 0; }
      15%  { transform: translate(-50%, -10px) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -80px) scale(1);   opacity: 0; }
    }

    html[data-theme="work-light"] {
      --canvas: #f5f1e8;
      --panel: rgba(255, 252, 246, 0.82);
      --panel-solid: #ffffff;
      --card: rgba(255, 255, 255, 0.92);
      --card-hover: #ffffff;
      --surface-sub: rgba(225, 215, 198, 0.55);
      --surface-elev: rgba(255, 255, 255, 0.98);
      --overlay: rgba(20, 12, 40, 0.04);
      --overlay-strong: rgba(20, 12, 40, 0.08);
      --border: rgba(40, 20, 60, 0.1);
      --border-strong: rgba(40, 20, 60, 0.18);
      --text-primary: #1a1325;
      --text-secondary: #5a4d68;
      --text-tertiary: #9a8fa8;
      --blob-1: #c4b5fd;
      --blob-2: #f9a8d4;
      --blob-3: #93c5fd;
      --blob-opacity: 0.22;
    }

    /* ---------- Ambient background ---------- */
    #bg-blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: var(--blob-opacity, 0.35); animation: float 20s infinite ease-in-out; }
    .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--blob-1), transparent 70%); top: -100px; left: -100px; }
    .blob-2 { width: 600px; height: 600px; background: radial-gradient(circle, var(--blob-2), transparent 70%); bottom: -150px; right: -150px; animation-delay: -7s; }
    .blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, var(--blob-3), transparent 70%); top: 40%; left: 50%; animation-delay: -14s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(60px, -40px) scale(1.1); }
      66%      { transform: translate(-40px, 50px) scale(0.95); }
    }

    /* ---------- App grid — Today is the app; Bank feeds it; Review surrounds it ----------
       Below 1280: single column, rails as drawers.
       1280–1599:  bank docks left; review stays drawer.
       ≥1600:      both rails docked in flow. */
    #app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
      height: 100vh;
      gap: 10px; padding: 14px; padding-bottom: 46px;
    }
    #left-rail, #right-rail {
      position: fixed;
      top: 0; bottom: 0;
      width: 86vw; max-width: 340px;
      z-index: 50;
      display: flex;
      transition: transform 220ms var(--ease);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    #left-rail { left: 0; transform: translateX(-100%); }
    #right-rail { right: 0; transform: translateX(100%); }
    #left-rail.open { transform: translateX(0); }
    #right-rail.open { transform: translateX(0); }
    #left-resizer, #right-resizer, #left-expand, #right-expand { display: none; }
    .main-shell {
      min-width: 0;
      width: 100%;
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex; flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* Rails are drawer-only at all viewports — Today owns the full screen.
       Bank + Pulse panels live inline on Today; project views can summon the
       right-rail drawer for Notes/Files/Team. */
    @media (min-width: 1024px) {
      #app {
        gap: 14px;
        padding: 16px;
        padding-bottom: 46px;
      }
    }
    #top-nav {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex; align-items: center; gap: 14px;
      padding: 8px 14px;
      background: var(--panel);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
    }
    .nav-brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding-right: 8px;
      border-right: 1px solid var(--border);
    }
    .nav-tabs {
      display: flex; align-items: center; gap: 4px;
    }
    .nav-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text-primary); background: var(--overlay); }
    .nav-tab.active {
      background: var(--overlay-strong);
      color: var(--text-primary);
      border-color: var(--border);
    }
    .nav-tab.active::before {
      content: ''; position: absolute;
      left: 0; right: 0; bottom: -9px; height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
    }
    .nav-tab { position: relative; }
    .nav-tab-icon { font-size: 13px; }
    .nav-tab-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-left: 2px;
      padding: 1px 5px;
      background: var(--overlay);
      border-radius: 4px;
    }
    .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
    .nav-tab.secondary { padding: 6px 8px; font-size: 12px; color: var(--text-tertiary); }
    .nav-spacer { flex: 1; }
    .nav-right {
      display: flex; align-items: center; gap: 10px;
    }
    .nav-right .context-pills { margin: 0; }
    .nav-drawer-btn {
      display: none;
      width: 36px; height: 36px;
      align-items: center; justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 18px; cursor: pointer;
      flex-shrink: 0;
    }
    .nav-drawer-btn:hover { color: var(--text-primary); background: var(--overlay-strong); }

    /* Drawer backdrop — no blur, subtle dim so main content stays readable */
    .drawer-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.28);
      z-index: 40;
    }

    /* ------ Responsive breakpoints ------ */
    /* Drawer toggles always visible since rails are always drawers now */
    .nav-drawer-btn.left,
    .nav-drawer-btn.right { display: inline-flex; }
    .nav-tabs {
      min-width: 0;
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { flex-shrink: 0; }
    @media (max-width: 820px) {
      #app {
        padding: 10px; padding-bottom: 46px;
        gap: 6px;
      }
      #top-nav { padding: 6px 10px; gap: 8px; flex-wrap: nowrap; }
      .nav-brand { display: none; }
      .nav-tab { padding: 6px 10px; font-size: 12px; }
      .nav-tab.secondary { padding: 5px 8px; font-size: 11px; }
      .nav-sep { display: none; }
      .nav-spacer { display: none; }
      .nav-right { gap: 4px; }
      .nav-right .context-pills button { padding: 4px 8px; font-size: 10px; }
    }
    /* Tablet / small-laptop: icon-only nav tabs so "Activity" doesn't truncate.
       Keep the active tab's label so the nav never looks broken. */
    @media (max-width: 1024px) {
      .nav-tab .nav-tab-count { display: none; }
      .nav-tab-icon { font-size: 15px; }
      .nav-tab span:not(.nav-tab-icon):not(.nav-tab-count) { display: none; }
      .nav-tab.active span:not(.nav-tab-icon):not(.nav-tab-count) { display: inline; }
    }
    @media (max-width: 560px) {
      #top-nav { padding: 5px 8px; gap: 6px; }
      .nav-right .context-pills button:not(.active) { display: none; }
      .top3 { grid-template-columns: 1fr !important; }
      .schedule-hour { font-size: 10px; padding: 6px 6px; }
      .schedule-row { grid-template-columns: 52px 1fr; }
      .projects-hub-grid { grid-template-columns: 1fr; }
      .main-header { flex-wrap: wrap; gap: 6px; }
      .main-title { font-size: 18px; }
      .modal { max-width: calc(100vw - 24px); margin: 12px; }
    }
    @media (max-width: 900px) {
      .planner-grid { grid-template-columns: 1fr; }
      .time-blocks { grid-template-columns: repeat(2, 1fr); }
    }

    /* Projects hub */
    .projects-hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 0 2px;
    }
    .projects-hub-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px 14px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 180ms var(--spring), box-shadow 180ms var(--ease), border-color 180ms var(--ease);
      display: flex; flex-direction: column; gap: 10px;
      min-height: 120px;
    }
    .projects-hub-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }
    .projects-hub-card-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
    }
    .projects-hub-card-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    .projects-hub-card-title {
      font-size: 15px; font-weight: 600;
      color: var(--text-primary);
      line-height: 1.25;
    }
    .projects-hub-card-ctx {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 2px 6px; border-radius: 4px;
      color: var(--text-tertiary);
      background: var(--overlay);
    }
    .projects-hub-card-ctx.work { color: var(--work); }
    .projects-hub-card-ctx.personal { color: var(--personal); }
    .projects-hub-card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.45;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .projects-hub-card-meta {
      display: flex; gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-tertiary);
    }
    .project-description {
      margin-top: 4px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      border-radius: 8px;
      border: 1px dashed transparent;
      transition: all 120ms var(--ease);
      cursor: text;
      max-width: 720px;
    }
    .project-description.empty { color: var(--text-tertiary); font-style: italic; }
    .project-description:hover { border-color: var(--border); background: var(--surface-sub); }
    .project-description:focus { outline: 0; border-color: var(--accent-from); border-style: solid; background: var(--card); color: var(--text-primary); font-style: normal; }
    .projects-hub-card-link-row {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: -2px;
    }
    .projects-hub-card-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-tertiary);
      text-decoration: none;
      padding: 3px 8px; border-radius: 6px;
      background: var(--overlay);
      max-width: 100%;
    }
    .projects-hub-card-link:hover { color: var(--text-primary); background: var(--overlay-strong); }
    .projects-hub-card-link .truncate {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 160px;
    }

    /* Project links manage-modal */
    .project-links-list {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 50vh; overflow: auto;
      padding: 2px;
    }
    .project-link-row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(180px, 2fr) auto auto;
      gap: 6px;
      align-items: center;
    }
    .project-link-input {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-sub);
      color: var(--text-primary);
      font-size: 12px;
      min-width: 0;
    }
    .project-link-input:focus { border-color: var(--border-strong); outline: none; }
    .project-links-empty {
      padding: 18px 12px; text-align: center;
      color: var(--text-tertiary); font-size: 12px; font-style: italic;
    }
    @media (max-width: 600px) {
      .project-link-row {
        grid-template-columns: 1fr auto auto;
        grid-template-areas: "label open remove" "url url url";
        gap: 4px;
      }
      .project-link-row .project-link-label { grid-area: label; }
      .project-link-row .project-link-url { grid-area: url; }
      .project-link-row .icon-btn:nth-of-type(1) { grid-area: open; }
      .project-link-row .icon-btn:nth-of-type(2) { grid-area: remove; }
    }
    .projects-hub-card-people {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: auto;
    }
    .projects-hub-more {
      font-size: 11px; color: var(--text-tertiary);
      padding: 3px 6px;
    }
    .rail, .main-shell {
      background: var(--panel);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: var(--radius-panel);
      display: flex; flex-direction: column; overflow: hidden;
      min-width: 0;
      grid-row: 2;
    }
    .rail-resizer {
      background: transparent;
      cursor: col-resize;
      border-radius: 3px;
      transition: background 150ms var(--ease);
      align-self: stretch;
      min-height: 0;
      grid-row: 2;
    }
    .rail-expand { grid-row: 2; }
    .rail-resizer:hover, .rail-resizer.active {
      background: linear-gradient(180deg, var(--accent-from), var(--accent-to));
    }
    .rail-expand {
      width: 0; overflow: hidden; padding: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      align-self: center;
      cursor: pointer;
      transition: background 150ms var(--ease), color 150ms var(--ease);
    }
    .rail-expand.visible { width: 18px; padding: 6px 0; }
    .rail-expand:hover { background: var(--overlay-strong); color: var(--text-primary); }
    #app.hide-left #left-rail, #app.hide-left #left-resizer { display: none; }
    #app.hide-right #right-rail, #app.hide-right #right-resizer { display: none; }

    /* ---------- Context pills (top of left rail) ---------- */
    .context-pills {
      display: flex; gap: 2px; padding: 4px;
      margin: 10px 14px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .context-pill {
      flex: 1; padding: 6px 0;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-tertiary);
      border-radius: 7px;
      transition: all 180ms var(--ease);
      font-family: 'JetBrains Mono', monospace;
    }
    .context-pill:hover { color: var(--text-primary); }
    .context-pill.active {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .context-pill.work.active { color: var(--work); }
    .context-pill.personal.active { color: var(--personal); }

    /* ---------- Left rail ---------- */
    #left-rail { padding: 10px 0 18px; }
    .rail-section { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
    .rail-section + .rail-section { margin-top: 18px; }
    .rail-divider { height: 1px; margin: 14px 20px; background: var(--border); }
    .rail-heading {
      text-transform: uppercase; font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-tertiary); padding: 0 12px 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .rail-heading.collapsible {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      cursor: pointer;
      user-select: none;
      border-radius: 6px;
      transition: background 120ms, color 120ms;
    }
    .rail-heading.collapsible:hover { background: var(--overlay); color: var(--text-secondary); }
    .rail-heading-arrow {
      display: inline-block; width: 10px; font-size: 9px;
      color: var(--text-tertiary);
    }
    .rail-heading.collapsed { padding-bottom: 4px; }
    .bank-dock-btn {
      margin-left: auto;
      width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-tertiary);
      font-size: 10px;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .bank-dock-btn:hover { color: var(--text-primary); border-color: var(--border-strong); background: var(--overlay); }
    .rail-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      transition: background 150ms var(--ease);
      position: relative; color: var(--text-secondary); font-weight: 500;
    }
    .rail-item:hover { background: var(--overlay); color: var(--text-primary); }
    .rail-item.active { background: var(--overlay-strong); color: var(--text-primary); }
    .rail-item.active::before {
      content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--accent-from), var(--accent-to));
    }
    .rail-icon { font-size: 16px; width: 20px; text-align: center; }
    .rail-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
      box-shadow: 0 0 8px var(--item-from, #7c3aed);
    }
    .rail-label { flex: 1; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .ctx-mark {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .ctx-mark.work { background: var(--work); }
    .ctx-mark.personal { background: var(--personal); }
    .rail-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-tertiary); background: rgba(255, 255, 255, 0.04);
      padding: 2px 6px; border-radius: 6px; min-width: 22px; text-align: center;

    .rail-add {

      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      color: var(--text-tertiary); font-size: 13px; font-weight: 500;
      transition: color 150ms var(--ease);
    }
    .rail-add:hover { color: var(--text-primary); }

    .bank-list {
      padding: 0 10px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 6px; margin-top: 6px;
    }
    .bank-sections-wrap {
      display: flex; flex-direction: column; gap: 6px;
      padding: 0 10px; overflow-y: auto; flex: 1; margin-top: 6px;
    }
    .bank-sections-wrap .bank-list {
      padding: 0; margin-top: 0; gap: 6px; flex: 0 0 auto;
    }
    .bank-section-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer; text-align: left; width: 100%;
      transition: background 120ms var(--ease), border-color 120ms var(--ease);
      user-select: none;
    }
    .bank-section-header:hover {
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    .bank-section-header.expanded {
      background: rgba(124, 58, 237, 0.06);
      border-color: rgba(124, 58, 237, 0.25);
      color: var(--text-primary);
    }
    .bank-section-chevron {
      font-size: 11px; color: var(--text-tertiary);
      width: 10px; flex-shrink: 0;
    }
    .bank-section-header.expanded .bank-section-chevron { color: var(--accent-from); }
    .bank-section-dot {
      width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0;
    }
    .bank-section-name {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bank-section-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;

      padding: 1px 8px; background: rgba(255, 255, 255, 0.04);
      border-radius: 6px; flex-shrink: 0;
    }
    html[data-theme="personal"] .bank-section-header { background: rgba(15, 23, 42, 0.02); }

    html[data-theme="personal"] .bank-section-header.expanded {
      background: rgba(124, 58, 237, 0.08);
    }
    .bank-card {

      padding: 10px 12px; font-size: 13px; cursor: grab;
      transition: all 150ms var(--ease); line-height: 1.35;

      display: flex; gap: 8px; align-items: flex-start;
    }
    .bank-card:hover { background: var(--card-hover); transform: translateX(2px); }
    .bank-card:active { cursor: grabbing; }

    .bank-card.done .bank-card-title { text-decoration: line-through; }
    .bank-card-body { flex: 1; min-width: 0; }
    .bank-card-check {
      flex-shrink: 0;

      margin-top: 1px;

    .bank-card:hover .bank-card-check {
      border-color: var(--accent-from);
    }
    .bank-card-check.checked {
      background: linear-gradient(135deg, #22c55e, #16a34a);

      color: white;
    }
    .bank-card-ctx {
      position: absolute; top: 8px; right: 8px;
      width: 5px; height: 5px; border-radius: 50%;
    }
    .project-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 6px 1px 4px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-secondary);

    }
    .project-chip > span:last-child {

    }
    .project-chip-dot {
