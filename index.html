<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creating Magic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.11.1/lib/msal-browser.min.js"></script>
  <style>
    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-feature-settings: 'cv02', 'cv03', 'cv04', 'cv11';
      background: var(--canvas);
      color: var(--text-primary);
      overflow: hidden;
      font-size: 14px;
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
    input, textarea, select { font: inherit; color: inherit; background: none; border: 0; padding: 0; outline: 0; resize: none; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.16); }

    :root,
    html[data-theme="work"] {
      --canvas: #0d1030;
      --panel: rgba(40, 42, 88, 0.6);
      --panel-solid: #202352;
      --card: rgba(56, 58, 108, 0.56);
      --card-hover: rgba(78, 82, 138, 0.82);
      --surface-sub: rgba(26, 28, 62, 0.6);
      --surface-elev: rgba(78, 82, 140, 0.95);
      --overlay: rgba(200, 210, 255, 0.05);
      --overlay-strong: rgba(200, 210, 255, 0.12);
      --border: rgba(180, 190, 255, 0.1);
      --border-strong: rgba(180, 190, 255, 0.22);
      --text-primary: #f5f5ff;
      --text-secondary: #a8aacf;
      --text-tertiary: #6c6f9a;
      --accent-from: #7c3aed;
      --accent-to: #ec4899;
      --danger: #f43f5e;
      --work: #60a5fa;
      --personal: #f97316;
      --blob-1: #8b5cf6;
      --blob-2: #f472b6;
      --blob-3: #22d3ee;
      --blob-opacity: 0.45;
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --radius-card: 14px;
      --radius-col: 18px;
      --radius-panel: 22px;
      --snark-bg: rgba(13, 16, 48, 0.85);
    }

    html[data-theme="personal"] {
      /* Notion Linen — low-blue-light warm palette for multi-hour focus.
         Text primary 15.2:1, secondary 6.8:1 contrast (WCAG AA+). */
      --canvas: #EFE8DC;
      --panel: rgba(249, 244, 234, 0.92);
      --panel-solid: #F9F4EA;
      --card: #FFFFFF;
      --card-hover: #FFFFFF;
      --surface-sub: rgba(249, 244, 234, 0.7);
      --surface-elev: #FFFFFF;
      --overlay: rgba(31, 27, 22, 0.04);
      --overlay-strong: rgba(31, 27, 22, 0.09);
      --border: rgba(212, 200, 176, 0.7);
      --border-strong: rgba(92, 83, 73, 0.35);
      --text-primary: #1F1B16;
      --text-secondary: #5C5349;
      --text-tertiary: #8B8170;
      --accent-from: #C2410C;
      --accent-to: #0E7490;
      --blob-1: #D97706;
      --blob-2: #0E7490;
      --blob-3: #A16207;
      --blob-opacity: 0.18;
      --snark-bg: rgba(249, 244, 234, 0.95);
    }
    html[data-theme="personal"] body {
      font-feature-settings: 'ss01', 'cv02', 'cv11';
    }
    html[data-theme="personal"] .main-title {
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    html[data-theme="personal"] .rail-heading,
    html[data-theme="personal"] .rail-panel-title,
    html[data-theme="personal"] .plan-section-title {
      color: #8B5A2E;
    }
    html[data-theme="personal"] .card {
      box-shadow: 0 1px 3px rgba(31, 27, 22, 0.06), 0 1px 0 rgba(255, 255, 255, 0.6) inset;
      transition: transform 180ms var(--spring), box-shadow 180ms var(--ease), background 180ms var(--ease);
    }
    html[data-theme="personal"] .card:hover {
      transform: translateY(-3px) rotate(-0.5deg);
      box-shadow: 0 10px 24px rgba(31, 27, 22, 0.12), 0 0 30px -5px var(--accent-from);
    }
    html[data-theme="personal"] .plan-card:hover {
      transform: translateY(-2px) rotate(0.6deg);
    }
    html[data-theme="personal"] .goal-card {
      box-shadow: 0 1px 4px rgba(31, 27, 22, 0.06), 0 1px 0 rgba(255, 255, 255, 0.6) inset;
    }
    html[data-theme="personal"] #snark-bar {
      color: #6B5D48;
    }
    html[data-theme="personal"] .context-pill.active {
      background: linear-gradient(135deg, rgba(194, 65, 12, 0.22), rgba(14, 116, 144, 0.22));
    }
    /* Schedule slot striping — alternate rows in warm paper tone for visual rhythm */
    html[data-theme="personal"] .schedule-row:nth-child(even) .schedule-slot {
      background: rgba(239, 232, 220, 0.5);
    }
    html[data-theme="personal"] .schedule { background: rgba(249, 244, 234, 0.6); }
    html[data-theme="personal"] .schedule-row.now { background: rgba(194, 65, 12, 0.08); }
    html[data-theme="personal"] .schedule-hour {
      color: #1F1B16;
      background: rgba(239, 232, 220, 0.6);
      border-right: 1px solid rgba(92, 83, 73, 0.25);
    }

    /* Morning Magic planner */
    .planner-wrap { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; padding-bottom: 40px; }
    .planner-section { }
    .planner-section-head {
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      padding-bottom: 10px; margin-bottom: 10px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .planner-section-head .count {
      font-size: 10px; color: var(--text-tertiary);
      padding: 1px 6px; background: var(--overlay);
      border-radius: 4px;
    }
    .planner-field {
      display: flex; flex-direction: column;
      gap: 4px; margin-bottom: 14px;
    }
    .planner-field label {
      font-size: 12px; color: var(--text-secondary);
      font-weight: 500;
      display: flex; justify-content: space-between; align-items: center;
    }
    .planner-field .pull-btn {
      font-size: 10px; padding: 2px 8px;
      color: var(--text-tertiary); border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer;
    }
    .planner-field .pull-btn:hover { color: var(--accent-from); border-color: var(--accent-from); }
    .planner-field input, .planner-field textarea {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      font-size: 13px; color: var(--text-primary);
      transition: border-color 120ms var(--ease);
    }
    .planner-field input:focus, .planner-field textarea:focus {
      border-color: var(--border-strong);
    }
    .planner-field textarea { min-height: 60px; resize: vertical; line-height: 1.5; }
    .planner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 14px; }
    .planner-grid .planner-field { margin-bottom: 0; }
    .linked-chips {
      display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px;
    }
    .linked-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 12px;
      font-size: 11px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.15), rgba(236, 72, 153, 0.15));
      border: 1px solid var(--border);
      color: var(--text-primary);
      cursor: pointer;
    }
    .linked-chip-icon { font-size: 10px; }
    .linked-chip-del { opacity: 0.5; }
    .linked-chip-del:hover { opacity: 1; color: var(--danger); }

    /* Nudge banner */
    .nudge-banner {
      position: relative;
      grid-column: 1 / -1;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      background: linear-gradient(135deg, rgba(249, 115, 22, 0.14), rgba(236, 72, 153, 0.14));
      border: 1px solid rgba(249, 115, 22, 0.3);
      border-radius: 14px;
      margin-bottom: -2px;
      backdrop-filter: blur(8px);
    }
    .nudge-banner-icon { font-size: 20px; }
    .nudge-banner-body { flex: 1; }
    .nudge-banner-title { font-weight: 600; font-size: 14px; color: var(--text-primary); }
    .nudge-banner-sub { font-size: 12px; color: var(--text-secondary); }
    .nudge-banner-open {
      padding: 6px 12px; font-size: 12px; font-weight: 600;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 8px; cursor: pointer;
      transition: transform 150ms var(--spring);
    }
    .nudge-banner-open:hover { transform: translateY(-1px); }
    .nudge-banner-close {
      width: 24px; height: 24px; border-radius: 6px;
      color: var(--text-tertiary); font-size: 14px;
      display: flex; align-items: center; justify-content: center;
    }
    .nudge-banner-close:hover { background: var(--overlay); color: var(--text-primary); }

    /* Auth gate */
    #auth-gate {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #0b0b14;
    }
    #auth-gate .gate-card {
      background: rgba(28, 28, 50, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 28px 32px;
      max-width: 320px; width: 90%;
      text-align: center;
      backdrop-filter: blur(20px);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.5);
    }
    #auth-gate .gate-emoji { font-size: 32px; margin-bottom: 10px; }
    #auth-gate h2 {
      margin: 0 0 4px;
      color: #f5f5f7;
      font-weight: 700;
      letter-spacing: -0.01em;
      font-size: 18px;
      font-family: 'Inter', sans-serif;
    }
    #auth-gate .gate-sub {
      color: #9a9aaf; font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 20px;
    }
    #auth-gate input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #f5f5f7;
      font-size: 14px;
      margin-bottom: 10px;
      font-family: 'Inter', sans-serif;
    }
    #auth-gate input:focus { outline: none; border-color: rgba(255, 255, 255, 0.25); }
    #auth-gate button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #7c3aed, #ec4899);
      color: white;
      border-radius: 10px;
      font-weight: 600;
      font-size: 13px;
      border: 0; cursor: pointer;
      transition: transform 150ms cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
    }
    #auth-gate button:hover { transform: translateY(-1px); }
    #auth-err {
      color: #f43f5e; font-size: 12px; min-height: 18px;
      margin-top: 8px; font-style: italic;
    }

    /* Planner — today's list */
    .today-list {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px; margin-bottom: 18px;
    }
    .today-list-head {
      display: flex; align-items: center; gap: 10px;
      font-size: 12px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      padding-bottom: 10px; margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .today-list-head .count {
      font-size: 11px; padding: 2px 8px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 6px; font-weight: 600;
    }
    .today-list-group {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;
      margin: 10px 0 6px;
    }
    .today-list-group:first-child { margin-top: 0; }
    .today-row {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 6px; border-radius: 8px;
      cursor: pointer;
      transition: background 120ms;
    }
    .today-row:hover { background: var(--overlay); }
    .today-check {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border: 2px solid var(--border-strong);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; color: transparent;
      cursor: pointer;
      transition: all 150ms var(--spring);
      margin-top: 1px;
    }
    .today-row:hover .today-check { border-color: var(--accent-from); }
    .today-row.done .today-check {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent;
      color: white;
    }
    .today-title {
      flex: 1; font-size: 13px; line-height: 1.4;
      color: var(--text-primary);
    }
    .today-row.done .today-title {
      color: var(--text-tertiary);
      text-decoration: line-through;
    }
    .today-meta {
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      display: flex; gap: 6px; align-items: center;
    }
    .today-project-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
    }
    .today-empty {
      padding: 20px; text-align: center; font-style: italic;
      color: var(--text-tertiary); font-size: 12px;
    }

    /* Planner field: task + done indicators */
    .planner-field label .task-btn {
      font-size: 10px; padding: 2px 8px;
      margin-left: 6px;
      color: var(--text-tertiary); border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      cursor: pointer;
    }
    .planner-field label .task-btn:hover { color: var(--accent-from); border-color: var(--accent-from); }
    .planner-field label .task-status {
      font-size: 11px;
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    .planner-field label .task-status.pending {
      color: #fbbf24;
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.3);
    }
    .planner-field label .task-status.done {
      color: #34d399;
      background: rgba(52, 211, 153, 0.12);
      border: 1px solid rgba(52, 211, 153, 0.3);
    }

    /* Subtasks */
    .subtasks-wrap {
      display: flex; flex-direction: column; gap: 4px;
      background: var(--overlay);
      border-radius: 10px;
      padding: 8px;
      margin-top: 6px;
    }
    .subtask-row {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 6px; border-radius: 6px;
      font-size: 13px;
      transition: background 120ms;
    }
    .subtask-row:hover { background: var(--overlay-strong); }
    .subtask-check {
      width: 16px; height: 16px; flex-shrink: 0;
      border: 1.5px solid var(--border-strong);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; color: transparent;
      cursor: pointer;
      transition: all 150ms var(--spring);
    }
    .subtask-check.checked {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent; color: white;
    }
    .subtask-title {
      flex: 1; outline: 0; min-width: 0;
      word-break: break-word;
    }
    .subtask-title:focus {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      padding: 0 4px;
      margin: 0 -4px;
    }
    .subtask-row.done .subtask-title {
      color: var(--text-tertiary);
      text-decoration: line-through;
    }
    .subtask-actions { display: flex; gap: 2px; opacity: 0; transition: opacity 150ms; flex-shrink: 0; }
    .subtask-row:hover .subtask-actions { opacity: 1; }
    .subtask-actions button {
      width: 20px; height: 20px; border-radius: 4px;
      font-size: 11px; color: var(--text-tertiary);
    }
    .subtask-actions button:hover { color: var(--text-primary); background: var(--overlay-strong); }
    .subtask-actions button.danger:hover { color: var(--danger); }
    .subtask-children { margin-left: 22px; display: flex; flex-direction: column; gap: 4px; }

    .subtask-bulk {
      display: flex; flex-direction: column; gap: 6px;
      padding: 8px; margin-top: 6px;
      border: 1px dashed var(--border);
      border-radius: 8px;
    }
    .subtask-bulk textarea {
      width: 100%; min-height: 40px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
    }
    .subtask-bulk .row { display: flex; gap: 6px; align-items: center; justify-content: space-between; }
    .subtask-bulk .hint {
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .subtask-bulk button {
      padding: 4px 10px; font-size: 11px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 6px; font-weight: 600;
    }

    /* Planner history */
    .history-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px; border-radius: 8px;
      font-size: 13px; cursor: pointer;
      transition: background 120ms;
    }
    .history-row:hover { background: var(--overlay); }
    .history-row.current { background: var(--overlay-strong); }
    .history-date {
      flex: 1; font-weight: 500;
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
    }
    .history-filled {
      font-size: 11px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .history-empty { color: var(--text-tertiary); font-style: italic; font-size: 12px; padding: 6px; }

    /* Check-in burst animation */
    .burst {
      position: fixed;
      pointer-events: none;
      z-index: 200;
      font-size: 20px;
      animation: burst-up 900ms var(--ease) forwards;
    }
    @keyframes burst-up {
      0%   { transform: translate(-50%, 0)     scale(0.6); opacity: 0; }
      15%  { transform: translate(-50%, -10px) scale(1.3); opacity: 1; }
      100% { transform: translate(-50%, -80px) scale(1);   opacity: 0; }
    }

    html[data-theme="work-light"] {
      --canvas: #f5f1e8;
      --panel: rgba(255, 252, 246, 0.82);
      --panel-solid: #ffffff;
      --card: rgba(255, 255, 255, 0.92);
      --card-hover: #ffffff;
      --surface-sub: rgba(225, 215, 198, 0.55);
      --surface-elev: rgba(255, 255, 255, 0.98);
      --overlay: rgba(20, 12, 40, 0.04);
      --overlay-strong: rgba(20, 12, 40, 0.08);
      --border: rgba(40, 20, 60, 0.1);
      --border-strong: rgba(40, 20, 60, 0.18);
      --text-primary: #1a1325;
      --text-secondary: #5a4d68;
      --text-tertiary: #9a8fa8;
      --blob-1: #c4b5fd;
      --blob-2: #f9a8d4;
      --blob-3: #93c5fd;
      --blob-opacity: 0.22;
    }

    /* ---------- Ambient background ---------- */
    #bg-blobs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: var(--blob-opacity, 0.35); animation: float 20s infinite ease-in-out; }
    .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, var(--blob-1), transparent 70%); top: -100px; left: -100px; }
    .blob-2 { width: 600px; height: 600px; background: radial-gradient(circle, var(--blob-2), transparent 70%); bottom: -150px; right: -150px; animation-delay: -7s; }
    .blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, var(--blob-3), transparent 70%); top: 40%; left: 50%; animation-delay: -14s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%      { transform: translate(60px, -40px) scale(1.1); }
      66%      { transform: translate(-40px, 50px) scale(0.95); }
    }

    /* ---------- App grid — Today is the app; Bank feeds it; Review surrounds it ----------
       Below 1280: single column, rails as drawers.
       1280–1599:  bank docks left; review stays drawer.
       ≥1600:      both rails docked in flow. */
    #app {
      position: relative; z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      grid-template-rows: auto minmax(0, 1fr);
      height: 100vh;
      gap: 10px; padding: 14px; padding-bottom: 46px;
    }
    #left-rail, #right-rail {
      position: fixed;
      top: 0; bottom: 0;
      width: 86vw; max-width: 340px;
      z-index: 50;
      display: flex;
      transition: transform 220ms var(--ease);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }
    #left-rail { left: 0; transform: translateX(-100%); }
    #right-rail { right: 0; transform: translateX(100%); }
    #left-rail.open { transform: translateX(0); }
    #right-rail.open { transform: translateX(0); }
    #left-resizer, #right-resizer, #left-expand, #right-expand { display: none; }
    .main-shell {
      min-width: 0;
      width: 100%;
      grid-column: 1 / -1;
      grid-row: 2;
      display: flex; flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    /* --- Laptop dock: Task Bank flows as left column --- */
    @media (min-width: 1280px) {
      #app {
        grid-template-columns: 280px minmax(0, 1fr);
      }
      #left-rail {
        position: relative;
        transform: none;
        width: 100%; max-width: none;
        z-index: 1;
        grid-column: 1;
        grid-row: 2;
        box-shadow: none;
        border-radius: var(--radius-panel);
      }
      .main-shell { grid-column: 2; }
      .nav-drawer-btn.left { display: none !important; }
      .drawer-backdrop.left-only { display: none !important; }
    }

    /* --- Desktop dock: Review rail also flows --- */
    @media (min-width: 1600px) {
      #app {
        grid-template-columns: 280px minmax(0, 1fr) 340px;
      }
      #right-rail {
        position: relative;
        transform: none;
        width: 100%; max-width: none;
        z-index: 1;
        grid-column: 3;
        grid-row: 2;
        box-shadow: none;
        border-radius: var(--radius-panel);
      }
      .nav-drawer-btn.right { display: none !important; }
      .drawer-backdrop { display: none !important; }
    }

    /* --- Ultra-wide: give rails more breathing room --- */
    @media (min-width: 1920px) {
      #app {
        grid-template-columns: 320px minmax(0, 1fr) 380px;
        gap: 14px;
        padding: 18px;
        padding-bottom: 46px;
      }
    }
    #top-nav {
      grid-column: 1 / -1;
      grid-row: 1;
      display: flex; align-items: center; gap: 14px;
      padding: 8px 14px;
      background: var(--panel);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
    }
    .nav-brand {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding-right: 8px;
      border-right: 1px solid var(--border);
    }
    .nav-tabs {
      display: flex; align-items: center; gap: 4px;
    }
    .nav-tab {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      color: var(--text-secondary);
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
      white-space: nowrap;
    }
    .nav-tab:hover { color: var(--text-primary); background: var(--overlay); }
    .nav-tab.active {
      background: var(--overlay-strong);
      color: var(--text-primary);
      border-color: var(--border);
    }
    .nav-tab.active::before {
      content: ''; position: absolute;
      left: 0; right: 0; bottom: -9px; height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
    }
    .nav-tab { position: relative; }
    .nav-tab-icon { font-size: 13px; }
    .nav-tab-count {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-left: 2px;
      padding: 1px 5px;
      background: var(--overlay);
      border-radius: 4px;
    }
    .nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 6px; flex-shrink: 0; }
    .nav-tab.secondary { padding: 6px 8px; font-size: 12px; color: var(--text-tertiary); }
    .nav-spacer { flex: 1; }
    .nav-right {
      display: flex; align-items: center; gap: 10px;
    }
    .nav-right .context-pills { margin: 0; }
    .nav-drawer-btn {
      display: none;
      width: 36px; height: 36px;
      align-items: center; justify-content: center;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 18px; cursor: pointer;
      flex-shrink: 0;
    }
    .nav-drawer-btn:hover { color: var(--text-primary); background: var(--overlay-strong); }

    /* Drawer backdrop — no blur, subtle dim so main content stays readable */
    .drawer-backdrop {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.28);
      z-index: 40;
    }

    /* ------ Responsive breakpoints ------ */
    /* Drawer toggles always visible since rails are always drawers now */
    .nav-drawer-btn.left,
    .nav-drawer-btn.right { display: inline-flex; }
    .nav-tabs {
      min-width: 0;
      overflow-x: auto; overflow-y: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { flex-shrink: 0; }
    @media (max-width: 820px) {
      #app {
        padding: 10px; padding-bottom: 46px;
        gap: 6px;
      }
      #top-nav { padding: 6px 10px; gap: 8px; flex-wrap: nowrap; }
      .nav-brand { display: none; }
      .nav-tab { padding: 6px 10px; font-size: 12px; }
      .nav-tab.secondary { padding: 5px 8px; font-size: 11px; }
      .nav-sep { display: none; }
      .nav-spacer { display: none; }
      .nav-right { gap: 4px; }
      .nav-right .context-pills button { padding: 4px 8px; font-size: 10px; }
    }
    /* Tablet / small-laptop: icon-only nav tabs so "Activity" doesn't truncate.
       Keep the active tab's label so the nav never looks broken. */
    @media (max-width: 1024px) {
      .nav-tab .nav-tab-count { display: none; }
      .nav-tab-icon { font-size: 15px; }
      .nav-tab span:not(.nav-tab-icon):not(.nav-tab-count) { display: none; }
      .nav-tab.active span:not(.nav-tab-icon):not(.nav-tab-count) { display: inline; }
    }
    @media (max-width: 560px) {
      #top-nav { padding: 5px 8px; gap: 6px; }
      .nav-right .context-pills button:not(.active) { display: none; }
      .top3 { grid-template-columns: 1fr !important; }
      .schedule-hour { font-size: 10px; padding: 6px 6px; }
      .schedule-row { grid-template-columns: 52px 1fr; }
      .projects-hub-grid { grid-template-columns: 1fr; }
      .main-header { flex-wrap: wrap; gap: 6px; }
      .main-title { font-size: 18px; }
      .modal { max-width: calc(100vw - 24px); margin: 12px; }
    }
    @media (max-width: 900px) {
      .planner-grid { grid-template-columns: 1fr; }
      .time-blocks { grid-template-columns: repeat(2, 1fr); }
    }

    /* Projects hub */
    .projects-hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 0 2px;
    }
    .projects-hub-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 16px 14px;
      cursor: pointer;
      overflow: hidden;
      transition: transform 180ms var(--spring), box-shadow 180ms var(--ease), border-color 180ms var(--ease);
      display: flex; flex-direction: column; gap: 10px;
      min-height: 120px;
    }
    .projects-hub-card:hover {
      transform: translateY(-2px);
      border-color: var(--border-strong);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
    }
    .projects-hub-card-accent {
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
    }
    .projects-hub-card-head {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 10px;
    }
    .projects-hub-card-title {
      font-size: 15px; font-weight: 600;
      color: var(--text-primary);
      line-height: 1.25;
    }
    .projects-hub-card-ctx {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em;
      padding: 2px 6px; border-radius: 4px;
      color: var(--text-tertiary);
      background: var(--overlay);
    }
    .projects-hub-card-ctx.work { color: var(--work); }
    .projects-hub-card-ctx.personal { color: var(--personal); }
    .projects-hub-card-meta {
      display: flex; gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-tertiary);
    }
    .projects-hub-card-link-row { margin-top: -2px; }
    .projects-hub-card-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 11px; color: var(--text-tertiary);
      text-decoration: none;
      padding: 3px 8px; border-radius: 6px;
      background: var(--overlay);
      max-width: 100%;
    }
    .projects-hub-card-link:hover { color: var(--text-primary); background: var(--overlay-strong); }
    .projects-hub-card-link .truncate {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 200px;
    }
    .projects-hub-card-people {
      display: flex; flex-wrap: wrap; gap: 4px;
      margin-top: auto;
    }
    .projects-hub-more {
      font-size: 11px; color: var(--text-tertiary);
      padding: 3px 6px;
    }
    .rail, .main-shell {
      background: var(--panel);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border); border-radius: var(--radius-panel);
      display: flex; flex-direction: column; overflow: hidden;
      min-width: 0;
      grid-row: 2;
    }
    .rail-resizer {
      background: transparent;
      cursor: col-resize;
      border-radius: 3px;
      transition: background 150ms var(--ease);
      align-self: stretch;
      min-height: 0;
      grid-row: 2;
    }
    .rail-expand { grid-row: 2; }
    .rail-resizer:hover, .rail-resizer.active {
      background: linear-gradient(180deg, var(--accent-from), var(--accent-to));
    }
    .rail-expand {
      width: 0; overflow: hidden; padding: 0;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      align-self: center;
      cursor: pointer;
      transition: background 150ms var(--ease), color 150ms var(--ease);
    }
    .rail-expand.visible { width: 18px; padding: 6px 0; }
    .rail-expand:hover { background: var(--overlay-strong); color: var(--text-primary); }
    #app.hide-left #left-rail, #app.hide-left #left-resizer { display: none; }
    #app.hide-right #right-rail, #app.hide-right #right-resizer { display: none; }

    /* ---------- Context pills (top of left rail) ---------- */
    .context-pills {
      display: flex; gap: 2px; padding: 4px;
      margin: 10px 14px 14px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .context-pill {
      flex: 1; padding: 6px 0;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-tertiary);
      border-radius: 7px;
      transition: all 180ms var(--ease);
      font-family: 'JetBrains Mono', monospace;
    }
    .context-pill:hover { color: var(--text-primary); }
    .context-pill.active {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    .context-pill.work.active { color: var(--work); }
    .context-pill.personal.active { color: var(--personal); }

    /* ---------- Left rail ---------- */
    #left-rail { padding: 10px 0 18px; }
    .rail-section { display: flex; flex-direction: column; gap: 2px; padding: 0 10px; }
    .rail-section + .rail-section { margin-top: 18px; }
    .rail-divider { height: 1px; margin: 14px 20px; background: var(--border); }
    .rail-heading {
      text-transform: uppercase; font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
      color: var(--text-tertiary); padding: 0 12px 8px;
      font-family: 'JetBrains Mono', monospace;
    }
    .rail-heading.collapsible {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      cursor: pointer;
      user-select: none;
      border-radius: 6px;
      transition: background 120ms, color 120ms;
    }
    .rail-heading.collapsible:hover { background: var(--overlay); color: var(--text-secondary); }
    .rail-heading-arrow {
      display: inline-block; width: 10px; font-size: 9px;
      color: var(--text-tertiary);
    }
    .rail-heading.collapsed { padding-bottom: 4px; }
    .bank-dock-btn {
      margin-left: auto;
      width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-tertiary);
      font-size: 10px;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .bank-dock-btn:hover { color: var(--text-primary); border-color: var(--border-strong); background: var(--overlay); }
    .rail-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      transition: background 150ms var(--ease);
      position: relative; color: var(--text-secondary); font-weight: 500;
    }
    .rail-item:hover { background: var(--overlay); color: var(--text-primary); }
    .rail-item.active { background: var(--overlay-strong); color: var(--text-primary); }
    .rail-item.active::before {
      content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, var(--accent-from), var(--accent-to));
    }
    .rail-icon { font-size: 16px; width: 20px; text-align: center; }
    .rail-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: linear-gradient(135deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
      box-shadow: 0 0 8px var(--item-from, #7c3aed);
    }
    .rail-label { flex: 1; font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .ctx-mark {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .ctx-mark.work { background: var(--work); }
    .ctx-mark.personal { background: var(--personal); }
    .rail-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-tertiary); background: rgba(255, 255, 255, 0.04);
      padding: 2px 6px; border-radius: 6px; min-width: 22px; text-align: center;
    }
    .rail-add {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px; cursor: pointer;
      color: var(--text-tertiary); font-size: 13px; font-weight: 500;
      transition: color 150ms var(--ease);
    }
    .rail-add:hover { color: var(--text-primary); }

    .bank-list {
      padding: 0 10px; overflow-y: auto; flex: 1;
      display: flex; flex-direction: column; gap: 6px; margin-top: 6px;
    }
    .bank-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px; font-size: 13px; cursor: grab;
      transition: all 150ms var(--ease); line-height: 1.35;
      position: relative;
    }
    .bank-card:hover { background: var(--card-hover); transform: translateX(2px); }
    .bank-card:active { cursor: grabbing; }
    .bank-card-ctx {
      position: absolute; top: 8px; right: 8px;
      width: 5px; height: 5px; border-radius: 50%;
    }
    .bank-card-ctx.work { background: var(--work); }
    .bank-card-ctx.personal { background: var(--personal); }
    .bank-card-meta {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-tertiary);
    }
    .bank-card-meta .due-pill {
      padding: 1px 6px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
    }
    .bank-card-meta .due-pill.overdue { color: #f87171; background: rgba(248, 113, 113, 0.08); }
    .bank-card-meta .due-pill.today { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
    .bank-card-meta .rec-pill { padding: 1px 6px; border-radius: 4px; background: rgba(124, 58, 237, 0.12); color: #c4b5fd; }
    .bank-empty {
      padding: 16px 14px; color: var(--text-tertiary);
      font-size: 12px; font-style: italic; text-align: center;
    }

    /* ---------- Main panel ---------- */
    .main-shell { padding: 0; }
    .main-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 28px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }
    .main-title {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 12px;
    }
    .main-title-dot {
      width: 14px; height: 14px; border-radius: 4px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      box-shadow: 0 0 12px var(--accent-from);
    }
    .main-subtitle {
      color: var(--text-tertiary); font-size: 13px;
      font-family: 'JetBrains Mono', monospace; margin-left: auto;
    }
    .main-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 14px;
      transition: background 150ms var(--ease), color 150ms var(--ease);
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--text-primary); }
    .icon-btn.danger:hover { color: var(--danger); }
    .text-btn {
      padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      transition: all 150ms var(--ease);
    }
    .text-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); border-color: var(--border-strong); }
    .text-btn.primary {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-color: transparent;
    }
    .text-btn.primary:hover { transform: translateY(-1px); }

    .main-body { flex: 1; overflow: auto; padding: 18px 20px 20px; }

    /* ---------- Kanban board ---------- */
    .board { display: flex; gap: 14px; min-height: 100%; align-items: flex-start; }
    .column {
      background: var(--surface-sub);
      border: 1px solid var(--border); border-radius: var(--radius-col);
      width: 300px; flex-shrink: 0;
      display: flex; flex-direction: column;
      max-height: calc(100vh - 180px);
      transition: background 200ms var(--ease);
    }
    .column.drop-target {
      background: rgba(30, 30, 56, 0.6);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 0 30px -5px var(--accent-from);
    }
    .column-header {
      padding: 14px 16px 10px;
      display: flex; align-items: center; gap: 10px;
      position: relative;
    }
    .column-header::after {
      content: ''; position: absolute; left: 16px; right: 16px; bottom: 0;
      height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
      opacity: 0.8;
    }
    .column-title {
      font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
      flex: 1; outline: 0;
    }
    .column-title[contenteditable]:focus {
      background: rgba(255, 255, 255, 0.04); border-radius: 4px;
      padding: 2px 4px; margin: -2px -4px;
    }
    .column-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-tertiary);
      padding: 2px 6px; background: rgba(255, 255, 255, 0.04); border-radius: 6px;
    }
    .column-menu-wrap { position: relative; }
    .column-menu {
      position: absolute; right: 0; top: 100%; margin-top: 6px;
      background: var(--panel-solid); border: 1px solid var(--border-strong);
      border-radius: 10px; padding: 6px; z-index: 10;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      min-width: 160px; display: flex; flex-direction: column;
    }
    .column-menu button {
      padding: 8px 10px; text-align: left; border-radius: 6px; font-size: 13px;
      color: var(--text-secondary); transition: background 120ms;
    }
    .column-menu button:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
    .column-menu button.danger:hover { color: var(--danger); }

    .column-cards {
      padding: 10px 10px 12px; overflow-y: auto; flex: 1;
      min-height: 80px; display: flex; flex-direction: column; gap: 8px;
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 12px 14px; cursor: grab;
      transition: transform 180ms var(--spring), box-shadow 180ms var(--ease), background 180ms var(--ease);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      position: relative;
    }
    .card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.08),
                  0 0 40px -10px var(--accent-from);
    }
    .card.sortable-ghost { opacity: 0.2; }
    .card.sortable-chosen { cursor: grabbing; }
    .card.sortable-drag {
      transform: rotate(2deg) scale(1.03) !important;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 40px -5px var(--accent-from) !important;
    }
    .card-title { font-weight: 500; font-size: 14px; color: var(--text-primary); line-height: 1.35; }
    .card-notes-preview {
      color: var(--text-tertiary); font-size: 12px; margin-top: 4px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .card-footer:empty { display: none; }
    .card-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 2px 8px; border-radius: 6px;
      border: 1px solid var(--border-strong); color: var(--text-secondary);
    }
    .card-pill.today { color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
    .card-pill.tomorrow { color: #60a5fa; border-color: rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.08); }
    .card-pill.scheduled { color: #a78bfa; border-color: rgba(167, 139, 250, 0.3); background: rgba(167, 139, 250, 0.08); }
    .card-pill.plan { color: #f472b6; border-color: rgba(244, 114, 182, 0.3); background: rgba(244, 114, 182, 0.08); }

    .card.expanded { cursor: default; background: var(--surface-elev); padding: 14px; }
    .card.expanded:hover { transform: none; }
    .card-edit-title {
      font-weight: 500; font-size: 14px; color: var(--text-primary); width: 100%;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
    }
    .card-edit-notes {
      width: 100%; margin-top: 8px; min-height: 60px;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
      color: var(--text-secondary); font-size: 13px;
    }
    .card-edit-row { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
    .due-opt {
      padding: 4px 8px; border-radius: 6px; font-size: 11px;
      font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
      color: var(--text-tertiary); background: var(--overlay);
      border: 1px solid transparent;
      transition: all 150ms var(--ease);
    }
    .due-opt:hover { color: var(--text-primary); background: var(--overlay-strong); }
    .due-opt.selected {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.35);
    }

    .col-add-btn {
      padding: 8px 12px; margin: 0 10px 10px;
      font-size: 12px; color: var(--text-tertiary);
      border: 1px dashed var(--border); border-radius: 8px;
      transition: all 150ms var(--ease);
    }
    .col-add-btn:hover {
      color: var(--text-primary); border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.03);
    }
    .col-empty {
      padding: 30px 16px; text-align: center; color: var(--text-tertiary);
      font-size: 12px; font-style: italic; line-height: 1.5;
    }
    .column.add-column {
      border-style: dashed; background: transparent; cursor: pointer;
      width: 180px; min-height: 100px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 13px;
      transition: all 150ms var(--ease);
    }
    .column.add-column:hover {
      background: rgba(255, 255, 255, 0.03); color: var(--text-primary); border-color: var(--border-strong);
    }

    /* ---------- Today schedule (hourly timeline) ---------- */
    .schedule {
      background: rgba(18, 18, 36, 0.4);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .schedule-row {
      display: grid;
      grid-template-columns: 70px 1fr;
      border-top: 1px solid var(--border);
      min-height: 44px;
    }
    .schedule-row:first-child { border-top: 0; }
    .schedule-row.now { background: rgba(96, 165, 250, 0.06); }
    .schedule-hour {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      padding: 8px 10px;
      border-right: 1px solid var(--border);
      display: flex; align-items: flex-start;
    }
    .schedule-slot {
      padding: 4px 6px;
      position: relative;
      min-height: 44px;
      transition: background 120ms;
      cursor: copy;
    }
    .schedule-slot.sortable-hover,
    .schedule-slot:hover { background: var(--overlay); }
    .schedule-slot:hover::after {
      content: '+ click to add';
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      opacity: 0.7;
      pointer-events: none;
    }
    /* Don't show the add hint over slots that have cards */
    .schedule-slot:has(.schedule-card):hover::after { display: none; }
    .schedule-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: grab;
      display: flex; align-items: center; gap: 8px;
      transition: background 120ms;
    }
    .schedule-card:not(.timeline) + .schedule-card:not(.timeline) { margin-top: 4px; }
    .schedule-card:hover { background: var(--card-hover); }
    .schedule-card.done { opacity: 0.55; text-decoration: line-through; }
    .schedule-card.timeline {
      position: absolute;
      padding: 4px 10px;
      overflow: hidden;
      z-index: 2;
      align-items: flex-start;
      line-height: 1.25;
    }
    .schedule-card.timeline:hover { z-index: 4; }
    .schedule-card.timeline.resizing { z-index: 5; transition: none; }
    .schedule-card.timeline .schedule-card-title {
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .schedule-card-resize,
    .schedule-card-resize-top {
      position: absolute;
      left: 8px; right: 8px;
      height: 6px;
      cursor: ns-resize;
      z-index: 6;
    }
    .schedule-card-resize { bottom: 0; border-radius: 0 0 6px 6px; }
    .schedule-card-resize-top { top: 0; border-radius: 6px 6px 0 0; }
    .schedule-card-resize::after,
    .schedule-card-resize-top::after {
      content: '';
      position: absolute;
      left: 50%;
      width: 20px; height: 2px;
      background: var(--border-strong);
      border-radius: 1px;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 120ms;
    }
    .schedule-card-resize::after { bottom: 1px; }
    .schedule-card-resize-top::after { top: 1px; }
    .schedule-card.timeline:hover .schedule-card-resize::after,
    .schedule-card.timeline:hover .schedule-card-resize-top::after,
    .schedule-card-resize:hover::after,
    .schedule-card-resize-top:hover::after { opacity: 1; }
    body.sched-dragging .schedule-card.timeline:not(.sortable-drag):not(.sortable-chosen) {
      pointer-events: none;
    }
    .schedule-card-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--border-strong);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .schedule-card-check:hover { border-color: var(--accent-from); }
    .schedule-card.done .schedule-card-check {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent; color: white;
    }
    .schedule-card-title { flex: 1; line-height: 1.3; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .schedule-card-dur {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-tertiary);
      padding: 1px 5px; background: rgba(255, 255, 255, 0.04);
      border-radius: 4px; white-space: nowrap;
    }
    .schedule-card-proj {
      width: 6px; height: 6px; border-radius: 50%;
      background: linear-gradient(135deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
      flex-shrink: 0;
    }

    .unscheduled-pool {
      background: rgba(18, 18, 36, 0.4);
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 10px;
      min-height: 60px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .unscheduled-pool:empty + .unscheduled-empty { display: block; }
    .unscheduled-empty {
      padding: 14px; color: var(--text-tertiary);
      font-size: 12px; font-style: italic; text-align: center;
    }

    /* ---------- Today plan ---------- */
    .plan-wrap { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }
    .plan-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 10px;
    }
    .plan-section-title .count {
      color: var(--text-tertiary);
      padding: 2px 6px; background: rgba(255, 255, 255, 0.04);
      border-radius: 6px; font-size: 11px;
    }
    .plan-section-title .spacer { flex: 1; }

    .top3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .top3-slot {
      background: var(--surface-sub);
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 96px;
      transition: all 180ms var(--ease);
      position: relative;
      display: flex; flex-direction: column;
    }
    .top3-slot.filled { border-style: solid; background: rgba(40, 40, 68, 0.55); }
    .top3-slot:hover { border-color: var(--border-strong); }
    .top3-slot-num {
      position: absolute; top: 8px; right: 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-tertiary);
      font-weight: 700;
    }
    .top3-slot-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 12px; font-style: italic;
      cursor: pointer; text-align: center;
    }
    .top3-slot-empty:hover { color: var(--text-primary); }
    .plan-card {
      background: rgba(50, 50, 82, 0.8);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px 10px 42px; position: relative;
      cursor: pointer;
      transition: background 150ms var(--ease);
    }
    .plan-card:hover { background: rgba(60, 60, 100, 0.9); }
    .plan-card.done { opacity: 0.55; }
    .plan-card.done .plan-card-title { text-decoration: line-through; }
    .plan-card-check {
      position: absolute; top: 10px; left: 10px;
      width: 22px; height: 22px;
      border: 2px solid var(--border-strong); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .plan-card-check:hover { border-color: var(--accent-from); background: var(--overlay); }
    .plan-card.done .plan-card-check {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent; color: white;
    }
    .plan-card-proj {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .plan-card-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--item-from), var(--item-to)); }
    .plan-card-title { font-size: 13px; font-weight: 500; line-height: 1.35; padding-right: 18px; }
    .plan-card-remove {
      position: absolute; top: 6px; right: 8px;
      color: var(--text-tertiary); font-size: 14px;
      opacity: 0; transition: opacity 150ms;
    }
    .plan-card:hover .plan-card-remove { opacity: 1; }
    .plan-card-remove:hover { color: var(--danger); }

    .time-blocks { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .time-block {
      background: var(--surface-sub);
      border: 1px solid var(--border); border-radius: 14px;
      display: flex; flex-direction: column;
      min-height: 140px;
    }
    .time-block-head {
      padding: 10px 14px 8px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .time-block-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-secondary); flex: 1;
      font-family: 'JetBrains Mono', monospace;
    }
    .time-block-body {
      padding: 10px; display: flex; flex-direction: column; gap: 6px;
      flex: 1; overflow: auto;
    }
    .time-block-empty {
      color: var(--text-tertiary); font-size: 11px; font-style: italic;
      padding: 10px; text-align: center;
    }
    .also-due-list { display: flex; flex-direction: column; gap: 8px; }

    /* ---------- Today group (aggregate per project) ---------- */
    .today-group { margin-bottom: 18px; }
    .today-group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 0 0 10px 0; font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
    }
    .today-group-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--item-from), var(--item-to)); }

    /* ---------- Ideas / Automations view ---------- */
    .list-view { max-width: 720px; margin: 0 auto; }
    .list-add { margin-bottom: 16px; display: flex; gap: 8px; }
    .list-add input {
      flex: 1;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px;
      transition: border-color 150ms var(--ease);
    }
    .list-add input:focus { border-color: var(--border-strong); }
    .list-add select {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 0 10px; font-size: 12px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
    }
    .list-add button {
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 10px; font-weight: 600; font-size: 13px;
      transition: transform 150ms var(--spring);
    }
    .list-add button:hover { transform: translateY(-1px); }

    .list-item {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 14px 16px; margin-bottom: 8px;
      transition: background 150ms var(--ease), transform 150ms var(--spring);
      cursor: pointer; position: relative;
    }
    .list-item:hover { background: var(--card-hover); transform: translateX(2px); }
    .list-item.expanded { cursor: default; padding: 16px; }
    .list-item.expanded:hover { transform: none; }
    .list-item-head { display: flex; align-items: center; gap: 10px; }
    .list-item-title { flex: 1; font-weight: 500; font-size: 14px; }
    .list-item.expanded .list-item-title {
      font-size: 15px; width: 100%;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
    }
    .list-item-details {
      width: 100%; min-height: 70px; margin-top: 10px;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      color: var(--text-secondary); font-size: 13px;
    }
    .status-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 3px 8px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border-strong);
    }
    .status-pill.idea { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
    .status-pill.researching { color: #fbbf24; background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); }
    .status-pill.building { color: #60a5fa; background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); }
    .status-pill.done { color: #34d399; background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); }

    .context-toggle {
      display: inline-flex; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 2px;
    }
    .context-toggle button {
      padding: 3px 8px; font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-tertiary);
      border-radius: 5px;
      transition: all 150ms var(--ease);
    }
    .context-toggle button.active.work { color: var(--work); background: rgba(96,165,250,0.1); }
    .context-toggle button.active.personal { color: var(--personal); background: rgba(52,211,153,0.1); }

    .list-item-actions {
      display: flex; gap: 6px;
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .list-item-actions .spacer { flex: 1; }
    .promote-btn {
      padding: 6px 12px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 6px;
      font-weight: 600; font-size: 12px;
      transition: transform 150ms var(--spring);
    }
    .promote-btn:hover { transform: translateY(-1px); }

    .item-files {
      margin-top: 12px; padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px dashed var(--border); border-radius: 10px;
      min-height: 54px;
      transition: border-color 150ms var(--ease), background 150ms var(--ease);
    }
    .item-files.drag-over { border-color: var(--accent-from); background: rgba(124, 58, 237, 0.08); }
    .item-files-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }
    .item-files-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .item-files-empty { color: var(--text-tertiary); font-size: 12px; font-style: italic; }

    /* ---------- Goals view ---------- */
    .goal-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .goal-head { display: flex; align-items: center; gap: 10px; }
    .goal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .goal-target {
      display: flex; gap: 8px; align-items: center;
      font-size: 12px; color: var(--text-secondary); margin-top: 4px;
    }
    .cadence-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.06); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
      border: 1px solid var(--border);
    }
    .streak-badge {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.2), rgba(251, 113, 133, 0.2));
      border: 1px solid rgba(251, 146, 60, 0.3);
      border-radius: 999px;
      font-size: 12px; font-weight: 600;
      color: #fb923c;
      font-family: 'JetBrains Mono', monospace;
    }
    .goal-bar-row { display: flex; align-items: center; gap: 10px; }
    .goal-bar {
      flex: 1; height: 8px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden; position: relative;
    }
    .goal-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
      transition: width 300ms var(--spring);
      box-shadow: 0 0 12px var(--accent-from);
    }
    .goal-bar-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-secondary);
      white-space: nowrap;
    }
    .goal-actions { display: flex; gap: 8px; align-items: center; }

    /* ---------- Activity view ---------- */
    .activity-toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .activity-toolbar .spacer { flex: 1; }
    .activity-toolbar select, .activity-toolbar input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 12px;
      color: var(--text-secondary);
    }
    .activity-feed { max-width: 780px; margin: 0 auto; }
    .activity-day {
      margin-bottom: 24px;
    }
    .activity-day-head {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;
      padding: 6px 0; margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .activity-entry {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .activity-entry:last-child { border-bottom: 0; }
    .activity-icon {
      flex-shrink: 0; width: 28px; height: 28px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
    }
    .activity-icon.card_done { background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.3); color: #34d399; }
    .activity-icon.promoted { background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.15)); border-color: rgba(236, 72, 153, 0.3); }
    .activity-icon.manual { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.3); color: #fbbf24; }
    .activity-body { flex: 1; min-width: 0; }
    .activity-desc { font-size: 13px; color: var(--text-primary); line-height: 1.4; }
    .activity-meta {
      display: flex; gap: 8px; align-items: center;
      margin-top: 4px;
      font-size: 11px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .activity-meta .proj-link {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; background: rgba(255,255,255,0.04);
      border-radius: 4px;
    }
    .activity-ctx {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;

  <script>
    /* ========================================================================
       KANBAN COCKPIT — single-file prototype (v2: context + day plan + log)
       ======================================================================== */

    const STORAGE_KEY = 'cmd_state_v1';
    const SAVE_DEBOUNCE = 300;
    const PW_HASH = '387c287d2b18fc5dd1beb2b931e2901a34d5dfc6689e4f2eeec3c7a0cf0ea0bd';
    // Baked encrypted PAT for cross-device sync. Encrypted with the password via AES-GCM.
    // Paste the output of Settings → "Bake PAT for other devices" here.
    const BAKED_PAT_ENCRYPTED = '';

    async function sha256(str) {
      const buf = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const PBKDF2_SALT = 'cmd-sync-salt-v1';
    async function deriveKeyFromPassword(password) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey(
        'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: enc.encode(PBKDF2_SALT), iterations: 100000, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );
    }
    function bytesToB64(bytes) { return btoa(String.fromCharCode(...bytes)); }
    function b64ToBytes(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

    async function encryptWithPassword(plaintext, password) {
      const key = await deriveKeyFromPassword(password);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext)
      );
      return bytesToB64(iv) + ':' + bytesToB64(new Uint8Array(ct));
    }
    async function decryptWithPassword(encrypted, password) {
      const [ivB64, ctB64] = encrypted.split(':');
      const iv = b64ToBytes(ivB64);
      const ct = b64ToBytes(ctB64);
      const key = await deriveKeyFromPassword(password);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    }
    async function requireAuth() {
      const gate = document.getElementById('auth-gate');
      if (sessionStorage.getItem('cmd_auth') === '1') {
        gate.style.display = 'none';
        return;
      }
      return new Promise(resolve => {
        const input = document.getElementById('auth-input');
        const err = document.getElementById('auth-err');
        const btn = document.getElementById('auth-submit');
        const go = async () => {
          err.textContent = '';
          const pw = input.value;
          const h = await sha256(pw);
          if (h === PW_HASH) {
            sessionStorage.setItem('cmd_auth', '1');
            // If a baked PAT exists and no local PAT, decrypt and save
            if (BAKED_PAT_ENCRYPTED && !localStorage.getItem('cmd_gh_pat')) {
              try {
                const pat = await decryptWithPassword(BAKED_PAT_ENCRYPTED, pw);
                localStorage.setItem('cmd_gh_pat', pat);
              } catch (e) { console.warn('Baked PAT decrypt failed', e); }
            }
            gate.style.display = 'none';
            resolve(true);
          } else {
            err.textContent = 'Nope.';
            input.value = ''; input.focus();
          }
        };
        btn.addEventListener('click', go);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
        setTimeout(() => input.focus(), 60);
      });
    }
    function lockApp() {
      sessionStorage.removeItem('cmd_auth');
      location.reload();
    }
    // ---------- Microsoft Graph (calendar → tasks) ----------
    const GRAPH_SCOPES = ['Calendars.Read'];
    let _msalInstances = {};  // keyed by client_id
    async function getMsalInstance(clientId, tenantId) {
      const key = clientId + '|' + (tenantId || 'common');
      if (_msalInstances[key]) return _msalInstances[key];
      if (typeof msal === 'undefined') throw new Error('MSAL library not loaded yet — refresh the page.');
      const inst = new msal.PublicClientApplication({
        auth: {
          clientId,
          authority: 'https://login.microsoftonline.com/' + (tenantId || 'common'),
          redirectUri: window.location.origin + window.location.pathname,
        },
        cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false },
      });
      if (typeof inst.initialize === 'function') await inst.initialize();
      _msalInstances[key] = inst;
      return inst;
    }
    async function graphConnectSource(source) {
      const inst = await getMsalInstance(source.auth.client_id, source.auth.tenant_id);
      const result = await inst.loginPopup({ scopes: GRAPH_SCOPES, prompt: 'select_account' });
      if (!result || !result.account) throw new Error('Login cancelled');
      return result.account.homeAccountId;
    }
    async function graphGetToken(source) {
      const inst = await getMsalInstance(source.auth.client_id, source.auth.tenant_id);
      const account = source.auth.account_id
        ? inst.getAccountByHomeId(source.auth.account_id)
        : (inst.getAllAccounts()[0] || null);
      if (!account) throw new Error('Not signed in — click Connect.');
      try {
        const r = await inst.acquireTokenSilent({ scopes: GRAPH_SCOPES, account });
        return r.accessToken;
      } catch (e) {
        const r = await inst.acquireTokenPopup({ scopes: GRAPH_SCOPES, account });
        return r.accessToken;
      }
    }
    async function graphFetchEvents(source, startISO, endISO) {
      const token = await graphGetToken(source);
      const url = 'https://graph.microsoft.com/v1.0/me/calendar/calendarView'
        + '?startDateTime=' + encodeURIComponent(startISO)
        + '&endDateTime=' + encodeURIComponent(endISO)
        + '&$select=id,subject,start,end,bodyPreview,body,organizer,attendees,isCancelled,location,responseStatus'
        + '&$orderby=start/dateTime&$top=250';
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
      const res = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + token,
          'Prefer': 'outlook.timezone="' + tz + '"',
        },
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error('Graph ' + res.status + ': ' + t.slice(0, 200));
      }
      const data = await res.json();
      return (data.value || []).map(normalizeGraphEvent);
    }
    function normalizeGraphEvent(e) {
      return {
        id: e.id,
        subject: e.subject || '(no subject)',
        start_iso: (e.start && e.start.dateTime) || '',
        end_iso: (e.end && e.end.dateTime) || '',
        organizer: e.organizer && e.organizer.emailAddress ? (e.organizer.emailAddress.name || e.organizer.emailAddress.address || '') : '',
        attendees: (e.attendees || []).map(a => (a.emailAddress && (a.emailAddress.name || a.emailAddress.address)) || '').filter(Boolean),
        body_text: ((e.body && e.body.content) || e.bodyPreview || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim(),
        is_cancelled: !!e.isCancelled,
        is_declined: e.responseStatus && e.responseStatus.response === 'declined',
        location: (e.location && e.location.displayName) || '',
      };
    }
    function mapEventToCard(evt, source) {
      const mapping = source.mapping || {};
      const start = new Date(evt.start_iso);
      const end = new Date(evt.end_iso);
      const durationMin = Math.max(15, Math.round((end - start) / 60000) || 30);
      // Strip seconds and TZ from ISO so scheduled_time stays in YYYY-MM-DDTHH:MM:SS local form
      const schedTime = evt.start_iso.slice(0, 19);
      const titleTemplate = mapping.title_template || '{subject}';
      const title = titleTemplate
        .replace('{subject}', evt.subject)
        .replace('{organizer}', evt.organizer)
        .replace('{location}', evt.location);
      const bodyStrategy = mapping.body_strategy || 'verbatim';
      let notes = '';
      if (bodyStrategy === 'verbatim') notes = evt.body_text || '';
      else if (bodyStrategy === 'summarize') notes = evt.body_text ? evt.body_text.slice(0, 280) : '';
      if (evt.location) notes = (notes ? notes + '\n\n' : '') + '📍 ' + evt.location;
      if (evt.organizer) notes = (notes ? notes + '\n' : '') + '👤 ' + evt.organizer;
      return {
        title,
        notes,
        scheduled_time: schedTime,
        duration_minutes: durationMin,
        context: mapping.default_context || 'work',
        auto_complete: mapping.auto_complete !== false,
        source: { kind: 'calendar', source_id: source.id, event_id: evt.id },
      };

      const userPrompt = 'EMAIL:\n' + emailText.trim() + '\n\n'

        + '  "summary": "one-line summary of the email",\n'

        + '}\n\n'

        + '- "context" = "personal" only if the email is clearly about Chuck\'s personal life; otherwise "work".\n'

        + '- "people" = humans named who Chuck would collaborate with (exclude Chuck himself).\n'
        + '- Use empty arrays for none, and null for missing optional values.';
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'content-type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 1024,
          system: systemPrompt,

    async function ghApi(path, opts) {

    async function ensureSyncGist() {
      let id = getSyncGistId();
      if (id) {
        try { await ghApi('/gists/' + id); return id; } catch (e) { /* fall through and find */ }
      }
      const gists = await ghApi('/gists?per_page=100');
      const existing = gists.find(g => g.files && g.files[GIST_FILENAME]);
      if (existing) { setSyncGistId(existing.id); return existing.id; }
      const snapshot = { ...state, last_updated: new Date().toISOString() };
      const fresh = await ghApi('/gists', {
        method: 'POST',
        body: JSON.stringify({
          description: 'Magic Dashboard — state sync',
          public: false,
          files: { [GIST_FILENAME]: { content: JSON.stringify(snapshot, null, 2) } },
        }),
      });
      setSyncGistId(fresh.id);
      return fresh.id;

    async function pullFromSync() {
      if (!getSyncPat()) return null;
      const id = await ensureSyncGist();
      if (!id) return null;
      const gist = await ghApi('/gists/' + id);
      const file = gist.files && gist.files[GIST_FILENAME];
      if (!file) return null;
      // gists truncate large files — for now we accept full content
      const text = file.truncated ? await fetch(file.raw_url).then(r => r.text()) : file.content;
      try { return JSON.parse(text); } catch (e) { return null; }
    }

    async function pushToSync() {
      if (!getSyncPat()) return;
      try {
        syncStatus = 'syncing'; updateSyncBadge();
        const id = await ensureSyncGist();
        if (!id) { syncStatus = 'error'; updateSyncBadge(); return; }
        const payload = { ...state, last_updated: new Date().toISOString() };
        await ghApi('/gists/' + id, {
          method: 'PATCH',
          body: JSON.stringify({
            files: { [GIST_FILENAME]: { content: JSON.stringify(payload, null, 2) } },
          }),
        });
        state.last_updated = payload.last_updated;
        syncStatus = 'ok'; lastSyncAt = new Date();
      } catch (e) {
        console.warn('Sync push failed', e);
        syncStatus = 'error';
      }
      updateSyncBadge();
    }

    function schedulePush() {
      if (!getSyncPat()) return;

    function updateSyncBadge() {
      const badge = document.getElementById('sync-badge');

      badge.style.display = '';
      let icon = '•', title = 'Sync idle', color = 'var(--text-tertiary)';
      if (syncStatus === 'syncing') { icon = '⟳'; title = 'Syncing…'; color = '#60a5fa'; }
      else if (syncStatus === 'ok') { icon = '✓'; title = 'Synced ' + (lastSyncAt ? lastSyncAt.toLocaleTimeString() : ''); color = '#34d399'; }
      else if (syncStatus === 'error') { icon = '⚠'; title = 'Sync error — see console'; color = '#f43f5e'; }
      badge.textContent = icon;
      badge.title = title;
      badge.style.color = color;
    }

        const localTs = state.last_updated || '';

    // ---------- Subtask helpers (recursive) ----------
    function findSubtaskInTree(tree, id) {
      for (let i = 0; i < tree.length; i++) {
        if (tree[i].id === id) return { node: tree[i], parentArr: tree, index: i };
        const found = findSubtaskInTree(tree[i].subtasks || [], id);
        if (found) return found;
      }
      return null;
    }
    function countSubtaskProgress(tree) {
      let done = 0, total = 0;
      function walk(arr) {
        for (const s of arr) {
          total++;
          if (s.done) done++;
          if (s.subtasks && s.subtasks.length) walk(s.subtasks);
        }
      }
      walk(tree || []);
      return { done, total };
    }
    function addSubtask(cardId, parentSubtaskId, title) {
      const t = (title || '').trim();
      if (!t) return;
      setState(s => {

        if (!c) return;
        c.subtasks = c.subtasks || [];
        const newSub = { id: uid('st'), title: t, done: false, subtasks: [] };
        if (parentSubtaskId) {
          const res = findSubtaskInTree(c.subtasks, parentSubtaskId);
          if (res) {
            res.node.subtasks = res.node.subtasks || [];
            res.node.subtasks.push(newSub);
          }
        } else {
          c.subtasks.push(newSub);
        }
      });
    }
    function toggleSubtask(cardId, subtaskId) {
