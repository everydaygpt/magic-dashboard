    function parseDueFromText(text) {
      if (!text) return null;
      const lower = text.toLowerCase();
      if (/\btoday\b/.test(lower)) return 'today';
      if (/\btomorrow\b/.test(lower)) return 'tomorrow';
      const dowMatch = lower.match(/\b(monday|tuesday|wednesday|thursday|friday|saturday|sunday)\b/);
      if (dowMatch) {
        const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
        const target = days.indexOf(dowMatch[1]);
        const now_ = new Date(); const dow = now_.getDay();
        let diff = target - dow;
        if (diff <= 0) diff += 7;
        const d = new Date(now_); d.setDate(d.getDate() + diff); d.setHours(0, 0, 0, 0);
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }
      const mdy = text.match(/\b(\d{1,2})\/(\d{1,2})(?:\/(\d{2,4}))?\b/);
      if (mdy) {
        const month = parseInt(mdy[1], 10); const day = parseInt(mdy[2], 10);
        let year = mdy[3] ? parseInt(mdy[3], 10) : new Date().getFullYear();
        if (year < 100) year += 2000;
        if (month < 1 || month > 12 || day < 1 || day > 31) return null;
        return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
      }
      return null;
    }

    function formatDuration(minutes) {
      if (!minutes) return '';
      if (minutes < 60) return minutes + 'm';
      const h = Math.floor(minutes / 60);
      const m = minutes % 60;
      return m ? h + 'h ' + m + 'm' : h + 'h';
    }

    function migrateState(s) {
      if (!s || typeof s !== 'object') return defaultState();
      if (s.version !== 1) return defaultState();
      s.projects = (s.projects || []).map(p => ({
        ...p,
        context: p.context || 'work',

      if (s.automations && s.automations.length) {

            context: a.context || 'work',

      })();
      s.cards = (s.cards || []).map(c => ({

        archived: c.archived === true,
        recurrence: c.recurrence || null,
        recurrence_day: (typeof c.recurrence_day === 'number' && c.recurrence_day >= 0 && c.recurrence_day <= 6) ? c.recurrence_day : null,
        recurrence_interval: typeof c.recurrence_interval === 'number' && c.recurrence_interval > 0 ? c.recurrence_interval : null,
        recurrence_unit: ['day','week','month','year'].includes(c.recurrence_unit) ? c.recurrence_unit : null,
        auto_complete: c.auto_complete === true,
        last_missed_at: c.last_missed_at || null,
        missed_count: typeof c.missed_count === 'number' ? c.missed_count : 0,
        source: c.source || null,
        duration_minutes: c.duration_minutes == null ? null : c.duration_minutes,
        scheduled_time: c.scheduled_time || null,
        subtasks: Array.isArray(c.subtasks) ? c.subtasks : [],
      }));
      s.activity_log = s.activity_log || [];
      s.notes = s.notes || [];
      s.files = s.files || [];
      s.goals = (s.goals || []).map(g => ({
        id: g.id, title: g.title,
        target: g.target || '', cadence: g.cadence || 'weekly',
        target_count: g.target_count == null ? null : g.target_count,
        unit: g.unit || '',
        context: g.context || 'personal',
        checkins: Array.isArray(g.checkins) ? g.checkins : [],
        created_at: g.created_at || now(),
      }));
      s.ui = s.ui || { active_view: 'today', theme: 'dark', context_filter: 'all' };
      if (!s.ui.context_filter) s.ui.context_filter = 'all';
      if (!s.ui.last_seen_day) s.ui.last_seen_day = null;
      if (!s.ui.theme_mode) s.ui.theme_mode = 'dark';
      if (s.ui.sound_enabled == null) s.ui.sound_enabled = true;
      if (!Array.isArray(s.ui.idea_categories) || s.ui.idea_categories.length === 0) {
        s.ui.idea_categories = ['Automation', 'Tech build', 'Home project', 'Book / reading'];
      }
      s.planner_entries = (s.planner_entries || []).map(e => ({
        ...e,
        answers: e.answers || {},
        linked: e.linked || {},
        tasks: e.tasks || {},
      }));
      s.ui.banner_dismissed = s.ui.banner_dismissed || {};
      s.ui.collapsed_sections = s.ui.collapsed_sections || {};
      s.ui.calendar_sources = Array.isArray(s.ui.calendar_sources) ? s.ui.calendar_sources : [];
      s.ui.layout = s.ui.layout || {};
      if (typeof s.ui.layout.left_width !== 'number') s.ui.layout.left_width = 260;
      if (typeof s.ui.layout.right_width !== 'number') s.ui.layout.right_width = 300;
      if (typeof s.ui.layout.left_hidden !== 'boolean') s.ui.layout.left_hidden = false;
      if (typeof s.ui.layout.right_hidden !== 'boolean') s.ui.layout.right_hidden = false;
      if (typeof s.ui.layout.task_bank_on_right !== 'boolean') s.ui.layout.task_bank_on_right = false;
      if (s.ui.project_view_mode !== 'kanban' && s.ui.project_view_mode !== 'table') s.ui.project_view_mode = 'kanban';
      if (!s.ui.project_table_sort || typeof s.ui.project_table_sort !== 'object') s.ui.project_table_sort = { key: 'column', dir: 'asc' };
      return s;
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return migrateState(defaultState());
        const migrated = migrateState(JSON.parse(raw));
        // Persist the migrated shape so localStorage reflects current schema
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated)); } catch (e) {}
        return migrated;
      } catch (e) {
        console.warn('Failed to load state', e);
        return defaultState();
      }
    }

    function saveState() {
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => {
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
        catch (e) { console.warn('Failed to save', e); }
        schedulePush();
      }, SAVE_DEBOUNCE);
    }

    function setState(updater) {
      updater(state);
      saveState();
      render();
    }

    // ---------- Utilities ----------
    function uid(prefix) {
      return prefix + '_' + Math.random().toString(36).slice(2, 9) + Date.now().toString(36).slice(-4);
    }
    function now() { return new Date().toISOString(); }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function clearNode(node) { while (node.firstChild) node.removeChild(node.firstChild); }

    function el(tag, attrs, children) {
      attrs = attrs || {};
      children = children || [];
      const node = document.createElement(tag);
      for (const k in attrs) {
        const v = attrs[k];
        if (k === 'class') node.className = v;
        else if (k === 'style' && typeof v === 'object') Object.assign(node.style, v);
        else if (k === 'dataset' && typeof v === 'object') Object.assign(node.dataset, v);
        else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2).toLowerCase(), v);
        else if (v === true) node.setAttribute(k, '');
        else if (v !== false && v != null) node.setAttribute(k, v);
      }
      const list = Array.isArray(children) ? children : [children];
      for (let i = 0; i < list.length; i++) {
        const c = list[i];
        if (c == null || c === false) continue;
        node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
      }
      return node;
    }

    function extOf(name) {
      const i = name.lastIndexOf('.');
      return i < 0 ? 'file' : name.slice(i + 1).toLowerCase();
    }
    function todayISO() {
      const d = new Date();
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function isDueToday(c) {
      if (!c.due) return false;
      if (c.due === 'today') return true;
      if (c.due === 'tomorrow') return false;
      return c.due === todayISO();
    }
    function formatDay(iso) {
      const d = new Date(iso);
      const today = new Date();
      const yesterday = new Date(Date.now() - 86400000);
      const sameDay = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
      if (sameDay(d, today)) return 'Today · ' + d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      if (sameDay(d, yesterday)) return 'Yesterday · ' + d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      return d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
    }
    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    }

    // ---------- Context ----------
    function contextOf(source, kind) {
      if (kind === 'project') return source.context;
      if (kind === 'idea' || kind === 'automation') return source.context;
      if (kind === 'card') {
        if (source.project_id && source.project_id !== 'inbox') {
          const p = state.projects.find(x => x.id === source.project_id);
          return p ? p.context : null;
        }
        return source.context;
      }
      return null;
    }
    function contextMatches(ctx) {
      const filter = state.ui.context_filter;
      if (filter === 'all') return true;
      return ctx === filter;
    }

    // ---------- Queries (context-aware) ----------
    function projectById(id) { return state.projects.find(p => p.id === id); }
    function visibleProjects() {
      return state.projects.filter(p => contextMatches(p.context));
    }
    function cardsForColumn(pid, cid) {
      return state.cards
        .filter(c => c.project_id === pid && c.column_id === cid && !c.archived)
        .sort((a, b) => a.position - b.position);
    }
    function archivedCards() {
      return state.cards.filter(c => c.archived);
    }
    function visibleArchivedCards() {
      return archivedCards().filter(c => contextMatches(contextOf(c, 'card')));
    }
    function bankCards() {
      return state.cards
        .filter(c => c.project_id === 'inbox' && !c.archived && !c.scheduled_time)
        .sort((a, b) => a.position - b.position);
    }
    function visibleBankCards() {
      return bankCards().filter(c => contextMatches(c.context));
    }
    function projectCardCount(id) { return state.cards.filter(c => c.project_id === id && !c.archived).length; }
    function todayCards() {
      return state.cards.filter(c => {
        if (c.project_id === 'inbox') return false;
        if (c.archived) return false;
        if (!contextMatches(contextOf(c, 'card'))) return false;
        return isDueToday(c);
      });
    }
    function planCards(slot, planDate) {
      const date = planDate || currentPlanDate;
      return state.cards
        .filter(c => {
          if (c.today_slot !== slot || c.plan_date !== date) return false;
          if (!contextMatches(contextOf(c, 'card'))) return false;
          // Keep completed-today tasks visible (strike-through); hide older archived.
          if (c.archived) return c.done_at && c.done_at.slice(0, 10) === date;
          return true;
        })
        .sort((a, b) => a.today_position - b.today_position);
    }
    function tomorrowISO() {
      const d = new Date(Date.now() + 86400000);
      return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
    }
    function filesForOwner(ot, oi) { return state.files.filter(f => f.owner_type === ot && f.owner_id === oi); }
    function notesForProject(pid) { return state.notes.filter(n => n.project_id === pid).sort((a, b) => a.position - b.position); }
    function visibleIdeas() { return state.ideas.filter(i => contextMatches(i.context)); }
    function visibleAutomations() { return state.automations.filter(a => contextMatches(a.context)); }
    function visibleActivity() { return state.activity_log.filter(a => contextMatches(a.context)); }

    // ---------- Activity logging ----------
    function logActivity(kind, description, opts) {
      opts = opts || {};
      const entry = {
        id: uid('log'),
        timestamp: now(),
        kind,
        description,
        project_id: opts.project_id || null,
        source_type: opts.source_type || null,

      };
      state.activity_log.unshift(entry);

    function deleteActivity(id) { setState(s => { s.activity_log = s.activity_log.filter(e => e.id !== id); }); }

    // ---------- Mutations ----------
    function addProject(name, accent, context) {
      const id = uid('proj');

        { id: uid('col'), name: 'Today' },

        s.projects.push({ id, name, accent, context, people: [], link: '', columns: cols, created_at: now() });

    function renameProject(id, name) {

    }
    function changeProjectContext(pid, context) {

    function addProjectPerson(pid, name) {

      if (!n) return;

    function removeProjectPerson(pid, name) {

    function setProjectLink(pid, link) {

    function promptProjectLink(proj) {
      const current = proj.link || '';
      const v = prompt('Link URL for "' + proj.name + '" (leave blank to remove):', current);
      if (v === null) return;
      const trimmed = v.trim();
      if (trimmed && !/^https?:\/\//i.test(trimmed)) {
        setProjectLink(proj.id, 'https://' + trimmed);

        setProjectLink(proj.id, trimmed);

    function deleteProject(id, mode) {
      setState(s => {
        if (mode === 'move') {
          s.cards.forEach(c => {
            if (c.project_id === id) {
              c.project_id = 'inbox'; c.column_id = null;
              c.position = s.cards.filter(x => x.project_id === 'inbox').length;
            }
          });
        } else {
          s.cards = s.cards.filter(c => c.project_id !== id);
        }
        s.notes = s.notes.filter(n => n.project_id !== id);
        s.files = s.files.filter(f => !(f.owner_type === 'project' && f.owner_id === id));
        s.projects = s.projects.filter(p => p.id !== id);
        if (s.ui.active_view === id) s.ui.active_view = s.projects[0] ? s.projects[0].id : 'today';
      });

    function addColumn(pid, name, position) {
      setState(s => {
        const p = s.projects.find(x => x.id === pid);
        if (!p) return;
        const col = { id: uid('col'), name: name || 'New column' };
        if (position == null) p.columns.push(col);
        else p.columns.splice(position, 0, col);
      });
    }
    function renameColumn(pid, cid, name) {
      setState(s => {
        const p = s.projects.find(x => x.id === pid);
        if (!p) return;
        const c = p.columns.find(x => x.id === cid);
        if (c) c.name = name || 'Untitled';
      });
    }
    function deleteColumn(pid, cid, mode) {
      setState(s => {
        const p = s.projects.find(x => x.id === pid);
        if (!p) return;
        p.columns = p.columns.filter(c => c.id !== cid);
        if (mode === 'bank') {
          s.cards.forEach(c => {
            if (c.project_id === pid && c.column_id === cid) {
              c.project_id = 'inbox'; c.column_id = null;
              c.position = s.cards.filter(x => x.project_id === 'inbox').length;
            }
          });
        } else {
          s.cards = s.cards.filter(c => !(c.project_id === pid && c.column_id === cid));
        }
      });
    }

    function isDoneColumn(p, cid) {
      const col = p.columns.find(c => c.id === cid);
      return col && /done|complete|finished|shipped/i.test(col.name);
    }

    function addCard(pid, cid, title) {
      const t = title.trim();
      if (!t) return;
      setState(s => {
        const pos = s.cards.filter(c => c.project_id === pid && c.column_id === cid).length;
        const newCard = { id: uid('card'), project_id: pid, column_id: cid, position: pos, title: t, notes: '', due: null, today_slot: null, today_position: 0, context: null, created_at: now() };
        s.cards.push(newCard);
        const p = s.projects.find(x => x.id === pid);
        logActivity('card_created', 'Added task "' + t + '"', { project_id: pid, source_type: 'card', source_id: newCard.id, context: p ? p.context : null });
      });
    }

    function findLiveCardByTitle(title) {
      const t = (title || '').trim().toLowerCase();
      if (!t) return null;
      return state.cards.find(c => !c.archived && !c.done_at && (c.title || '').trim().toLowerCase() === t) || null;
    }

    function addBankCard(title, context) {
      const t = title.trim();
      if (!t) return null;
      const existing = findLiveCardByTitle(t);
      if (existing) return existing;
      const cardId = uid('card');
      setState(s => {
        const pos = s.cards.filter(c => c.project_id === 'inbox').length;
        s.cards.push({ id: cardId, project_id: 'inbox', column_id: null, position: pos, title: t, notes: '', due: null, today_slot: null, today_position: 0, context: context || null, created_at: now() });
        logActivity('card_created', 'Added task "' + t + '" to bank', { source_type: 'card', source_id: cardId, context });
      });
      return state.cards.find(c => c.id === cardId);
    }

    function updateCard(id, patch) {
      setState(s => { const c = s.cards.find(x => x.id === id); if (c) Object.assign(c, patch); });
    }
    function deleteCard(id) {
      setState(s => { s.cards = s.cards.filter(c => c.id !== id); });
      if (expandedCardId === id) expandedCardId = null;
    }

    function archiveOldDone() {
      const today = todayISO();
      let changed = false;
      state.cards.forEach(c => {
        if (c.archived) return;
        if (!c.done_at) return;
        if (c.project_id === 'inbox' || !c.column_id) return;
        const p = state.projects.find(x => x.id === c.project_id);
        if (!p || !isDoneColumn(p, c.column_id)) return;
        const doneDate = c.done_at.slice(0, 10);
        if (doneDate < today) { c.archived = true; changed = true; }
      });
      state.ui.last_seen_day = today;
      if (changed) saveState();
    }
    function unarchiveCard(id) {
      setState(s => {
        const c = s.cards.find(x => x.id === id);
        if (c) { c.archived = false; c.done_at = null; }
      });
    }
    function archiveDoneNow(projectId) {
      setState(s => {
        s.cards.forEach(c => {
          if (c.archived) return;
          if (c.project_id !== projectId || !c.column_id) return;
          const p = s.projects.find(x => x.id === projectId);
          if (!p || !isDoneColumn(p, c.column_id)) return;
          c.archived = true;
          if (!c.done_at) c.done_at = now();
        });
      });
    }

    function addIdeaCategory(name) {

    function deleteIdeaCategory(name) {

    function updateIdea(id, patch) { setState(s => { const i = s.ideas.find(x => x.id === id); if (i) Object.assign(i, patch); }); }
    function deleteIdea(id) {

    function updateAutomation(id, patch) { setState(s => { const a = s.automations.find(x => x.id === id); if (a) Object.assign(a, patch); }); }
    function deleteAutomation(id) {
      setState(s => {

    // ---------- Goals ----------
    function visibleGoals() { return state.goals.filter(g => contextMatches(g.context)); }
    function addGoal(title, cadence, targetCount, context) {
      const t = title.trim();
      if (!t) return;
      setState(s => {
        s.goals.push({
          id: uid('goal'), title: t, target: '', cadence: cadence || 'weekly',
          target_count: targetCount || null, unit: '',
          context: context || 'personal', checkins: [], created_at: now(),
        });
      });
    }
    function updateGoal(id, patch) {
      setState(s => { const g = s.goals.find(x => x.id === id); if (g) Object.assign(g, patch); });
    }
    function deleteGoal(id) { setState(s => { s.goals = s.goals.filter(g => g.id !== id); }); }
    function checkInGoal(id, amount) {
      let streakAfter = 0;
      let beforeStreak = 0;
      setState(s => {
        const g = s.goals.find(x => x.id === id);
        if (!g) return;
        beforeStreak = goalStreak(g);
        g.checkins.push({ id: uid('ci'), timestamp: now(), amount: amount || 1 });
        logActivity('manual', 'Checked in on goal "' + g.title + '"', { context: g.context });
        streakAfter = goalStreak(g);
      });
      soundCheckin();
      if (streakAfter > beforeStreak && isStreakMilestone(streakAfter)) {
        setTimeout(() => soundStreak(), 350);
      }
    }
    function removeCheckin(goalId, ciId) {
      setState(s => { const g = s.goals.find(x => x.id === goalId); if (g) g.checkins = g.checkins.filter(c => c.id !== ciId); });
    }

    function periodBounds(cadence, d) {
      const date = d instanceof Date ? new Date(d) : new Date(d + 'T00:00:00');
      date.setHours(0, 0, 0, 0);
      let start, end;
      if (cadence === 'daily') {
        start = new Date(date);
        end = new Date(date); end.setDate(end.getDate() + 1);
      } else if (cadence === 'weekly') {
        const dow = date.getDay(); // 0=Sun
        start = new Date(date); start.setDate(date.getDate() - dow);
        end = new Date(start); end.setDate(start.getDate() + 7);
      } else if (cadence === 'monthly') {
        start = new Date(date.getFullYear(), date.getMonth(), 1);
        end = new Date(date.getFullYear(), date.getMonth() + 1, 1);
      } else { // quarterly
        const q = Math.floor(date.getMonth() / 3);
        start = new Date(date.getFullYear(), q * 3, 1);
        end = new Date(date.getFullYear(), q * 3 + 3, 1);
      }
      return { start: start.getTime(), end: end.getTime() };
    }
    function checkinsInPeriod(goal, offset) {
      offset = offset || 0;
      const base = new Date();
      if (goal.cadence === 'daily') base.setDate(base.getDate() + offset);
      else if (goal.cadence === 'weekly') base.setDate(base.getDate() + offset * 7);
      else if (goal.cadence === 'monthly') base.setMonth(base.getMonth() + offset);
      else base.setMonth(base.getMonth() + offset * 3);
      const { start, end } = periodBounds(goal.cadence, base);
      let total = 0;
      for (const ci of goal.checkins) {
        const t = new Date(ci.timestamp).getTime();
        if (t >= start && t < end) total += (ci.amount || 1);
      }
      return total;
    }

    function resolveDueISO(due) {
      if (!due) return null;
      if (due === 'today') return todayISO();
      if (due === 'tomorrow') return tomorrowISO();
      if (/^\d{4}-\d{2}-\d{2}$/.test(due)) return due;
      return null;
    }

    function nextOccurrenceISO(fromISO, recurrence, recDay, custom) {
      const d = new Date(fromISO + 'T00:00:00');
      const today = new Date(todayISO() + 'T00:00:00');
      const customInterval = Math.max(1, Number(custom && custom.interval) || 1);
      const customUnit = (custom && custom.unit) || 'day';
      const advance = () => {
        if (recurrence === 'daily') {
          d.setDate(d.getDate() + 1);
        } else if (recurrence === 'weekly') {
          if (typeof recDay === 'number') {
            const diff = (recDay - d.getDay() + 7) % 7 || 7;
            d.setDate(d.getDate() + diff);
          } else {
            d.setDate(d.getDate() + 7);
          }
        } else if (recurrence === 'monthly') {
          d.setMonth(d.getMonth() + 1);
        } else if (recurrence === 'quarterly') {
          d.setMonth(d.getMonth() + 3);
        } else if (recurrence === 'custom') {
          if (customUnit === 'week') d.setDate(d.getDate() + 7 * customInterval);
          else if (customUnit === 'month') d.setMonth(d.getMonth() + customInterval);
          else if (customUnit === 'year') d.setFullYear(d.getFullYear() + customInterval);
          else d.setDate(d.getDate() + customInterval);
        } else {
          d.setDate(d.getDate() + 1);
        }
      };
      advance();
      while (d < today) advance();
      return d.toISOString().slice(0, 10);
    }

    function rollRecurringCards() {
      const today = todayISO();
      let changed = false;
      state.cards.forEach(c => {
        if (!c.recurrence || c.archived) return;
        const dueISO = resolveDueISO(c.due);
        if (!dueISO || dueISO >= today) return;
        if (c.auto_complete) {
          // Auto-complete occurrence: log as done, advance to next cycle.
          logActivity('card_done', 'Auto-completed recurring "' + c.title + '" (' + dueISO + ')', {
            project_id: c.project_id === 'inbox' ? null : c.project_id,
            source_type: 'card', source_id: c.id, context: c.context,
          });
        } else {
          logActivity('card_missed', 'Missed recurring "' + c.title + '" (due ' + dueISO + ')', {
            project_id: c.project_id === 'inbox' ? null : c.project_id,
            source_type: 'card', source_id: c.id, context: c.context,
          });
          c.missed_count = (c.missed_count || 0) + 1;
          c.last_missed_at = dueISO;
        }
        c.due = nextOccurrenceISO(dueISO, c.recurrence, c.recurrence_day, { interval: c.recurrence_interval, unit: c.recurrence_unit });
        c.done_at = null;
        c.scheduled_time = null;
        changed = true;
      });
      if (changed) { saveState(); }
    }

    function rollMissedSchedules() {
      // Any non-recurring scheduled task whose scheduled_time is in the past
      // and isn't completed → either auto-complete (user flag) or unschedule → bank.
      const today = todayISO();
      let changed = false;
      state.cards.forEach(c => {
        if (!c.scheduled_time) return;
        if (c.done_at || c.archived) return;
        if (c.recurrence) return; // recurring handled separately
        const schedDate = c.scheduled_time.slice(0, 10);
        if (schedDate >= today) return;
        if (c.auto_complete) {
          // End of scheduled day passed — mark done at the original scheduled time.
          c.done_at = c.scheduled_time;
          c.archived = true;
          logActivity('card_done', 'Auto-completed "' + c.title + '" (scheduled ' + schedDate + ')', {
            project_id: c.project_id === 'inbox' ? null : c.project_id,
            source_type: 'card', source_id: c.id, context: c.context,
          });
        } else {
          logActivity('card_missed', 'Rolled back to bank: "' + c.title + '" (scheduled ' + schedDate + ')', {
            project_id: c.project_id === 'inbox' ? null : c.project_id,
            source_type: 'card', source_id: c.id, context: c.context,

          c.scheduled_time = null;

        changed = true;
      });

    }

    function goalStreak(goal) {
      const target = goal.target_count || 1;
      let streak = 0;
      let offset = -1; // start from last completed period
      while (true) {
        const n = checkinsInPeriod(goal, offset);
        if (n >= target) { streak++; offset--; }
        else break;
        if (streak > 520) break; // safety
      }
      // include current period if target already hit
      if (checkinsInPeriod(goal, 0) >= target) streak++;
      return streak;
    }

    function scheduledOnDate(dateIso) {
      return state.cards.filter(c => {
        if (!c.scheduled_time) return false;
        if (c.scheduled_time.slice(0, 10) !== dateIso) return false;
        if (c.archived) {
          // Keep completed-today tasks on the schedule (strike-through) until day flips.
          return c.done_at && c.done_at.slice(0, 10) === dateIso;

    function hourOfScheduled(c) {
      if (!c.scheduled_time) return null;
      // Parse hour from local time string "YYYY-MM-DDTHH:..." without UTC conversion
      const m = c.scheduled_time.match(/T(\d{2}):/);
      if (m) return parseInt(m[1], 10);
      // Fallback: handle older UTC-format entries
      return new Date(c.scheduled_time).getHours();
    }
    function minuteOfScheduled(c) {
      if (!c.scheduled_time) return 0;
      const m = c.scheduled_time.match(/T\d{2}:(\d{2})/);
      if (m) return parseInt(m[1], 10);
      return new Date(c.scheduled_time).getMinutes();
    }
    function computeScheduleLayout(cards) {
      if (!cards.length) return {};
      const items = cards.map(c => {
        const start = hourOfScheduled(c) * 60 + minuteOfScheduled(c);
        const dur = c.duration_minutes || 60;
        return { id: c.id, start, end: start + dur, dur };
      });
      // Union-find clusters of transitively-overlapping cards
      const parent = {};
      items.forEach(t => { parent[t.id] = t.id; });
      const find = (x) => parent[x] === x ? x : (parent[x] = find(parent[x]));
      const union = (a, b) => { parent[find(a)] = find(b); };
      for (let i = 0; i < items.length; i++) {
        for (let j = i + 1; j < items.length; j++) {
          if (items[i].end > items[j].start && items[j].end > items[i].start) union(items[i].id, items[j].id);
        }
      }
      const clusters = {};
      items.forEach(t => { const r = find(t.id); (clusters[r] = clusters[r] || []).push(t); });
      const layout = {};
      Object.values(clusters).forEach(cluster => {
        cluster.sort((a, b) => a.start - b.start || b.dur - a.dur);
        const colEnds = [];
        cluster.forEach(t => {
          let col = colEnds.findIndex(e => e <= t.start);
          if (col === -1) { col = colEnds.length; colEnds.push(0); }
          colEnds[col] = t.end;
          layout[t.id] = { col };
        });
        const cols = colEnds.length;
        cluster.forEach(t => { layout[t.id].cols = cols; });
      });
      return layout;
    }

      const leftR = document.getElementById('left-resizer');
      const rightR = document.getElementById('right-resizer');
      const leftE = document.getElementById('left-expand');
      const rightE = document.getElementById('right-expand');

      const startDrag = (side) => (e) => {
        e.preventDefault();
        const resizerEl = side === 'left' ? leftR : rightR;
        resizerEl.classList.add('active');
        const startX = e.clientX;
        const startW = state.ui.layout[side + '_width'];
        const onMove = (ev) => {
          const dx = ev.clientX - startX;
          const w = side === 'left' ? startW + dx : startW - dx;
          const clamped = Math.max(180, Math.min(500, w));
          const app = document.getElementById('app');
          const L = state.ui.layout;
          L[side + '_width'] = clamped;
          // Live preview without full re-render
          const leftCol = L.left_hidden ? '0' : L.left_width + 'px';
          const rightCol = L.right_hidden ? '0' : L.right_width + 'px';
          app.style.gridTemplateColumns = `${leftCol} ${L.left_hidden ? '0' : '6px'} ${L.left_hidden ? 'auto' : '0'} 1fr ${L.right_hidden ? 'auto' : '0'} ${L.right_hidden ? '0' : '6px'} ${rightCol}`;
        };
        const onUp = () => {
          resizerEl.classList.remove('active');
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          saveState();
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      };
      leftR.addEventListener('pointerdown', startDrag('left'));
      rightR.addEventListener('pointerdown', startDrag('right'));
      leftR.addEventListener('dblclick', () => setState(s => { s.ui.layout = s.ui.layout || {}; s.ui.layout.left_hidden = true; }));
      rightR.addEventListener('dblclick', () => setState(s => { s.ui.layout = s.ui.layout || {}; s.ui.layout.right_hidden = true; }));
      leftE.addEventListener('click', () => setState(s => { s.ui.layout = s.ui.layout || {}; s.ui.layout.left_hidden = false; }));
      rightE.addEventListener('click', () => setState(s => { s.ui.layout = s.ui.layout || {}; s.ui.layout.right_hidden = false; }));
    }

      const currentPat = getSyncPat();

      }, currentPat

        : 'Not connected. Paste a fine-grained PAT with gist scope.');

      const connectBtn = el('button', {
        class: 'primary',
        onClick: async () => {
          const v = patInput.value.trim();
          if (!v) {
            setSyncPat(null); setSyncGistId(null);
            syncStatus = 'idle'; updateSyncBadge();
            closeModal();
            return;
          }
          setSyncPat(v);
          statusLine.textContent = 'Testing token…';
          try {
            const id = await ensureSyncGist();
            statusLine.textContent = 'Connected · gist ' + id.slice(0, 12) + '…';
            syncStatus = 'syncing'; updateSyncBadge();
            // Pull first to respect any existing state from another device
            const remote = await pullFromSync();
            if (remote) {
              const localTs = state.last_updated || '';
              const remoteTs = remote.last_updated || '';
              if (remoteTs > localTs) {
                if (confirm('Remote gist has newer state. Replace local with remote?')) {
                  state = migrateState(remote);
                  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
                  render();
                }
              }
            }
            await pushToSync();
            closeModal();
          } catch (e) {
            setSyncPat(null);
            statusLine.style.color = '#f43f5e';
            statusLine.textContent = 'Failed: ' + e.message;
          }

      }, currentPat ? 'Update token' : 'Connect');

        class: 'danger',

          syncStatus = 'idle'; updateSyncBadge();
          closeModal();
        },
      }, 'Disconnect') : null;

      const bakeBtn = currentPat ? el('button', {
        onClick: async () => {
          const pw = prompt('Enter your dashboard password so I can encrypt the PAT for other devices:');
          if (!pw) return;
          const h = await sha256(pw);
          if (h !== PW_HASH) { alert('Wrong password.'); return; }
          try {
            const encrypted = await encryptWithPassword(currentPat, pw);
            const out = el('textarea', {
              style: { width: '100%', minHeight: '80px', fontFamily: 'JetBrains Mono, monospace', fontSize: '11px' },
              readonly: true,
            });
            out.value = encrypted;
            const copyBtn = el('button', {
              onClick: () => { navigator.clipboard.writeText(encrypted); copyBtn.textContent = 'Copied'; setTimeout(() => copyBtn.textContent = 'Copy', 1200); },
            }, 'Copy');

            openModal([
              el('h3', {}, 'Bake PAT for all devices'),

              el('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', padding: '8px', background: 'var(--overlay)', borderRadius: '6px', marginBottom: '10px' } },

              el('p', { style: { fontSize: '11px', color: 'var(--text-tertiary)', marginTop: '12px' } },

              el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Close')]),

            setTimeout(() => { out.select(); }, 50);
          } catch (e) {

      const anthKeyInput = el('input', {

        style: { fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', color: 'var(--text-tertiary)', marginBottom: '10px' },
      }, getAnthropicKey() ? 'Connected — From email uses this key in your browser.' : 'Not set. Paste your Anthropic API key to enable email analysis.');

      openModal([
        el('h3', {}, 'Settings'),
        el('div', { class: 'modal-label' }, 'Cloud sync — GitHub Gist'),
        statusLine,
        el('p', { style: { fontSize: '12px' } }, 'Paste a fine-grained PAT with gist scope. State is stored as a private gist named cmd-state.json. Each device that uses the same PAT syncs to the same gist.'),

        el('div', { class: 'modal-label' }, 'Anthropic API key (for email analysis)'),
        anthStatusLine,
        el('p', { style: { fontSize: '12px' } }, 'Stored in this browser only. Used by the "From email" button to extract tasks from pasted email content.'),

    function bankCardEl(c) {
      const node = el('div', {
        class: 'bank-card',
        dataset: { cardId: c.id },
        onClick: () => openCardEditModal(c.id),
      }, [el('div', { class: 'bank-card-title' }, c.title)]);
      if (c.context) node.appendChild(el('span', { class: 'bank-card-ctx ' + c.context }));
      const dueLabel = formatDueLabel(c.due);
      const dueISO = resolveDueISO(c.due);
      const pills = [];
      if (dueLabel) {
        let cls = 'due-pill';
        const today = todayISO();
        if (dueISO && dueISO < today) cls += ' overdue';
        else if (dueLabel === 'Today') cls += ' today';
        const timeLabel = formatScheduledTimeLabel(c.scheduled_time);
        pills.push(el('span', { class: cls }, dueLabel + (timeLabel ? ' · ' + timeLabel : '')));
      }
      if (c.recurrence) {
        const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        let recLabel;
        if (c.recurrence === 'weekly' && typeof c.recurrence_day === 'number') {
          recLabel = 'Weekly · ' + dayLabels[c.recurrence_day];
        } else if (c.recurrence === 'custom' && c.recurrence_interval && c.recurrence_unit) {
          const n = c.recurrence_interval;
          recLabel = 'Every ' + n + ' ' + c.recurrence_unit + (n === 1 ? '' : 's');
        } else {
          recLabel = c.recurrence.charAt(0).toUpperCase() + c.recurrence.slice(1);
        }
        pills.push(el('span', { class: 'rec-pill' }, '↻ ' + recLabel));
      }
      if (c.missed_count) {
        pills.push(el('span', { class: 'due-pill overdue', title: 'Last missed ' + (c.last_missed_at || '') }, 'Missed × ' + c.missed_count));
      }
      if (pills.length) node.appendChild(el('div', { class: 'bank-card-meta' }, pills));
      return node;

    function subtaskSectionEl(cardId) {
      const wrap = el('div', { class: 'subtasks-wrap' });

      const rebuild = () => {
        clearNode(wrap);
        const c = state.cards.find(x => x.id === cardId);
        if (!c) return;
        const tree = c.subtasks || [];
        if (tree.length === 0) {
          wrap.appendChild(el('div', {
            style: { padding: '8px', color: 'var(--text-tertiary)', fontSize: '12px', fontStyle: 'italic' },
          }, 'No subtasks yet. Paste below or type one per line.'));
        }
        const renderNodes = (arr, parentEl) => {
          arr.forEach(st => {
            const row = el('div', { class: 'subtask-row' + (st.done ? ' done' : '') }, [
              el('div', {
                class: 'subtask-check' + (st.done ? ' checked' : ''),
                onClick: () => { toggleSubtask(cardId, st.id); rebuild(); },
              }, st.done ? '✓' : ''),
              el('span', {
                class: 'subtask-title',
                contenteditable: 'true',
                onBlur: (e) => { const v = e.target.textContent.trim(); if (v && v !== st.title) { editSubtaskTitle(cardId, st.id, v); rebuild(); } else { e.target.textContent = st.title; } },
                onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
              }, st.title),
              el('div', { class: 'subtask-actions' }, [
                el('button', {
                  title: 'Add sub-subtask',
                  onClick: () => {
                    const t = prompt('Sub-subtask:');
                    if (t && t.trim()) { addSubtask(cardId, st.id, t.trim()); rebuild(); }
                  },
                }, '+'),
                el('button', {
                  class: 'danger', title: 'Delete',
                  onClick: () => { deleteSubtask(cardId, st.id); rebuild(); },
                }, '×'),
              ]),
            ]);
            parentEl.appendChild(row);
            if (st.subtasks && st.subtasks.length) {
              const children = el('div', { class: 'subtask-children' });
              renderNodes(st.subtasks, children);
              parentEl.appendChild(children);
            }
          });
        };
        renderNodes(tree, wrap);

        // Bulk add
        const bulk = el('textarea', {
          placeholder: 'Add subtasks — one per line. Paste works.',
          onKeydown: (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); commitBulk(); }
          },
        });
        const commitBulk = () => {
          const lines = bulk.value.split('\n').map(l => l.trim()).filter(Boolean);
          if (!lines.length) return;
          lines.forEach(line => addSubtask(cardId, null, line));
          bulk.value = '';
          rebuild();
        };
        const bulkWrap = el('div', { class: 'subtask-bulk' }, [
          bulk,
          el('div', { class: 'row' }, [
            el('span', { class: 'hint' }, 'Ctrl/Cmd+Enter or button to submit all lines'),
            el('button', { onClick: commitBulk }, '+ Add'),
          ]),
        ]);
        wrap.appendChild(bulkWrap);
      };

      rebuild();
      return wrap;
    }

    function openCardEditModal(cardId) {
      const c = state.cards.find(x => x.id === cardId);
      if (!c) return;
      let title = c.title, notes = c.notes || '', due = c.due, context = c.context, recurrence = c.recurrence;
      let recurrenceDay = typeof c.recurrence_day === 'number' ? c.recurrence_day : null;
      let recurrenceInterval = typeof c.recurrence_interval === 'number' && c.recurrence_interval > 0 ? c.recurrence_interval : 2;
      let recurrenceUnit = ['day','week','month','year'].includes(c.recurrence_unit) ? c.recurrence_unit : 'week';
      let duration = c.duration_minutes || '';
      let timeHHMM = extractTimeHHMM(c.scheduled_time);
      let autoComplete = !!c.auto_complete;
      const titleInput = el('input', { type: 'text', value: title, onInput: (e) => title = e.target.value });
      const notesArea = el('textarea', { rows: 3, value: '', onInput: (e) => notes = e.target.value, style: { minHeight: '60px' } });
      notesArea.value = notes;
      const dateInput = el('input', {
        type: 'date',
        value: due && /^\d{4}-\d{2}-\d{2}$/.test(due) ? due : '',
        onChange: (e) => { if (e.target.value) { due = e.target.value; refreshDue(); } },
        style: { padding: '4px 6px', borderRadius: '6px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--text-secondary)', fontSize: '11px' },

      const mkUnit = (val, label) => {

      customRow.appendChild(mkUnit('day', 'days'));

      customRow.appendChild(mkUnit('year', 'years'));
      refreshSubRows();
      const timeInput = el('input', {

      });
      const save = () => {

        const dur = duration === '' || duration == null ? null : parseInt(duration, 10);
        const schedTime = composeScheduledTime(due, timeHHMM);
        updateCard(cardId, {
          title: title.trim(), notes: notes.trim(), due, context, recurrence,
          recurrence_day: recurrence === 'weekly' ? recurrenceDay : null,
          recurrence_interval: recurrence === 'custom' ? recurrenceInterval : null,
          recurrence_unit: recurrence === 'custom' ? recurrenceUnit : null,
          duration_minutes: (dur != null && !isNaN(dur) && dur >= 0) ? dur : null,
          scheduled_time: schedTime,
          auto_complete: autoComplete,
        });

      };
      const autoCompleteCheckbox = el('input', {

      });
      autoCompleteCheckbox.checked = autoComplete;
      const autoCompleteRow = el('label', {
        class: 'card-edit-row',
        style: { marginTop: '6px', cursor: 'pointer' },
      }, [
        autoCompleteCheckbox,
        el('span', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, 'Auto-complete at end of scheduled day'),
        el('span', { style: { fontSize: '10px', color: 'var(--text-tertiary)', fontStyle: 'italic' } }, '(for events that happen whether you "did" them or not — like hockey games)'),
      ]);
      const durationInput = el('input', {
        type: 'number', min: '0', step: '5', placeholder: 'Optional — minutes',
        value: duration,
        onInput: (e) => duration = e.target.value,
      });
      const del = () => {
        if (!confirm('Delete "' + c.title + '"?')) return;
        deleteCard(cardId);
        closeModal();
      };
      openModal([
        el('h3', {}, 'Edit task'),
        titleInput,
        notesArea,
        el('div', { class: 'modal-label' }, 'Context'),
        ctxToggle,
        el('div', { class: 'card-edit-row', style: { marginTop: '10px' } }, [
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Due'),
          noneBtn, todayBtn, tomorrowBtn, dateInput,
        ]),
        el('div', { class: 'card-edit-row', style: { marginTop: '6px' } }, [
          el('span', { style: rowLabelStyle2 }, 'At'),
          timeInput,
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)' } }, 'needs a due date'),
        ]),
        autoCompleteRow,

        el('div', { class: 'modal-label', style: { marginTop: '10px' } }, 'Estimated duration (optional)'),
        durationInput,
        el('div', { class: 'modal-label', style: { marginTop: '10px' } }, 'Subtasks'),
        subtaskSectionEl(cardId),
        el('div', { class: 'modal-actions' }, [
          el('button', { class: 'danger', onClick: del }, 'Delete'),

    // ---------- Main ----------
    function renderMain() {
      const header = document.getElementById('main-header');
      const body = document.getElementById('main-body');
      clearNode(header); clearNode(body);
      const view = state.ui.active_view;
      if (view === 'today') { renderTodayPlan(header, body); return; }
      if (view === 'daily' || view === 'weekly') { state.ui.active_view = 'today'; render(); return; }
      if (view === 'ideas') { renderIdeasView(header, body); return; }
      if (view === 'automations') { state.ui.active_view = 'ideas'; render(); return; }
      if (view === 'goals') { renderGoalsView(header, body); return; }
      if (view === 'activity') { renderActivityView(header, body); return; }
      if (view === 'done') { renderDoneView(header, body); return; }
      if (view === 'projects') { renderProjectsHub(header, body); return; }
      const proj = projectById(view);
      if (!proj) { state.ui.active_view = 'today'; render(); return; }
      renderProjectView(header, body, proj);
    }

    function renderProjectsHub(header, body) {
      header.appendChild(el('div', { class: 'main-title' }, [
        el('div', { class: 'main-title-dot' }),
        el('span', {}, 'Projects'),
      ]));

    // ---------- Today plan ----------
    function renderTodayPlan(header, body) {
      const isToday = currentPlanDate === todayISO();
      const isTomorrow = currentPlanDate === tomorrowISO();
      const label = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : new Date(currentPlanDate + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      header.appendChild(el('div', { class: 'main-title' }, [
        el('div', { class: 'main-title-dot' }),
        el('span', {}, isToday ? 'Today' : isTomorrow ? 'Plan tomorrow' : 'Plan ' + label),
      ]));
      const plannedCount = state.cards.filter(c => c.today_slot && c.plan_date === currentPlanDate && contextMatches(contextOf(c, 'card'))).length;
      const dueCount = isToday ? todayCards().length : 0;
      header.appendChild(el('div', { class: 'main-subtitle' }, plannedCount + ' planned' + (isToday ? ' · ' + dueCount + ' due today' : '')));
      header.appendChild(el('div', { class: 'main-actions' }, [
        planDateToggleEl(),
        el('button', { class: 'text-btn', onClick: () => { if (confirm('Clear the plan for ' + label + '?')) clearDayPlan(); } }, 'Clear'),
      ]));

      const wrap = el('div', { class: 'plan-wrap' });

      // Top 3
      const priorities = planCards('priority');
      const top3 = el('div', { class: 'top3' });
      for (let i = 0; i < 3; i++) {
        const c = priorities[i];
        top3.appendChild(top3SlotEl(c, i));
      }
      wrap.appendChild(el('div', {}, [
        el('div', { class: 'plan-section-title' }, [
          el('span', {}, 'Top 3'),
          el('span', { class: 'count' }, priorities.length + ' / 3'),
          el('div', { class: 'spacer' }),
          el('button', { class: 'text-btn', onClick: () => openCardPickerModal('priority') }, '+ Pick'),
        ]),
        top3,
      ]));

      // Hourly schedule (5 AM - midnight)
      const schedule = el('div', { class: 'schedule' });
      const scheduled = scheduledOnDate(currentPlanDate);
      const nowHour = isToday ? new Date().getHours() : -1;
      const scheduleLayout = computeScheduleLayout(scheduled);
      for (let h = 5; h <= 23; h++) {
        const row = el('div', { class: 'schedule-row' + (h === nowHour ? ' now' : '') });
        const label = new Date(2000, 0, 1, h).toLocaleTimeString(undefined, { hour: 'numeric' });
        row.appendChild(el('div', { class: 'schedule-hour' }, label));
        const slot = el('div', {
          class: 'schedule-slot',
          dataset: { scheduleHour: String(h) },
          onClick: (e) => {
            // Click on empty slot area → create new task at that hour (+ minute from click Y)
            if (e.target.closest('.schedule-card')) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const rel = e.clientY - rect.top;
            const snap = 15;
            const minute = Math.min(45, Math.max(0, Math.round(rel / rect.height * 60 / snap) * snap));
            createScheduledTaskAt(currentPlanDate, h, minute);
          },
        });
        scheduled
          .filter(c => hourOfScheduled(c) === h)
          .forEach(c => slot.appendChild(scheduleCardEl(c, scheduleLayout[c.id])));
        row.appendChild(slot);
        schedule.appendChild(row);
      }
      wrap.appendChild(el('div', {}, [
        el('div', { class: 'plan-section-title' }, [
          el('span', {}, 'Schedule'),
          el('span', { class: 'count' }, scheduled.length + ' scheduled'),
          el('div', { class: 'spacer' }),
          el('button', {
            class: 'text-btn',
            title: 'Clear all scheduled times for this day',
            onClick: () => {
              if (!confirm('Remove scheduled times for all ' + scheduled.length + ' cards?')) return;
              setState(s => { scheduled.forEach(c => { const cc = s.cards.find(x => x.id === c.id); if (cc) cc.scheduled_time = null; }); });
            },
          }, 'Unschedule all'),
        ]),
        schedule,
      ]));

      // Hook up Sortable for cross-hour and pool drag.
      // Accept drops from Task Bank + project columns (group 'cards') too.
      setTimeout(() => {
        const slots = wrap.querySelectorAll('.schedule-slot, .unscheduled-pool');
        slots.forEach(s => {
          Sortable.create(s, {
            group: { name: 'schedule', pull: true, put: ['schedule', 'cards'] },
            animation: 160,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            delay: 120, delayOnTouchOnly: true, touchStartThreshold: 5, fallbackOnBody: true,
            onStart: () => document.body.classList.add('sched-dragging'),
            // onAdd fires when a card arrives from ANOTHER list (bank, project column, pool)
            onAdd: (evt) => {
              const cardId = evt.item.dataset.cardId;
              if (!cardId) return;
              if (evt.to.classList.contains('unscheduled-pool')) {
                unscheduleCard(cardId);
              } else {
                const h = parseInt(evt.to.dataset.scheduleHour, 10);
                if (!isNaN(h)) scheduleCardAt(cardId, currentPlanDate, h);
              }
            },
            // onEnd handles reorders within schedule (card moved between hour slots)
            onEnd: (evt) => {
              document.body.classList.remove('sched-dragging');
              if (evt.from === evt.to) return; // same-list reorder, ignore
              // Cross-list moves WITHIN the schedule group (slot ↔ pool, slot ↔ slot)
              if (!evt.from.classList.contains('schedule-slot') && !evt.from.classList.contains('unscheduled-pool')) return;
              const cardId = evt.item.dataset.cardId;
              if (!cardId) return;
              if (evt.to.classList.contains('unscheduled-pool')) {
                unscheduleCard(cardId);
              } else if (evt.to.classList.contains('schedule-slot')) {
                const h = parseInt(evt.to.dataset.scheduleHour, 10);
                if (!isNaN(h)) scheduleCardAt(cardId, currentPlanDate, h);
              }
            },
          });
        });
        // Top 3 slots accept drops from bank / project columns / schedule
        wrap.querySelectorAll('.top3-slot').forEach((slotEl, i) => {
          Sortable.create(slotEl, {
            group: { name: 'top3', pull: false, put: ['cards', 'schedule'] },
            animation: 160,
            delay: 120, delayOnTouchOnly: true, touchStartThreshold: 5, fallbackOnBody: true,
            onAdd: (evt) => {
              const cardId = evt.item.dataset.cardId;
              evt.item.remove();
              if (!cardId) return;
              addCardToPlan(cardId, 'priority', currentPlanDate);
            },
          });
        });
      }, 0);

      // Unscheduled pool: cards for this date that don't have a scheduled_time yet
      const due = state.cards.filter(c => {
        if (c.archived) return false;
        if (c.scheduled_time) return false;
        if (!contextMatches(contextOf(c, 'card'))) return false;
        if (!c.due) return false;
        if (cardDueOnDate(c, currentPlanDate)) return true;
        return false;
      });
      // Unscheduled pool
      const pool = el('div', { class: 'unscheduled-pool' });
      due.forEach(c => pool.appendChild(scheduleCardEl(c)));
      const poolEmpty = el('div', { class: 'unscheduled-empty', style: { display: due.length === 0 ? 'block' : 'none' } }, 'Nothing unscheduled. Drag a card here to unschedule it.');
      wrap.appendChild(el('div', {}, [
        el('div', { class: 'plan-section-title' }, [
          el('span', {}, 'Unscheduled'),
          el('span', { class: 'count' }, String(due.length)),
          el('div', { class: 'spacer' }),
          el('span', { style: { fontSize: '10px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace' } }, 'drag into an hour above'),
        ]),
        pool,
        poolEmpty,
      ]));

      body.appendChild(wrap);
    }

    function planDateToggleEl() {
      const today = todayISO();
      const tomorrow = tomorrowISO();
      const yesterday = yesterdayISO();
      const isToday = currentPlanDate === today;
      const isTomorrow = currentPlanDate === tomorrow;
      const isYesterday = currentPlanDate === yesterday;
      const isCustom = !isToday && !isTomorrow && !isYesterday;
      const wrap = el('div', { class: 'context-toggle', style: { marginRight: '6px' } });
      wrap.appendChild(el('button', {
        class: isYesterday ? 'active work' : '',
        onClick: () => { currentPlanDate = yesterday; render(); },
      }, 'Yesterday'));
      wrap.appendChild(el('button', {
        class: isToday ? 'active work' : '',
        onClick: () => { currentPlanDate = today; render(); },
      }, 'Today'));
      wrap.appendChild(el('button', {
        class: isTomorrow ? 'active work' : '',
        onClick: () => { currentPlanDate = tomorrow; render(); },
      }, 'Tomorrow'));
      wrap.appendChild(el('button', {
        class: isCustom ? 'active work' : '',
        onClick: () => {
          const v = prompt('Plan date (YYYY-MM-DD):', currentPlanDate);
          if (v && /^\d{4}-\d{2}-\d{2}$/.test(v)) { currentPlanDate = v; render(); }
        },
        title: 'Custom date',
      }, isCustom ? new Date(currentPlanDate + 'T00:00:00').toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : 'Date…'));
      return wrap;
    }

    function scheduleCardEl(c, layout) {
      const proj = c.project_id && c.project_id !== 'inbox' ? projectById(c.project_id) : null;
      const style = proj ? { '--item-from': proj.accent.from, '--item-to': proj.accent.to } : {};
      if (layout) {
        const HOUR_PX = 44;
        const startMin = minuteOfScheduled(c);
        const dur = c.duration_minutes || 60;
        const gap = 2;
        const colPct = 100 / layout.cols;
        const leftGap = layout.col === 0 ? 0 : gap;
        const rightGap = layout.col === layout.cols - 1 ? 0 : gap;
        style.position = 'absolute';
        style.top = (startMin / 60 * HOUR_PX) + 'px';
        style.height = Math.max(26, dur / 60 * HOUR_PX - gap) + 'px';
        style.left = `calc(${layout.col * colPct}% + ${leftGap}px)`;
        style.width = `calc(${colPct}% - ${leftGap + rightGap}px)`;
      }
      const card = el('div', {
        class: 'schedule-card' + (c.done_at ? ' done' : '') + (layout ? ' timeline' : ''),
        dataset: { cardId: c.id },
        style,
        onClick: (e) => {
          if (e.target.closest('.schedule-card-resize') || e.target.closest('.schedule-card-resize-top')) return;
          if (e.target.closest('.schedule-card-check')) {
            toggleCardDone(c.id);
            return;
          }
          openCardEditModal(c.id);
        },
      }, [
        layout ? el('div', { class: 'schedule-card-resize-top', title: 'Drag to change start time' }) : null,
        el('span', { class: 'schedule-card-check' }, c.done_at ? '✓' : ''),
        proj ? el('span', { class: 'schedule-card-proj' }) : null,
        el('span', { class: 'schedule-card-title' }, c.title),
        c.duration_minutes ? el('span', { class: 'schedule-card-dur' }, formatDuration(c.duration_minutes)) : null,
        layout ? el('div', { class: 'schedule-card-resize', title: 'Drag to extend' }) : null,
      ]);
      if (layout) {
        attachScheduleResize(card, c.id);
        attachScheduleStartResize(card, c.id);
      }
      return card;
    }

    function attachScheduleResize(card, cardId) {
      const handle = card.querySelector('.schedule-card-resize');
      if (!handle) return;
      const block = (e) => e.stopPropagation();
      handle.addEventListener('mousedown', block);
      handle.addEventListener('touchstart', block);
      handle.addEventListener('pointerdown', (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const c = state.cards.find(x => x.id === cardId);
        if (!c) return;
        const HOUR_PX = 44;
        const SNAP = 15;
        const startY = e.clientY;
        const initDur = c.duration_minutes || 60;
        const startAbs = hourOfScheduled(c) * 60 + minuteOfScheduled(c);
        const maxDur = 24 * 60 - startAbs;
        card.classList.add('resizing');
        const compute = (ev) => {
          const dy = ev.clientY - startY;
          const delta = Math.round(dy / HOUR_PX * 60 / SNAP) * SNAP;
          return Math.max(SNAP, Math.min(maxDur, initDur + delta));
        };
        const onMove = (ev) => {
          const d = compute(ev);
          card.style.height = Math.max(26, d / 60 * HOUR_PX - 2) + 'px';
        };
        const onUp = (ev) => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          card.classList.remove('resizing');
          const d = compute(ev);
          setState(s => {
            const cc = s.cards.find(x => x.id === cardId);
            if (cc) cc.duration_minutes = d;
          });
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    }

    function attachScheduleStartResize(card, cardId) {
      const handle = card.querySelector('.schedule-card-resize-top');
      if (!handle) return;
      const block = (e) => e.stopPropagation();
      handle.addEventListener('mousedown', block);
      handle.addEventListener('touchstart', block);
      handle.addEventListener('pointerdown', (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const c = state.cards.find(x => x.id === cardId);
        if (!c) return;
        const HOUR_PX = 44;
        const SNAP = 15;
        const startY = e.clientY;
        const initStart = hourOfScheduled(c) * 60 + minuteOfScheduled(c);
        const initDur = c.duration_minutes || 60;
        const initEnd = initStart + initDur;
        const minStart = 5 * 60;      // earliest 5 AM
        const maxStart = initEnd - SNAP;
        const slotHourMin = Math.floor(initStart / 60) * 60;
        card.classList.add('resizing');
        const compute = (ev) => {
          const dy = ev.clientY - startY;
          const delta = Math.round(dy / HOUR_PX * 60 / SNAP) * SNAP;
          const newStart = Math.max(minStart, Math.min(maxStart, initStart + delta));
          return { newStart, newDur: initEnd - newStart };
        };
        const onMove = (ev) => {
          const { newStart, newDur } = compute(ev);
          card.style.top = ((newStart - slotHourMin) / 60 * HOUR_PX) + 'px';
          card.style.height = Math.max(26, newDur / 60 * HOUR_PX - 2) + 'px';
        };
        const onUp = (ev) => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          card.classList.remove('resizing');
          const { newStart, newDur } = compute(ev);
          const newHour = Math.floor(newStart / 60);
          const newMin = newStart % 60;
          setState(s => {
            const cc = s.cards.find(x => x.id === cardId);
            if (!cc) return;
            const date = cc.scheduled_time ? cc.scheduled_time.slice(0, 10) : currentPlanDate;
            cc.scheduled_time = date + 'T' + String(newHour).padStart(2, '0') + ':' + String(newMin).padStart(2, '0') + ':00';
            cc.duration_minutes = newDur;
          });
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    }
