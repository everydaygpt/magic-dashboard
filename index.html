      flex-shrink: 0;
    }
    .pulse-row.attention { gap: 10px; align-items: flex-start; }
    .pulse-row-check {
      flex-shrink: 0;
      width: 18px; height: 18px;
      border: 1.5px solid var(--border-strong);
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700;
      color: transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
      margin-top: 1px;
      background: transparent;
    }
    .pulse-row:hover .pulse-row-check {
      border-color: var(--accent-from);
    }
    .pulse-row-check.checked {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      border-color: #16a34a;
      color: white;
    }
    .bank-card-ctx.work { background: var(--work); }
    .bank-card-ctx.personal { background: var(--personal); }
    .bank-card-meta {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 6px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-tertiary);
    }
    .bank-card-meta .due-pill {
      padding: 1px 6px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.04);
    }
    .bank-card-meta .due-pill.overdue { color: #f87171; background: rgba(248, 113, 113, 0.08); }
    .bank-card-meta .due-pill.today { color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
    .bank-card-meta .rec-pill { padding: 1px 6px; border-radius: 4px; background: rgba(124, 58, 237, 0.12); color: #c4b5fd; }
    .bank-card-meta .attach-pill { padding: 1px 6px; border-radius: 4px; background: rgba(96, 165, 250, 0.12); color: #93c5fd; }
    html[data-theme="personal"] .bank-card-meta .attach-pill { background: rgba(37, 99, 235, 0.12); color: #1d4ed8; }
    html[data-theme="personal"] .bank-card-meta .rec-pill { background: rgba(124, 58, 237, 0.12); color: #6d28d9; }
    /* Card links — chip list + inline add form */
    .card-links-wrap { display: flex; flex-direction: column; gap: 6px; }
    .card-links-list {
      display: flex; flex-direction: column; gap: 4px;
      padding: 8px 10px;
      background: var(--surface-sub);
      border: 1px solid var(--border);
      border-radius: 8px;
      min-height: 32px;
    }
    .card-links-empty {
      color: var(--text-tertiary); font-size: 12px; font-style: italic;
      text-align: center; padding: 4px;
    }
    .card-link-row {
      display: flex; align-items: center; gap: 6px;
      padding: 4px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
    }
    .card-link-anchor {
      flex: 1; min-width: 0;
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-secondary);
      font-size: 12px;
      text-decoration: none;
      overflow: hidden;
    }
    .card-link-anchor:hover { color: var(--accent-from); text-decoration: underline; }
    .card-link-anchor .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-link-del {
      width: 22px; height: 22px;
      background: transparent; border: 0; color: var(--text-tertiary);
      border-radius: 4px; font-size: 14px; cursor: pointer; flex-shrink: 0;
    }
    .card-link-del:hover { background: var(--overlay); color: var(--danger); }
    .card-link-add-row {
      display: flex; gap: 6px;
      padding: 6px 8px;
      background: var(--surface-sub);
      border: 1px dashed var(--border);
      border-radius: 8px;
    }
    .card-link-input-label, .card-link-input-url {
      padding: 4px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      font-family: inherit;
    }
    .card-link-input-label { width: 32%; }
    .card-link-input-url { flex: 1; min-width: 0; }
    .card-link-input-label:focus, .card-link-input-url:focus { border-color: var(--accent-from); outline: none; }
    .card-link-add-btn { padding: 4px 12px; flex-shrink: 0; font-size: 12px; }

    .card-files-wrap { display: flex; flex-direction: column; }
    .card-files-list {
      display: flex; flex-wrap: wrap; gap: 6px;
      min-height: 44px;
      padding: 8px 10px;
      background: var(--surface-sub);
      border: 1px dashed var(--border);
      border-radius: 8px;
      align-items: center;
      transition: border-color 120ms var(--ease), background 120ms var(--ease);
    }
    .card-files-list.drag-over {
      border-color: var(--accent-from);
      background: var(--card-hover);
    }
    .card-files-empty {
      width: 100%; text-align: center;
      color: var(--text-tertiary); font-size: 12px; font-style: italic;
    }
    .bank-empty {
      padding: 16px 14px; color: var(--text-tertiary);
      font-size: 12px; font-style: italic; text-align: center;
    }

    /* ---------- Main panel ---------- */
    .main-shell { padding: 0; }
    .main-header {
      display: flex; align-items: center; gap: 14px;
      padding: 20px 28px 14px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    }
    .main-title {
      font-size: 22px; font-weight: 700; letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 12px;
    }
    .main-title-dot {
      width: 14px; height: 14px; border-radius: 4px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      box-shadow: 0 0 12px var(--accent-from);
    }
    .main-subtitle {
      color: var(--text-tertiary); font-size: 13px;
      font-family: 'JetBrains Mono', monospace; margin-left: auto;
    }
    .main-actions { display: flex; gap: 6px; }
    .icon-btn {
      width: 32px; height: 32px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary); font-size: 14px;
      transition: background 150ms var(--ease), color 150ms var(--ease);
    }
    .icon-btn:hover { background: rgba(255, 255, 255, 0.06); color: var(--text-primary); }
    .icon-btn.danger:hover { color: var(--danger); }
    .text-btn {
      padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 500;
      color: var(--text-secondary);
      border: 1px solid var(--border);
      transition: all 150ms var(--ease);
    }
    .text-btn:hover { color: var(--text-primary); background: rgba(255,255,255,0.04); border-color: var(--border-strong); }
    .text-btn.primary {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-color: transparent;
    }
    .text-btn.primary:hover { transform: translateY(-1px); }

    .main-body { flex: 1; overflow: auto; padding: 18px 20px 20px; }

    /* ---------- Kanban board ---------- */
    .board { display: flex; gap: 14px; min-height: 100%; align-items: flex-start; }
    .column {
      background: var(--surface-sub);
      border: 1px solid var(--border); border-radius: var(--radius-col);
      width: 300px; flex-shrink: 0;
      display: flex; flex-direction: column;
      max-height: calc(100vh - 180px);
      transition: background 200ms var(--ease);
    }
    .column.drop-target {
      background: rgba(30, 30, 56, 0.6);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 0 30px -5px var(--accent-from);
    }
    .column-header {
      padding: 14px 16px 10px;
      display: flex; align-items: center; gap: 10px;
      position: relative;
    }
    .column-header::after {
      content: ''; position: absolute; left: 16px; right: 16px; bottom: 0;
      height: 2px; border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
      opacity: 0.8;
    }
    .column-title {
      font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 0.06em;
      flex: 1; outline: 0;
    }
    .column-title[contenteditable]:focus {
      background: rgba(255, 255, 255, 0.04); border-radius: 4px;
      padding: 2px 4px; margin: -2px -4px;
    }
    .column-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-tertiary);
      padding: 2px 6px; background: rgba(255, 255, 255, 0.04); border-radius: 6px;
    }
    .column-info-badge {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 600;
      letter-spacing: 0.08em; color: var(--accent-from);
      padding: 2px 6px; border: 1px solid var(--accent-from);
      border-radius: 4px; background: rgba(124, 58, 237, 0.08);
      margin-left: 4px;
    }
    .column.info-col {
      background: rgba(124, 58, 237, 0.04);
      border-color: rgba(124, 58, 237, 0.25);
    }
    .column.info-col .column-header { border-bottom-color: rgba(124, 58, 237, 0.2); }
    .card.info-card {
      background: rgba(124, 58, 237, 0.06);
      border-left: 2px solid var(--accent-from);
    }
    .card.info-card .card-title { font-weight: 500; }
    .column-menu-wrap { position: relative; }
    .column-menu {
      position: absolute; right: 0; top: 100%; margin-top: 6px;
      background: var(--panel-solid); border: 1px solid var(--border-strong);
      border-radius: 10px; padding: 6px; z-index: 10;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
      min-width: 160px; display: flex; flex-direction: column;
    }
    .column-menu button {
      padding: 8px 10px; text-align: left; border-radius: 6px; font-size: 13px;
      color: var(--text-secondary); transition: background 120ms;
    }
    .column-menu button:hover { background: rgba(255, 255, 255, 0.05); color: var(--text-primary); }
    .column-menu button.danger:hover { color: var(--danger); }

    .column-cards {
      padding: 10px 10px 12px; overflow-y: auto; flex: 1;
      min-height: 80px; display: flex; flex-direction: column; gap: 8px;
    }
    .card {
      background: var(--card);
      backdrop-filter: blur(12px);
      border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 12px 14px; cursor: grab;
      transition: transform 180ms var(--spring), box-shadow 180ms var(--ease), background 180ms var(--ease);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.04);
      position: relative;
    }
    .card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.08),
                  0 0 40px -10px var(--accent-from);
    }
    .card.sortable-ghost { opacity: 0.2; }
    .card.sortable-chosen { cursor: grabbing; }
    .card.sortable-drag {
      transform: rotate(2deg) scale(1.03) !important;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5), 0 0 40px -5px var(--accent-from) !important;
    }
    .card-title { font-weight: 500; font-size: 14px; color: var(--text-primary); line-height: 1.35; }
    .card-notes-preview {
      color: var(--text-tertiary); font-size: 12px; margin-top: 4px;
      overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    }
    .card-footer { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
    .card-footer:empty { display: none; }
    .card-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.05em;
      padding: 2px 8px; border-radius: 6px;
      border: 1px solid var(--border-strong); color: var(--text-secondary);
    }
    .card-pill.today { color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); background: rgba(251, 191, 36, 0.08); }
    .card-pill.tomorrow { color: #60a5fa; border-color: rgba(96, 165, 250, 0.3); background: rgba(96, 165, 250, 0.08); }
    .card-pill.scheduled { color: #a78bfa; border-color: rgba(167, 139, 250, 0.3); background: rgba(167, 139, 250, 0.08); }
    .card-pill.plan { color: #f472b6; border-color: rgba(244, 114, 182, 0.3); background: rgba(244, 114, 182, 0.08); }
    .card-pill.quick-today {
      cursor: pointer; opacity: 0.5;
      color: var(--text-tertiary);
      background: transparent;
      transition: all 150ms var(--ease);
    }
    .card:hover .card-pill.quick-today { opacity: 1; }
    .card-pill.quick-today:hover {
      color: #fbbf24;
      border-color: rgba(251, 191, 36, 0.45);
      background: rgba(251, 191, 36, 0.12);
      transform: translateY(-1px);
    }
    .project-chip.clickable { transition: transform 120ms var(--ease), box-shadow 120ms var(--ease); }
    .project-chip.clickable:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(124, 58, 237, 0.25); }

    .card.expanded { cursor: default; background: var(--surface-elev); padding: 14px; }
    .card.expanded:hover { transform: none; }
    .card-edit-title {
      font-weight: 500; font-size: 14px; color: var(--text-primary); width: 100%;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
    }
    .card-edit-notes {
      width: 100%; margin-top: 8px; min-height: 60px;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
      color: var(--text-secondary); font-size: 13px;
    }
    .card-edit-row { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
    .due-opt {
      padding: 4px 8px; border-radius: 6px; font-size: 11px;
      font-family: 'JetBrains Mono', monospace; text-transform: uppercase;
      color: var(--text-tertiary); background: var(--overlay);
      border: 1px solid transparent;
      transition: all 150ms var(--ease);
    }
    .due-opt:hover { color: var(--text-primary); background: var(--overlay-strong); }
    .due-opt.selected {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 0 0 1px rgba(124, 58, 237, 0.35);
    }

    .col-add-btn {
      padding: 8px 12px; margin: 0 10px 10px;
      font-size: 12px; color: var(--text-tertiary);
      border: 1px dashed var(--border); border-radius: 8px;
      transition: all 150ms var(--ease);
    }
    .col-add-btn:hover {
      color: var(--text-primary); border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.03);
    }
    .col-empty {
      padding: 30px 16px; text-align: center; color: var(--text-tertiary);
      font-size: 12px; font-style: italic; line-height: 1.5;
    }
    .column.add-column {
      border-style: dashed; background: transparent; cursor: pointer;
      width: 180px; min-height: 100px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 13px;
      transition: all 150ms var(--ease);
    }
    .column.add-column:hover {
      background: rgba(255, 255, 255, 0.03); color: var(--text-primary); border-color: var(--border-strong);
    }

    /* ---------- Today schedule (hourly timeline) ---------- */
    .schedule {
      background: rgba(18, 18, 36, 0.4);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .schedule-row {
      display: grid;
      grid-template-columns: 70px 1fr;
      border-top: 1px solid var(--border);
      min-height: 44px;
      transition: min-height 180ms var(--ease);
    }
    .schedule-row:first-child { border-top: 0; }
    .schedule-row.now { background: rgba(96, 165, 250, 0.06); }
    /* Empty hour rows compact to half height to stop the schedule from dominating the viewport */
    .schedule-row:not(:has(.schedule-card)):not(.now) {
      min-height: 22px;
    }
    .schedule-row:not(:has(.schedule-card)):not(.now) .schedule-slot {
      min-height: 22px;
    }
    .schedule-row:not(:has(.schedule-card)):not(.now) .schedule-hour {
      font-size: 9px;
      padding: 4px 10px;
      opacity: 0.45;
    }
    .schedule-row:not(:has(.schedule-card)):not(.now):hover {
      min-height: 36px;
    }
    .schedule-row:not(:has(.schedule-card)):not(.now):hover .schedule-slot { min-height: 36px; }
    .schedule-row:not(:has(.schedule-card)):not(.now):hover .schedule-hour { opacity: 0.85; font-size: 11px; }
    .schedule-hour {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-secondary);
      padding: 8px 10px;
      border-right: 1px solid var(--border);
      display: flex; align-items: flex-start;
    }
    .schedule-slot {
      padding: 4px 6px;
      position: relative;
      min-height: 44px;
      transition: background 120ms;
      cursor: copy;
    }
    .schedule-slot.sortable-hover,
    .schedule-slot:hover { background: var(--overlay); }
    .schedule-slot:hover::after {
      content: '+ click to add';
      position: absolute;
      right: 10px; top: 50%;
      transform: translateY(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      opacity: 0.7;
      pointer-events: none;
    }
    /* Don't show the add hint over slots that have cards */
    .schedule-slot:has(.schedule-card):hover::after { display: none; }
    .schedule-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 12px;
      cursor: grab;
      display: flex; align-items: center; gap: 8px;
      transition: background 120ms;
    }
    .schedule-card:not(.timeline) + .schedule-card:not(.timeline) { margin-top: 4px; }
    .schedule-card:hover { background: var(--card-hover); }
    .schedule-card.done { opacity: 0.55; text-decoration: line-through; }
    .schedule-card.timeline {
      position: absolute;
      padding: 4px 10px;
      overflow: hidden;
      z-index: 2;
      align-items: flex-start;
      line-height: 1.25;
    }
    .schedule-card.timeline:hover { z-index: 4; }
    .schedule-card.timeline.resizing { z-index: 5; transition: none; }
    .schedule-card.timeline .schedule-card-title {
      white-space: normal;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    .schedule-card-resize,
    .schedule-card-resize-top {
      position: absolute;
      left: 8px; right: 8px;
      height: 6px;
      cursor: ns-resize;
      z-index: 6;
    }
    .schedule-card-resize { bottom: 0; border-radius: 0 0 6px 6px; }
    .schedule-card-resize-top { top: 0; border-radius: 6px 6px 0 0; }
    .schedule-card-resize::after,
    .schedule-card-resize-top::after {
      content: '';
      position: absolute;
      left: 50%;
      width: 20px; height: 2px;
      background: var(--border-strong);
      border-radius: 1px;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 120ms;
    }
    .schedule-card-resize::after { bottom: 1px; }
    .schedule-card-resize-top::after { top: 1px; }
    .schedule-card.timeline:hover .schedule-card-resize::after,
    .schedule-card.timeline:hover .schedule-card-resize-top::after,
    .schedule-card-resize:hover::after,
    .schedule-card-resize-top:hover::after { opacity: 1; }
    body.sched-dragging .schedule-card.timeline:not(.sortable-drag):not(.sortable-chosen) {
      pointer-events: none;
    }
    .schedule-card-check {
      width: 20px; height: 20px; flex-shrink: 0;
      border: 2px solid var(--border-strong);
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; color: transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .schedule-card-check:hover { border-color: var(--accent-from); }
    .schedule-card.done .schedule-card-check {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent; color: white;
    }
    .schedule-card-title { flex: 1; line-height: 1.3; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
    .schedule-card-dur {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-tertiary);
      padding: 1px 5px; background: rgba(255, 255, 255, 0.04);
      border-radius: 4px; white-space: nowrap;
    }
    .schedule-card-proj {
      display: inline-flex; align-items: center; gap: 4px;
      flex-shrink: 0;
      padding: 1px 6px 1px 4px;
      border-radius: 10px;
      background: color-mix(in srgb, var(--item-from, #7c3aed) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--item-from, #7c3aed) 30%, transparent);
      font-size: 10px;
      font-weight: 600;
      color: var(--item-from, #7c3aed);
      max-width: 110px;
      cursor: pointer;
      transition: background 120ms var(--ease);
    }
    .schedule-card-proj:hover { background: color-mix(in srgb, var(--item-from, #7c3aed) 22%, transparent); }
    .schedule-card-proj-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: linear-gradient(135deg, var(--item-from, #7c3aed), var(--item-to, #ec4899));
      flex-shrink: 0;
    }
    .schedule-card-proj-name {
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      letter-spacing: 0.02em;
    }
    /* Cards in timeline view are tighter — hide the project name text, keep dot */
    .schedule-card.timeline .schedule-card-proj-name { display: none; }
    .schedule-card.timeline .schedule-card-proj { padding: 2px; border-radius: 50%; }

    /* ---------- Project status pill (Hub + Project view) ---------- */
    .project-status-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 8px;
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 120ms var(--ease);
      font-family: 'JetBrains Mono', monospace;
      flex-shrink: 0;
    }
    .project-status-pill.large { padding: 4px 10px; font-size: 11px; }
    .project-status-pill .project-status-dot { width: 6px; height: 6px; border-radius: 50%; }
    .project-status-pill.active   { background: rgba(34, 197, 94, 0.14);  color: #4ade80; border-color: rgba(34, 197, 94, 0.30); }
    .project-status-pill.active   .project-status-dot { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
    .project-status-pill.on-hold  { background: rgba(234, 179, 8, 0.14);  color: #facc15; border-color: rgba(234, 179, 8, 0.30); }
    .project-status-pill.on-hold  .project-status-dot { background: #eab308; }
    .project-status-pill.blocked  { background: rgba(239, 68, 68, 0.14);  color: #f87171; border-color: rgba(239, 68, 68, 0.30); }
    .project-status-pill.blocked  .project-status-dot { background: #ef4444; }
    .project-status-pill.done     { background: rgba(148, 163, 184, 0.14); color: #94a3b8; border-color: rgba(148, 163, 184, 0.30); }
    .project-status-pill.done     .project-status-dot { background: #94a3b8; }
    .project-status-pill:hover { transform: translateY(-1px); }

    /* Light theme — desaturated status colors */
    html[data-theme="personal"] .project-status-pill.active  { background: rgba(22, 163, 74, 0.14);  color: #15803d; border-color: rgba(22, 163, 74, 0.30); }
    html[data-theme="personal"] .project-status-pill.on-hold { background: rgba(202, 138, 4, 0.14);  color: #a16207; border-color: rgba(202, 138, 4, 0.30); }
    html[data-theme="personal"] .project-status-pill.blocked { background: rgba(220, 38, 38, 0.14);  color: #b91c1c; border-color: rgba(220, 38, 38, 0.30); }
    html[data-theme="personal"] .project-status-pill.done    { background: rgba(100, 116, 139, 0.14); color: #475569; border-color: rgba(100, 116, 139, 0.30); }

    /* Done projects on the hub — subtle dim */
    .projects-hub-card.status-done { opacity: 0.65; }
    .projects-hub-card.status-done:hover { opacity: 1; }

    /* Completed projects collapsible section */
    .completed-projects-section {
      margin-top: 24px;
      padding-top: 18px;
      border-top: 1px dashed var(--border);
    }
    .completed-projects-summary {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 4px;
      cursor: pointer;
      list-style: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      user-select: none;
    }
    .completed-projects-summary::-webkit-details-marker { display: none; }
    .completed-projects-summary:hover { color: var(--text-primary); }
    .completed-projects-toggle {
      display: inline-block;
      transition: transform 180ms var(--ease);
      font-size: 10px;
    }
    details[open] > .completed-projects-summary > .completed-projects-toggle { transform: rotate(90deg); }
    .completed-projects-count {
      padding: 1px 8px;
      border-radius: 10px;
      background: rgba(148, 163, 184, 0.16);
      color: var(--text-secondary);
      font-weight: 600;
    }
    .completed-projects-hint {
      margin-left: auto;
      font-size: 10px;
      color: var(--text-tertiary);
      text-transform: none;
      letter-spacing: 0;
      font-style: italic;
    }
    .projects-hub-grid.completed { margin-top: 12px; }

    /* Make hub card head wrap nicely with the new status pill */
    .projects-hub-card-head { flex-wrap: wrap; gap: 8px; align-items: center; }

    .unscheduled-pool {
      background: rgba(18, 18, 36, 0.4);
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 10px;
      min-height: 60px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .unscheduled-pool:empty + .unscheduled-empty { display: block; }
    .unscheduled-empty {
      padding: 14px; color: var(--text-tertiary);
      font-size: 12px; font-style: italic; text-align: center;
    }

    /* ---------- Just Did block ---------- */
    .just-did-wrap { display: flex; flex-direction: column; gap: 8px; }
    .just-did-input-wrap { position: relative; display: flex; flex-direction: column; gap: 6px; }
    .just-did-input {
      width: 100%;
      padding: 10px 14px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 120ms var(--ease), box-shadow 120ms var(--ease);
    }
    .just-did-input::placeholder { color: var(--text-tertiary); }
    .just-did-input:focus {
      border-color: var(--accent-from);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }
    .just-did-matches:empty { display: none; }
    .just-did-matches { display: flex; flex-direction: column; gap: 2px; }
    .just-did-match {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
      transition: all 120ms var(--ease);
    }
    .just-did-match.active, .just-did-match:hover {
      background: var(--card-hover);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    .just-did-match.new { color: var(--text-secondary); }
    .just-did-match.new:hover, .just-did-match.new.active {
      color: var(--text-primary);
      border-color: var(--accent-from);
    }
    .just-did-match-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .just-did-match-proj {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
      padding: 1px 6px;
      background: var(--overlay);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .just-did-match-new-icon {
      width: 18px; height: 18px;
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white;
      border-radius: 4px;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0;
    }
    .just-did-wins {
      display: flex; flex-direction: column; gap: 4px;
      margin-top: 6px;
    }
    .just-did-win {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      background: rgba(34, 197, 94, 0.06);
      border: 1px solid rgba(34, 197, 94, 0.18);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 120ms var(--ease);
    }
    .just-did-win:hover { background: rgba(34, 197, 94, 0.12); }
    .just-did-win-check {
      width: 16px; height: 16px;
      display: inline-flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border-radius: 50%;
      font-size: 10px; font-weight: 700;
      flex-shrink: 0;
    }
    .just-did-win-title {
      flex: 1; min-width: 0;
      color: var(--text-primary);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .just-did-win-proj {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      padding: 1px 5px;
      background: var(--overlay);
      border-radius: 3px;
      flex-shrink: 0;
    }
    .just-did-win-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      flex-shrink: 0;
    }
    .just-did-win-undo {
      width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 0; background: transparent;
      color: var(--text-tertiary);
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }
    .just-did-win-undo:hover { background: var(--overlay); color: var(--text-primary); }

    /* ---------- Books view ---------- */
    .books-list { display: flex; flex-direction: column; gap: 14px; max-width: 880px; margin: 0 auto; padding-bottom: 20px; }
    .book-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .book-card-head { display: flex; align-items: flex-start; gap: 12px; }
    .book-card-info { flex: 1; min-width: 0; }
    .book-card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); }
    .book-card-author { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; font-style: italic; }
    .book-card-meta { display: flex; align-items: center; gap: 8px; }
    .book-card-count {
      font-family: 'JetBrains Mono', monospace; font-size: 11px;
      color: var(--text-tertiary);
      padding: 2px 8px; border-radius: 4px; background: var(--overlay);
    }
    .book-quote-add {
      display: flex; gap: 6px;
      padding: 10px;
      background: var(--surface-sub);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .book-quote-input {
      flex: 1;
      padding: 6px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
    }
    .book-quote-input:focus { border-color: var(--accent-from); outline: none; }
    .book-page-input {
      width: 56px;
      padding: 6px 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-primary);
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      text-align: center;
    }
    .book-page-input:focus { border-color: var(--accent-from); outline: none; }
    .book-quotes { display: flex; flex-direction: column; gap: 8px; }
    .book-quotes-empty {
      padding: 14px; text-align: center;
      color: var(--text-tertiary); font-size: 12px; font-style: italic;
    }
    .book-quote-row {
      display: flex; gap: 10px;
      padding: 10px 12px;
      background: var(--surface-sub);
      border-left: 3px solid var(--accent-from);
      border-radius: 6px;
    }
    .book-quote-mark {
      font-family: Georgia, serif;
      font-size: 28px;
      line-height: 1;
      color: var(--accent-from);
      opacity: 0.6;
      flex-shrink: 0;
    }
    .book-quote-body { flex: 1; min-width: 0; }
    .book-quote-text {
      font-size: 14px;
      color: var(--text-primary);
      line-height: 1.5;
      font-style: italic;
    }
    .book-quote-page {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 4px;
    }
    .book-quote-del {
      width: 22px; height: 22px;
      background: transparent;
      border: 0;
      color: var(--text-tertiary);
      cursor: pointer;
      border-radius: 4px;
      font-size: 16px; font-weight: 700;
      flex-shrink: 0;
    }
    .book-quote-del:hover { background: var(--overlay); color: var(--danger); }

    /* ---------- Email suggestions tray (triage agent ingest) ---------- */
    .email-tray {
      width: 100%;
      max-width: 1700px;
      margin: 0 auto 18px;
      padding: 14px 16px 16px;
      background: linear-gradient(135deg, rgba(96, 165, 250, 0.08), rgba(59, 130, 246, 0.05));
      border: 1px solid rgba(96, 165, 250, 0.3);
      border-left: 4px solid #60a5fa;
      border-radius: var(--radius-panel);
    }
    .email-tray-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 12px;
    }
    .email-tray-icon { font-size: 16px; }
    .email-tray-title {
      font-size: 13px; font-weight: 600;
      letter-spacing: 0.04em; text-transform: uppercase;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }
    .email-tray-count {
      padding: 1px 8px;
      border-radius: 10px;
      background: #60a5fa;
      color: white;
      font-size: 11px; font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
    }
    .email-tray-list { display: flex; flex-direction: column; gap: 8px; }
    .email-suggestion {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 120ms var(--ease), background 120ms var(--ease);
    }
    .email-suggestion:hover { border-color: var(--border-strong); background: var(--card-hover); }
    .email-suggestion-confidence {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .email-suggestion-confidence.high { background: #22c55e; box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15); }
    .email-suggestion-confidence.mid  { background: #eab308; box-shadow: 0 0 0 3px rgba(234, 179, 8, 0.15); }
    .email-suggestion-confidence.low  { background: #ef4444; box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15); }
    .email-suggestion-confidence.unknown { background: var(--text-tertiary); opacity: 0.5; }
    .email-suggestion-body { flex: 1; min-width: 0; }
    .email-suggestion-action {
      font-size: 14px; font-weight: 500;
      color: var(--text-primary);
      line-height: 1.4;
    }
    .email-suggestion-meta {
      display: flex; flex-wrap: wrap; gap: 6px;
      margin-top: 4px;
      font-size: 11px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .email-suggestion-from { color: var(--text-secondary); }
    .email-suggestion-subj { font-style: italic; }
    .email-suggestion-due { color: #f59e0b; }
    .email-suggestion-excerpt {
      margin-top: 6px;
      padding: 6px 10px;
      background: var(--surface-sub);
      border-left: 2px solid var(--border);
      border-radius: 4px;
      font-size: 12px;
      color: var(--text-secondary);
      font-style: italic;
      line-height: 1.45;
      max-height: 60px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      text-overflow: ellipsis;
    }
    .email-suggestion-actions {
      display: flex; align-items: center; gap: 4px;
      flex-shrink: 0;
    }
    .email-suggestion-actions .icon-btn,
    .email-suggestion-actions .text-btn {
      padding: 4px 10px;
      font-size: 12px;
    }

    /* ---------- Quote of the day — full-width strip above Today's body ---------- */
    .today-quote {
      display: flex; gap: 16px;
      padding: 16px 22px;
      margin-bottom: 18px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.06), rgba(236, 72, 153, 0.06));
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent-from);
      border-radius: var(--radius-panel);
      align-items: center;
      width: 100%;
      max-width: 1700px;
      margin-left: auto; margin-right: auto;
      transition: all 180ms var(--ease);
    }
    .today-quote:hover {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(236, 72, 153, 0.1));
      transform: translateY(-1px);
    }
    .today-quote-mark {
      font-family: Georgia, serif;
      font-size: 44px;
      line-height: 0.7;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 4px;
    }
    .today-quote-body { flex: 1; min-width: 0; }
    .today-quote-text {
      font-size: 15px;
      color: var(--text-primary);
      font-style: italic;
      line-height: 1.5;
      font-weight: 500;
    }
    .today-quote-attr {
      margin-top: 6px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
      color: var(--text-tertiary);
      text-transform: uppercase;
    }
    @media (max-width: 720px) {
      .today-quote { padding: 12px 14px; gap: 10px; }
      .today-quote-mark { font-size: 32px; }
      .today-quote-text { font-size: 13px; }
    }

    /* ---------- Inline filter (search) input ---------- */
    .inline-filter {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      transition: border-color 120ms var(--ease), box-shadow 120ms var(--ease);
      margin-bottom: 10px;
    }
    .inline-filter:focus-within {
      border-color: var(--accent-from);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.15);
    }
    .inline-filter-icon { font-size: 12px; opacity: 0.6; flex-shrink: 0; }
    .inline-filter-input {
      flex: 1;
      background: transparent;
      border: 0;
      outline: 0;
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      padding: 2px 0;
    }
    .inline-filter-input::placeholder { color: var(--text-tertiary); }
    .inline-filter-clear {
      width: 20px; height: 20px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--overlay);
      color: var(--text-tertiary);
      border: 0; cursor: pointer;
      border-radius: 4px;
      font-size: 14px; font-weight: 700;
      flex-shrink: 0;
    }
    .inline-filter-clear:hover { background: var(--overlay-strong); color: var(--text-primary); }

    /* ---------- Today plan ---------- */
    /* Single-day-other-than-today (Plan tomorrow) keeps the narrow centered layout */
    .plan-wrap { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 22px; }
    /* Today command-center: 2-column at desktop, stacked on mobile */
    .today-cmd {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 18px;
      width: 100%;
      max-width: 1700px;
      margin: 0 auto;
    }
    @media (min-width: 1100px) {
      .today-cmd { grid-template-columns: minmax(0, 1.05fr) minmax(0, 1fr); gap: 20px; }
    }
    @media (min-width: 1500px) {
      .today-cmd { grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 24px; }
    }
    .today-col { display: flex; flex-direction: column; gap: 18px; min-width: 0; }
    /* Sticky Top 3 — keeps the priority slots visible while user scrolls the
       Bank below, so they can drag a card from the bottom of the list onto
       a Top 3 slot without losing them off-screen. Desktop only. */
    @media (min-width: 1100px) {
      .today-sticky-top {
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--panel);
        padding-top: 6px;
        padding-bottom: 12px;
        margin-top: -6px;
        margin-bottom: -6px;
      }
    }
    .today-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
      padding: 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-width: 0;
    }
    .today-panel.flush { padding: 0; }
    .today-panel.flush > .today-panel-head { padding: 14px 16px 8px; }
    .today-panel-head {
      display: flex; align-items: center; gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary);
    }
    .today-panel-head .count {
      padding: 1px 6px; border-radius: 4px;
      background: var(--overlay);
      font-size: 10px;
      color: var(--text-secondary);
    }
    .today-panel-head .spacer { flex: 1; }
    /* Pulse panels in main column: card chrome instead of rail padding */
    .today-cmd .pulse-panel {
      padding: 14px 16px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius-panel);
    }
    /* Pulse strip — at-a-glance row above schedule. Stacks on narrow viewports,
       becomes a 3-column grid on desktop so all three panels fit above the fold. */
    .today-pulse-strip {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }
    @media (min-width: 1100px) {
      .today-pulse-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    .today-pulse-strip .pulse-panel + .pulse-panel {
      border-top: 0; margin-top: 0; padding-top: 14px;
    }
    /* Reset the cascade for nested pulse panels in main */
    .today-cmd .pulse-panel + .pulse-panel { border-top: 0; margin-top: 0; padding-top: 14px; }
    .plan-section-title {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 10px;
    }
    .plan-section-title .count {
      color: var(--text-tertiary);
      padding: 2px 6px; background: rgba(255, 255, 255, 0.04);
      border-radius: 6px; font-size: 11px;
    }
    .plan-section-title .spacer { flex: 1; }

    .top3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .top3.collapsed {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-top: 8px;
      opacity: 0;
      max-height: 0;
      overflow: hidden;
      pointer-events: auto;
    }
    .top3.collapsed .top3-slot { min-height: 1px; padding: 0; border: 0; visibility: hidden; }
    .top3-empty-cta {
      display: flex; align-items: center; gap: 12px;
      width: 100%;
      padding: 14px 18px;
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.08), rgba(236, 72, 153, 0.08));
      border: 1px dashed var(--border-strong);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      transition: all 180ms var(--ease);
      font-family: inherit;
    }
    .top3-empty-cta:hover {
      background: linear-gradient(135deg, rgba(124, 58, 237, 0.14), rgba(236, 72, 153, 0.14));
      border-color: var(--accent-from);
      transform: translateY(-1px);
    }
    .top3-empty-cta-icon {
      font-size: 22px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      -webkit-background-clip: text; background-clip: text;
      color: transparent;
      line-height: 1;
    }
    .top3-empty-cta-text { flex: 1; font-weight: 500; }
    .top3-empty-cta-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-tertiary);
    }
    .top3-slot {
      background: var(--surface-sub);
      border: 1px dashed var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 96px;
      transition: all 180ms var(--ease);
      position: relative;
      display: flex; flex-direction: column;
    }
    .top3-slot.filled { border-style: solid; background: rgba(40, 40, 68, 0.55); }
    .top3-slot:hover { border-color: var(--border-strong); }
    .top3-slot-num {
      position: absolute; top: 8px; right: 10px;
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      color: var(--text-tertiary);
      font-weight: 700;
    }
    .top3-slot-empty {
      flex: 1; display: flex; align-items: center; justify-content: center;
      color: var(--text-tertiary); font-size: 12px; font-style: italic;
      cursor: pointer; text-align: center;
    }
    .top3-slot-empty:hover { color: var(--text-primary); }
    .plan-card {
      background: rgba(50, 50, 82, 0.8);
      border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 12px 10px 42px; position: relative;
      cursor: pointer;
      transition: background 150ms var(--ease);
    }
    .plan-card:hover { background: rgba(60, 60, 100, 0.9); }
    .plan-card.done { opacity: 0.55; }
    .plan-card.done .plan-card-title { text-decoration: line-through; }
    .plan-card-check {
      position: absolute; top: 10px; left: 10px;
      width: 22px; height: 22px;
      border: 2px solid var(--border-strong); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; color: transparent;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .plan-card-check:hover { border-color: var(--accent-from); background: var(--overlay); }
    .plan-card.done .plan-card-check {
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      border-color: transparent; color: white;
    }
    .plan-card-proj {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 10px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .plan-card-dot { width: 8px; height: 8px; border-radius: 50%; background: linear-gradient(135deg, var(--item-from), var(--item-to)); }
    .plan-card-title { font-size: 13px; font-weight: 500; line-height: 1.35; padding-right: 18px; }
    .plan-card-remove {
      position: absolute; top: 6px; right: 8px;
      color: var(--text-tertiary); font-size: 14px;
      opacity: 0; transition: opacity 150ms;
    }
    .plan-card:hover .plan-card-remove { opacity: 1; }
    .plan-card-remove:hover { color: var(--danger); }

    .time-blocks { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .time-block {
      background: var(--surface-sub);
      border: 1px solid var(--border); border-radius: 14px;
      display: flex; flex-direction: column;
      min-height: 140px;
    }
    .time-block-head {
      padding: 10px 14px 8px;
      display: flex; align-items: center; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .time-block-label {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-secondary); flex: 1;
      font-family: 'JetBrains Mono', monospace;
    }
    .time-block-body {
      padding: 10px; display: flex; flex-direction: column; gap: 6px;
      flex: 1; overflow: auto;
    }
    .time-block-empty {
      color: var(--text-tertiary); font-size: 11px; font-style: italic;
      padding: 10px; text-align: center;
    }
    .also-due-list { display: flex; flex-direction: column; gap: 8px; }

    /* ---------- Today group (aggregate per project) ---------- */
    .today-group { margin-bottom: 18px; }
    .today-group-header {
      display: flex; align-items: center; gap: 10px;
      padding: 0 0 10px 0; font-size: 12px; font-weight: 600;
      color: var(--text-secondary);
    }
    .today-group-dot { width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, var(--item-from), var(--item-to)); }

    /* ---------- Ideas / Automations view ---------- */
    .list-view { max-width: 720px; margin: 0 auto; }
    .list-add { margin-bottom: 16px; display: flex; gap: 8px; }
    .list-add input {
      flex: 1;
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; font-size: 14px;
      transition: border-color 150ms var(--ease);
    }
    .list-add input:focus { border-color: var(--border-strong); }
    .list-add select {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 0 10px; font-size: 12px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
    }
    .list-add button {
      padding: 0 18px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 10px; font-weight: 600; font-size: 13px;
      transition: transform 150ms var(--spring);
    }
    .list-add button:hover { transform: translateY(-1px); }

    .list-item {
      background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-card);
      padding: 14px 16px; margin-bottom: 8px;
      transition: background 150ms var(--ease), transform 150ms var(--spring);
      cursor: pointer; position: relative;
    }
    .list-item:hover { background: var(--card-hover); transform: translateX(2px); }
    .list-item.expanded { cursor: default; padding: 16px; }
    .list-item.expanded:hover { transform: none; }
    .list-item-head { display: flex; align-items: center; gap: 10px; }
    .list-item-title { flex: 1; font-weight: 500; font-size: 14px; }
    .list-item.expanded .list-item-title {
      font-size: 15px; width: 100%;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 8px;
    }
    .list-item-details {
      width: 100%; min-height: 70px; margin-top: 10px;
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 10px;
      color: var(--text-secondary); font-size: 13px;
    }
    .status-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em;
      padding: 3px 8px; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border-strong);
    }
    .status-pill.idea { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
    .status-pill.researching { color: #fbbf24; background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.3); }
    .status-pill.building { color: #60a5fa; background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.3); }
    .status-pill.done { color: #34d399; background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.3); }

    .context-toggle {
      display: inline-flex; background: rgba(0,0,0,0.3);
      border: 1px solid var(--border); border-radius: 7px;
      padding: 2px;
    }
    .context-toggle button {
      padding: 3px 8px; font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase; letter-spacing: 0.06em;
      color: var(--text-tertiary);
      border-radius: 5px;
      transition: all 150ms var(--ease);
    }
    .context-toggle button.active.work { color: var(--work); background: rgba(96,165,250,0.1); }
    .context-toggle button.active.personal { color: var(--personal); background: rgba(52,211,153,0.1); }

    .list-item-actions {
      display: flex; gap: 6px;
      margin-top: 12px; padding-top: 12px;
      border-top: 1px solid var(--border);
      align-items: center;
    }
    .list-item-actions .spacer { flex: 1; }
    .promote-btn {
      padding: 6px 12px;
      background: linear-gradient(135deg, var(--accent-from), var(--accent-to));
      color: white; border-radius: 6px;
      font-weight: 600; font-size: 12px;
      transition: transform 150ms var(--spring);
    }
    .promote-btn:hover { transform: translateY(-1px); }

    .item-files {
      margin-top: 12px; padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px dashed var(--border); border-radius: 10px;
      min-height: 54px;
      transition: border-color 150ms var(--ease), background 150ms var(--ease);
    }
    .item-files.drag-over { border-color: var(--accent-from); background: rgba(124, 58, 237, 0.08); }
    .item-files-label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;
      margin-bottom: 8px;
    }
    .item-files-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .item-files-empty { color: var(--text-tertiary); font-size: 12px; font-style: italic; }

    /* ---------- Goals view ---------- */
    .goal-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 14px 16px; margin-bottom: 10px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .goal-head { display: flex; align-items: center; gap: 10px; }
    .goal-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
    .goal-target {
      display: flex; gap: 8px; align-items: center;
      font-size: 12px; color: var(--text-secondary); margin-top: 4px;
    }
    .cadence-pill {
      font-family: 'JetBrains Mono', monospace; font-size: 9px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.06); color: var(--text-tertiary);
      text-transform: uppercase; letter-spacing: 0.06em;
      border: 1px solid var(--border);
    }
    .streak-badge {
      display: flex; align-items: center; gap: 4px;
      padding: 4px 10px;
      background: linear-gradient(135deg, rgba(251, 146, 60, 0.2), rgba(251, 113, 133, 0.2));
      border: 1px solid rgba(251, 146, 60, 0.3);
      border-radius: 999px;
      font-size: 12px; font-weight: 600;
      color: #fb923c;
      font-family: 'JetBrains Mono', monospace;
    }
    .goal-bar-row { display: flex; align-items: center; gap: 10px; }
    .goal-bar {
      flex: 1; height: 8px; border-radius: 4px;
      background: rgba(255, 255, 255, 0.05);
      overflow: hidden; position: relative;
    }
    .goal-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--accent-from), var(--accent-to));
      transition: width 300ms var(--spring);
      box-shadow: 0 0 12px var(--accent-from);
    }
    .goal-bar-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px; color: var(--text-secondary);
      white-space: nowrap;
    }
    .goal-actions { display: flex; gap: 8px; align-items: center; }

    /* ---------- Activity view ---------- */
    .activity-toolbar {
      display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px;
      padding-bottom: 14px; border-bottom: 1px solid var(--border);
      align-items: center;
    }
    .activity-toolbar .spacer { flex: 1; }
    .activity-toolbar select, .activity-toolbar input {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px; font-size: 12px;
      color: var(--text-secondary);
    }
    .activity-feed { max-width: 780px; margin: 0 auto; }
    .activity-day {
      margin-bottom: 24px;
    }
    .activity-day-head {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace;
      padding: 6px 0; margin-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .activity-entry {
      display: flex; gap: 12px; padding: 10px 0;
      border-bottom: 1px solid var(--border);
      align-items: flex-start;
    }
    .activity-entry:last-child { border-bottom: 0; }
    .activity-icon {
      flex-shrink: 0; width: 28px; height: 28px;
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
    }
    .activity-icon.card_done { background: rgba(52, 211, 153, 0.1); border-color: rgba(52, 211, 153, 0.3); color: #34d399; }
    .activity-icon.promoted { background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(236,72,153,0.15)); border-color: rgba(236, 72, 153, 0.3); }
    .activity-icon.manual { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.3); color: #fbbf24; }
    .activity-body { flex: 1; min-width: 0; }
    .activity-desc { font-size: 13px; color: var(--text-primary); line-height: 1.4; }
    .activity-meta {
      display: flex; gap: 8px; align-items: center;
      margin-top: 4px;
      font-size: 11px; color: var(--text-tertiary);
      font-family: 'JetBrains Mono', monospace;
    }
    .activity-meta .proj-link {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 6px; background: rgba(255,255,255,0.04);
      border-radius: 4px;
    }
    .activity-ctx {
      font-size: 9px; padding: 1px 5px; border-radius: 4px;
      text-transform: uppercase; letter-spacing: 0.06em;
      font-weight: 700;
    }
    .activity-ctx.work { color: var(--work); background: rgba(96,165,250,0.1); }
    .activity-ctx.personal { color: var(--personal); background: rgba(52,211,153,0.1); }
    .activity-del {
      color: var(--text-tertiary); font-size: 14px;
      opacity: 0; transition: opacity 150ms;
    }
    .activity-entry:hover .activity-del { opacity: 1; }

    .jd-summary-out {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      margin-top: 10px;
      max-height: 300px; overflow: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-primary);
      line-height: 1.55;
      white-space: pre-wrap;
    }

    /* ---------- Project view-mode toggle + table ---------- */
    .view-toggle {
      display: inline-flex;
      background: var(--surface-sub);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2px;
      gap: 2px;
      margin-right: 6px;
    }
    .view-toggle button {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      background: transparent;
      transition: all 120ms var(--ease);
      display: inline-flex; align-items: center; gap: 5px;
    }
    .view-toggle button:hover { color: var(--text-secondary); }
    .view-toggle button.active {
      background: var(--overlay-strong);
      color: var(--text-primary);
    }
    .view-toggle .icon { font-size: 13px; }

    .project-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
      background: rgba(18, 18, 36, 0.35);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    html[data-theme="personal"] .project-table { background: rgba(250, 251, 253, 0.7); }
    html[data-theme="work-light"] .project-table { background: rgba(255, 252, 246, 0.7); }
    .project-table thead th {
      text-align: left;
      padding: 10px 14px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-tertiary);
      border-bottom: 1px solid var(--border);
      background: var(--overlay);
      white-space: nowrap;
      user-select: none;
      cursor: pointer;
      position: sticky; top: 0;
      z-index: 1;
    }
    .project-table thead th.sortable:hover { color: var(--text-secondary); }
    .project-table thead th.sorted { color: var(--text-primary); }
    .project-table thead th .sort-arrow {
      margin-left: 4px;
      font-size: 9px;
      opacity: 0.7;
    }
    .project-table tbody tr {
      transition: background 120ms var(--ease);
      cursor: pointer;
    }
    .project-table tbody tr:hover { background: var(--overlay); }
    .project-table tbody tr.expanded { background: var(--overlay-strong); }
    .project-table tbody tr.done-row td:not(.pt-expand) { opacity: 0.55; }
    .project-table tbody tr.done-row .pt-title { text-decoration: line-through; }
    .project-table tbody td {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      vertical-align: top;
    }
    .project-table tbody tr:first-child td { border-top: 0; }
    .pt-title {
      color: var(--text-primary);
      font-weight: 500;
      line-height: 1.3;
      display: flex; align-items: center; gap: 8px;
      min-width: 220px;
    }
    .pt-notes {
      display: block;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 3px;
      line-height: 1.4;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 380px;
    }
    .pt-col-wrap { position: relative; display: inline-block; }
    .pt-col-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: 'JetBrains Mono', monospace;
      background: var(--overlay);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      transition: all 120ms var(--ease);
    }
    .pt-col-pill:hover { background: var(--overlay-strong); color: var(--text-primary); border-color: var(--border-strong); }
    .pt-col-pill.open { background: var(--overlay-strong); color: var(--text-primary); border-color: var(--border-strong); }
    .pt-col-pill.done { background: rgba(34, 197, 94, 0.12); color: #86efac; border-color: rgba(34, 197, 94, 0.3); }
    .pt-col-pill.done:hover { background: rgba(34, 197, 94, 0.2); }
    html[data-theme="personal"] .pt-col-pill.done,
    html[data-theme="work-light"] .pt-col-pill.done { color: #15803d; background: rgba(34, 197, 94, 0.15); }
    .pt-col-chevron { font-size: 8px; opacity: 0.7; margin-top: 1px; }

    .pt-col-popover {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      z-index: 20;
      min-width: 180px;
      background: var(--panel-solid);
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35), 0 0 0 1px var(--border);
      padding: 4px;
      display: flex; flex-direction: column; gap: 1px;
      animation: popoverIn 140ms var(--ease);
    }
    @keyframes popoverIn {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pt-col-opt {
      display: flex; align-items: center; gap: 8px;
      padding: 7px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      text-align: left;
      transition: background 100ms var(--ease), color 100ms var(--ease);
      cursor: pointer;
    }
    .pt-col-opt:hover { background: var(--overlay-strong); color: var(--text-primary); }
    .pt-col-opt.selected { color: var(--text-primary); background: var(--overlay); }
    .pt-col-opt-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--text-tertiary); flex-shrink: 0;
    }
    .pt-col-opt-dot.done { background: #22c55e; box-shadow: 0 0 6px rgba(34, 197, 94, 0.5); }
    .pt-col-opt-name { flex: 1; white-space: nowrap; }
    .pt-col-opt-check { color: var(--accent-from); font-size: 11px; }

    .pt-lane-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border);
      background: var(--overlay);
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 120ms var(--ease);
    }
    .pt-lane-pill:hover { background: var(--overlay-strong); border-color: var(--border-strong); color: var(--text-primary); }
    .pt-lane-pill.none { color: var(--text-tertiary); border-style: dashed; }
    .pt-lane-pill.me {
      background: rgba(96, 165, 250, 0.14);
      color: #93c5fd;
      border-color: rgba(96, 165, 250, 0.4);
    }
    .pt-lane-pill.me:hover { background: rgba(96, 165, 250, 0.22); }
    .pt-lane-pill.ai {
      background: rgba(168, 85, 247, 0.14);
      color: #d8b4fe;
      border-color: rgba(168, 85, 247, 0.45);
    }
    .pt-lane-pill.ai:hover { background: rgba(168, 85, 247, 0.22); }
    html[data-theme="personal"] .pt-lane-pill.me,
    html[data-theme="work-light"] .pt-lane-pill.me {
      color: #1d4ed8;
      background: rgba(96, 165, 250, 0.18);
    }
    html[data-theme="personal"] .pt-lane-pill.ai,
    html[data-theme="work-light"] .pt-lane-pill.ai {
      color: #6b21a8;
      background: rgba(168, 85, 247, 0.16);
    }

    .pt-cell-muted { color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; font-size: 11px; white-space: nowrap; }
    .pt-cell-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-secondary); }
    .pt-expanded-row td {
      padding: 0;
      background: var(--surface-sub);
      border-top: 0;
    }
    .pt-expanded-inner {
      padding: 14px 18px;
      border-top: 1px solid var(--border-strong);
    }
    .pt-expanded-inner .card { background: transparent; border: 0; box-shadow: none; padding: 0; }
    .pt-empty {
      padding: 40px 20px;
      text-align: center;
      color: var(--text-tertiary);
      font-style: italic;
      font-size: 13px;
    }
    .pt-add-row {
      display: block; width: 100%;
      margin-top: 6px;
      padding: 12px 16px;
      background: var(--surface-sub);
      border: 1px dashed var(--border);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      text-align: left;
      transition: border-color 120ms var(--ease), background 120ms var(--ease), color 120ms var(--ease);
    }
    .pt-add-row:hover {
      border-color: var(--accent-from);
      background: var(--card-hover);
      color: var(--text-primary);
    }

    @media (max-width: 1024px) {
      .project-table thead th.pt-hide-md,
      .project-table tbody td.pt-hide-md { display: none; }
    }
    @media (max-width: 768px) {
      .project-table thead th.pt-hide-sm,
      .project-table tbody td.pt-hide-sm { display: none; }
      .project-table tbody td, .project-table thead th { padding: 8px 10px; }
    }

    /* ---------- Right rail ---------- */
    #right-rail { padding: 18px 0; }
    .rail-panel { padding: 0 18px; flex: 0 0 auto; overflow: visible; min-height: 0; }
    #right-rail { overflow-y: auto; }
    .rail-panel + .rail-panel { border-top: 1px solid var(--border); padding-top: 14px; margin-top: 14px; }
    .rail-panel-head { display: flex; align-items: center; margin-bottom: 10px; }
    .rail-panel-title {
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-tertiary); font-family: 'JetBrains Mono', monospace; flex: 1;
    }
    .rail-panel-head .icon-btn { width: 22px; height: 22px; font-size: 12px; }

    /* ---------- Today view: Pulse panels ---------- */
    .pulse-panel { flex: 0 0 auto; max-height: none; }
    .pulse-list { display: flex; flex-direction: column; gap: 6px; }
    .pulse-empty {
      padding: 10px 4px; font-size: 12px; font-style: italic;
      color: var(--text-tertiary);
    }

  <script>
    /* ========================================================================
       KANBAN COCKPIT — single-file prototype (v2: context + day plan + log)
       ======================================================================== */

    const STORAGE_KEY = 'cmd_state_v1';
    const SAVE_DEBOUNCE = 300;
    const PW_HASH = '387c287d2b18fc5dd1beb2b931e2901a34d5dfc6689e4f2eeec3c7a0cf0ea0bd';
    // Baked encrypted PAT for cross-device sync. Encrypted with the password via AES-GCM.
    // Paste the output of Settings → "Bake PAT for other devices" here.
    const BAKED_PAT_ENCRYPTED = 'p7eVBUbKKwN1qT8n:KQvMWhHTyYeeRG4QzbW0MjamqK2LEXyzjErlOvuoU/yn5ryMJis8yFiDvukz2o6g8/Eu3SwmMUFs9vGwMyj//BqVYjfKVYlke1LanGLTmsaIWExv9r382IG665JBJSJNnNfqAM79b7fphkKfPg==';

    async function sha256(str) {
      const buf = new TextEncoder().encode(str);
      const hash = await crypto.subtle.digest('SHA-256', buf);
      return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const PBKDF2_SALT = 'cmd-sync-salt-v1';
    async function deriveKeyFromPassword(password) {
      const enc = new TextEncoder();
      const material = await crypto.subtle.importKey(
        'raw', enc.encode(password), { name: 'PBKDF2' }, false, ['deriveKey']
      );
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: enc.encode(PBKDF2_SALT), iterations: 100000, hash: 'SHA-256' },
        material,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );
    }
    function bytesToB64(bytes) { return btoa(String.fromCharCode(...bytes)); }
    function b64ToBytes(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }

    async function encryptWithPassword(plaintext, password) {
      const key = await deriveKeyFromPassword(password);
      const iv = crypto.getRandomValues(new Uint8Array(12));
      const ct = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv }, key, new TextEncoder().encode(plaintext)
      );
      return bytesToB64(iv) + ':' + bytesToB64(new Uint8Array(ct));
    }
    async function decryptWithPassword(encrypted, password) {
      const [ivB64, ctB64] = encrypted.split(':');
      const iv = b64ToBytes(ivB64);
      const ct = b64ToBytes(ctB64);
      const key = await deriveKeyFromPassword(password);
      const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
      return new TextDecoder().decode(pt);
    }
    async function requireAuth() {
      const gate = document.getElementById('auth-gate');
      if (sessionStorage.getItem('cmd_auth') === '1') {
        gate.style.display = 'none';
        return;
      }
      return new Promise(resolve => {
        const input = document.getElementById('auth-input');
        const err = document.getElementById('auth-err');
        const btn = document.getElementById('auth-submit');
        const go = async () => {
          err.textContent = '';
          const pw = input.value;
          const h = await sha256(pw);
          if (h === PW_HASH) {
            sessionStorage.setItem('cmd_auth', '1');
            // If a baked PAT exists and no local PAT, decrypt and save
            if (BAKED_PAT_ENCRYPTED && !localStorage.getItem('cmd_gh_pat')) {
              try {
                const pat = await decryptWithPassword(BAKED_PAT_ENCRYPTED, pw);
                localStorage.setItem('cmd_gh_pat', pat);
              } catch (e) { console.warn('Baked PAT decrypt failed', e); }
            }
            gate.style.display = 'none';
            resolve(true);
          } else {
            err.textContent = 'Nope.';
            input.value = ''; input.focus();
          }
        };
        btn.addEventListener('click', go);
        input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
        setTimeout(() => input.focus(), 60);
      });
    }
    function lockApp() {
      sessionStorage.removeItem('cmd_auth');
      location.reload();
    }
    // ---------- Microsoft Graph (calendar → tasks) ----------
    const GRAPH_SCOPES = ['Calendars.Read'];
    let _msalInstances = {};  // keyed by client_id
    async function getMsalInstance(clientId, tenantId) {
      const key = clientId + '|' + (tenantId || 'common');
      if (_msalInstances[key]) return _msalInstances[key];
      if (typeof msal === 'undefined') throw new Error('MSAL library not loaded yet — refresh the page.');
      const inst = new msal.PublicClientApplication({
        auth: {
          clientId,
          authority: 'https://login.microsoftonline.com/' + (tenantId || 'common'),
          redirectUri: window.location.origin + window.location.pathname,
        },
        cache: { cacheLocation: 'localStorage', storeAuthStateInCookie: false },
      });
      if (typeof inst.initialize === 'function') await inst.initialize();
      _msalInstances[key] = inst;
      return inst;
    }
    async function graphConnectSource(source) {
      const inst = await getMsalInstance(source.auth.client_id, source.auth.tenant_id);
      const result = await inst.loginPopup({ scopes: GRAPH_SCOPES, prompt: 'select_account' });
      if (!result || !result.account) throw new Error('Login cancelled');
      return result.account.homeAccountId;
    }
    async function graphGetToken(source) {
      const inst = await getMsalInstance(source.auth.client_id, source.auth.tenant_id);
      const account = source.auth.account_id
        ? inst.getAccountByHomeId(source.auth.account_id)
        : (inst.getAllAccounts()[0] || null);
      if (!account) throw new Error('Not signed in — click Connect.');
      try {
        const r = await inst.acquireTokenSilent({ scopes: GRAPH_SCOPES, account });
        return r.accessToken;
      } catch (e) {
        const r = await inst.acquireTokenPopup({ scopes: GRAPH_SCOPES, account });
        return r.accessToken;
      }
    }
    async function graphFetchEvents(source, startISO, endISO) {
      const token = await graphGetToken(source);
      const url = 'https://graph.microsoft.com/v1.0/me/calendar/calendarView'
        + '?startDateTime=' + encodeURIComponent(startISO)
        + '&endDateTime=' + encodeURIComponent(endISO)
        + '&$select=id,subject,start,end,bodyPreview,body,organizer,attendees,isCancelled,location,responseStatus'
        + '&$orderby=start/dateTime&$top=250';
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || 'UTC';
      const res = await fetch(url, {
        headers: {
          'Authorization': 'Bearer ' + token,
          'Prefer': 'outlook.timezone="' + tz + '"',
        },
      });
      if (!res.ok) {
        const t = await res.text();
        throw new Error('Graph ' + res.status + ': ' + t.slice(0, 200));
      }
      const data = await res.json();
      return (data.value || []).map(normalizeGraphEvent);
    }
    function normalizeGraphEvent(e) {
      return {
        id: e.id,
        subject: e.subject || '(no subject)',
        start_iso: (e.start && e.start.dateTime) || '',
        end_iso: (e.end && e.end.dateTime) || '',
        organizer: e.organizer && e.organizer.emailAddress ? (e.organizer.emailAddress.name || e.organizer.emailAddress.address || '') : '',
        attendees: (e.attendees || []).map(a => (a.emailAddress && (a.emailAddress.name || a.emailAddress.address)) || '').filter(Boolean),
        body_text: ((e.body && e.body.content) || e.bodyPreview || '').replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim(),
        is_cancelled: !!e.isCancelled,
        is_declined: e.responseStatus && e.responseStatus.response === 'declined',
        location: (e.location && e.location.displayName) || '',
      };
    }
    function mapEventToCard(evt, source) {
      const mapping = source.mapping || {};
      const start = new Date(evt.start_iso);
      const end = new Date(evt.end_iso);
      const durationMin = Math.max(15, Math.round((end - start) / 60000) || 30);
      // Strip seconds and TZ from ISO so scheduled_time stays in YYYY-MM-DDTHH:MM:SS local form
      const schedTime = evt.start_iso.slice(0, 19);
      const titleTemplate = mapping.title_template || '{subject}';
      const title = titleTemplate
        .replace('{subject}', evt.subject)
        .replace('{organizer}', evt.organizer)
        .replace('{location}', evt.location);
      const bodyStrategy = mapping.body_strategy || 'verbatim';
      let notes = '';
      if (bodyStrategy === 'verbatim') notes = evt.body_text || '';
      else if (bodyStrategy === 'summarize') notes = evt.body_text ? evt.body_text.slice(0, 280) : '';
      if (evt.location) notes = (notes ? notes + '\n\n' : '') + '📍 ' + evt.location;
      if (evt.organizer) notes = (notes ? notes + '\n' : '') + '👤 ' + evt.organizer;
      return {
        title,
        notes,
        scheduled_time: schedTime,
        duration_minutes: durationMin,
        context: mapping.default_context || 'work',
        auto_complete: mapping.auto_complete !== false,
        source: { kind: 'calendar', source_id: source.id, event_id: evt.id },
      };
    }
    function cardForCalendarEvent(sourceId, eventId) {
      return state.cards.find(c => c.source && c.source.kind === 'calendar'
        && c.source.source_id === sourceId && c.source.event_id === eventId);
