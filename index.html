        },
      }, 'Save key');
      const anthStatusLine = el('div', {
        style: { fontSize: '11px', fontFamily: 'JetBrains Mono, monospace', color: 'var(--text-tertiary)', marginBottom: '10px' },
      }, getAnthropicKey() ? 'Connected — From email uses this key in your browser.' : 'Not set. Paste your Anthropic API key to enable email analysis.');

      openModal([
        el('h3', {}, 'Settings'),
        el('div', { class: 'modal-label' }, 'Cloud sync — GitHub Gist'),
        statusLine,
        el('p', { style: { fontSize: '12px' } }, 'Paste a fine-grained PAT with gist scope. State is stored as a private gist named cmd-state.json. Each device that uses the same PAT syncs to the same gist.'),
        patInput,
        el('div', { style: { display: 'flex', gap: '6px', marginTop: '4px', marginBottom: '18px', flexWrap: 'wrap' } }, [connectBtn, disconnectBtn, bakeBtn].filter(Boolean)),

        el('div', { class: 'modal-label' }, 'Anthropic API key (for email analysis)'),
        anthStatusLine,
        el('p', { style: { fontSize: '12px' } }, 'Stored in this browser only. Used by the "From email" button to extract tasks from pasted email content.'),
        anthKeyInput,
        el('div', { style: { display: 'flex', gap: '6px', marginTop: '4px', marginBottom: '18px' } }, [anthSaveBtn]),

        el('div', { class: 'modal-label' }, 'Calendar sources'),

    function bankListEl() {
      const wrap = el('div', { class: 'bank-sections-wrap', dataset: { dropKind: 'bank' } });
      const cards = visibleBankCards();
      if (cards.length === 0) {
        const list = el('div', { class: 'bank-list', dataset: { dropKind: 'bank' } });
        list.appendChild(el('div', { class: 'bank-empty' }, EMPTY_COPY.bank));

    // Group bank cards by project and render each as a collapsible section
    // header + (optional) card list. Section state lives in state.ui.bank_expanded
    // — absent or false = collapsed (default). When a query is active, every
    // section that has matches is force-expanded so search results are visible
    // without clicking; the user's persisted state is restored when query clears.
    function appendBankSections(parent, cards, query) {
      const filtering = !!query;
      const groups = new Map();
      cards.forEach(c => {
        const pid = c.project_id || 'inbox';
        if (!groups.has(pid)) groups.set(pid, []);
        groups.get(pid).push(c);
      });
      const projectIds = Array.from(groups.keys())
        .filter(pid => pid !== 'inbox')
        .sort((a, b) => {
          const an = (state.projects.find(p => p.id === a) || {}).name || '';
          const bn = (state.projects.find(p => p.id === b) || {}).name || '';
          return an.localeCompare(bn);
        });
      if (groups.has('inbox')) projectIds.push('inbox');

      const expandedMap = state.ui.bank_expanded || {};
      projectIds.forEach(pid => {
        const groupCards = groups.get(pid);
        const proj = state.projects.find(p => p.id === pid);
        const accent = proj && proj.accent ? proj.accent : { from: '#7c3aed', to: '#ec4899' };
        const projName = proj ? proj.name : 'Inbox';
        const isExpanded = filtering || expandedMap[pid] === true;

        const header = el('button', {
          class: 'bank-section-header' + (isExpanded ? ' expanded' : ''),
          title: isExpanded ? 'Collapse' : 'Expand',
          onClick: () => {
            if (filtering) return;
            setState(s => {
              s.ui.bank_expanded = s.ui.bank_expanded || {};
              s.ui.bank_expanded[pid] = !s.ui.bank_expanded[pid];
            });
          },
        }, [
          el('span', { class: 'bank-section-chevron' }, isExpanded ? '▾' : '▸'),
          el('span', {
            class: 'bank-section-dot',
            style: { background: 'linear-gradient(135deg, ' + accent.from + ', ' + accent.to + ')' },
          }),
          el('span', { class: 'bank-section-name' }, projName),
          el('span', { class: 'bank-section-count' }, String(groupCards.length)),
        ]);
        parent.appendChild(header);

        if (isExpanded) {
          const list = el('div', {
            class: 'bank-list bank-section-list',
            dataset: { dropKind: 'bank', bankSection: pid },
          });
          groupCards.forEach(c => list.appendChild(bankCardEl(c)));
          parent.appendChild(list);
        }
      });
    }
    function bankCardEl(c) {
      const node = el('div', {
        class: 'bank-card' + (c.done_at ? ' done' : ''),
        dataset: { cardId: c.id },
        onClick: () => openCardEditModal(c.id),
      }, [
        el('div', {
          class: 'bank-card-check' + (c.done_at ? ' checked' : ''),
          title: c.done_at ? 'Completed — click to undo' : 'Mark done',
          onClick: (e) => { e.stopPropagation(); toggleCardDone(c.id); },
        }, c.done_at ? '✓' : ''),
        el('div', { class: 'bank-card-body' }, [
          el('div', { class: 'bank-card-title' }, c.title),
        ]),
      ]);
      if (c.context) node.appendChild(el('span', { class: 'bank-card-ctx ' + c.context }));
      const body = node.querySelector('.bank-card-body');
      const dueLabel = formatDueLabel(c.due);
      const dueISO = resolveDueISO(c.due);
      const pills = [];
      // Project chip — clickable to jump to that project
      if (c.project_id && c.project_id !== 'inbox') {
        const proj = projectById(c.project_id);
        if (proj) {
          const accent = proj.accent || { from: '#a855f7', to: '#ec4899' };
          pills.push(el('span', {
            class: 'project-chip clickable',
            title: 'Open ' + proj.name,
            style: {
              background: 'linear-gradient(135deg, ' + accent.from + '22, ' + accent.to + '22)',
              borderColor: accent.from + '55',
              cursor: 'pointer',
            },
            onClick: (e) => { e.stopPropagation(); navigateTo(proj.id); },
          }, [
            el('span', { class: 'project-chip-dot', style: {
              background: 'linear-gradient(135deg, ' + accent.from + ', ' + accent.to + ')' } }),
            el('span', {}, proj.name),
          ]));
        }
      }
      if (c.source && c.source.kind === 'email') {
        pills.push(el('span', {
          class: 'attach-pill',
          title: 'From inbox' + (c.source.received_at ? ' · ' + new Date(c.source.received_at).toLocaleDateString() : ''),
        }, '📥 inbox'));
      }
      if (dueLabel) {
        let cls = 'due-pill';
        const today = todayISO();
        if (dueISO && dueISO < today) cls += ' overdue';
        else if (dueLabel === 'Today') cls += ' today';
        const timeLabel = formatScheduledTimeLabel(c.scheduled_time);
        pills.push(el('span', { class: cls }, dueLabel + (timeLabel ? ' · ' + timeLabel : '')));
      }
      if (c.recurrence) {
        const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        let recLabel;
        if (c.recurrence === 'weekly' && typeof c.recurrence_day === 'number') {
          recLabel = 'Weekly · ' + dayLabels[c.recurrence_day];
        } else if (c.recurrence === 'custom' && c.recurrence_interval && c.recurrence_unit) {
          const n = c.recurrence_interval;
          recLabel = 'Every ' + n + ' ' + c.recurrence_unit + (n === 1 ? '' : 's');
        } else {
          recLabel = c.recurrence.charAt(0).toUpperCase() + c.recurrence.slice(1);
        }
        pills.push(el('span', { class: 'rec-pill' }, '↻ ' + recLabel));
      }
      if (c.missed_count) {
        pills.push(el('span', { class: 'due-pill overdue', title: 'Last missed ' + (c.last_missed_at || '') }, 'Missed × ' + c.missed_count));
      }
      const fileCount = filesForOwner('card', c.id).length;
      if (fileCount > 0) {
        pills.push(el('span', { class: 'attach-pill', title: fileCount + ' attachment' + (fileCount === 1 ? '' : 's') }, '📎 ' + fileCount));
      }
      if (pills.length) body.appendChild(el('div', { class: 'bank-card-meta' }, pills));
      return node;
    }

    function subtaskSectionEl(cardId) {
      const wrap = el('div', { class: 'subtasks-wrap' });

      const rebuild = () => {
        clearNode(wrap);
        const c = state.cards.find(x => x.id === cardId);
        if (!c) return;
        const tree = c.subtasks || [];
        if (tree.length === 0) {
          wrap.appendChild(el('div', {
            style: { padding: '8px', color: 'var(--text-tertiary)', fontSize: '12px', fontStyle: 'italic' },
          }, 'No subtasks yet. Paste below or type one per line.'));
        }
        const renderNodes = (arr, parentEl) => {
          arr.forEach(st => {
            const row = el('div', { class: 'subtask-row' + (st.done ? ' done' : '') }, [
              el('div', {
                class: 'subtask-check' + (st.done ? ' checked' : ''),
                onClick: () => { toggleSubtask(cardId, st.id); rebuild(); },
              }, st.done ? '✓' : ''),
              el('span', {
                class: 'subtask-title',
                contenteditable: 'true',
                onBlur: (e) => { const v = e.target.textContent.trim(); if (v && v !== st.title) { editSubtaskTitle(cardId, st.id, v); rebuild(); } else { e.target.textContent = st.title; } },
                onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
              }, st.title),
              el('div', { class: 'subtask-actions' }, [
                el('button', {
                  title: 'Add sub-subtask',
                  onClick: () => {
                    const t = prompt('Sub-subtask:');
                    if (t && t.trim()) { addSubtask(cardId, st.id, t.trim()); rebuild(); }
                  },
                }, '+'),
                el('button', {
                  class: 'danger', title: 'Delete',
                  onClick: () => { deleteSubtask(cardId, st.id); rebuild(); },
                }, '×'),
              ]),
            ]);
            parentEl.appendChild(row);
            if (st.subtasks && st.subtasks.length) {
              const children = el('div', { class: 'subtask-children' });
              renderNodes(st.subtasks, children);
              parentEl.appendChild(children);
            }
          });
        };
        renderNodes(tree, wrap);

        // Bulk add
        const bulk = el('textarea', {
          placeholder: 'Add subtasks — one per line. Paste works.',
          onKeydown: (e) => {
            if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); commitBulk(); }
          },
        });
        const commitBulk = () => {
          const lines = bulk.value.split('\n').map(l => l.trim()).filter(Boolean);
          if (!lines.length) return;
          lines.forEach(line => addSubtask(cardId, null, line));
          bulk.value = '';
          rebuild();
        };
        const bulkWrap = el('div', { class: 'subtask-bulk' }, [
          bulk,
          el('div', { class: 'row' }, [
            el('span', { class: 'hint' }, 'Ctrl/Cmd+Enter or button to submit all lines'),
            el('button', { onClick: commitBulk }, '+ Add'),
          ]),
        ]);
        wrap.appendChild(bulkWrap);
      };

      rebuild();
      return wrap;
    }

    function openCardEditModal(cardId) {
      const c = state.cards.find(x => x.id === cardId);
      if (!c) return;
      let title = c.title, notes = c.notes || '', due = c.due, context = c.context, recurrence = c.recurrence;
      let recurrenceDay = typeof c.recurrence_day === 'number' ? c.recurrence_day : null;
      let recurrenceInterval = typeof c.recurrence_interval === 'number' && c.recurrence_interval > 0 ? c.recurrence_interval : 2;
      let recurrenceUnit = ['day','week','month','year'].includes(c.recurrence_unit) ? c.recurrence_unit : 'week';
      let duration = c.duration_minutes || '';
      let timeHHMM = extractTimeHHMM(c.scheduled_time);
      let autoComplete = !!c.auto_complete;
      const titleInput = el('input', { type: 'text', value: title, onInput: (e) => title = e.target.value });
      const notesArea = el('textarea', { rows: 3, value: '', onInput: (e) => notes = e.target.value, style: { minHeight: '60px' } });
      notesArea.value = notes;
      const dateInput = el('input', {
        type: 'date',
        value: due && /^\d{4}-\d{2}-\d{2}$/.test(due) ? due : '',
        onChange: (e) => { if (e.target.value) { due = e.target.value; refreshDue(); } },
        style: { padding: '4px 6px', borderRadius: '6px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--text-secondary)', fontSize: '11px' },
      });
      const mkDue = (label, val) => el('button', {
        class: 'due-opt' + (due === val || (val == null && due == null) ? ' selected' : ''),
        onClick: () => { due = val; dateInput.value = ''; refreshDue(); },
      }, label);
      const noneBtn = mkDue('none', null);
      const todayBtn = mkDue('today', 'today');
      const tomorrowBtn = mkDue('tomorrow', 'tomorrow');
      const refreshDue = () => {
        noneBtn.classList.toggle('selected', due == null);
        todayBtn.classList.toggle('selected', due === 'today');
        tomorrowBtn.classList.toggle('selected', due === 'tomorrow');
      };
      const ctxToggle = contextToggleEl(context || 'work', (ctx) => {
        context = ctx;
        ctxToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        ctxToggle.querySelector('.' + ctx).classList.add('active');
      });
      const recRow = el('div', { class: 'card-edit-row' });
      const dayRow = el('div', { class: 'card-edit-row', style: { marginTop: '6px' } });
      const customRow = el('div', { class: 'card-edit-row', style: { marginTop: '6px' } });
      const refreshSubRows = () => {
        dayRow.style.display = recurrence === 'weekly' ? '' : 'none';
        customRow.style.display = recurrence === 'custom' ? '' : 'none';
      };
      const mkRec = (val, label) => {
        const b = el('button', { class: 'due-opt' + (recurrence === val ? ' selected' : ''), onClick: () => {
          recurrence = val;
          recRow.querySelectorAll('.due-opt').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
          refreshSubRows();
        } }, label);
        return b;
      };
      const rowLabelStyle2 = { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' };
      recRow.appendChild(el('span', { style: rowLabelStyle2 }, 'Recurs'));
      recRow.appendChild(mkRec(null, 'never'));
      recRow.appendChild(mkRec('daily', 'daily'));
      recRow.appendChild(mkRec('weekly', 'weekly'));
      recRow.appendChild(mkRec('monthly', 'monthly'));
      recRow.appendChild(mkRec('custom', 'custom'));
      const dayLabels = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
      dayRow.appendChild(el('span', { style: rowLabelStyle2 }, 'On'));
      dayLabels.forEach((lbl, idx) => {
        const b = el('button', {
          class: 'due-opt' + (recurrenceDay === idx ? ' selected' : ''),
          onClick: () => {
            recurrenceDay = idx;
            dayRow.querySelectorAll('.due-opt').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
          },
        }, lbl);
        dayRow.appendChild(b);
      });
      customRow.appendChild(el('span', { style: rowLabelStyle2 }, 'Every'));
      const intervalInput = el('input', {
        type: 'number', min: '1', step: '1', value: String(recurrenceInterval),
        onInput: (e) => {
          const v = parseInt(e.target.value, 10);
          if (!isNaN(v) && v > 0) recurrenceInterval = v;
        },
        style: { width: '60px', padding: '4px 6px', borderRadius: '6px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--text-secondary)', fontSize: '11px' },
      });
      customRow.appendChild(intervalInput);
      const mkUnit = (val, label) => {
        const b = el('button', {
          class: 'due-opt' + (recurrenceUnit === val ? ' selected' : ''),
          onClick: () => {
            recurrenceUnit = val;
            customRow.querySelectorAll('.due-opt').forEach(x => x.classList.remove('selected'));
            b.classList.add('selected');
          },
        }, label);
        return b;
      };
      customRow.appendChild(mkUnit('day', 'days'));
      customRow.appendChild(mkUnit('week', 'weeks'));
      customRow.appendChild(mkUnit('month', 'months'));
      customRow.appendChild(mkUnit('year', 'years'));
      refreshSubRows();
      const timeInput = el('input', {
        type: 'time', step: 900, value: timeHHMM,
        onChange: (e) => { timeHHMM = e.target.value || ''; },
        style: { padding: '4px 6px', borderRadius: '6px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--text-secondary)', fontSize: '11px' },
      });
      const save = () => {
        if (!title.trim()) { titleInput.focus(); return; }
        const dur = duration === '' || duration == null ? null : parseInt(duration, 10);
        const schedTime = composeScheduledTime(due, timeHHMM);
        updateCard(cardId, {
          title: title.trim(), notes: notes.trim(), due, context, recurrence,
          recurrence_day: recurrence === 'weekly' ? recurrenceDay : null,
          recurrence_interval: recurrence === 'custom' ? recurrenceInterval : null,
          recurrence_unit: recurrence === 'custom' ? recurrenceUnit : null,
          duration_minutes: (dur != null && !isNaN(dur) && dur >= 0) ? dur : null,
          scheduled_time: schedTime,
          auto_complete: autoComplete,
        });
        closeModal();
      };
      const autoCompleteCheckbox = el('input', {
        type: 'checkbox',
        onChange: (e) => { autoComplete = e.target.checked; },
        style: { width: '16px', height: '16px', cursor: 'pointer' },
      });
      autoCompleteCheckbox.checked = autoComplete;
      const autoCompleteRow = el('label', {
        class: 'card-edit-row',
        style: { marginTop: '6px', cursor: 'pointer' },
      }, [
        autoCompleteCheckbox,
        el('span', { style: { fontSize: '12px', color: 'var(--text-secondary)' } }, 'Auto-complete at end of scheduled day'),
        el('span', { style: { fontSize: '10px', color: 'var(--text-tertiary)', fontStyle: 'italic' } }, '(for events that happen whether you "did" them or not — like hockey games)'),
      ]);
      const durationInput = el('input', {
        type: 'number', min: '0', step: '5', placeholder: 'Optional — minutes',
        value: duration,
        onInput: (e) => duration = e.target.value,
      });
      const del = () => {
        if (!confirm('Delete "' + c.title + '"?')) return;
        deleteCard(cardId);
        closeModal();
      };
      const isInfo = isInfoCard(c);
      const taskFields = isInfo ? [] : [
        el('div', { class: 'card-edit-row', style: { marginTop: '10px' } }, [
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Due'),
          noneBtn, todayBtn, tomorrowBtn, dateInput,
        ]),
        el('div', { class: 'card-edit-row', style: { marginTop: '6px' } }, [
          el('span', { style: rowLabelStyle2 }, 'At'),
          timeInput,
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)' } }, 'needs a due date'),
        ]),
        autoCompleteRow,
        recRow,
        dayRow,
        customRow,
        el('div', { class: 'modal-label', style: { marginTop: '10px' } }, 'Estimated duration (optional)'),
        durationInput,
      ];
      openModal([
        el('h3', {}, isInfo ? '📌 Edit info card' : 'Edit task'),
        titleInput,
        notesArea,
        el('div', { class: 'modal-label' }, 'Context'),
        ctxToggle,
        ...taskFields,
        el('div', { class: 'modal-label', style: { marginTop: '10px' } }, isInfo ? 'Checklist' : 'Subtasks'),
        subtaskSectionEl(cardId),
        el('div', { class: 'modal-label', style: { marginTop: '10px' } }, 'Attachments'),
        cardFilesSectionEl(cardId),
        el('div', { class: 'modal-actions' }, [
          el('button', { class: 'danger', onClick: del }, 'Delete'),
          el('div', { style: { flex: 1 } }),
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: save }, 'Save'),
        ]),
      ]);
      setTimeout(() => titleInput.focus(), 50);
    }

    // Card links — list of { label, url } per card; rendered as a chip row plus an inline add form.
    function cardLinksSectionEl(cardId) {
      const wrap = el('div', { class: 'card-links-wrap' });
      const rebuild = () => {
        clearNode(wrap);
        const c = state.cards.find(x => x.id === cardId);
        const links = (c && Array.isArray(c.links)) ? c.links : [];
        const list = el('div', { class: 'card-links-list' });
        if (links.length === 0) {
          list.appendChild(el('div', { class: 'card-links-empty' }, 'No links. Paste a URL below.'));
        } else {
          links.forEach((link, idx) => {
            const display = link.label || link.url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
            list.appendChild(el('div', { class: 'card-link-row' }, [
              el('a', {
                href: link.url, target: '_blank', rel: 'noopener',
                class: 'card-link-anchor',
                title: link.url,
                onClick: (e) => e.stopPropagation(),
              }, [el('span', {}, '🔗'), el('span', { class: 'truncate' }, display)]),
              el('button', {
                class: 'icon-btn card-link-del',
                title: 'Remove this link',
                onClick: (e) => {
                  e.stopPropagation();
                  setState(s => {
                    const cc = s.cards.find(x => x.id === cardId);
                    if (cc) cc.links.splice(idx, 1);
                  });
                  setTimeout(rebuild, 30);
                },
              }, '×'),
            ]));
          });
        }
        wrap.appendChild(list);

        // Inline add form: label + url + add button
        const labelInput = el('input', {
          type: 'text', placeholder: 'Label (optional)',
          class: 'card-link-input-label',
          onClick: (e) => e.stopPropagation(),
        });
        const urlInput = el('input', {
          type: 'url', placeholder: 'https://…',
          class: 'card-link-input-url',
          onClick: (e) => e.stopPropagation(),
        });
        const submit = () => {
          const url = urlInput.value.trim();
          if (!url) { urlInput.focus(); return; }
          // Default to https:// if no scheme
          const finalUrl = /^[a-z]+:\/\//i.test(url) ? url : 'https://' + url;
          const label = labelInput.value.trim();
          setState(s => {
            const cc = s.cards.find(x => x.id === cardId);
            if (!cc) return;
            cc.links = cc.links || [];
            cc.links.push({ label, url: finalUrl });
          });
          labelInput.value = ''; urlInput.value = '';
          setTimeout(() => { rebuild(); urlInput.focus(); }, 30);
        };
        urlInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); submit(); } });
        labelInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); urlInput.focus(); } });
        const addBtn = el('button', {
          class: 'text-btn primary card-link-add-btn',
          onClick: (e) => { e.stopPropagation(); submit(); },
        }, '+ Add');
        wrap.appendChild(el('div', { class: 'card-link-add-row' }, [labelInput, urlInput, addBtn]));
      };
      rebuild();
      return wrap;
    }

    // Card attachments — files attached directly to a card (owner_type='card')
    function cardFilesSectionEl(cardId) {
      const wrap = el('div', { class: 'card-files-wrap' });

      const rebuild = () => {
        clearNode(wrap);
        const files = filesForOwner('card', cardId);
        const list = el('div', { class: 'card-files-list' });
        if (files.length === 0) {
          list.appendChild(el('div', { class: 'card-files-empty' }, 'No attachments. Drop, paste, or click + to pick.'));
        } else {
          files.forEach(f => list.appendChild(fileChipEl(f)));
        }
        wrap.appendChild(list);

        // File picker button
        const fileInput = el('input', {
          type: 'file', multiple: true,
          style: { display: 'none' },
        });
        fileInput.addEventListener('change', () => {
          for (const f of fileInput.files) addFile('card', cardId, f);
          fileInput.value = '';
          setTimeout(rebuild, 50);
        });
        const pickBtn = el('button', {
          class: 'text-btn',
          style: { marginTop: '6px' },
          onClick: () => fileInput.click(),
        }, '+ Attach files');
        wrap.appendChild(pickBtn);
        wrap.appendChild(fileInput);

        // Drag-drop zone (re-attach each rebuild)
        setupFileDrop(list, 'card', cardId);
        // Rebuild after drop happens — setupFileDrop calls addFile but we need UI refresh
        const origDrop = list.ondrop;
        list.addEventListener('drop', () => setTimeout(rebuild, 80), { once: true });
      };

      rebuild();
      // Paste-to-attach: bound to the wrap's lifecycle (auto-removes when modal closes).
      // Attached once per cardFilesSectionEl construction so we don't pile up handlers.
      setupFilePaste(wrap, 'card', cardId, rebuild);
      return wrap;
    }

    // ---------- Main ----------
    function renderMain() {
      const header = document.getElementById('main-header');
      const body = document.getElementById('main-body');
      clearNode(header); clearNode(body);
      const view = state.ui.active_view;
      if (view === 'today') { renderTodayPlan(header, body); return; }
      if (view === 'daily' || view === 'weekly') { state.ui.active_view = 'today'; render(); return; }
      if (view === 'ideas') { renderIdeasView(header, body); return; }
      if (view === 'automations') { state.ui.active_view = 'ideas'; render(); return; }
      if (view === 'goals') { renderGoalsView(header, body); return; }
      if (view === 'books') { renderBooksView(header, body); return; }
      if (view === 'activity') { renderActivityView(header, body); return; }
      if (view === 'done') { renderDoneView(header, body); return; }
      if (view === 'projects') { renderProjectsHub(header, body); return; }
      const proj = projectById(view);
      if (!proj) { state.ui.active_view = 'today'; render(); return; }
      renderProjectView(header, body, proj);
    }

    function renderProjectsHub(header, body) {
      header.appendChild(el('div', { class: 'main-title' }, [
        el('div', { class: 'main-title-dot' }),
        el('span', {}, 'Projects'),
      ]));
      const allProjs = visibleProjects();
      const activeProjs = allProjs.filter(p => (p.status || 'active') !== 'done');
      const doneProjs = allProjs.filter(p => (p.status || 'active') === 'done');
      // Sort active by status order
      activeProjs.sort((a, b) => {
        const ai = PROJECT_STATUS_ORDER.indexOf(a.status || 'active');
        const bi = PROJECT_STATUS_ORDER.indexOf(b.status || 'active');
        if (ai !== bi) return ai - bi;
        return (a.name || '').localeCompare(b.name || '');
      });
      doneProjs.sort((a, b) => (a.name || '').localeCompare(b.name || ''));

      const counts = {};
      activeProjs.forEach(p => { const s = p.status || 'active'; counts[s] = (counts[s] || 0) + 1; });
      const subtitleParts = [activeProjs.length + ' active'];
      ['on_hold', 'blocked'].forEach(s => {
        if (counts[s]) subtitleParts.push(counts[s] + ' ' + PROJECT_STATUS[s].label.toLowerCase());
      });
      if (doneProjs.length) subtitleParts.push(doneProjs.length + ' completed');
      header.appendChild(el('div', { class: 'main-subtitle' }, subtitleParts.join(' · ')));
      header.appendChild(el('div', { class: 'main-actions' }, [
        el('button', { class: 'text-btn', onClick: () => openNewProjectModal() }, '+ New project'),
      ]));

      if (activeProjs.length === 0 && doneProjs.length === 0) {
        body.appendChild(el('div', {
          style: { padding: '40px', textAlign: 'center', color: 'var(--text-tertiary)', fontSize: '13px' },
        }, 'No projects yet. Click "+ New project" to start one.'));
        return;
      }

      const grid = el('div', { class: 'projects-hub-grid' });
      activeProjs.forEach(p => grid.appendChild(projectHubCardEl(p)));
      if (activeProjs.length === 0) {
        grid.appendChild(el('div', {
          style: { padding: '20px', color: 'var(--text-tertiary)', fontSize: '13px', fontStyle: 'italic' },
        }, 'All projects are done. Suspicious.'));
      }
      body.appendChild(grid);

      if (doneProjs.length) {
        const isOpen = !!state.ui._completed_projects_open;
        const section = el('details', {
          class: 'completed-projects-section',
          open: isOpen ? 'open' : null,
          onToggle: (e) => {
            // Persist open/closed in ui state without triggering full render churn
            state.ui._completed_projects_open = e.target.open;
            saveState();
          },
        });
        section.appendChild(el('summary', { class: 'completed-projects-summary' }, [
          el('span', { class: 'completed-projects-toggle' }, '▸'),
          el('span', {}, 'Completed projects'),
          el('span', { class: 'completed-projects-count' }, String(doneProjs.length)),
          el('span', { class: 'completed-projects-hint' }, 'click a status pill to reopen'),
        ]));
        const doneGrid = el('div', { class: 'projects-hub-grid completed' });
        doneProjs.forEach(p => doneGrid.appendChild(projectHubCardEl(p)));
        section.appendChild(doneGrid);
        body.appendChild(section);
      }
    }

    const PROJECT_STATUS = {
      active:  { label: 'Active',  className: 'active' },
      on_hold: { label: 'On hold', className: 'on-hold' },
      blocked: { label: 'Blocked', className: 'blocked' },
      done:    { label: 'Done',    className: 'done' },
    };
    const PROJECT_STATUS_ORDER = ['active', 'on_hold', 'blocked', 'done'];

    function setProjectStatus(projectId, status) {
      if (!PROJECT_STATUS[status]) return;
      setState(s => {
        const p = s.projects.find(x => x.id === projectId);
        if (p) p.status = status;
      });
    }

    function projectStatusPillEl(p, opts) {
      opts = opts || {};
      const status = p.status || 'active';
      const meta = PROJECT_STATUS[status] || PROJECT_STATUS.active;
      const pill = el('button', {
        class: 'project-status-pill ' + meta.className + (opts.large ? ' large' : ''),
        title: 'Status: ' + meta.label + ' — click to cycle',
        onClick: (e) => {
          e.stopPropagation();
          const idx = PROJECT_STATUS_ORDER.indexOf(status);
          const next = PROJECT_STATUS_ORDER[(idx + 1) % PROJECT_STATUS_ORDER.length];
          setProjectStatus(p.id, next);
        },
      }, [
        el('span', { class: 'project-status-dot' }),
        el('span', {}, meta.label),
      ]);
      return pill;
    }

    function projectHubCardEl(p) {
      const cardCount = state.cards.filter(c => c.project_id === p.id && !c.archived).length;
      const people = Array.isArray(p.people) ? p.people : [];
      const status = p.status || 'active';
      const open = () => { state.ui.active_view = p.id; saveState(); render(); };
      const node = el('div', {
        class: 'projects-hub-card status-' + (PROJECT_STATUS[status] || PROJECT_STATUS.active).className,
        style: { '--item-from': p.accent.from, '--item-to': p.accent.to },
        onClick: open,
      });
      node.appendChild(el('div', { class: 'projects-hub-card-accent' }));
      const headChildren = [
        el('div', { class: 'projects-hub-card-title' }, p.name),
        projectStatusPillEl(p),
        el('span', { class: 'projects-hub-card-ctx ' + (p.context || 'work') }, p.context || 'work'),
      ];
      node.appendChild(el('div', { class: 'projects-hub-card-head' }, headChildren));
      if (p.description) {
        node.appendChild(el('div', { class: 'projects-hub-card-desc' }, p.description));
      }
      const cardLinks = Array.isArray(p.links) ? p.links.filter(l => l && l.url) : [];
      if (cardLinks.length) {
        const linkRow = el('div', { class: 'projects-hub-card-link-row' });
        cardLinks.slice(0, 3).forEach(link => {
          const display = link.label || link.url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
          linkRow.appendChild(el('a', {
            href: link.url, target: '_blank', rel: 'noopener',
            class: 'projects-hub-card-link',
            onClick: (e) => e.stopPropagation(),
            title: link.url,
          }, [ el('span', {}, '🔗'), el('span', { class: 'truncate' }, display) ]));
        });
        if (cardLinks.length > 3) {
          linkRow.appendChild(el('span', {
            class: 'projects-hub-card-link',
            style: { color: 'var(--text-tertiary)', cursor: 'default' },
            title: cardLinks.slice(3).map(l => l.label || l.url).join('\n'),
          }, '+' + (cardLinks.length - 3) + ' more'));
        }
        node.appendChild(linkRow);
      }
      node.appendChild(el('div', { class: 'projects-hub-card-meta' }, [
        el('span', {}, cardCount + ' card' + (cardCount === 1 ? '' : 's')),
        el('span', {}, '·'),
        el('span', {}, p.columns.length + ' column' + (p.columns.length === 1 ? '' : 's')),
      ]));
      if (people.length) {
        const row = el('div', { class: 'projects-hub-card-people' });
        people.slice(0, 5).forEach(name => row.appendChild(el('span', { class: 'team-chip' }, [
          el('span', { class: 'team-chip-name' }, name),
        ])));
        if (people.length > 5) row.appendChild(el('span', { class: 'projects-hub-more' }, '+' + (people.length - 5)));
        node.appendChild(row);
      }
      return node;
    }

    // ---------- Today plan ----------
    function renderTodayPlan(header, body) {
      const isToday = currentPlanDate === todayISO();
      const isTomorrow = currentPlanDate === tomorrowISO();
      const label = isToday ? 'Today' : isTomorrow ? 'Tomorrow' : new Date(currentPlanDate + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      header.appendChild(el('div', { class: 'main-title' }, [
        el('div', { class: 'main-title-dot' }),
        el('span', {}, isToday ? 'Today' : isTomorrow ? 'Plan tomorrow' : 'Plan ' + label),
      ]));
      const plannedCount = state.cards.filter(c => c.today_slot && c.plan_date === currentPlanDate && contextMatches(contextOf(c, 'card'))).length;
      const dueCount = isToday ? todayCards().length : 0;
      header.appendChild(el('div', { class: 'main-subtitle' }, plannedCount + ' planned' + (isToday ? ' · ' + dueCount + ' due today' : '')));
      header.appendChild(el('div', { class: 'main-actions' }, [
        planDateToggleEl(),
        el('button', { class: 'text-btn', onClick: () => { if (confirm('Clear the plan for ' + label + '?')) clearDayPlan(); } }, 'Clear'),
      ]));

      // Stale-schedule banner: when viewing Today, surface unfinished items still
      // sitting on yesterday's (or earlier) schedule — usually the result of a
      // tab being open across midnight before the rollover fix landed.
      if (isToday) {
        const todayStr = todayISO();
        const stale = state.cards.filter(c => {
          if (!c.scheduled_time || c.done_at || c.archived) return false;
          if (!contextMatches(contextOf(c, 'card'))) return false;
          return c.scheduled_time.slice(0, 10) < todayStr;
        });
        if (stale.length) {
          const byDay = {};
          stale.forEach(c => {
            const d = c.scheduled_time.slice(0, 10);
            (byDay[d] = byDay[d] || []).push(c);
          });
          const days = Object.keys(byDay).sort().reverse();
          const mostRecent = days[0];
          const banner = el('div', {
            style: {
              margin: '8px 0 12px', padding: '10px 14px',
              background: 'rgba(245, 158, 11, 0.08)',
              border: '1px solid rgba(245, 158, 11, 0.35)',
              borderRadius: '10px',
              display: 'flex', gap: '12px', alignItems: 'center', flexWrap: 'wrap',
            },
          }, [
            el('span', { style: { fontSize: '16px' } }, '⚠'),
            el('div', { style: { flex: '1', minWidth: '200px', fontSize: '13px' } }, [
              el('div', { style: { fontWeight: '600' } }, stale.length + ' unfinished item' + (stale.length === 1 ? '' : 's') + ' on past schedules'),
              el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)' } },
                'Most recent: ' + new Date(mostRecent + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + ' · ' + byDay[mostRecent].length + ' item' + (byDay[mostRecent].length === 1 ? '' : 's')),
            ]),
            el('button', {
              class: 'text-btn',
              onClick: () => { currentPlanDate = mostRecent; render(); },
            }, 'Show ' + new Date(mostRecent + 'T00:00:00').toLocaleDateString(undefined, { month: 'numeric', day: 'numeric' })),
            el('button', {
              class: 'text-btn primary',
              title: 'Move all ' + stale.length + ' unfinished items forward to today, keeping their hour:minute',
              onClick: () => {
                if (!confirm('Move ' + stale.length + ' item' + (stale.length === 1 ? '' : 's') + ' from past schedules to today (keeping their time-of-day)?')) return;
                setState(s => {
                  s.cards.forEach(c => {
                    if (!c.scheduled_time || c.done_at || c.archived) return;
                    if (c.scheduled_time.slice(0, 10) >= todayStr) return;
                    const t = c.scheduled_time.slice(11);
                    c.scheduled_time = todayStr + 'T' + t;
                    if (c.due && c.due !== 'today' && c.due !== 'tomorrow' && /^\d{4}-\d{2}-\d{2}$/.test(c.due) && c.due < todayStr) {
                      c.due = todayStr;
                    }
                  });
                });
              },
            }, '↻ Move all to today'),
          ]);
          body.appendChild(banner);
        }
      }

      // Top 3 — collapse to single CTA when none picked, else show standard 3-slot grid
      const priorities = planCards('priority');
      const top3Block = el('div', {});
      top3Block.appendChild(el('div', { class: 'plan-section-title' }, [
        el('span', {}, 'Top 3'),
        el('span', { class: 'count' }, priorities.length + ' / 3'),
        el('div', { class: 'spacer' }),
        el('button', { class: 'text-btn', onClick: () => openCardPickerModal('priority') }, '+ Pick'),
      ]));
      if (priorities.length === 0) {
        top3Block.appendChild(el('button', {
          class: 'top3-empty-cta',
          onClick: () => openCardPickerModal('priority'),
        }, [
          el('span', { class: 'top3-empty-cta-icon' }, '◎'),
          el('span', { class: 'top3-empty-cta-text' }, 'Pick three priorities for today.'),
          el('span', { class: 'top3-empty-cta-hint' }, 'Or drag a card here.'),
        ]));
        // Hidden drop-target slots so existing drag-to-top3 still works
        const top3 = el('div', { class: 'top3 collapsed' });
        for (let i = 0; i < 3; i++) top3.appendChild(top3SlotEl(priorities[i], i));
        top3Block.appendChild(top3);
      } else {
        const top3 = el('div', { class: 'top3' });
        for (let i = 0; i < 3; i++) top3.appendChild(top3SlotEl(priorities[i], i));
        top3Block.appendChild(top3);
      }
      // Hourly schedule (5 AM - midnight)
      const schedule = el('div', { class: 'schedule' });
      const scheduled = scheduledOnDate(currentPlanDate);
      const nowHour = isToday ? new Date().getHours() : -1;
      const scheduleLayout = computeScheduleLayout(scheduled);
      for (let h = 5; h <= 23; h++) {
        const row = el('div', { class: 'schedule-row' + (h === nowHour ? ' now' : '') });
        const label = new Date(2000, 0, 1, h).toLocaleTimeString(undefined, { hour: 'numeric' });
        row.appendChild(el('div', { class: 'schedule-hour' }, label));
        const slot = el('div', {
          class: 'schedule-slot',
          dataset: { scheduleHour: String(h) },
          onClick: (e) => {
            if (e.target.closest('.schedule-card')) return;
            const rect = e.currentTarget.getBoundingClientRect();
            const rel = e.clientY - rect.top;
            const snap = 15;
            const minute = Math.min(45, Math.max(0, Math.round(rel / rect.height * 60 / snap) * snap));
            createScheduledTaskAt(currentPlanDate, h, minute);
          },
        });
        scheduled
          .filter(c => hourOfScheduled(c) === h)
          .forEach(c => slot.appendChild(scheduleCardEl(c, scheduleLayout[c.id])));
        row.appendChild(slot);
        schedule.appendChild(row);
      }
      const scheduleSection = el('div', {}, [
        el('div', { class: 'plan-section-title' }, [
          el('span', {}, 'Schedule'),
          el('span', { class: 'count' }, scheduled.length + ' scheduled'),
          el('div', { class: 'spacer' }),
          el('button', {
            class: 'text-btn',
            title: 'Clear all scheduled times for this day',
            onClick: () => {
              if (!confirm('Remove scheduled times for all ' + scheduled.length + ' cards?')) return;
              setState(s => { scheduled.forEach(c => { const cc = s.cards.find(x => x.id === c.id); if (cc) cc.scheduled_time = null; }); });
            },
          }, 'Unschedule all'),
        ]),
        schedule,
      ]);

      // Unscheduled pool: cards for this date that don't have a scheduled_time yet
      const due = state.cards.filter(c => {
        if (c.archived) return false;
        if (c.scheduled_time) return false;
        if (!contextMatches(contextOf(c, 'card'))) return false;
        if (!c.due) return false;
        if (cardDueOnDate(c, currentPlanDate)) return true;
        return false;
      });
      const pool = el('div', { class: 'unscheduled-pool' });
      due.forEach(c => pool.appendChild(scheduleCardEl(c)));
      const poolEmpty = el('div', { class: 'unscheduled-empty', style: { display: due.length === 0 ? 'block' : 'none' } }, 'Nothing unscheduled. Drag a card here to unschedule it.');
      const unscheduledSection = el('div', {}, [
        el('div', { class: 'plan-section-title' }, [
          el('span', {}, 'Unscheduled'),
          el('span', { class: 'count' }, String(due.length)),
          el('div', { class: 'spacer' }),
          el('span', { style: { fontSize: '10px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace' } }, 'drag into an hour above'),
        ]),
        pool,
        poolEmpty,
      ]);

      // Compose layout — Today is the full-screen command center; other dates use the narrow plan layout
      if (isToday) {
        const cmd = el('div', { class: 'today-cmd' });
        const leftCol = el('div', { class: 'today-col today-col-left' });
        const rightCol = el('div', { class: 'today-col today-col-right' });

        top3Block.classList.add('today-sticky-top');
        leftCol.appendChild(top3Block);
        leftCol.appendChild(renderTodayBankPanel());
        leftCol.appendChild(renderJustDidBlock());

        // Right col leads with the at-a-glance Pulse strip (visible above the fold),
        // then the schedule + unscheduled drawer (which can scroll below if needed).
        const pulseStrip = el('div', { class: 'today-pulse-strip' });
        pulseStrip.appendChild(renderProjectsPulsePanel());
        pulseStrip.appendChild(renderNeedsAttentionPanel());
        pulseStrip.appendChild(renderGoalsPulsePanel());
        rightCol.appendChild(pulseStrip);
        rightCol.appendChild(scheduleSection);
        rightCol.appendChild(unscheduledSection);

        cmd.appendChild(leftCol);
        cmd.appendChild(rightCol);

        // Email suggestions tray — only when triage agent has pending items.
        const tray = renderEmailSuggestionsTray();
        if (tray) body.appendChild(tray);

        // (Daily quote now lives in the footer — see renderSnark.)
        body.appendChild(cmd);
      } else {
        const wrap = el('div', { class: 'plan-wrap' });
        wrap.appendChild(top3Block);
        wrap.appendChild(scheduleSection);
        wrap.appendChild(unscheduledSection);
        body.appendChild(wrap);
      }

      // Wire Sortable for schedule slots, unscheduled pool, top3 slots, and (on Today) the inline bank.
      // Scoped to body so both the 2-col and narrow layouts are covered.
      setTimeout(() => {
        body.querySelectorAll('.schedule-slot, .unscheduled-pool').forEach(s => {
          Sortable.create(s, {
            group: { name: 'schedule', pull: true, put: ['schedule', 'cards'] },
            animation: 160,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            delay: 120, delayOnTouchOnly: true, touchStartThreshold: 5, fallbackOnBody: true,
            onStart: () => document.body.classList.add('sched-dragging'),
            onAdd: (evt) => {
              const cardId = evt.item.dataset.cardId;
              if (!cardId) return;
              if (evt.to.classList.contains('unscheduled-pool')) {
                unscheduleCard(cardId);
              } else {
                const h = parseInt(evt.to.dataset.scheduleHour, 10);
                if (!isNaN(h)) scheduleCardAt(cardId, currentPlanDate, h);
              }
            },
            onEnd: (evt) => {
              document.body.classList.remove('sched-dragging');
              if (evt.from === evt.to) return;
              if (!evt.from.classList.contains('schedule-slot') && !evt.from.classList.contains('unscheduled-pool')) return;
              const cardId = evt.item.dataset.cardId;
              if (!cardId) return;
              if (evt.to.classList.contains('unscheduled-pool')) {
                unscheduleCard(cardId);
              } else if (evt.to.classList.contains('schedule-slot')) {
                const h = parseInt(evt.to.dataset.scheduleHour, 10);
                if (!isNaN(h)) scheduleCardAt(cardId, currentPlanDate, h);
              }
            },
          });
        });
        body.querySelectorAll('.top3-slot').forEach((slotEl, i) => {
          Sortable.create(slotEl, {
            group: { name: 'top3', pull: false, put: ['cards', 'schedule'] },
            animation: 160,
            delay: 120, delayOnTouchOnly: true, touchStartThreshold: 5, fallbackOnBody: true,
            onAdd: (evt) => {
              const cardId = evt.item.dataset.cardId;
              evt.item.remove();
              if (!cardId) return;
              addCardToPlan(cardId, 'priority', currentPlanDate);
            },
          });
        });
        // Inline bank list (on Today only) — drag out to project columns / schedule / top3
        body.querySelectorAll('.today-bank-list').forEach(list => {
          Sortable.create(list, {
            group: { name: 'cards', pull: true, put: true },
            animation: 180,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            dragClass: 'sortable-drag',
            delay: 120, delayOnTouchOnly: true, touchStartThreshold: 5, fallbackOnBody: true,
            onEnd: handleCardDrop,
          });
        });
      }, 0);
    }

    // Reusable inline search/filter input
    function filterInputEl({ value, placeholder, onInput, onClear }) {
      const wrap = el('div', { class: 'inline-filter' });
      const input = el('input', {
        type: 'text',
        class: 'inline-filter-input',
        placeholder: placeholder || 'Filter…',
        value: value || '',
      });
      input.addEventListener('input', (e) => onInput(e.target.value));
      input.addEventListener('keydown', (e) => { if (e.key === 'Escape') { input.value = ''; onClear(); } });
      const clearBtn = el('button', {
        class: 'inline-filter-clear',
        title: 'Clear (Esc)',
        style: { display: value ? 'inline-flex' : 'none' },
        onClick: () => onClear(),

      wrap.appendChild(el('span', { class: 'inline-filter-icon' }, '🔍'));
      wrap.appendChild(input);
      wrap.appendChild(clearBtn);
      // Auto-focus when filter has a value (re-render keeps focus)
      if (value) setTimeout(() => { input.focus(); input.setSelectionRange(value.length, value.length); }, 0);
      return wrap;
    }

    function scheduleCardEl(c, layout) {
      const proj = c.project_id && c.project_id !== 'inbox' ? projectById(c.project_id) : null;
      const style = proj ? { '--item-from': proj.accent.from, '--item-to': proj.accent.to } : {};
      if (layout) {
        const HOUR_PX = 44;
        const startMin = minuteOfScheduled(c);
        const dur = c.duration_minutes || 60;
        const gap = 2;
        const colPct = 100 / layout.cols;
        const leftGap = layout.col === 0 ? 0 : gap;
        const rightGap = layout.col === layout.cols - 1 ? 0 : gap;
        style.position = 'absolute';
        style.top = (startMin / 60 * HOUR_PX) + 'px';
        style.height = Math.max(26, dur / 60 * HOUR_PX - gap) + 'px';
        style.left = `calc(${layout.col * colPct}% + ${leftGap}px)`;
        style.width = `calc(${colPct}% - ${leftGap + rightGap}px)`;
      }
      const card = el('div', {
        class: 'schedule-card' + (c.done_at ? ' done' : '') + (layout ? ' timeline' : ''),
        dataset: { cardId: c.id },
        style,
        onClick: (e) => {
          if (e.target.closest('.schedule-card-resize') || e.target.closest('.schedule-card-resize-top')) return;
          if (e.target.closest('.schedule-card-proj')) {
            // Click the project tag → jump to that project
            e.stopPropagation();
            if (proj) { setState(s => { s.ui.active_view = proj.id; }); }
            return;
          }
          if (e.target.closest('.schedule-card-check')) {
            toggleCardDone(c.id);
            return;
          }
          openCardEditModal(c.id);
        },
      }, [
        layout ? el('div', { class: 'schedule-card-resize-top', title: 'Drag to change start time' }) : null,
        el('span', { class: 'schedule-card-check' }, c.done_at ? '✓' : ''),
        proj ? el('span', { class: 'schedule-card-proj', title: 'From: ' + proj.name + ' — click to open' }, [
          el('span', { class: 'schedule-card-proj-dot' }),
          el('span', { class: 'schedule-card-proj-name' }, proj.name),
        ]) : null,
        el('span', { class: 'schedule-card-title' }, c.title),
        c.duration_minutes ? el('span', { class: 'schedule-card-dur' }, formatDuration(c.duration_minutes)) : null,
        layout ? el('div', { class: 'schedule-card-resize', title: 'Drag to extend' }) : null,
      ]);
      if (layout) {
        attachScheduleResize(card, c.id);
        attachScheduleStartResize(card, c.id);
      }
      return card;
    }

    function attachScheduleResize(card, cardId) {
      const handle = card.querySelector('.schedule-card-resize');
      if (!handle) return;
      const block = (e) => e.stopPropagation();
      handle.addEventListener('mousedown', block);
      handle.addEventListener('touchstart', block);
      handle.addEventListener('pointerdown', (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const c = state.cards.find(x => x.id === cardId);
        if (!c) return;
        const HOUR_PX = 44;
        const SNAP = 15;
        const startY = e.clientY;
        const initDur = c.duration_minutes || 60;
        const startAbs = hourOfScheduled(c) * 60 + minuteOfScheduled(c);
        const maxDur = 24 * 60 - startAbs;
        card.classList.add('resizing');
        const compute = (ev) => {
          const dy = ev.clientY - startY;
          const delta = Math.round(dy / HOUR_PX * 60 / SNAP) * SNAP;
          return Math.max(SNAP, Math.min(maxDur, initDur + delta));
        };
        const onMove = (ev) => {
          const d = compute(ev);
          card.style.height = Math.max(26, d / 60 * HOUR_PX - 2) + 'px';
        };
        const onUp = (ev) => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          card.classList.remove('resizing');
          const d = compute(ev);
          setState(s => {
            const cc = s.cards.find(x => x.id === cardId);
            if (cc) cc.duration_minutes = d;
          });
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    }

    function attachScheduleStartResize(card, cardId) {
      const handle = card.querySelector('.schedule-card-resize-top');
      if (!handle) return;
      const block = (e) => e.stopPropagation();
      handle.addEventListener('mousedown', block);
      handle.addEventListener('touchstart', block);
      handle.addEventListener('pointerdown', (e) => {
        if (e.button !== undefined && e.button !== 0) return;
        e.stopPropagation();
        e.preventDefault();
        const c = state.cards.find(x => x.id === cardId);
        if (!c) return;
        const HOUR_PX = 44;
        const SNAP = 15;
        const startY = e.clientY;
        const initStart = hourOfScheduled(c) * 60 + minuteOfScheduled(c);
        const initDur = c.duration_minutes || 60;
        const initEnd = initStart + initDur;
        const minStart = 5 * 60;      // earliest 5 AM
        const maxStart = initEnd - SNAP;
        const slotHourMin = Math.floor(initStart / 60) * 60;
        card.classList.add('resizing');
        const compute = (ev) => {
          const dy = ev.clientY - startY;
          const delta = Math.round(dy / HOUR_PX * 60 / SNAP) * SNAP;
          const newStart = Math.max(minStart, Math.min(maxStart, initStart + delta));
          return { newStart, newDur: initEnd - newStart };
        };
        const onMove = (ev) => {
          const { newStart, newDur } = compute(ev);
          card.style.top = ((newStart - slotHourMin) / 60 * HOUR_PX) + 'px';
          card.style.height = Math.max(26, newDur / 60 * HOUR_PX - 2) + 'px';
        };
        const onUp = (ev) => {
          document.removeEventListener('pointermove', onMove);
          document.removeEventListener('pointerup', onUp);
          card.classList.remove('resizing');
          const { newStart, newDur } = compute(ev);
          const newHour = Math.floor(newStart / 60);
          const newMin = newStart % 60;
          setState(s => {
            const cc = s.cards.find(x => x.id === cardId);
            if (!cc) return;
            const date = cc.scheduled_time ? cc.scheduled_time.slice(0, 10) : currentPlanDate;
            cc.scheduled_time = date + 'T' + String(newHour).padStart(2, '0') + ':' + String(newMin).padStart(2, '0') + ':00';
            cc.duration_minutes = newDur;
          });
        };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
    }

    function top3SlotEl(c, i) {

    function timeBlockEl(b) {

    // ---------- Planner views (Morning Magic) ----------
    function plannerFieldEl(kind, date, field) {
      const entry = plannerEntry(kind, date);
      const value = entry ? ((entry.answers || {})[field.key] || '') : '';
      const linked = entry ? (((entry.linked || {})[field.key]) || []) : [];
      const taskId = entry ? (((entry.tasks || {})[field.key])) : null;
      const taskCard = taskId ? state.cards.find(c => c.id === taskId) : null;
      const canAddTask = kind === 'daily' && date >= todayISO();
      const labelChildren = [el('span', {}, field.label)];
      labelChildren.push(el('button', {
        class: 'pull-btn',
        onClick: () => {
          const ent = plannerEntry(kind, date) || ensurePlannerEntry(kind, date);
          openPlannerPullModal(ent, field);
        },
      }, '+ pull'));
      if (field.taskable && canAddTask) {
        if (taskCard) {
          if (taskCard.done_at) {
            labelChildren.push(el('span', { class: 'task-status done', title: 'Completed ' + new Date(taskCard.done_at).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) }, '✓ done'));
          } else {
            labelChildren.push(el('span', { class: 'task-status pending', title: 'On today\u2019s list — check it off to mark complete' }, '○ pending'));
          }
          labelChildren.push(el('button', {
            class: 'task-btn', title: 'Remove from today\u2019s list',
            onClick: () => removeTaskFromField(entry.id, field.key),
          }, '× task'));
        } else {
          labelChildren.push(el('button', {
            class: 'task-btn',
            onClick: () => {
              if (!value.trim()) { alert('Fill in the field first.'); return; }
              const ent = entry || ensurePlannerEntry(kind, date);
              const proj = null;
              const prefix = field.taskPrefix || '';
              const suffix = field.taskSuffix || '';
              const title = (prefix + value.trim() + suffix).trim();
              addTaskFromField(ent.id, field, title, null);
            },
          }, '+ task'));
        }
      }
      const label = el('label', {}, labelChildren);
      const commit = (e) => {
        if (e.target.value === value) return;
        const ent = plannerEntry(kind, date) || ensurePlannerEntry(kind, date);
        updatePlannerField(ent.id, field.key, e.target.value);
      };
      const enterToTask = !field.long || field.enterIsTask;
      const commitAsTask = async () => {
        const text = input.value.trim();
        if (!text) return;
        // Clear BEFORE setState so the blur-on-unmount does not re-save the text
        input.value = '';
        const ent = plannerEntry(kind, date) || ensurePlannerEntry(kind, date);
        const parsedDue = parseDueFromText(text);
        // For daily-planner tasks without an explicit date, default to the planner's date
        // so they show up in Today's list automatically.
        let finalDue = parsedDue;
        if (!finalDue && kind === 'daily') {
          finalDue = date === todayISO() ? 'today'
                    : date === tomorrowISO() ? 'tomorrow'
                    : date;
        }
        const ctx = state.ui.context_filter !== 'all' ? state.ui.context_filter : 'work';
        const existing = findLiveCardByTitle(text);
        const cardId = existing ? existing.id : uid('card');
        setState(s => {
          if (!existing) {
            const pos = s.cards.filter(c => c.project_id === 'inbox').length;
            s.cards.push({
              id: cardId, project_id: 'inbox', column_id: null, position: pos,
              title: text, notes: '', due: finalDue || null,
              today_slot: null, today_position: 0, plan_date: null,
              context: ctx,
              done_at: null, archived: false,
              recurrence: null,
              duration_minutes: null,
              scheduled_time: null,
              source: { kind: 'planner', entry_id: ent.id, field_key: field.key },
              created_at: now(),
            });
            logActivity('card_created', 'Added from ' + kind + ' planner: "' + text + '"', { source_type: 'card', source_id: cardId, context: ctx });
          }
          const e = s.planner_entries.find(x => x.id === ent.id);
          if (e) {
            e.linked = e.linked || {};
            e.linked[field.key] = e.linked[field.key] || [];
            const already = e.linked[field.key].some(l => l.id === cardId);
            if (!already) e.linked[field.key].push({ type: 'task', id: cardId, title: text });
          }
        });
        if (!existing) soundAdd();
      };
      const keydownHandler = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          if (enterToTask) { e.preventDefault(); commitAsTask(); }
          else if (!field.long) { e.preventDefault(); e.target.blur(); }
        }
      };
      const input = field.long
        ? el('textarea', { rows: 3, value: '', onBlur: commit, onKeydown: keydownHandler })
        : el('input', {
            type: 'text', value: '',
            onBlur: commit,
            onKeydown: keydownHandler,
          });
      input.value = value;
      const wrap = el('div', { class: 'planner-field' }, [label, input]);
      if (linked.length) {
        const chips = el('div', { class: 'linked-chips' });
        linked.forEach(it => {
          chips.appendChild(el('div', {
            class: 'linked-chip',
            onClick: () => jumpToLinkedItem(it),
          }, [
            el('span', { class: 'linked-chip-icon' }, linkedIcon(it.type)),
            el('span', {}, it.title),
            el('button', {
              class: 'linked-chip-del',
              onClick: (e) => { e.stopPropagation(); unlinkPlannerItem(entry.id, field.key, it.type + ':' + it.id); },
            }, '×'),
          ]));
        });
        wrap.appendChild(chips);
      }
      return wrap;
    }

    function plannerDateNavEl(kind) {
      const cur = kind === 'daily' ? currentDailyDate : currentWeeklyDate;
      const todayRef = kind === 'daily' ? todayISO() : mondayOf(todayISO());
      const offsetDays = kind === 'daily' ? 1 : 7;
      const move = (dir) => {
        const d = new Date(cur + 'T00:00:00');
        d.setDate(d.getDate() + dir * offsetDays);
        const nd = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        if (kind === 'daily') currentDailyDate = nd;
        else currentWeeklyDate = nd;
        render();
      };
      const wrap = el('div', { class: 'context-toggle' });
      wrap.appendChild(el('button', { onClick: () => move(-1), title: 'Previous' }, '←'));
      wrap.appendChild(el('button', {
        class: cur === todayRef ? 'active work' : '',
        onClick: () => {
          if (kind === 'daily') currentDailyDate = todayRef;
          else currentWeeklyDate = todayRef;
          render();
        },
      }, kind === 'daily' ? 'Today' : 'This week'));
      wrap.appendChild(el('button', { onClick: () => move(1), title: 'Next' }, '→'));
      const dateInput = el('input', {
        type: 'date', value: cur,
        style: { padding: '4px 6px', borderRadius: '6px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--text-secondary)', fontSize: '11px', marginLeft: '4px' },
        onChange: (e) => {
          const v = e.target.value;
          if (!v) return;
          if (kind === 'daily') currentDailyDate = v;
          else currentWeeklyDate = mondayOf(v);
          render();
        },
      });
      const container = el('div', { style: { display: 'flex', alignItems: 'center', gap: '4px' } }, [wrap, dateInput]);
      return container;
    }

    function plannerHistoryEl(kind, currentDate) {
      const entries = state.planner_entries
        .filter(e => e.kind === kind)
        .sort((a, b) => b.date.localeCompare(a.date));
      const sec = el('div', { class: 'planner-section' }, [
        el('div', { class: 'planner-section-head' }, [
          el('span', {}, 'History'),
          el('span', { class: 'count' }, String(entries.length)),
        ]),
      ]);
      if (entries.length === 0) {
        sec.appendChild(el('div', { class: 'history-empty' }, 'No past entries yet. Show up tomorrow.'));
        return sec;
      }
      entries.forEach(e => {
        const filled = Object.values(e.answers || {}).filter(v => (v || '').trim()).length;
        const linkedTotal = Object.values(e.linked || {}).reduce((n, arr) => n + (arr || []).length, 0);
        const d = new Date(e.date + 'T00:00:00');
        const label = kind === 'daily'
          ? d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined })
          : 'Week of ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined });
        sec.appendChild(el('div', {
          class: 'history-row' + (e.date === currentDate ? ' current' : ''),
          onClick: () => {
            if (kind === 'daily') currentDailyDate = e.date;
            else currentWeeklyDate = e.date;
            render();
          },
        }, [
          el('span', { class: 'history-date' }, label),
          el('span', { class: 'history-filled' },
            filled + ' field' + (filled === 1 ? '' : 's') +
            (linkedTotal ? ' · ' + linkedTotal + ' linked' : '')
          ),
        ]));
      });
      return sec;
    }

    function linkedIcon(type) {
      return { task: '☐', project: '●', idea: '💡', automation: '⚡', goal: '🎯' }[type] || '•';
    }

    function jumpToLinkedItem(it) {
      if (it.type === 'project') state.ui.active_view = it.id;
      else if (it.type === 'task') {
        const c = state.cards.find(x => x.id === it.id);
        if (c && c.project_id !== 'inbox') { state.ui.active_view = c.project_id; expandedCardId = it.id; }
        else expandedCardId = it.id;
      }
      else if (it.type === 'idea') { state.ui.active_view = 'ideas'; expandedItemKey = 'idea:' + it.id; }
      else if (it.type === 'automation') { state.ui.active_view = 'automations'; expandedItemKey = 'automation:' + it.id; }
      else if (it.type === 'goal') { state.ui.active_view = 'goals'; }
      saveState(); render();
    }

    function nudgeBannerEl() {
      const today = todayISO();
      const isMonday = new Date(today + 'T00:00:00').getDay() === 1;
      const monday = mondayOf(today);
      const dismissed = state.ui.banner_dismissed || {};
      const weeklyEntry = plannerEntry('weekly', monday);
      const dailyEntry = plannerEntry('daily', today);
      // Suppress the banner if we're already on that planner view
      const view = state.ui.active_view;

      if (isMonday && !weeklyEntry && dismissed.weekly !== monday && view !== 'weekly') {
        return makeBanner('📆', 'It\u2019s Monday. Time to plan the week.', '9 prompts, maybe 10 minutes. Sets the tone.',
          'Open weekly', () => { state.ui.active_view = 'weekly'; saveState(); render(); },
          () => dismissBanner('weekly', monday));
      }
      if (!dailyEntry && dismissed.daily !== today && view !== 'daily') {
        return makeBanner('🌅', 'Plan your day', 'Ten minutes now, hours saved later.',
          'Open daily', () => { state.ui.active_view = 'daily'; saveState(); render(); },
          () => dismissBanner('daily', today));
      }
      return null;
    }
    function makeBanner(icon, title, sub, cta, openFn, dismissFn) {
      return el('div', { class: 'nudge-banner' }, [
        el('span', { class: 'nudge-banner-icon' }, icon),
        el('div', { class: 'nudge-banner-body' }, [
          el('div', { class: 'nudge-banner-title' }, title),
          el('div', { class: 'nudge-banner-sub' }, sub),
        ]),
        el('button', { class: 'nudge-banner-open', onClick: openFn }, cta),
        el('button', { class: 'nudge-banner-close', title: 'Dismiss for today', onClick: dismissFn }, '×'),
      ]);
    }
    function dismissBanner(kind, date) {
      setState(s => { s.ui.banner_dismissed = s.ui.banner_dismissed || {}; s.ui.banner_dismissed[kind] = date; });
    }

    function cardDueOnDate(c, dateIso) {
      if (!c.due) return false;
      if (c.due === dateIso) return true;
      if (c.due === 'today' && dateIso === todayISO()) return true;
      if (c.due === 'tomorrow' && dateIso === tomorrowISO()) return true;
      return false;
    }

    function plannerLinkedCardIds(entry) {
      const taskIds = Object.values(entry.tasks || {}).filter(Boolean);
      const linkedIds = Object.values(entry.linked || {})
        .flat()
        .filter(it => it && it.type === 'task')
        .map(it => it.id);
      return [...new Set([...taskIds, ...linkedIds])];
    }

    function renderTodayListEl(entry, date) {
      const isToday = date === todayISO();
      const isTomorrow = date === tomorrowISO();
      const dayLabel = isToday ? 'today' : isTomorrow ? 'tomorrow' : new Date(date + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long' });
      const listTitle = isToday ? "Today's list" : isTomorrow ? "Tomorrow's list" : dayLabel.charAt(0).toUpperCase() + dayLabel.slice(1) + "'s list";

      const taskIds = plannerLinkedCardIds(entry);
      const plannerCards = state.cards.filter(c => taskIds.includes(c.id));
      const otherDueCards = state.cards.filter(c => {
        if (taskIds.includes(c.id)) return false;
        // For today: keep done-today cards visible so completed checkboxes stick
        if (isToday) {
          if (c.archived && !c.done_at) return false;
          if (c.archived && c.done_at && localDateOfISO(c.done_at) !== date) return false;
          return isDueToday(c);
        }
        // For future dates: hide archived entirely
        if (c.archived) return false;
        return cardDueOnDate(c, date);
      });
      const all = [...plannerCards, ...otherDueCards];
      const doneCount = all.filter(c => c.done_at).length;

      const wrap = el('div', { class: 'today-list' });
      wrap.appendChild(el('div', { class: 'today-list-head' }, [
        el('span', {}, listTitle),
        all.length > 0 ? el('span', { class: 'count' }, doneCount + ' / ' + all.length) : null,
      ]));
      if (all.length === 0) {
        wrap.appendChild(el('div', { class: 'today-empty' }, (isToday || isTomorrow)
          ? 'Fill in the planner below. Checkable tasks land here.'
          : 'No tasks captured for this day.'));
        return wrap;
      }
      if (plannerCards.length) {
        wrap.appendChild(el('div', { class: 'today-list-group' }, 'From ' + dayLabel + "'s planner"));
        plannerCards.forEach(c => wrap.appendChild(todayRowEl(c)));
      }
      if (otherDueCards.length) {
        wrap.appendChild(el('div', { class: 'today-list-group' }, 'Also due ' + dayLabel));
        otherDueCards.forEach(c => wrap.appendChild(todayRowEl(c)));
      }
      return wrap;
    }

    function todayRowEl(c) {
      const proj = c.project_id && c.project_id !== 'inbox' ? projectById(c.project_id) : null;
      const row = el('div', {
        class: 'today-row' + (c.done_at ? ' done' : ''),
        onClick: () => toggleCardDone(c.id),
        title: c.done_at ? 'Completed ' + new Date(c.done_at).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : 'Click to mark done',
      }, [
        el('div', { class: 'today-check' }, c.done_at ? '✓' : ''),
        el('div', { style: { flex: '1', minWidth: '0' } }, [
          el('div', { class: 'today-title' }, c.title),
          el('div', { class: 'today-meta' }, [
            proj ? el('span', { class: 'today-project-dot', style: { '--item-from': proj.accent.from, '--item-to': proj.accent.to } }) : null,
            el('span', {}, proj ? proj.name : (c.source && c.source.kind === 'planner' ? 'From planner' : 'Inbox')),
          ]),
        ]),
      ]);
      return row;
    }

    function renderDailyPlanner(header, body) {
      const date = currentDailyDate;
      const today = todayISO();
      const d = new Date(date + 'T00:00:00');
      const dateLabel = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: date.slice(0, 4) !== today.slice(0, 4) ? 'numeric' : undefined });
      const isToday = date === today;
      header.appendChild(el('div', { class: 'main-title' }, [
        el('span', { style: { fontSize: '22px' } }, '🌅'),
        el('span', {}, 'Daily planner'),
      ]));
      const dateStatus = isToday ? '' : (date > today ? ' · planning ahead' : ' · history');
      header.appendChild(el('div', { class: 'main-subtitle' }, dateLabel + dateStatus));
      const actions = [plannerDateNavEl('daily')];
      if (isToday) {
        actions.push(el('button', {
          class: 'text-btn',
          title: 'Jump to tomorrow and start planning it',
          onClick: () => { currentDailyDate = tomorrowISO(); render(); },
        }, '🌙 Plan tomorrow'));
      }
      actions.push(el('button', {
        class: 'text-btn',
        title: 'Carry over yesterday\u2019s undone items',

        wrap.appendChild(renderTodayListEl(ent, date));
      }
      DAILY_FIELDS.forEach(section => {

          el('div', { class: 'planner-section-head' }, [el('span', {}, section.section)]),
        ]);
        section.items.forEach(f => sec.appendChild(plannerFieldEl('daily', date, f)));
        wrap.appendChild(sec);
      });
      wrap.appendChild(plannerHistoryEl('daily', date));
      body.appendChild(wrap);
    }

    function carryOverYesterday(entryId) {
      const yEntry = plannerEntry('daily', yesterdayISO());
      if (!yEntry) { alert('No daily plan from yesterday to carry over.'); return; }
      const undone = (yEntry.answers && yEntry.answers.y_not_done) || '';
      if (!undone.trim()) { alert('Yesterday had nothing marked undone.'); return; }
      setState(s => {
        const e = s.planner_entries.find(x => x.id === entryId);
        if (!e) return;
        const cur = (e.answers.email_items || '').trim();
        e.answers.email_items = cur ? (cur + '\n' + undone) : undone;
      });
    }

    function openPlannerPullModal(entry, field) {
      let query = '';
      const selected = {};
      ((entry.linked || {})[field.key] || []).forEach(it => selected[it.type + ':' + it.id] = it);

      const resultsEl = el('div', { class: 'picker-list', style: { maxHeight: '320px' } });
      const renderResults = () => {
        clearNode(resultsEl);
        const ql = query.toLowerCase().trim();
        const matches = (s) => s && s.toLowerCase().includes(ql);

        const groups = [];
        const cards = state.cards.filter(c => !c.archived && (!ql || matches(c.title) || matches(c.notes))).slice(0, 30)
          .map(c => {
            const p = c.project_id === 'inbox' ? null : projectById(c.project_id);
            return { type: 'task', id: c.id, title: c.title, hint: p ? p.name : 'Bank' };
          });
        if (cards.length) groups.push({ label: 'Tasks', items: cards });

        const projs = state.projects.filter(p => !ql || matches(p.name))
          .map(p => ({ type: 'project', id: p.id, title: p.name, hint: p.context }));
        if (projs.length) groups.push({ label: 'Projects', items: projs });

        const ideas = state.ideas.filter(i => !ql || matches(i.title) || matches(i.details))
          .map(i => ({ type: 'idea', id: i.id, title: i.title, hint: i.context }));
        if (ideas.length) groups.push({ label: 'Ideas', items: ideas });

        const autos = state.automations.filter(a => !ql || matches(a.title) || matches(a.details))
          .map(a => ({ type: 'automation', id: a.id, title: a.title, hint: a.status }));
        if (autos.length) groups.push({ label: 'Automations', items: autos });

        const goals = state.goals.filter(g => !ql || matches(g.title))
          .map(g => ({ type: 'goal', id: g.id, title: g.title, hint: g.cadence }));
        if (goals.length) groups.push({ label: 'Goals', items: goals });

        groups.forEach(g => {
          resultsEl.appendChild(el('div', { class: 'picker-group-head' }, g.label));
          g.items.forEach(it => {
            const key = it.type + ':' + it.id;
            const isSel = !!selected[key];
            const row = el('div', {
              class: 'picker-item' + (isSel ? ' active' : ''),
              onClick: () => {
                if (selected[key]) delete selected[key];

                renderResults();
              },

              el('span', { style: { width: '16px' } }, linkedIcon(it.type)),

        }

      const searchInput = el('input', {
        class: 'picker-search', type: 'text', placeholder: 'Search tasks, ideas, automations, projects, goals…',
        onInput: (e) => { query = e.target.value; renderResults(); },
      });

      const submit = () => {
        const items = Object.values(selected);
        linkToPlannerField(entry.id, field.key, items);
        closeModal();
      };

      openModal([
        el('h3', {}, 'Link items to: ' + field.label),
        el('p', {}, 'Tap an item to toggle. Click Apply when done.'),
        searchInput,
        resultsEl,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: submit }, 'Apply'),
        ]),
      ]);
      renderResults();
      setTimeout(() => searchInput.focus(), 50);
    }

      const streak = goalStreak(g);

            el('div', { class: 'goal-target' }, [
              el('span', { class: 'cadence-pill' }, CADENCE_LABELS[g.cadence] || g.cadence),

    // ---------- Books view ----------
    function quotesForBook(bookId) {
      return (state.quotes || [])
        .filter(q => q.book_id === bookId)
        .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));

    function addBook(title, author) {
      const t = (title || '').trim();
      if (!t) return;
      setState(s => {
        s.books = s.books || [];
        s.books.unshift({
          id: uid('book'),
          title: t,
          author: (author || '').trim(),
          created_at: now(),
        });
      });
    }

    function deleteBook(id) {
      setState(s => {
        s.books = (s.books || []).filter(b => b.id !== id);
        s.quotes = (s.quotes || []).filter(q => q.book_id !== id);
      });
    }

    function addQuote(bookId, text, page) {
      const t = (text || '').trim();
      if (!t) return;
      setState(s => {
        s.quotes = s.quotes || [];
        s.quotes.unshift({
          id: uid('quote'),
          book_id: bookId,
          text: t,
          page: (page || '').trim(),
          created_at: now(),
        });
      });
    }

    function deleteQuote(id) {
      setState(s => { s.quotes = (s.quotes || []).filter(q => q.id !== id); });
    }

    function pickDailyQuote() {
      const quotes = state.quotes || [];
      if (quotes.length === 0) return null;
      // Stable per-day rotation: same quote shows all day, rotates at midnight local
      const today = todayISO();
      const seed = today.split('-').reduce((a, n) => a * 31 + parseInt(n, 10), 7);
      const idx = ((seed % quotes.length) + quotes.length) % quotes.length;
      const q = quotes[idx];
