    // ---------- JD Summary ----------
    function openJDSummaryModal() {
      let range = '30';
      let ctx = state.ui.context_filter === 'personal' ? 'personal' : 'work';
      const output = el('div', { class: 'jd-summary-out' }, 'Pick a range and click "Generate."');
      const rangeSel = el('select', {}, [
        el('option', { value: '7' }, 'Last 7 days'),
        el('option', { value: '30', selected: true }, 'Last 30 days'),
        el('option', { value: '90' }, 'Last 90 days'),
        el('option', { value: '365' }, 'Last year'),
        el('option', { value: 'all' }, 'All time'),
      ]);
      rangeSel.addEventListener('change', () => range = rangeSel.value);
      const ctxToggle = contextToggleEl(ctx, (c) => {
        ctx = c;
        ctxToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        ctxToggle.querySelector('.' + c).classList.add('active');
      });

      const generate = () => {
        const cutoff = range === 'all' ? 0 : Date.now() - (parseInt(range, 10) * 86400000);
        const entries = state.activity_log.filter(e => {
          if (e.context !== ctx) return false;
          if (cutoff && new Date(e.timestamp).getTime() < cutoff) return false;
          return true;
        });
        if (entries.length === 0) {
          output.textContent = 'No activity in this range. Noted.';
          return;
        }
        const byProject = {};
        const manualOnly = [];
        entries.forEach(e => {
          if (e.kind === 'manual' && !e.project_id) { manualOnly.push(e); return; }
          const key = e.project_id || '(no project)';
          (byProject[key] = byProject[key] || { done: [], created: [], promoted: [], other: [] });
          if (e.kind === 'card_done') byProject[key].done.push(e);
          else if (e.kind === 'card_created') byProject[key].created.push(e);
          else if (e.kind === 'promoted' || e.kind === 'project_created') byProject[key].promoted.push(e);
          else byProject[key].other.push(e);
        });

        const lines = [];
        lines.push('# Job Description Summary — ' + (ctx === 'work' ? 'Work' : 'Personal'));
        lines.push('Range: ' + (range === 'all' ? 'All time' : 'Last ' + range + ' days'));
        lines.push('Total entries: ' + entries.length);
        lines.push('');
        for (const key of Object.keys(byProject)) {
          const proj = key === '(no project)' ? null : projectById(key);
          lines.push('## ' + (proj ? proj.name : '(No project)'));
          const g = byProject[key];
          if (g.done.length) {
            lines.push('- Completed ' + g.done.length + ' task' + (g.done.length === 1 ? '' : 's') + ':');
            g.done.slice(0, 10).forEach(e => lines.push('  · ' + e.description.replace(/^Completed\s+"?|"$/g, '')));
            if (g.done.length > 10) lines.push('  · …and ' + (g.done.length - 10) + ' more');
          }
          if (g.created.length) lines.push('- Opened ' + g.created.length + ' new task' + (g.created.length === 1 ? '' : 's'));
          if (g.promoted.length) {
            lines.push('- ' + g.promoted.length + ' project/idea milestone' + (g.promoted.length === 1 ? '' : 's'));
          }
          if (g.other.length) {
            lines.push('- Other activity:');
            g.other.slice(0, 6).forEach(e => lines.push('  · ' + e.description));
          }
          lines.push('');
        }
        if (manualOnly.length) {
          lines.push('## Other work (no project)');
          manualOnly.slice(0, 30).forEach(e => lines.push('- ' + e.description));
          if (manualOnly.length > 30) lines.push('- …and ' + (manualOnly.length - 30) + ' more');
        }
        output.textContent = lines.join('\n');
      };

      const copyBtn = el('button', {
        onClick: () => {
          navigator.clipboard.writeText(output.textContent).then(() => {
            copyBtn.textContent = 'Copied';
            setTimeout(() => copyBtn.textContent = 'Copy', 1200);
          });
        },
      }, 'Copy');

      openModal([
        el('h3', {}, 'Summarize for JD'),
        el('p', {}, 'Groups your activity by project and summarizes the work. Export for HR, or just for your own sanity.'),
        el('div', { class: 'modal-label' }, 'Range'),
        rangeSel,
        el('div', { class: 'modal-label' }, 'Context'),
        ctxToggle,
        el('div', { style: { display: 'flex', gap: '8px', marginTop: '10px' } }, [
          el('button', { class: 'primary', onClick: generate }, 'Generate'),
          copyBtn,
        ]),
        output,
        el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Close')]),
      ]);
    }

    // ---------- Command palette ----------
    function openCommandPalette() {
      let query = '';
      let selected = 0;
      let flatResults = [];

      const resultsEl = el('div', { class: 'palette-results' });

      const jump = (r) => {
        closeModal();
        if (r.type === 'project') { state.ui.active_view = r.project.id; }
        else if (r.type === 'card') {
          if (r.card.project_id === 'inbox') {
            expandedCardId = r.card.id;
          } else {
            state.ui.active_view = r.card.project_id;
            expandedCardId = r.card.id;
          }
        }
        else if (r.type === 'idea') { state.ui.active_view = 'ideas'; expandedItemKey = 'idea:' + r.idea.id; }
        else if (r.type === 'automation') { state.ui.active_view = 'automations'; expandedItemKey = 'automation:' + r.automation.id; }
        else if (r.type === 'goal') { state.ui.active_view = 'goals'; setTimeout(() => openGoalEditorModal(r.goal), 50); }
        else if (r.type === 'note') {
          state.ui.active_view = r.note.project_id;
        }
        else if (r.type === 'view') { state.ui.active_view = r.view; }
        saveState();
        render();
      };

      const collectResults = (q) => {
        const ql = q.toLowerCase().trim();
        const groups = [];
        if (!ql) {
          // Default suggestions: views + recent projects
          const views = [
            { type: 'view', view: 'today', label: 'Today', icon: '◉' },
            { type: 'view', view: 'ideas', label: 'Ideas', icon: '💡' },
            { type: 'view', view: 'automations', label: 'Automations', icon: '⚡' },
            { type: 'view', view: 'goals', label: 'Goals', icon: '🎯' },
            { type: 'view', view: 'activity', label: 'Activity', icon: '📋' },
            { type: 'view', view: 'done', label: 'Done', icon: '✓' },
          ];
          groups.push({ label: 'Jump to', items: views });
          groups.push({
            label: 'Projects',
            items: state.projects.map(p => ({ type: 'project', project: p, label: p.name, icon: '●', meta: p.context })),
          });
          return groups;
        }
        const match = (s) => s && s.toLowerCase().includes(ql);

        const cards = state.cards.filter(c => !c.archived && (match(c.title) || match(c.notes))).slice(0, 15).map(c => {
          const p = c.project_id === 'inbox' ? null : projectById(c.project_id);
          return { type: 'card', card: c, label: c.title, icon: '☐', meta: (p ? p.name : 'Bank') + (c.due ? ' · ' + c.due : '') };
        });
        if (cards.length) groups.push({ label: 'Cards', items: cards });

        const projs = state.projects.filter(p => match(p.name)).map(p => ({ type: 'project', project: p, label: p.name, icon: '●', meta: p.context }));
        if (projs.length) groups.push({ label: 'Projects', items: projs });

        const ideas = state.ideas.filter(i => match(i.title) || match(i.details)).map(i => ({ type: 'idea', idea: i, label: i.title, icon: '💡', meta: i.context }));
        if (ideas.length) groups.push({ label: 'Ideas', items: ideas });

        const autos = state.automations.filter(a => match(a.title) || match(a.details)).map(a => ({ type: 'automation', automation: a, label: a.title, icon: '⚡', meta: a.status + ' · ' + a.context }));
        if (autos.length) groups.push({ label: 'Automations', items: autos });

        const goals = state.goals.filter(g => match(g.title) || match(g.target)).map(g => ({ type: 'goal', goal: g, label: g.title, icon: '🎯', meta: g.cadence + ' · ' + g.context }));
        if (goals.length) groups.push({ label: 'Goals', items: goals });

        const notes = state.notes.filter(n => match(n.content)).map(n => {
          const p = projectById(n.project_id);
          return { type: 'note', note: n, label: (n.content || '').slice(0, 60) || '(empty note)', icon: '📝', meta: p ? p.name : '' };
        });
        if (notes.length) groups.push({ label: 'Notes', items: notes });

        const acts = state.activity_log.filter(e => match(e.description)).slice(0, 10).map(e => {
          const p = e.project_id ? projectById(e.project_id) : null;
          return { type: 'activity', activity: e, label: e.description, icon: ACTIVITY_ICONS[e.kind] || '•', meta: (p ? p.name + ' · ' : '') + formatTime(e.timestamp) };
        });
        if (acts.length) groups.push({ label: 'Activity', items: acts });

        return groups;
      };

      const renderResults = () => {
        clearNode(resultsEl);
        const groups = collectResults(query);
        flatResults = [];
        groups.forEach(g => {
          resultsEl.appendChild(el('div', { class: 'palette-group-head' }, g.label));
          g.items.forEach(item => {
            flatResults.push(item);
            const idx = flatResults.length - 1;
            const row = el('div', {
              class: 'palette-row' + (idx === selected ? ' active' : ''),
              dataset: { idx: String(idx) },
              onClick: () => { if (item.type !== 'activity') jump(item); else closeModal(); },
              onMouseenter: () => { selected = idx; updateActive(); },
            }, [
              el('span', { class: 'palette-row-icon' }, item.icon || '•'),
              el('div', { class: 'palette-row-body' }, [
                el('div', { class: 'palette-row-title' }, item.label || ''),
                item.meta ? el('div', { class: 'palette-row-meta' }, item.meta) : null,
              ]),
            ]);
            resultsEl.appendChild(row);
          });
        });
        if (flatResults.length === 0) {
          resultsEl.appendChild(el('div', { style: { padding: '20px', textAlign: 'center', color: 'var(--text-tertiary)', fontSize: '12px', fontStyle: 'italic' } }, 'No matches.'));
        }
      };
      const updateActive = () => {
        resultsEl.querySelectorAll('.palette-row').forEach((r, i) => r.classList.toggle('active', i === selected));
        const activeRow = resultsEl.querySelector('.palette-row.active');
        if (activeRow) activeRow.scrollIntoView({ block: 'nearest' });
      };

      const searchInput = el('input', {
        class: 'palette-search', type: 'text', placeholder: 'Search anything…',
        onInput: (e) => { query = e.target.value; selected = 0; renderResults(); },
        onKeydown: (e) => {
          if (e.key === 'ArrowDown') { e.preventDefault(); selected = Math.min(flatResults.length - 1, selected + 1); updateActive(); }
          else if (e.key === 'ArrowUp') { e.preventDefault(); selected = Math.max(0, selected - 1); updateActive(); }
          else if (e.key === 'Enter') {
            e.preventDefault();
            const r = flatResults[selected];
            if (r && r.type !== 'activity') jump(r); else closeModal();
          }
        },
      });

      const modals = document.getElementById('modals');
      clearNode(modals);
      const backdrop = el('div', { class: 'modal-backdrop', onClick: (e) => { if (e.target === backdrop) closeModal(); } });
      const modal = el('div', { class: 'modal palette-modal' }, [
        searchInput,
        el('div', { class: 'palette-hint' }, [
          el('span', {}, '↑↓ navigate · Enter select · Esc close'),
          el('span', {}, 'Ctrl+K'),
        ]),
        resultsEl,
      ]);
      backdrop.appendChild(modal);
      modals.appendChild(backdrop);
      renderResults();
      setTimeout(() => searchInput.focus(), 50);
    }

    // ---------- Sound effects ----------
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playTone(freq, dur, type, peakGain) {
      if (!state.ui.sound_enabled) return;
      const ctx = ensureAudio();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = type || 'sine';
      osc.frequency.value = freq;
      const peak = peakGain != null ? peakGain : 0.14;
      const t = ctx.currentTime;
      g.gain.setValueAtTime(0.001, t);
      g.gain.exponentialRampToValueAtTime(peak, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(g); g.connect(ctx.destination);
      osc.start(t); osc.stop(t + dur + 0.02);
    }
    function playSeq(notes) {
      if (!state.ui.sound_enabled) return;
      let delay = 0;
      notes.forEach(n => {
        setTimeout(() => playTone(n.freq, n.dur, n.type, n.gain), delay);
        delay += (n.step != null ? n.step : n.dur * 1000 * 0.6);
      });
    }
    // Cheerful major-chord arpeggio for check-ins
    function soundCheckin() { playSeq([
      { freq: 523.25, dur: 0.10, type: 'triangle' },
      { freq: 659.25, dur: 0.10, type: 'triangle' },
      { freq: 783.99, dur: 0.16, type: 'triangle', gain: 0.16 },
    ]); }
    // Success ding — octave up
    function soundDone() { playSeq([
      { freq: 659.25, dur: 0.08, type: 'sine' },
      { freq: 987.77, dur: 0.22, type: 'sine', gain: 0.18 },
    ]); }
    // Soft blip for add
    function soundAdd() { playTone(880, 0.06, 'sine', 0.08); }
    // Fanfare for streak milestones (5, 10, 25, 50, 100)
    function soundStreak() { playSeq([
      { freq: 523.25, dur: 0.1, type: 'square', gain: 0.1 },
      { freq: 659.25, dur: 0.1, type: 'square', gain: 0.1 },
      { freq: 783.99, dur: 0.1, type: 'square', gain: 0.1 },
      { freq: 1046.50, dur: 0.28, type: 'square', gain: 0.14 },
    ]); }
    function isStreakMilestone(n) { return n === 5 || n === 10 || n === 25 || n === 50 || n === 100; }

    // ---------- Animation helpers ----------
    const BURST_EMOJIS = ['🔥', '💪', '🏖️', '🌞', '🎉', '🎯', '⚡', '🏆'];
    function spawnBurst(anchor) {
      const rect = anchor.getBoundingClientRect();
      const emoji = BURST_EMOJIS[Math.floor(Math.random() * BURST_EMOJIS.length)];
      const burst = el('div', { class: 'burst' }, '+1 ' + emoji);
      burst.style.left = (rect.left + rect.width / 2) + 'px';
      burst.style.top = (rect.top - 4) + 'px';
      document.body.appendChild(burst);
      setTimeout(() => burst.remove(), 950);
    }

    // ---------- Snark ----------
    function renderSnark() { document.getElementById('snark-bar').textContent = snarkLine; }

    // ---------- Init ----------
    function init() {
      archiveOldDone();
      rollRecurringCards();
      rollMissedSchedules();
      attachLayoutHandlers();
      render();
      renderSnark();
      updateSyncBadge();
      // Drawer close handlers
      const backdrop = document.getElementById('drawer-backdrop');
      if (backdrop) backdrop.addEventListener('click', closeDrawers);
      document.addEventListener('click', (e) => {
        if (e.target.closest('.nav-tab') || e.target.closest('.bank-card')) {
          closeDrawers();
        }
      });
      // Kick off a background pull from the gist; re-render if remote is newer
      if (getSyncPat()) {
        firstLoadSync().catch(e => console.warn(e));
      }
      document.addEventListener('click', (e) => {
        if (e.target.closest('.rail-item') || e.target.closest('.context-pill')) {
          snarkLine = pick(SNARK_LINES);
          renderSnark();
        }
      }, { capture: true });
      document.addEventListener('keydown', (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
          e.preventDefault();
          openCommandPalette();
          return;
        }
        if (e.key !== 'Escape') return;
        if (document.querySelector('.modal-backdrop')) { closeModal(); return; }
        if (expandedCardId || expandedItemKey) {
          expandedCardId = null; expandedItemKey = null; render();
        }
      });
    }

    (async () => {
      await requireAuth();
      init();
    })();
  </script>
</body>
</html>
