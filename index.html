    // ---------- Planner views (Morning Magic) ----------
    function plannerFieldEl(kind, date, field) {
      const entry = plannerEntry(kind, date);
      const value = entry ? ((entry.answers || {})[field.key] || '') : '';
      const linked = entry ? (((entry.linked || {})[field.key]) || []) : [];
      const taskId = entry ? (((entry.tasks || {})[field.key])) : null;
      const taskCard = taskId ? state.cards.find(c => c.id === taskId) : null;
      const canAddTask = kind === 'daily' && date >= todayISO();
      const labelChildren = [el('span', {}, field.label)];
      labelChildren.push(el('button', {
        class: 'pull-btn',
        onClick: () => {
          const ent = plannerEntry(kind, date) || ensurePlannerEntry(kind, date);
          openPlannerPullModal(ent, field);
        },
      }, '+ pull'));
      if (field.taskable && canAddTask) {
        if (taskCard) {
          if (taskCard.done_at) {
            labelChildren.push(el('span', { class: 'task-status done', title: 'Completed ' + new Date(taskCard.done_at).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) }, '✓ done'));
          } else {
            labelChildren.push(el('span', { class: 'task-status pending', title: 'On today\u2019s list — check it off to mark complete' }, '○ pending'));
          }
          labelChildren.push(el('button', {
            class: 'task-btn', title: 'Remove from today\u2019s list',
            onClick: () => removeTaskFromField(entry.id, field.key),
          }, '× task'));
        } else {
          labelChildren.push(el('button', {
            class: 'task-btn',
            onClick: () => {
              if (!value.trim()) { alert('Fill in the field first.'); return; }
              const ent = entry || ensurePlannerEntry(kind, date);
              const proj = null;
              const prefix = field.taskPrefix || '';
              const suffix = field.taskSuffix || '';
              const title = (prefix + value.trim() + suffix).trim();
              addTaskFromField(ent.id, field, title, null);
            },
          }, '+ task'));
        }
      }
      const label = el('label', {}, labelChildren);
      const commit = (e) => {
        if (e.target.value === value) return;
        const ent = plannerEntry(kind, date) || ensurePlannerEntry(kind, date);
        updatePlannerField(ent.id, field.key, e.target.value);
      };
      const enterToTask = !field.long || field.enterIsTask;
      const commitAsTask = async () => {
        const text = input.value.trim();
        if (!text) return;
        // Clear BEFORE setState so the blur-on-unmount does not re-save the text
        input.value = '';
        const ent = plannerEntry(kind, date) || ensurePlannerEntry(kind, date);
        const parsedDue = parseDueFromText(text);
        // For daily-planner tasks without an explicit date, default to the planner's date
        // so they show up in Today's list automatically.
        let finalDue = parsedDue;
        if (!finalDue && kind === 'daily') {
          finalDue = date === todayISO() ? 'today'
                    : date === tomorrowISO() ? 'tomorrow'
                    : date;
        }
        const ctx = state.ui.context_filter !== 'all' ? state.ui.context_filter : 'work';
        const existing = findLiveCardByTitle(text);
        const cardId = existing ? existing.id : uid('card');
        setState(s => {
          if (!existing) {
            const pos = s.cards.filter(c => c.project_id === 'inbox').length;
            s.cards.push({
              id: cardId, project_id: 'inbox', column_id: null, position: pos,
              title: text, notes: '', due: finalDue || null,
              today_slot: null, today_position: 0, plan_date: null,
              context: ctx,
              done_at: null, archived: false,
              recurrence: null,
              duration_minutes: null,
              scheduled_time: null,
              source: { kind: 'planner', entry_id: ent.id, field_key: field.key },
              created_at: now(),
            });
            logActivity('card_created', 'Added from ' + kind + ' planner: "' + text + '"', { source_type: 'card', source_id: cardId, context: ctx });
          }
          const e = s.planner_entries.find(x => x.id === ent.id);
          if (e) {
            e.linked = e.linked || {};
            e.linked[field.key] = e.linked[field.key] || [];
            const already = e.linked[field.key].some(l => l.id === cardId);
            if (!already) e.linked[field.key].push({ type: 'task', id: cardId, title: text });
          }
        });
        if (!existing) soundAdd();
      };
      const keydownHandler = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          if (enterToTask) { e.preventDefault(); commitAsTask(); }
          else if (!field.long) { e.preventDefault(); e.target.blur(); }
        }
      };
      const input = field.long
        ? el('textarea', { rows: 3, value: '', onBlur: commit, onKeydown: keydownHandler })
        : el('input', {
            type: 'text', value: '',
            onBlur: commit,
            onKeydown: keydownHandler,
          });
      input.value = value;
      const wrap = el('div', { class: 'planner-field' }, [label, input]);
      if (linked.length) {
        const chips = el('div', { class: 'linked-chips' });
        linked.forEach(it => {
          chips.appendChild(el('div', {
            class: 'linked-chip',
            onClick: () => jumpToLinkedItem(it),
          }, [
            el('span', { class: 'linked-chip-icon' }, linkedIcon(it.type)),
            el('span', {}, it.title),
            el('button', {
              class: 'linked-chip-del',
              onClick: (e) => { e.stopPropagation(); unlinkPlannerItem(entry.id, field.key, it.type + ':' + it.id); },
            }, '×'),
          ]));
        });
        wrap.appendChild(chips);
      }
      return wrap;
    }

    function plannerDateNavEl(kind) {
      const cur = kind === 'daily' ? currentDailyDate : currentWeeklyDate;
      const todayRef = kind === 'daily' ? todayISO() : mondayOf(todayISO());
      const offsetDays = kind === 'daily' ? 1 : 7;
      const move = (dir) => {
        const d = new Date(cur + 'T00:00:00');
        d.setDate(d.getDate() + dir * offsetDays);
        const nd = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        if (kind === 'daily') currentDailyDate = nd;
        else currentWeeklyDate = nd;
        render();
      };
      const wrap = el('div', { class: 'context-toggle' });
      wrap.appendChild(el('button', { onClick: () => move(-1), title: 'Previous' }, '←'));
      wrap.appendChild(el('button', {
        class: cur === todayRef ? 'active work' : '',
        onClick: () => {
          if (kind === 'daily') currentDailyDate = todayRef;
          else currentWeeklyDate = todayRef;
          render();
        },
      }, kind === 'daily' ? 'Today' : 'This week'));
      wrap.appendChild(el('button', { onClick: () => move(1), title: 'Next' }, '→'));
      const dateInput = el('input', {
        type: 'date', value: cur,
        style: { padding: '4px 6px', borderRadius: '6px', background: 'var(--card)', border: '1px solid var(--border)', color: 'var(--text-secondary)', fontSize: '11px', marginLeft: '4px' },
        onChange: (e) => {
          const v = e.target.value;
          if (!v) return;
          if (kind === 'daily') currentDailyDate = v;
          else currentWeeklyDate = mondayOf(v);
          render();
        },
      });
      const container = el('div', { style: { display: 'flex', alignItems: 'center', gap: '4px' } }, [wrap, dateInput]);
      return container;
    }

    function plannerHistoryEl(kind, currentDate) {
      const entries = state.planner_entries
        .filter(e => e.kind === kind)
        .sort((a, b) => b.date.localeCompare(a.date));
      const sec = el('div', { class: 'planner-section' }, [
        el('div', { class: 'planner-section-head' }, [
          el('span', {}, 'History'),
          el('span', { class: 'count' }, String(entries.length)),
        ]),
      ]);
      if (entries.length === 0) {
        sec.appendChild(el('div', { class: 'history-empty' }, 'No past entries yet. Show up tomorrow.'));
        return sec;
      }
      entries.forEach(e => {
        const filled = Object.values(e.answers || {}).filter(v => (v || '').trim()).length;
        const linkedTotal = Object.values(e.linked || {}).reduce((n, arr) => n + (arr || []).length, 0);
        const d = new Date(e.date + 'T00:00:00');
        const label = kind === 'daily'
          ? d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined })
          : 'Week of ' + d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: d.getFullYear() !== new Date().getFullYear() ? 'numeric' : undefined });
        sec.appendChild(el('div', {
          class: 'history-row' + (e.date === currentDate ? ' current' : ''),
          onClick: () => {
            if (kind === 'daily') currentDailyDate = e.date;
            else currentWeeklyDate = e.date;
            render();
          },
        }, [
          el('span', { class: 'history-date' }, label),
          el('span', { class: 'history-filled' },
            filled + ' field' + (filled === 1 ? '' : 's') +
            (linkedTotal ? ' · ' + linkedTotal + ' linked' : '')
          ),
        ]));
      });
      return sec;
    }

    function linkedIcon(type) {
      return { task: '☐', project: '●', idea: '💡', automation: '⚡', goal: '🎯' }[type] || '•';
    }

    function jumpToLinkedItem(it) {
      if (it.type === 'project') state.ui.active_view = it.id;
      else if (it.type === 'task') {
        const c = state.cards.find(x => x.id === it.id);
        if (c && c.project_id !== 'inbox') { state.ui.active_view = c.project_id; expandedCardId = it.id; }
        else expandedCardId = it.id;
      }
      else if (it.type === 'idea') { state.ui.active_view = 'ideas'; expandedItemKey = 'idea:' + it.id; }
      else if (it.type === 'automation') { state.ui.active_view = 'automations'; expandedItemKey = 'automation:' + it.id; }
      else if (it.type === 'goal') { state.ui.active_view = 'goals'; }
      saveState(); render();
    }

    function nudgeBannerEl() {
      const today = todayISO();
      const isMonday = new Date(today + 'T00:00:00').getDay() === 1;
      const monday = mondayOf(today);
      const dismissed = state.ui.banner_dismissed || {};
      const weeklyEntry = plannerEntry('weekly', monday);
      const dailyEntry = plannerEntry('daily', today);
      // Suppress the banner if we're already on that planner view
      const view = state.ui.active_view;

      if (isMonday && !weeklyEntry && dismissed.weekly !== monday && view !== 'weekly') {
        return makeBanner('📆', 'It\u2019s Monday. Time to plan the week.', '9 prompts, maybe 10 minutes. Sets the tone.',
          'Open weekly', () => { state.ui.active_view = 'weekly'; saveState(); render(); },
          () => dismissBanner('weekly', monday));
      }
      if (!dailyEntry && dismissed.daily !== today && view !== 'daily') {
        return makeBanner('🌅', 'Plan your day', 'Ten minutes now, hours saved later.',
          'Open daily', () => { state.ui.active_view = 'daily'; saveState(); render(); },
          () => dismissBanner('daily', today));
      }
      return null;
    }
    function makeBanner(icon, title, sub, cta, openFn, dismissFn) {
      return el('div', { class: 'nudge-banner' }, [
        el('span', { class: 'nudge-banner-icon' }, icon),
        el('div', { class: 'nudge-banner-body' }, [
          el('div', { class: 'nudge-banner-title' }, title),
          el('div', { class: 'nudge-banner-sub' }, sub),
        ]),
        el('button', { class: 'nudge-banner-open', onClick: openFn }, cta),
        el('button', { class: 'nudge-banner-close', title: 'Dismiss for today', onClick: dismissFn }, '×'),
      ]);
    }
    function dismissBanner(kind, date) {
      setState(s => { s.ui.banner_dismissed = s.ui.banner_dismissed || {}; s.ui.banner_dismissed[kind] = date; });
    }

    function cardDueOnDate(c, dateIso) {
      if (!c.due) return false;
      if (c.due === dateIso) return true;
      if (c.due === 'today' && dateIso === todayISO()) return true;
      if (c.due === 'tomorrow' && dateIso === tomorrowISO()) return true;
      return false;
    }

    function plannerLinkedCardIds(entry) {
      const taskIds = Object.values(entry.tasks || {}).filter(Boolean);
      const linkedIds = Object.values(entry.linked || {})
        .flat()
        .filter(it => it && it.type === 'task')
        .map(it => it.id);
      return [...new Set([...taskIds, ...linkedIds])];
    }

    function renderTodayListEl(entry, date) {
      const isToday = date === todayISO();
      const isTomorrow = date === tomorrowISO();
      const dayLabel = isToday ? 'today' : isTomorrow ? 'tomorrow' : new Date(date + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'long' });
      const listTitle = isToday ? "Today's list" : isTomorrow ? "Tomorrow's list" : dayLabel.charAt(0).toUpperCase() + dayLabel.slice(1) + "'s list";

      const taskIds = plannerLinkedCardIds(entry);
      const plannerCards = state.cards.filter(c => taskIds.includes(c.id));
      const otherDueCards = state.cards.filter(c => {
        if (taskIds.includes(c.id)) return false;
        // For today: keep done-today cards visible so completed checkboxes stick
        if (isToday) {
          if (c.archived && !c.done_at) return false;
          if (c.archived && c.done_at && c.done_at.slice(0, 10) !== date) return false;
          return isDueToday(c);
        }
        // For future dates: hide archived entirely
        if (c.archived) return false;
        return cardDueOnDate(c, date);
      });
      const all = [...plannerCards, ...otherDueCards];
      const doneCount = all.filter(c => c.done_at).length;

      const wrap = el('div', { class: 'today-list' });
      wrap.appendChild(el('div', { class: 'today-list-head' }, [
        el('span', {}, listTitle),
        all.length > 0 ? el('span', { class: 'count' }, doneCount + ' / ' + all.length) : null,
      ]));
      if (all.length === 0) {
        wrap.appendChild(el('div', { class: 'today-empty' }, (isToday || isTomorrow)
          ? 'Fill in the planner below. Checkable tasks land here.'
          : 'No tasks captured for this day.'));
        return wrap;
      }
      if (plannerCards.length) {
        wrap.appendChild(el('div', { class: 'today-list-group' }, 'From ' + dayLabel + "'s planner"));
        plannerCards.forEach(c => wrap.appendChild(todayRowEl(c)));
      }
      if (otherDueCards.length) {
        wrap.appendChild(el('div', { class: 'today-list-group' }, 'Also due ' + dayLabel));
        otherDueCards.forEach(c => wrap.appendChild(todayRowEl(c)));
      }
      return wrap;
    }

    function todayRowEl(c) {
      const proj = c.project_id && c.project_id !== 'inbox' ? projectById(c.project_id) : null;
      const row = el('div', {
        class: 'today-row' + (c.done_at ? ' done' : ''),
        onClick: () => toggleCardDone(c.id),
        title: c.done_at ? 'Completed ' + new Date(c.done_at).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' }) : 'Click to mark done',
      }, [
        el('div', { class: 'today-check' }, c.done_at ? '✓' : ''),
        el('div', { style: { flex: '1', minWidth: '0' } }, [
          el('div', { class: 'today-title' }, c.title),
          el('div', { class: 'today-meta' }, [
            proj ? el('span', { class: 'today-project-dot', style: { '--item-from': proj.accent.from, '--item-to': proj.accent.to } }) : null,
            el('span', {}, proj ? proj.name : (c.source && c.source.kind === 'planner' ? 'From planner' : 'Inbox')),
          ]),
        ]),
      ]);
      return row;
    }

    function renderDailyPlanner(header, body) {
      const date = currentDailyDate;
      const today = todayISO();
      const d = new Date(date + 'T00:00:00');
      const dateLabel = d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric', year: date.slice(0, 4) !== today.slice(0, 4) ? 'numeric' : undefined });
      const isToday = date === today;
      header.appendChild(el('div', { class: 'main-title' }, [
        el('span', { style: { fontSize: '22px' } }, '🌅'),
        el('span', {}, 'Daily planner'),
      ]));
      const dateStatus = isToday ? '' : (date > today ? ' · planning ahead' : ' · history');
      header.appendChild(el('div', { class: 'main-subtitle' }, dateLabel + dateStatus));
      const actions = [plannerDateNavEl('daily')];
      if (isToday) {
        actions.push(el('button', {
          class: 'text-btn',
          title: 'Jump to tomorrow and start planning it',
          onClick: () => { currentDailyDate = tomorrowISO(); render(); },
        }, '🌙 Plan tomorrow'));
      }
      actions.push(el('button', {
        class: 'text-btn',
        title: 'Carry over yesterday\u2019s undone items',
        onClick: () => {
          const ent = plannerEntry('daily', date) || ensurePlannerEntry('daily', date);
          carryOverYesterday(ent.id);
        },
      }, '← Carry over'));
      header.appendChild(el('div', { class: 'main-actions', style: { display: 'flex', gap: '6px', alignItems: 'center' } }, actions));

      const wrap = el('div', { class: 'planner-wrap' });
      const dateIsFuture = date >= today;
      if (dateIsFuture) {
        const ent = plannerEntry('daily', date) || ensurePlannerEntry('daily', date);
        wrap.appendChild(renderTodayListEl(ent, date));
      }
      DAILY_FIELDS.forEach(section => {
        const sec = el('div', { class: 'planner-section' }, [
          el('div', { class: 'planner-section-head' }, [el('span', {}, section.section)]),
        ]);
        section.items.forEach(f => sec.appendChild(plannerFieldEl('daily', date, f)));
        wrap.appendChild(sec);
      });
      wrap.appendChild(plannerHistoryEl('daily', date));
      body.appendChild(wrap);
    }

    function carryOverYesterday(entryId) {
      const yEntry = plannerEntry('daily', yesterdayISO());
      if (!yEntry) { alert('No daily plan from yesterday to carry over.'); return; }
      const undone = (yEntry.answers && yEntry.answers.y_not_done) || '';
      if (!undone.trim()) { alert('Yesterday had nothing marked undone.'); return; }
      setState(s => {
        const e = s.planner_entries.find(x => x.id === entryId);
        if (!e) return;
        const cur = (e.answers.email_items || '').trim();
        e.answers.email_items = cur ? (cur + '\n' + undone) : undone;
      });
    }

    function renderWeeklyPlanner(header, body) {
      if (!currentWeeklyDate) currentWeeklyDate = mondayOf(todayISO());
      const monday = currentWeeklyDate;
      const todayMonday = mondayOf(todayISO());
      const d = new Date(monday + 'T00:00:00');
      const isThisWeek = monday === todayMonday;
      header.appendChild(el('div', { class: 'main-title' }, [
        el('span', { style: { fontSize: '22px' } }, '📆'),
        el('span', {}, 'Weekly planner'),
      ]));
      header.appendChild(el('div', { class: 'main-subtitle' }, 'Week of ' + d.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' }) + (isThisWeek ? '' : ' · history')));
      header.appendChild(el('div', { class: 'main-actions' }, [plannerDateNavEl('weekly')]));

      const wrap = el('div', { class: 'planner-wrap' });

      // Responsibilities grid
      const respSec = el('div', { class: 'planner-section' }, [
        el('div', { class: 'planner-section-head' }, [el('span', {}, 'Responsibilities this week')]),
      ]);
      const grid = el('div', { class: 'planner-grid' });
      WEEKLY_RESPONSIBILITIES.forEach(([key, label]) => {
        grid.appendChild(plannerFieldEl('weekly', monday, { key, label }));
      });
      respSec.appendChild(grid);
      wrap.appendChild(respSec);

      WEEKLY_FIELDS.forEach(section => {
        const sec = el('div', { class: 'planner-section' }, [
          el('div', { class: 'planner-section-head' }, [el('span', {}, section.section)]),
        ]);
        section.items.forEach(f => sec.appendChild(plannerFieldEl('weekly', monday, f)));
        wrap.appendChild(sec);
      });

      wrap.appendChild(plannerHistoryEl('weekly', monday));
      body.appendChild(wrap);
    }

    function openPlannerPullModal(entry, field) {
      let query = '';
      const selected = {};
      ((entry.linked || {})[field.key] || []).forEach(it => selected[it.type + ':' + it.id] = it);

      const resultsEl = el('div', { class: 'picker-list', style: { maxHeight: '320px' } });
      const renderResults = () => {
        clearNode(resultsEl);
        const ql = query.toLowerCase().trim();
        const matches = (s) => s && s.toLowerCase().includes(ql);

        const groups = [];
        const cards = state.cards.filter(c => !c.archived && (!ql || matches(c.title) || matches(c.notes))).slice(0, 30)
          .map(c => {
            const p = c.project_id === 'inbox' ? null : projectById(c.project_id);
            return { type: 'task', id: c.id, title: c.title, hint: p ? p.name : 'Bank' };
          });
        if (cards.length) groups.push({ label: 'Tasks', items: cards });

        const projs = state.projects.filter(p => !ql || matches(p.name))
          .map(p => ({ type: 'project', id: p.id, title: p.name, hint: p.context }));
        if (projs.length) groups.push({ label: 'Projects', items: projs });

        const ideas = state.ideas.filter(i => !ql || matches(i.title) || matches(i.details))
          .map(i => ({ type: 'idea', id: i.id, title: i.title, hint: i.context }));
        if (ideas.length) groups.push({ label: 'Ideas', items: ideas });

        const autos = state.automations.filter(a => !ql || matches(a.title) || matches(a.details))
          .map(a => ({ type: 'automation', id: a.id, title: a.title, hint: a.status }));
        if (autos.length) groups.push({ label: 'Automations', items: autos });

        const goals = state.goals.filter(g => !ql || matches(g.title))
          .map(g => ({ type: 'goal', id: g.id, title: g.title, hint: g.cadence }));
        if (goals.length) groups.push({ label: 'Goals', items: goals });

        groups.forEach(g => {
          resultsEl.appendChild(el('div', { class: 'picker-group-head' }, g.label));
          g.items.forEach(it => {
            const key = it.type + ':' + it.id;
            const isSel = !!selected[key];
            const row = el('div', {
              class: 'picker-item' + (isSel ? ' active' : ''),
              onClick: () => {
                if (selected[key]) delete selected[key];
                else selected[key] = { type: it.type, id: it.id, title: it.title };
                renderResults();
              },
            }, [
              el('span', { style: { width: '16px' } }, linkedIcon(it.type)),
              el('span', { class: 'picker-item-title' }, it.title),
              el('span', { class: 'picker-item-hint' }, (it.hint || '') + (isSel ? ' ✓' : '')),
            ]);
            resultsEl.appendChild(row);
          });
        });
        if (groups.length === 0) {
          resultsEl.appendChild(el('div', { style: { padding: '20px', textAlign: 'center', color: 'var(--text-tertiary)', fontSize: '12px', fontStyle: 'italic' } }, 'Nothing matches.'));
        }
      };

      const searchInput = el('input', {
        class: 'picker-search', type: 'text', placeholder: 'Search tasks, ideas, automations, projects, goals…',
        onInput: (e) => { query = e.target.value; renderResults(); },
      });

      const submit = () => {
        const items = Object.values(selected);
        linkToPlannerField(entry.id, field.key, items);
        closeModal();
      };

      openModal([
        el('h3', {}, 'Link items to: ' + field.label),
        el('p', {}, 'Tap an item to toggle. Click Apply when done.'),
        searchInput,
        resultsEl,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: submit }, 'Apply'),
        ]),
      ]);
      renderResults();
      setTimeout(() => searchInput.focus(), 50);
    }

    // ---------- Goals view ----------
    const CADENCE_LABELS = { daily: 'Daily', weekly: 'Weekly', monthly: 'Monthly', quarterly: 'Quarterly' };

    function renderGoalsView(header, body) {
      header.appendChild(el('div', { class: 'main-title' }, [
        el('span', { style: { fontSize: '22px' } }, '🎯'),
        el('span', {}, 'Goals'),
      ]));
      const goals = visibleGoals();
      header.appendChild(el('div', { class: 'main-subtitle' }, goals.length + ' tracked'));
      header.appendChild(el('div', { class: 'main-actions' }, [
        el('button', { class: 'text-btn primary', onClick: () => openNewGoalModal() }, '+ New goal'),
      ]));

      if (goals.length === 0) {
        body.appendChild(el('div', { style: { padding: '60px 20px', textAlign: 'center', color: 'var(--text-tertiary)', fontStyle: 'italic' } }, EMPTY_COPY.goalsEmpty));
        return;
      }
      const list = el('div', { class: 'list-view' });
      goals.forEach(g => list.appendChild(goalCardEl(g)));
      body.appendChild(list);
    }

    function goalCardEl(g) {
      const target = g.target_count || 1;
      const thisPeriod = checkinsInPeriod(g, 0);
      const pct = Math.min(100, Math.round((thisPeriod / target) * 100));
      const streak = goalStreak(g);
      const periodLabel = g.cadence === 'daily' ? 'today' : 'this ' + (g.cadence === 'weekly' ? 'week' : g.cadence === 'monthly' ? 'month' : 'quarter');

      const node = el('div', { class: 'goal-card' }, [
        el('div', { class: 'goal-head' }, [
          el('span', { class: 'ctx-mark ' + (g.context || 'personal') }),
          el('div', { style: { flex: '1' } }, [
            el('div', { class: 'goal-title' }, g.title),
            el('div', { class: 'goal-target' }, [
              el('span', { class: 'cadence-pill' }, CADENCE_LABELS[g.cadence] || g.cadence),
              g.target ? el('span', {}, g.target) : null,
            ]),
          ]),
          streak > 0 ? el('div', { class: 'streak-badge', title: streak + ' period streak' }, [
            el('span', {}, '🔥'),
            el('span', {}, String(streak)),
          ]) : null,
        ]),
        el('div', { class: 'goal-bar-row' }, [
          el('div', { class: 'goal-bar' }, el('div', { class: 'goal-bar-fill', style: { width: pct + '%' } })),
          el('div', { class: 'goal-bar-label' }, thisPeriod + ' / ' + target + ' ' + periodLabel),
        ]),
        el('div', { class: 'goal-actions' }, [
          el('button', {
            class: 'text-btn primary',
            onClick: (e) => {
              spawnBurst(e.currentTarget);
              if (g.unit) {
                const v = prompt('Amount (' + g.unit + '):', '1');
                if (v && !isNaN(parseFloat(v))) checkInGoal(g.id, parseFloat(v));
              } else checkInGoal(g.id, 1);
            },
          }, '+ Check in'),
          el('button', { class: 'text-btn', onClick: () => openGoalEditorModal(g) }, 'Edit'),
          el('div', { class: 'spacer', style: { flex: 1 } }),
          g.checkins.length ? el('span', {
            style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace' },
          }, g.checkins.length + ' total') : null,
        ]),
      ]);
      return node;
    }

    function openNewGoalModal() {
      let title = '', cadence = 'weekly', targetCount = '';
      const filter = state.ui.context_filter;
      let context = filter !== 'all' ? filter : 'personal';
      const titleInput = el('input', { type: 'text', placeholder: 'e.g. Run 3x a week', onInput: (e) => title = e.target.value });
      const cadenceSel = el('select', {}, Object.keys(CADENCE_LABELS).map(k => el('option', { value: k, selected: k === 'weekly' }, CADENCE_LABELS[k])));
      cadenceSel.addEventListener('change', () => cadence = cadenceSel.value);
      const countInput = el('input', { type: 'number', min: '1', placeholder: '3 (optional — how many per period)', onInput: (e) => targetCount = e.target.value });
      const ctxToggle = contextToggleEl(context, (ctx) => {
        context = ctx;
        ctxToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        ctxToggle.querySelector('.' + ctx).classList.add('active');
      });
      const submit = () => {
        if (!title.trim()) { titleInput.focus(); return; }
        const tc = targetCount ? parseInt(targetCount, 10) : null;
        addGoal(title, cadence, tc, context);
        closeModal();
      };
      openModal([
        el('h3', {}, 'New goal'),
        el('div', { class: 'modal-label' }, 'What'),
        titleInput,
        el('div', { class: 'modal-label' }, 'Cadence'),
        cadenceSel,
        el('div', { class: 'modal-label' }, 'Target count per period'),
        countInput,
        el('div', { class: 'modal-label' }, 'Context'),
        ctxToggle,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: submit }, 'Create'),
        ]),
      ]);
      setTimeout(() => titleInput.focus(), 50);
    }

    function openGoalEditorModal(g) {
      let title = g.title, target = g.target || '', cadence = g.cadence, targetCount = g.target_count || '', unit = g.unit || '';
      let context = g.context;
      const titleInput = el('input', { type: 'text', value: title, onInput: (e) => title = e.target.value });
      const targetInput = el('input', { type: 'text', value: target, placeholder: 'e.g. 3x per week; 8 hrs sleep', onInput: (e) => target = e.target.value });
      const cadenceSel = el('select', {}, Object.keys(CADENCE_LABELS).map(k => el('option', { value: k, selected: k === cadence }, CADENCE_LABELS[k])));
      cadenceSel.addEventListener('change', () => cadence = cadenceSel.value);
      const countInput = el('input', { type: 'number', min: '1', value: targetCount, placeholder: 'Target per period', onInput: (e) => targetCount = e.target.value });
      const unitInput = el('input', { type: 'text', value: unit, placeholder: 'Unit (e.g. oz, miles, reps)', onInput: (e) => unit = e.target.value });
      const ctxToggle = contextToggleEl(context, (ctx) => {
        context = ctx;
        ctxToggle.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        ctxToggle.querySelector('.' + ctx).classList.add('active');
      });

      // Recent check-ins list
      const recent = el('div', { style: { maxHeight: '140px', overflow: 'auto' } });
      const sorted = [...g.checkins].sort((a, b) => b.timestamp.localeCompare(a.timestamp)).slice(0, 20);
      if (sorted.length === 0) {
        recent.appendChild(el('div', { style: { color: 'var(--text-tertiary)', fontSize: '12px', fontStyle: 'italic', padding: '8px' } }, 'No check-ins yet.'));
      } else {
        sorted.forEach(ci => {
          recent.appendChild(el('div', {
            style: { display: 'flex', justifyContent: 'space-between', padding: '6px 8px', fontSize: '12px', borderBottom: '1px solid var(--border)', color: 'var(--text-secondary)' },
          }, [
            el('span', {}, new Date(ci.timestamp).toLocaleString()),
            el('span', { style: { display: 'flex', gap: '8px', alignItems: 'center' } }, [
              el('span', {}, '+' + ci.amount + (g.unit ? ' ' + g.unit : '')),
              el('button', {
                style: { color: 'var(--danger)', fontSize: '10px' },
                onClick: () => { removeCheckin(g.id, ci.id); closeModal(); openGoalEditorModal({ ...g, checkins: g.checkins.filter(c => c.id !== ci.id) }); },

        el('div', { class: 'modal-actions' }, [

        }, 'Unarchive'),
      ]);

    function openDoneExportModal() {
      const archived = visibleArchivedCards();
      const lines = ['title,project,context,completed_at'];
      archived.forEach(c => {
        const proj = projectById(c.project_id);
        const safe = (s) => '"' + (s || '').replace(/"/g, '""') + '"';
        lines.push([
          safe(c.title),
          safe(proj ? proj.name : ''),
          safe(proj ? proj.context : ''),
          safe(c.done_at || c.created_at),
        ].join(','));
      });
      const csv = lines.join('\n');
      const out = el('div', { class: 'jd-summary-out' }, csv);
      const copyBtn = el('button', {
        onClick: () => { navigator.clipboard.writeText(csv).then(() => { copyBtn.textContent = 'Copied'; setTimeout(() => copyBtn.textContent = 'Copy CSV', 1200); }); },
      }, 'Copy CSV');
      const dlBtn = el('button', {
        onClick: () => {
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'done-' + todayISO() + '.csv';
          a.click();
          URL.revokeObjectURL(url);
        },
      }, 'Download');
      openModal([
        el('h3', {}, 'Export completed tasks'),
        el('p', {}, archived.length + ' task' + (archived.length === 1 ? '' : 's') + ' in current context filter.'),
        el('div', { style: { display: 'flex', gap: '8px', marginBottom: '10px' } }, [copyBtn, dlBtn]),
        out,
        el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Close')]),
      ]);
    }

    // ---------- Project (kanban) view ----------

        el('button', { class: 'icon-btn', title: 'Change accent', onClick: () => openAccentModal(proj) }, '🎨'),

            const p = s.projects.find(x => x.id === proj.id);

    function renderProjectTable(body, proj) {
      const allCards = state.cards.filter(c => c.project_id === proj.id && !c.archived);
      if (allCards.length === 0) {
        body.appendChild(el('div', { class: 'pt-empty' }, 'No cards yet. Switch back to Cards view to add some.'));
        return;
      }
      const colById = Object.fromEntries(proj.columns.map(col => [col.id, col]));
      const colOrder = Object.fromEntries(proj.columns.map((col, i) => [col.id, i]));

      const sort = state.ui.project_table_sort || { key: 'column', dir: 'asc' };
      const getSortValue = (c, key) => {
        switch (key) {
          case 'title': return (c.title || '').toLowerCase();
          case 'column': return (colOrder[c.column_id] ?? 99) + '-' + (colById[c.column_id]?.name || '');
          case 'due': return c.due ? resolveDueISO(c.due) || c.due : '\uffff';
          case 'scheduled': return c.scheduled_time || '\uffff';
          case 'duration': return c.duration_minutes || 0;
          case 'subtasks': return (c.subtasks || []).length;
          case 'created': return c.created_at || 0;
          default: return '';
        }
      };
      const sorted = [...allCards].sort((a, b) => {
        const av = getSortValue(a, sort.key);
        const bv = getSortValue(b, sort.key);
        let cmp = 0;
        if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
        else cmp = String(av).localeCompare(String(bv));
        // Tiebreak by column then position so kanban order is preserved within groups.
        if (cmp === 0) {
          cmp = (colOrder[a.column_id] ?? 99) - (colOrder[b.column_id] ?? 99);
          if (cmp === 0) cmp = (a.position || 0) - (b.position || 0);
        }
        return sort.dir === 'desc' ? -cmp : cmp;
      });

      const headerCell = (label, key, extraClass) => {
        const isSorted = sort.key === key;
        return el('th', {
          class: (extraClass || '') + ' sortable' + (isSorted ? ' sorted' : ''),
          onClick: () => setState(s => {
            const cur = s.ui.project_table_sort || { key: 'column', dir: 'asc' };
            if (cur.key === key) cur.dir = cur.dir === 'asc' ? 'desc' : 'asc';
            else { cur.key = key; cur.dir = 'asc'; }
            s.ui.project_table_sort = cur;
          }),
        }, [
          el('span', {}, label),
          isSorted ? el('span', { class: 'sort-arrow' }, sort.dir === 'asc' ? '▲' : '▼') : null,
        ]);
      };

      const thead = el('thead', {}, [
        el('tr', {}, [
          headerCell('Title', 'title'),
          headerCell('Column', 'column'),
          headerCell('Due', 'due', 'pt-hide-sm'),
          headerCell('Scheduled', 'scheduled', 'pt-hide-md'),
          headerCell('Dur', 'duration', 'pt-hide-md'),
          headerCell('Sub', 'subtasks', 'pt-hide-md'),
          headerCell('Created', 'created', 'pt-hide-md'),
        ]),
      ]);

      const tbody = el('tbody');
      sorted.forEach(c => {
        const isExpanded = expandedCardId === c.id;
        const col = colById[c.column_id];
        const isDone = col ? isDoneColumn(proj, col.id) : false;
        const subs = c.subtasks || [];
        const subsDone = subs.length ? countSubtaskProgress(subs) : { done: 0, total: 0 };
        const dueLabel = formatDueLabel(c.due);
        const schedLabel = formatScheduledTimeLabel(c.scheduled_time);
        const created = c.created_at ? new Date(c.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';

        const titleCell = el('td', {}, [
          el('div', { class: 'pt-title' }, [
            el('span', {}, c.title || '(untitled)'),
          ]),
          c.notes ? el('span', { class: 'pt-notes' }, c.notes.replace(/\s+/g, ' ').trim()) : null,
        ]);

        const row = el('tr', {
          class: (isExpanded ? 'expanded ' : '') + (isDone && !isExpanded ? 'done-row' : ''),
          dataset: { cardId: c.id },
          onClick: (e) => {
            if (e.target.closest('a,button,input,textarea,select')) return;
            expandedCardId = isExpanded ? null : c.id;
            expandedItemKey = null;
            render();
          },
        }, [
          titleCell,
          el('td', {}, el('span', { class: 'pt-col-pill' + (isDone ? ' done' : '') }, col ? col.name : '—')),
          el('td', { class: 'pt-hide-sm' }, dueLabel ? el('span', { class: 'pt-cell-muted' }, dueLabel) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, schedLabel ? el('span', { class: 'pt-cell-muted' }, schedLabel) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, c.duration_minutes ? el('span', { class: 'pt-cell-num' }, formatDuration(c.duration_minutes)) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, subs.length ? el('span', { class: 'pt-cell-num' }, subsDone.done + '/' + subsDone.total) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, created ? el('span', { class: 'pt-cell-muted' }, created) : el('span', { class: 'pt-cell-muted' }, '—')),
        ]);
        tbody.appendChild(row);

        if (isExpanded) {
          const inner = el('div', { class: 'pt-expanded-inner' });
          inner.addEventListener('click', (e) => e.stopPropagation());
          inner.appendChild(cardEl(c, proj));
          tbody.appendChild(el('tr', { class: 'pt-expanded-row' }, [
            el('td', { colspan: 7 }, inner),
          ]));
        }
      });

      body.appendChild(el('table', { class: 'project-table' }, [thead, tbody]));
    }

    function columnEl(proj, col) {
      const cards = cardsForColumn(proj.id, col.id);
      const node = el('div', { class: 'column', dataset: { columnId: col.id, projectId: proj.id } });
      const menuWrap = el('div', { class: 'column-menu-wrap' });
      const menuBtn = el('button', {
        class: 'icon-btn', title: 'Column menu',
        onClick: (e) => { e.stopPropagation(); toggleColumnMenu(menuWrap, proj, col); },
      }, '⋯');
      menuWrap.appendChild(menuBtn);

      const header = el('div', { class: 'column-header' }, [
        el('span', {
          class: 'column-title', contenteditable: 'true',
          onBlur: (e) => {
            const v = e.target.textContent.trim();
            if (v && v !== col.name) renameColumn(proj.id, col.id, v);
            else e.target.textContent = col.name;
          },
          onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
        }, col.name),
        el('span', { class: 'column-count' }, String(cards.length)),
        menuWrap,
      ]);
      node.appendChild(header);

      const cardList = el('div', { class: 'column-cards' });
      if (cards.length === 0) cardList.appendChild(el('div', { class: 'col-empty' }, EMPTY_COPY.column));
      else cards.forEach(c => cardList.appendChild(cardEl(c, proj)));
      node.appendChild(cardList);
      node.appendChild(el('button', {
        class: 'col-add-btn',
        onClick: () => openNewCardModal(proj, col),
      }, '+ Add card'));
      return node;
    }

    function openNewCardModal(proj, col) {
      let title = '', notes = '', due = null, recurrence = null;
      const titleInput = el('input', { type: 'text', placeholder: 'Task title', onInput: (e) => title = e.target.value,
        onKeydown: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } } });
      const notesArea = el('textarea', { placeholder: 'Notes (optional)', rows: 2, onInput: (e) => notes = e.target.value, style: { minHeight: '50px' } });
      const dateInput = el('input', { type: 'date', onChange: (e) => { if (e.target.value) { due = e.target.value; refreshDueButtons(); } } });
      const btnNone = el('button', { class: 'due-opt selected', onClick: () => { due = null; dateInput.value = ''; refreshDueButtons(); } }, 'none');
      const btnToday = el('button', { class: 'due-opt', onClick: () => { due = 'today'; dateInput.value = ''; refreshDueButtons(); } }, 'today');
      const btnTomorrow = el('button', { class: 'due-opt', onClick: () => { due = 'tomorrow'; dateInput.value = ''; refreshDueButtons(); } }, 'tomorrow');
      const refreshDueButtons = () => {
        btnNone.classList.toggle('selected', due == null);
        btnToday.classList.toggle('selected', due === 'today');
        btnTomorrow.classList.toggle('selected', due === 'tomorrow');
      };
      const recRow = el('div', { class: 'card-edit-row' });
      const mkRec = (val, label) => {
        const b = el('button', { class: 'due-opt' + (recurrence === val ? ' selected' : ''), onClick: () => {
          recurrence = val;
          recRow.querySelectorAll('.due-opt').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
        } }, label);
        return b;
      };
      recRow.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Recurs'));
      recRow.appendChild(mkRec(null, 'never'));
      recRow.appendChild(mkRec('daily', 'daily'));
      recRow.appendChild(mkRec('weekly', 'weekly'));
      recRow.appendChild(mkRec('monthly', 'monthly'));
      // First button "never" starts selected
      recRow.querySelectorAll('.due-opt')[0].classList.add('selected');

      const submit = () => {
        if (!title.trim()) { titleInput.focus(); return; }
        const id = uid('card');
        setState(s => {
          const pos = s.cards.filter(c => c.project_id === proj.id && c.column_id === col.id && !c.archived).length;
          s.cards.push({
            id, project_id: proj.id, column_id: col.id, position: pos,
            title: title.trim(), notes: notes.trim(), due,
            today_slot: null, today_position: 0, plan_date: null,
            context: null, done_at: null, archived: false,
            recurrence, created_at: now(),
          });
          logActivity('card_created', 'Added task "' + title.trim() + '"', { project_id: proj.id, source_type: 'card', source_id: id, context: proj.context });
        });
        soundAdd();
        closeModal();
      };
      openModal([
        el('h3', {}, 'New card in ' + col.name),
        titleInput,
        notesArea,
        el('div', { class: 'card-edit-row' }, [
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Due'),
          btnNone, btnToday, btnTomorrow, dateInput,
        ]),
        recRow,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: submit }, 'Add'),
        ]),
      ]);
      setTimeout(() => titleInput.focus(), 50);
    }

    function toggleColumnMenu(wrap, proj, col) {
      const existing = wrap.querySelector('.column-menu');
      if (existing) { existing.remove(); return; }
      const menu = el('div', { class: 'column-menu' }, [
        el('button', { onClick: () => { wrap.parentElement.querySelector('.column-title').focus(); menu.remove(); } }, 'Rename'),
        el('button', { onClick: () => { const idx = proj.columns.findIndex(c => c.id === col.id); addColumn(proj.id, 'New column', idx); } }, 'Add before'),

    // ---------- Drag-drop ----------
    function handleCardDrop(evt) {
      const cardId = evt.item.dataset.cardId;
      const targetColumn = evt.to.closest('[data-column-id]');
      const inBank = evt.to.classList.contains('bank-list');
      if (!cardId) return;
      setState(s => {
        const c = s.cards.find(x => x.id === cardId);
        if (!c) return;
        const beforePid = c.project_id;
        const beforeCid = c.column_id;
        if (inBank) {
          c.project_id = 'inbox'; c.column_id = null;
          // Dropping into bank = unschedule. Bank is for unscheduled work.
          c.scheduled_time = null;
          c.today_slot = null; c.today_position = 0; c.plan_date = null;
        }
        else if (targetColumn) {
          c.project_id = targetColumn.dataset.projectId;
          c.column_id = targetColumn.dataset.columnId;
        }
        const siblings = [...evt.to.children].map(n => n.dataset.cardId).filter(Boolean);
        siblings.forEach((id, i) => {
          const cc = s.cards.find(x => x.id === id);
          if (cc) cc.position = i;
        });
        // Track done_at and log card_done if moved into a "Done" column
        if (c.project_id !== 'inbox' && c.column_id && (beforeCid !== c.column_id || beforePid !== c.project_id)) {
          const p = s.projects.find(x => x.id === c.project_id);
          if (p && isDoneColumn(p, c.column_id)) {
            c.done_at = now();
            logActivity('card_done', 'Completed "' + c.title + '"', { project_id: p.id, source_type: 'card', source_id: c.id, context: p.context });
            setTimeout(soundDone, 0);
            // Spawn a fresh copy for recurring cards
            if (c.recurrence) {
              const firstNonDone = p.columns.find(col => !isDoneColumn(p, col.id));
              if (firstNonDone) {
                const pos = s.cards.filter(x => x.project_id === p.id && x.column_id === firstNonDone.id && !x.archived).length;
                const clone = {
                  id: uid('card'), project_id: p.id, column_id: firstNonDone.id,
                  position: pos, title: c.title, notes: c.notes, due: null,
                  today_slot: null, today_position: 0, plan_date: null,
                  context: null, done_at: null, archived: false,
                  recurrence: c.recurrence, created_at: now(),
                };
                s.cards.push(clone);
                logActivity('card_created', 'Recurring "' + c.title + '" spawned (' + c.recurrence + ')', { project_id: p.id, source_type: 'card', source_id: clone.id, context: p.context });
              }
            }
          } else {
            if (c.done_at) c.done_at = null;
          }
        } else if (c.project_id === 'inbox') {
          c.done_at = null;
        }
      });
    }

    function setupFileDrop(container, ownerType, ownerId) {
      container.addEventListener('dragover', (e) => { e.preventDefault(); container.classList.add('drag-over'); });
      container.addEventListener('dragleave', (e) => { if (e.target === container) container.classList.remove('drag-over'); });
      container.addEventListener('drop', (e) => {
        e.preventDefault(); container.classList.remove('drag-over');
        if (!e.dataTransfer.files || e.dataTransfer.files.length === 0) return;
        for (const f of e.dataTransfer.files) addFile(ownerType, ownerId, f);
      });
    }

    function renderMiniTodayList() {
      const today = todayISO();
      const tomorrow = tomorrowISO();
      const ctxOk = (c) => contextMatches(contextOf(c, 'card'));
      const isDueTomorrow = (c) => c.due === 'tomorrow' || c.due === tomorrow;
      const plannerCards = [];
      const otherDueCards = state.cards.filter(c => {
        if (c.archived && !c.done_at) return false;
        if (c.archived && c.done_at && c.done_at.slice(0, 10) !== today) return false;
        if (!ctxOk(c)) return false;
        return isDueToday(c);
      });
      const tomorrowCards = state.cards.filter(c => {
        if (c.archived) return false;
        if (!ctxOk(c)) return false;
        return isDueTomorrow(c);
      });
      const todayAll = [...plannerCards, ...otherDueCards];
      const doneCount = todayAll.filter(c => c.done_at).length;

      const panel = el('div', { class: 'rail-panel' });
      panel.appendChild(el('div', { class: 'rail-panel-head' }, [
        el('div', { class: 'rail-panel-title' }, 'Today'),
        todayAll.length > 0 ? el('span', {
          style: { fontSize: '10px', padding: '2px 6px', borderRadius: '4px',
            background: 'linear-gradient(135deg, var(--accent-from), var(--accent-to))',
            color: 'white', fontWeight: '600', fontFamily: 'JetBrains Mono, monospace' },
        }, doneCount + ' / ' + todayAll.length) : null,
      ]));
      if (todayAll.length === 0) {
        panel.appendChild(el('div', { class: 'files-empty', style: { padding: '10px', fontSize: '12px' } }, 'No tasks for today yet.'));
      } else {
        const list = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px' } });
        todayAll.forEach(c => list.appendChild(miniTodayRowEl(c)));
        panel.appendChild(list);
      }
      if (tomorrowCards.length) {
        panel.appendChild(el('div', {
          style: { fontSize: '10px', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text-tertiary)', marginTop: '10px', marginBottom: '4px' },
        }, 'Tomorrow · ' + tomorrowCards.length));

        tomorrowCards.forEach(c => tlist.appendChild(miniTodayRowEl(c)));
        panel.appendChild(tlist);
      }
      return panel;
    }

    function formatDueLabel(due) {
      if (!due) return '';
      if (due === 'today') return 'Today';
      if (due === 'tomorrow') return 'Tomorrow';
      if (!/^\d{4}-\d{2}-\d{2}$/.test(due)) return '';
      if (due === todayISO()) return 'Today';
      if (due === tomorrowISO()) return 'Tomorrow';
      return new Date(due + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatScheduledTimeLabel(scheduled_time) {
      if (!scheduled_time) return '';
      const m = scheduled_time.match(/T(\d{2}):(\d{2})/);
      if (!m) return '';
      const h = parseInt(m[1], 10);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = (h % 12) || 12;
      return h12 + ':' + m[2] + ' ' + ampm;
    }

    function composeScheduledTime(due, timeHHMM) {
      if (!timeHHMM || !/^\d{2}:\d{2}$/.test(timeHHMM)) return null;
      const dateISO = resolveDueISO(due);
      if (!dateISO) return null;
      return dateISO + 'T' + timeHHMM + ':00';
    }

    function extractTimeHHMM(scheduled_time) {
      if (!scheduled_time) return '';
      const m = scheduled_time.match(/T(\d{2}):(\d{2})/);
      return m ? m[1] + ':' + m[2] : '';
    }

          Object.assign(existing, {
            notes: existing.notes || notes.trim() || '',
            due: existing.due || due,
            context: existing.context || context || null,
            recurrence: existing.recurrence || recurrence || null,
            duration_minutes: existing.duration_minutes || (duration === '' ? null : parseInt(duration, 10) || null),
          });
          setState(() => {});
          closeModal();
          return;
        }
        const id = uid('card');
        const dur = duration === '' || duration == null ? null : parseInt(duration, 10);
        const schedTime = composeScheduledTime(due, timeHHMM);
        setState(s => {
          const pos = s.cards.filter(c => c.project_id === 'inbox').length;
          s.cards.push({
            id, project_id: 'inbox', column_id: null, position: pos,
            title: t, notes: notes.trim(), due,
            today_slot: null, today_position: 0, plan_date: null,
            context: context || null, done_at: null, archived: false,
            recurrence: recurrence || null,
            duration_minutes: (dur != null && !isNaN(dur) && dur >= 0) ? dur : null,
            scheduled_time: schedTime,
            created_at: now(),
          });
          logActivity('card_created', 'Added task "' + t + '" to bank', { source_type: 'card', source_id: id, context });
        });
        soundAdd();
        closeModal();
      };
      openModal([
        el('h3', {}, 'Add to task bank'),
        titleInput,
        notesArea,
        el('div', { class: 'modal-label' }, 'Context'),
        ctxToggle,
        el('div', { class: 'card-edit-row' }, [

          timeInput,
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)' } }, 'needs a due date'),
        ]),
        recRow,
        el('div', { class: 'modal-label', style: { marginTop: '10px' } }, 'Estimated duration (optional)'),
        durationInput,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: submit }, 'Add'),
        ]),

    function openCalendarImportModal(sourceId) {
      const source = (state.ui.calendar_sources || []).find(s => s.id === sourceId);
      if (!source) { alert('Calendar source not found.'); return; }
      let stage = 'loading';
      let events = [];
      let selection = [];
      let errorMsg = '';

      const modal = el('div', { class: 'modal', style: { maxWidth: '680px' } });
      const backdrop = el('div', { class: 'modal-backdrop' });
      backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
      backdrop.appendChild(modal);
      const modals = document.getElementById('modals');
      clearNode(modals); modals.appendChild(backdrop);

      const rebuild = () => {
        clearNode(modal);
        modal.appendChild(el('h3', {}, 'Pull from calendar — ' + source.name));
        if (stage === 'loading') {
          modal.appendChild(el('p', { style: { color: 'var(--text-tertiary)' } }, 'Fetching events from Microsoft Graph…'));
          return;
        }
        if (stage === 'error') {
          modal.appendChild(el('p', { style: { color: '#f43f5e', fontFamily: 'JetBrains Mono, monospace', fontSize: '12px' } }, errorMsg));
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Close'),
            el('button', { class: 'primary', onClick: () => loadEvents() }, 'Retry'),
          ]));
          return;
        }
        if (stage === 'review') {
          if (events.length === 0) {
            modal.appendChild(el('p', { style: { color: 'var(--text-tertiary)' } }, 'No events in the selected range.'));
            modal.appendChild(el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Close')]));
            return;
          }
          modal.appendChild(el('p', { style: { fontSize: '12px', color: 'var(--text-tertiary)' } }, events.length + ' event' + (events.length === 1 ? '' : 's') + ' found. Uncheck anything you don\'t want imported.'));
          const list = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px', maxHeight: '400px', overflowY: 'auto' } });
          events.forEach((evt, i) => {
            const existing = cardForCalendarEvent(source.id, evt.id);
            const cb = el('input', {
              type: 'checkbox',
              onChange: (e) => { selection[i] = e.target.checked; },
            });
            cb.checked = selection[i] && !existing;
            if (existing) cb.disabled = true;
            const start = new Date(evt.start_iso);
            const meta = start.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })
              + ' · ' + start.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
            const row = el('label', {
              style: { display: 'flex', gap: '10px', alignItems: 'flex-start', padding: '6px 8px', borderRadius: '6px', border: '1px solid var(--border)', cursor: existing ? 'default' : 'pointer', opacity: existing ? '0.55' : '1' },
            }, [
              cb,
              el('div', { style: { flex: '1', minWidth: '0' } }, [
                el('div', { style: { fontSize: '13px', fontWeight: '500' } }, evt.subject),
                el('div', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace' } },
                  meta + (evt.location ? ' · ' + evt.location : '') + (existing ? ' · already imported' : '')),
              ]),
            ]);
            list.appendChild(row);
          });
          modal.appendChild(list);
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Cancel'),
            el('button', { class: 'primary', onClick: commit }, 'Import selected'),
          ]));
        }
      };

      const commit = () => {
        let created = 0;
        setState(s => {
          const src = (s.ui.calendar_sources || []).find(x => x.id === source.id);
          events.forEach((evt, i) => {
            if (!selection[i]) return;
            if (cardForCalendarEvent(source.id, evt.id)) return;
            const cardFields = mapEventToCard(evt, source);
            const pos = s.cards.filter(c => c.project_id === 'inbox').length;
            s.cards.push(Object.assign({
              id: uid('card'),
              project_id: 'inbox',
              column_id: null,
              position: pos,
              due: cardFields.scheduled_time.slice(0, 10),
              today_slot: null, today_position: 0, plan_date: null,
              done_at: null, archived: false,
              recurrence: null, recurrence_day: null, recurrence_interval: null, recurrence_unit: null,
              missed_count: 0, last_missed_at: null,
              subtasks: [],
              created_at: now(),
            }, cardFields));
            created++;
          });
          if (src) src.last_synced_at = new Date().toISOString();
        });
        closeModal();
        if (created) setTimeout(soundAdd, 0);
      };

      const loadEvents = async () => {
        stage = 'loading';
        rebuild();
        try {
          // Default window: now → end of tomorrow (local time)
          const now = new Date();
          const startISO = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
          const endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 2);
          const endISO = endDate.toISOString();
          events = await graphFetchEvents(source, startISO, endISO);
          events = events.filter(e => !e.is_cancelled && !e.is_declined);
          selection = events.map(e => !cardForCalendarEvent(source.id, e.id));
          stage = 'review';
        } catch (e) {
          stage = 'error';
          errorMsg = e.message || String(e);
        }
        rebuild();
      };
      rebuild();
      loadEvents();
    }

    function openEmailAnalyzeModal() {
      if (!getAnthropicKey()) {
        openModal([
          el('h3', {}, 'Add Anthropic API key first'),
          el('p', {}, 'Open Settings (⋯) and paste your Anthropic API key to enable email analysis.'),
          el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Close'),
            el('button', { class: 'primary', onClick: () => { closeModal(); openSettingsModal(); } }, 'Open Settings'),
          ]),
        ]);
        return;
      }
      let stage = 'input';
      let analysis = null;
      let selection = { tasks: [], people: [], makeProject: false };
      const backdrop = el('div', { class: 'modal-backdrop' });
      const modal = el('div', { class: 'modal', style: { maxWidth: '640px' } });
      backdrop.appendChild(modal);
      backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
      const modals = document.getElementById('modals');
      clearNode(modals); modals.appendChild(backdrop);

      const rebuild = () => {
        clearNode(modal);
        if (stage === 'input') {
          const textarea = el('textarea', {
            placeholder: 'Paste email body (subject + body is fine)',
            style: { width: '100%', minHeight: '220px', fontFamily: 'inherit', fontSize: '13px' },
          });
          const analyzeBtn = el('button', { class: 'primary', onClick: async () => {
            const text = textarea.value.trim();
            if (!text) { textarea.focus(); return; }
            stage = 'loading';
            rebuild();
            try {
              analysis = await analyzeEmailWithClaude(text);
              selection = {
                tasks: (analysis.tasks || []).map(() => true),
                people: (analysis.people || []).map(() => true),
                makeProject: !!analysis.project_suggestion,
              };
              stage = 'review';
            } catch (e) {
              stage = 'error';
              analysis = { error: e.message };
            }
            rebuild();
          } }, 'Analyze');
          modal.appendChild(el('h3', {}, 'Add from email'));
          modal.appendChild(el('p', { style: { fontSize: '12px', color: 'var(--text-tertiary)' } }, 'Paste an email. Claude will pull out tasks, suggest a project if it smells like one, and list the humans to add.'));
          modal.appendChild(textarea);
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Cancel'),
            analyzeBtn,
          ]));
          setTimeout(() => textarea.focus(), 30);
        } else if (stage === 'loading') {
          modal.appendChild(el('h3', {}, 'Analyzing…'));
          modal.appendChild(el('p', { style: { color: 'var(--text-tertiary)' } }, 'Claude is reading the email.'));
        } else if (stage === 'error') {
          modal.appendChild(el('h3', {}, 'Analysis failed'));
          modal.appendChild(el('p', { style: { color: '#f43f5e', fontFamily: 'JetBrains Mono, monospace', fontSize: '12px' } }, analysis.error));
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Close'),
            el('button', { class: 'primary', onClick: () => { stage = 'input'; rebuild(); } }, 'Try again'),
          ]));
        } else if (stage === 'review') {
          modal.appendChild(el('h3', {}, 'Extracted from email'));
          if (analysis.summary) modal.appendChild(el('p', { style: { fontSize: '13px', color: 'var(--text-secondary)' } }, analysis.summary));

          if (analysis.tasks && analysis.tasks.length) {
            modal.appendChild(el('div', { class: 'modal-label', style: { marginTop: '10px' } }, 'Tasks'));
            const taskList = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px' } });
            analysis.tasks.forEach((t, i) => {
              const cb = el('input', { type: 'checkbox', onChange: (e) => { selection.tasks[i] = e.target.checked; } });
              cb.checked = selection.tasks[i];
              const titleI = el('input', { type: 'text', value: t.title, onInput: (e) => t.title = e.target.value, style: { flex: '1', fontSize: '13px' } });
              const meta = [];
              if (t.due) meta.push(t.due);
              if (t.duration_minutes) meta.push(formatDuration(t.duration_minutes));
              if (t.context) meta.push(t.context);
              const row = el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } }, [
                cb, titleI,
                meta.length ? el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace' } }, meta.join(' · ')) : null,
              ]);
              taskList.appendChild(row);
            });
            modal.appendChild(taskList);
          }

          if (analysis.project_suggestion) {
            modal.appendChild(el('div', { class: 'modal-label', style: { marginTop: '12px' } }, 'Suggested project'));
            const cb = el('input', { type: 'checkbox', onChange: (e) => { selection.makeProject = e.target.checked; } });
            cb.checked = selection.makeProject;
            modal.appendChild(el('div', { style: { display: 'flex', gap: '8px', alignItems: 'center' } }, [
              cb,
              el('strong', {}, analysis.project_suggestion.name),
              el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)' } }, '— ' + analysis.project_suggestion.reason),
            ]));
          }

          if (analysis.people && analysis.people.length) {
            modal.appendChild(el('div', { class: 'modal-label', style: { marginTop: '12px' } }, 'People'));
            const peopleRow = el('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px' } });
            analysis.people.forEach((name, i) => {
              const cb = el('input', { type: 'checkbox', onChange: (e) => { selection.people[i] = e.target.checked; } });
              cb.checked = selection.people[i];
              peopleRow.appendChild(el('label', { style: { display: 'inline-flex', alignItems: 'center', gap: '4px', fontSize: '12px', padding: '3px 8px', borderRadius: '999px', border: '1px solid var(--border)' } }, [cb, name]));
            });
            modal.appendChild(peopleRow);
          }

          const commit = () => {
            const tasks = (analysis.tasks || []).filter((_, i) => selection.tasks[i]);
            const people = (analysis.people || []).filter((_, i) => selection.people[i]);
            let projectId = null;
            if (selection.makeProject && analysis.project_suggestion) {
              projectId = addProject(analysis.project_suggestion.name, ACCENT_PALETTE[0], 'work');
              people.forEach(n => addProjectPerson(projectId, n));
            }
            tasks.forEach(t => {
              if (findLiveCardByTitle(t.title)) return;
              const existing = addBankCard(t.title, t.context || 'work');
              if (existing) updateCard(existing.id, {
                due: t.due || null,
                duration_minutes: t.duration_minutes || null,
              });
            });
            closeModal();
          };
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: () => { stage = 'input'; rebuild(); } }, 'Back'),
            el('button', { class: 'primary', onClick: commit }, 'Add selected'),
          ]));
        }
      };
      rebuild();
    }
