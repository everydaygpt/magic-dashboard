    // Bulk import: paste a markdown-ish list of books and quotes
    function parseBookHeading(text) {
      // Try common author separators in order of specificity
      const seps = [/\s+—\s+/, /\s+–\s+/, /\s+by\s+/i, /\s*\|\s*/, /\s+-\s+/];
      for (const sep of seps) {
        if (sep.test(text)) {
          const idx = text.search(sep);
          return { title: text.slice(0, idx).trim(), author: text.slice(idx).replace(sep, '').trim() };
        }
      }
      return { title: text.trim(), author: '' };
    }

    function parseQuoteLine(line) {
      // Strip leading list markers
      let text = line.replace(/^\s*[->•*]+\s*/, '').trim();
      // Strip surrounding quotes (straight + curly)
      text = text.replace(/^["“‘']\s*/, '').replace(/\s*["”’']\s*$/, '').trim();
      // Extract trailing page reference: " — p. 47", "(p. 47)", "p.47", "page 47"
      let page = '';
      const pageMatch = text.match(/[\s\(](?:[-—–]\s*)?p(?:\.|age)?\s*(\d+)\s*\)?\s*["”’']?\s*$/i);
      if (pageMatch) {
        page = pageMatch[1];
        text = text.slice(0, pageMatch.index).replace(/[\s\(\—,–-]+$/, '').replace(/["”’']\s*$/, '').trim();
      }
      return { text, page };
    }

    function parseBulkBooks(input) {
      const books = [];
      let current = null;
      const lines = input.split(/\r?\n/);
      for (const raw of lines) {
        const line = raw.trim();
        if (!line) continue;

        // # Heading → book
        const hashMatch = line.match(/^#{1,3}\s*(.+?)\s*#*\s*$/);
        if (hashMatch) {
          const head = parseBookHeading(hashMatch[1]);
          current = { ...head, quotes: [] };
          books.push(current);
          continue;
        }

        // Quote markers: > " ' - * •
        const isQuoteMarker = /^[->•*"“‘']/.test(line);
        if (isQuoteMarker) {
          if (!current) { current = { title: '(untitled)', author: '', quotes: [] }; books.push(current); }
          current.quotes.push(parseQuoteLine(line));
          continue;
        }

        // No marker: heuristic — if it looks like "Title by Author" or "Title — Author" treat as book
        if (!current || /\sby\s|—|–|\|/.test(line)) {
          const head = parseBookHeading(line);
          current = { ...head, quotes: [] };
          books.push(current);
        } else {
          // Fallback: treat as a quote on the current book
          current.quotes.push(parseQuoteLine(line));
        }
      }
      // Drop completely empty books (no title AND no quotes)
      return books.filter(b => (b.title && b.title !== '(untitled)') || b.quotes.length > 0);
    }

    function openDoneExportModal() {
      const archived = visibleArchivedCards();
      const lines = ['title,project,context,completed_at'];
      archived.forEach(c => {
        const proj = projectById(c.project_id);
        const safe = (s) => '"' + (s || '').replace(/"/g, '""') + '"';
        lines.push([
          safe(c.title),
          safe(proj ? proj.name : ''),
          safe(proj ? proj.context : ''),
          safe(c.done_at || c.created_at),
        ].join(','));
      });
      const csv = lines.join('\n');
      const out = el('div', { class: 'jd-summary-out' }, csv);
      const copyBtn = el('button', {
        onClick: () => { navigator.clipboard.writeText(csv).then(() => { copyBtn.textContent = 'Copied'; setTimeout(() => copyBtn.textContent = 'Copy CSV', 1200); }); },
      }, 'Copy CSV');
      const dlBtn = el('button', {
        onClick: () => {
          const blob = new Blob([csv], { type: 'text/csv' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'done-' + todayISO() + '.csv';
          a.click();
          URL.revokeObjectURL(url);
        },
      }, 'Download');
      openModal([
        el('h3', {}, 'Export completed tasks'),
        el('p', {}, archived.length + ' task' + (archived.length === 1 ? '' : 's') + ' in current context filter.'),
        el('div', { style: { display: 'flex', gap: '8px', marginBottom: '10px' } }, [copyBtn, dlBtn]),
        out,
        el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Close')]),
      ]);
    }

    // ---------- Project (kanban) view ----------
    function renderProjectView(header, body, proj) {
      header.appendChild(el('div', { class: 'main-title' }, [
        el('div', { class: 'main-title-dot' }),
        el('span', {
          contenteditable: 'true',
          onBlur: (e) => {
            const v = e.target.textContent.trim();
            if (v && v !== proj.name) renameProject(proj.id, v);
            else e.target.textContent = proj.name;
          },
          onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
        }, proj.name),
        projectStatusPillEl(proj, { large: true }),
        el('span', { class: 'activity-ctx ' + proj.context, title: 'Project context' }, proj.context),
      ]));
      header.appendChild(el('div', { class: 'main-subtitle' }, projectCardCount(proj.id) + ' cards · ' + proj.columns.length + ' columns'));
      // Editable description — click to edit, blur saves. Shows placeholder when empty.
      const descEl = el('div', {
        class: 'project-description' + (!proj.description ? ' empty' : ''),
        contenteditable: 'true',
        spellcheck: 'true',
        title: 'Click to edit · purpose of this project',
        onFocus: (e) => {
          if (!proj.description) e.target.textContent = '';
          e.target.classList.remove('empty');
        },
        onBlur: (e) => {
          const v = e.target.textContent.trim();
          if (v !== (proj.description || '')) {
            setState(s => { const p = s.projects.find(x => x.id === proj.id); if (p) p.description = v; });
          } else if (!v) {
            // Restore placeholder if blurred empty
            e.target.textContent = 'Add a one-liner: what is this project for?';
            e.target.classList.add('empty');
          }
        },
        onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
      }, proj.description || 'Add a one-liner: what is this project for?');
      header.appendChild(descEl);
      // Project links — list of {label, url}. Header button opens the manage
      // modal; count badge shows when 2+ links exist.
      const projLinks = Array.isArray(proj.links) ? proj.links.filter(l => l && l.url) : [];
      const linkBtn = el('button', {
        class: 'icon-btn',
        title: projLinks.length === 0
          ? 'Add a link to this project'
          : projLinks.length === 1
            ? ('Manage links · 1 saved (' + (projLinks[0].label || projLinks[0].url) + ')')
            : 'Manage links · ' + projLinks.length + ' saved',
        onClick: () => openProjectLinksModal(proj),
      }, projLinks.length > 1 ? '🔗 ' + projLinks.length : '🔗');
      const viewMode = state.ui.project_view_mode || 'kanban';
      const viewToggle = el('div', { class: 'view-toggle', title: 'Switch between kanban and table' }, [
        el('button', {
          class: viewMode === 'kanban' ? 'active' : '',
          onClick: () => { if (viewMode !== 'kanban') setState(s => { s.ui.project_view_mode = 'kanban'; }); },
        }, [el('span', { class: 'icon' }, '⊞'), el('span', {}, 'Cards')]),
        el('button', {
          class: viewMode === 'table' ? 'active' : '',
          onClick: () => { if (viewMode !== 'table') setState(s => { s.ui.project_view_mode = 'table'; }); },
        }, [el('span', { class: 'icon' }, '☰'), el('span', {}, 'Table')]),
      ]);
      const aiCount = state.cards.filter(c => c.project_id === proj.id && !c.archived && c.lane === 'ai').length;
      const aiExportBtn = el('button', {
        class: 'icon-btn' + (aiCount === 0 ? ' disabled' : ''),
        title: aiCount === 0 ? 'No AI-lane tasks yet — mark some with 🤖 in table view' : 'Export ' + aiCount + ' AI-lane task' + (aiCount === 1 ? '' : 's') + ' as a prompt',
        style: aiCount === 0 ? { opacity: 0.4, cursor: 'not-allowed' } : {},
        onClick: () => { if (aiCount > 0) openAiPromptExportModal(proj); },
      }, '🤖');
      header.appendChild(el('div', { class: 'main-actions' }, [
        el('button', {
          class: 'text-btn primary',
          title: 'Add a new task to this project',
          onClick: () => addProjectTaskAndEdit(proj),
        }, '+ Add task'),
        viewToggle,
        aiExportBtn,
        linkBtn,
        el('button', {
          class: 'icon-btn',
          title: 'Bulk log completions — paste a list, match or create as done',
          onClick: () => openProjectBulkLogModal(proj),
        }, '📝'),
        el('button', { class: 'icon-btn', title: 'Archive Done now', onClick: () => {
          const count = proj.columns.filter(c => isDoneColumn(proj, c.id)).reduce((n, c) => n + cardsForColumn(proj.id, c.id).length, 0);
          if (count === 0) { alert('No cards in any Done column.'); return; }
          if (confirm('Archive ' + count + ' done task' + (count === 1 ? '' : 's') + ' now?')) archiveDoneNow(proj.id);
        } }, '📦'),
        el('button', { class: 'icon-btn', title: 'Toggle context', onClick: () => changeProjectContext(proj.id, proj.context === 'work' ? 'personal' : 'work') }, proj.context === 'work' ? '💼' : '🏠'),
        el('button', { class: 'icon-btn', title: 'Change accent', onClick: () => openAccentModal(proj) }, '🎨'),
        el('button', { class: 'icon-btn danger', title: 'Delete project', onClick: () => openDeleteProjectModal(proj) }, '🗑'),
      ]));

      // Inline project filter — narrows cards across all columns by title/notes
      body.appendChild(filterInputEl({
        value: projectFilterQuery,
        placeholder: 'Search cards in this project…',
        onInput: (v) => { projectFilterQuery = v; render(); },
        onClear: () => { projectFilterQuery = ''; render(); },
      }));

      if (viewMode === 'table') {
        renderProjectTable(body, proj);
        return;
      }

      const board = el('div', { class: 'board' });
      proj.columns.forEach(col => board.appendChild(columnEl(proj, col)));
      board.appendChild(el('div', { class: 'column add-column', onClick: () => addColumn(proj.id) }, '+ New column'));
      body.appendChild(board);

      proj.columns.forEach(col => {
        const columnCards = body.querySelector('[data-column-id="' + col.id + '"] .column-cards');
        if (columnCards) {
          Sortable.create(columnCards, {
            group: { name: 'cards', pull: true, put: true },
            animation: 180,
            easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
            ghostClass: 'sortable-ghost',
            chosenClass: 'sortable-chosen',
            dragClass: 'sortable-drag',
            delay: 120,
            delayOnTouchOnly: true,
            touchStartThreshold: 5,
            fallbackOnBody: true,
            onEnd: handleCardDrop,
          });
        }
      });
      Sortable.create(board, {
        animation: 180,
        easing: 'cubic-bezier(0.22, 1, 0.36, 1)',
        handle: '.column-header',
        draggable: '.column:not(.add-column)',
        onEnd: () => {
          const newOrder = [...board.children]
            .filter(n => n.dataset && n.dataset.columnId)
            .map(n => n.dataset.columnId);
          setState(s => {
            const p = s.projects.find(x => x.id === proj.id);
            if (!p) return;
            p.columns.sort((a, b) => newOrder.indexOf(a.id) - newOrder.indexOf(b.id));
          });
        },
      });
    }

    // Cycles a card's lane: none → me → ai → none. Click in table to assign.
    function buildLanePill(c) {
      const lane = c.lane || null;
      const label = lane === 'ai' ? '🤖 AI' : lane === 'me' ? '👤 Me' : '— set';
      const cls = 'pt-lane-pill' + (lane === 'ai' ? ' ai' : lane === 'me' ? ' me' : ' none');
      const next = lane === null ? 'me' : lane === 'me' ? 'ai' : null;
      return el('button', {
        class: cls,
        title: 'Click to cycle: none → Me → AI',
        onClick: (e) => { e.stopPropagation(); updateCard(c.id, { lane: next }); },
      }, label);
    }

    function buildColumnPicker(c, proj, colById) {
      const col = colById[c.column_id];
      const isDone = col ? isDoneColumn(proj, col.id) : false;
      const isOpen = openColumnPopoverCardId === c.id;

      const pill = el('button', {
        class: 'pt-col-pill' + (isDone ? ' done' : '') + (isOpen ? ' open' : ''),
        title: 'Click to move to another column',
        onClick: (e) => {
          e.stopPropagation();
          openColumnPopoverCardId = isOpen ? null : c.id;
          render();
        },
      }, [
        el('span', {}, col ? col.name : '—'),
        el('span', { class: 'pt-col-chevron' }, '▾'),
      ]);

      const wrap = el('div', { class: 'pt-col-wrap' }, [pill]);
      if (!isOpen) return wrap;

      const popover = el('div', { class: 'pt-col-popover', onClick: (e) => e.stopPropagation() });
      proj.columns.forEach(opt => {
        const optIsDone = isDoneColumn(proj, opt.id);
        const selected = opt.id === c.column_id;
        popover.appendChild(el('button', {
          class: 'pt-col-opt' + (selected ? ' selected' : '') + (optIsDone ? ' done' : ''),
          onClick: (e) => {
            e.stopPropagation();
            openColumnPopoverCardId = null;
            if (opt.id !== c.column_id) moveCardToColumn(c.id, opt.id);
            else render();
          },
        }, [
          el('span', { class: 'pt-col-opt-dot' + (optIsDone ? ' done' : '') }),
          el('span', { class: 'pt-col-opt-name' }, opt.name),
          selected ? el('span', { class: 'pt-col-opt-check' }, '✓') : null,
        ]));
      });
      wrap.appendChild(popover);
      return wrap;
    }

    function renderProjectTable(body, proj) {
      const everyCard = state.cards.filter(c => c.project_id === proj.id && !c.archived);
      if (everyCard.length === 0) {
        body.appendChild(el('div', { class: 'pt-empty' }, [
          el('div', { style: { marginBottom: '12px' } }, 'No cards yet.'),
          el('button', {
            class: 'text-btn primary',
            onClick: () => addProjectTaskAndEdit(proj),
          }, '+ Add task'),
        ]));
        return;
      }
      const q = projectFilterQuery.trim().toLowerCase();
      const allCards = q
        ? everyCard.filter(c => (c.title || '').toLowerCase().includes(q) || (c.notes || '').toLowerCase().includes(q))
        : everyCard;
      if (allCards.length === 0) {
        body.appendChild(el('div', { class: 'pt-empty' }, 'No cards match "' + projectFilterQuery + '".'));
        return;
      }
      const colById = Object.fromEntries(proj.columns.map(col => [col.id, col]));
      const colOrder = Object.fromEntries(proj.columns.map((col, i) => [col.id, i]));

      const sort = state.ui.project_table_sort || { key: 'column', dir: 'asc' };
      const getSortValue = (c, key) => {
        switch (key) {
          case 'title': return (c.title || '').toLowerCase();
          case 'column': return (colOrder[c.column_id] ?? 99) + '-' + (colById[c.column_id]?.name || '');
          case 'due': return c.due ? resolveDueISO(c.due) || c.due : '\uffff';
          case 'scheduled': return c.scheduled_time || '\uffff';
          case 'duration': return c.duration_minutes || 0;
          case 'subtasks': return (c.subtasks || []).length;
          case 'created': return c.created_at || 0;
          case 'lane': return c.lane === 'ai' ? 0 : c.lane === 'me' ? 1 : 2;
          default: return '';
        }
      };
      const sorted = [...allCards].sort((a, b) => {
        const av = getSortValue(a, sort.key);
        const bv = getSortValue(b, sort.key);
        let cmp = 0;
        if (typeof av === 'number' && typeof bv === 'number') cmp = av - bv;
        else cmp = String(av).localeCompare(String(bv));
        // Tiebreak by column then position so kanban order is preserved within groups.
        if (cmp === 0) {
          cmp = (colOrder[a.column_id] ?? 99) - (colOrder[b.column_id] ?? 99);
          if (cmp === 0) cmp = (a.position || 0) - (b.position || 0);
        }
        return sort.dir === 'desc' ? -cmp : cmp;
      });

      const headerCell = (label, key, extraClass) => {
        const isSorted = sort.key === key;
        return el('th', {
          class: (extraClass || '') + ' sortable' + (isSorted ? ' sorted' : ''),
          onClick: () => setState(s => {
            const cur = s.ui.project_table_sort || { key: 'column', dir: 'asc' };
            if (cur.key === key) cur.dir = cur.dir === 'asc' ? 'desc' : 'asc';
            else { cur.key = key; cur.dir = 'asc'; }
            s.ui.project_table_sort = cur;
          }),
        }, [
          el('span', {}, label),
          isSorted ? el('span', { class: 'sort-arrow' }, sort.dir === 'asc' ? '▲' : '▼') : null,
        ]);
      };

      const thead = el('thead', {}, [
        el('tr', {}, [
          headerCell('Title', 'title'),
          headerCell('Lane', 'lane'),
          headerCell('Column', 'column'),
          headerCell('Due', 'due', 'pt-hide-sm'),
          headerCell('Scheduled', 'scheduled', 'pt-hide-md'),
          headerCell('Dur', 'duration', 'pt-hide-md'),
          headerCell('Sub', 'subtasks', 'pt-hide-md'),
          headerCell('Created', 'created', 'pt-hide-md'),
        ]),
      ]);

      const tbody = el('tbody');
      sorted.forEach(c => {
        const isExpanded = expandedCardId === c.id;
        const col = colById[c.column_id];
        const isDone = col ? isDoneColumn(proj, col.id) : false;
        const subs = c.subtasks || [];
        const subsDone = subs.length ? countSubtaskProgress(subs) : { done: 0, total: 0 };
        const dueLabel = formatDueLabel(c.due);
        const schedLabel = formatScheduledTimeLabel(c.scheduled_time);
        const created = c.created_at ? new Date(c.created_at).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '';

        const titleCell = el('td', {}, [
          el('div', { class: 'pt-title' }, [
            el('span', {}, c.title || '(untitled)'),
          ]),
          c.notes ? el('span', { class: 'pt-notes' }, c.notes.replace(/\s+/g, ' ').trim()) : null,
        ]);

        const row = el('tr', {
          class: (isExpanded ? 'expanded ' : '') + (isDone && !isExpanded ? 'done-row' : ''),
          dataset: { cardId: c.id },
          onClick: (e) => {
            if (e.target.closest('a,button,input,textarea,select,.pt-col-wrap,.pt-lane-pill')) return;
            expandedCardId = isExpanded ? null : c.id;
            expandedItemKey = null;
            openColumnPopoverCardId = null;
            render();
          },
        }, [
          titleCell,
          el('td', {}, buildLanePill(c)),
          el('td', {}, buildColumnPicker(c, proj, colById)),
          el('td', { class: 'pt-hide-sm' }, dueLabel ? el('span', { class: 'pt-cell-muted' }, dueLabel) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, schedLabel ? el('span', { class: 'pt-cell-muted' }, schedLabel) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, c.duration_minutes ? el('span', { class: 'pt-cell-num' }, formatDuration(c.duration_minutes)) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, subs.length ? el('span', { class: 'pt-cell-num' }, subsDone.done + '/' + subsDone.total) : el('span', { class: 'pt-cell-muted' }, '—')),
          el('td', { class: 'pt-hide-md' }, created ? el('span', { class: 'pt-cell-muted' }, created) : el('span', { class: 'pt-cell-muted' }, '—')),
        ]);
        tbody.appendChild(row);

        if (isExpanded) {
          const inner = el('div', { class: 'pt-expanded-inner' });
          inner.addEventListener('click', (e) => e.stopPropagation());
          inner.appendChild(cardEl(c, proj));
          tbody.appendChild(el('tr', { class: 'pt-expanded-row' }, [
            el('td', { colspan: 8 }, inner),
          ]));
        }
      });

      body.appendChild(el('table', { class: 'project-table' }, [thead, tbody]));

      // Inline add-task row at the bottom of the table
      body.appendChild(el('button', {
        class: 'pt-add-row',
        onClick: () => addProjectTaskAndEdit(proj),
      }, '+ Add task'));
    }

    // Create a blank card in the project's first non-Done column and immediately
    // open the edit modal so the user can fill in details + attachments.
    function addProjectTaskAndEdit(proj, targetCol) {
      if (!proj.columns || proj.columns.length === 0) return;
      const col = targetCol || proj.columns.find(c => !isDoneColumn(proj, c.id)) || proj.columns[0];
      const id = uid('card');
      setState(s => {
        const pos = s.cards.filter(c => c.project_id === proj.id && c.column_id === col.id && !c.archived).length;
        s.cards.push({
          id, project_id: proj.id, column_id: col.id, position: pos,
          title: 'New task', notes: '', due: null,
          today_slot: null, today_position: 0, plan_date: null,
          context: proj.context || null, done_at: null, archived: false,
          recurrence: null, created_at: now(),
        });
        logActivity('card_created', 'Added task in ' + proj.name + (col ? ' / ' + col.name : ''), { project_id: proj.id, source_type: 'card', source_id: id, context: proj.context });
      });
      soundAdd();
      // Open the edit modal so the user gets the full form: due, lane, time,
      // duration, links, attachments — not the stripped-down quick-add modal.
      setTimeout(() => openCardEditModal(id), 50);
    }

    function columnEl(proj, col) {
      const allCards = cardsForColumn(proj.id, col.id);
      const q = projectFilterQuery.trim().toLowerCase();
      const cards = q
        ? allCards.filter(c => (c.title || '').toLowerCase().includes(q) || (c.notes || '').toLowerCase().includes(q))
        : allCards;
      const isInfo = isInfoColumn(col);
      const node = el('div', { class: 'column' + (isInfo ? ' info-col' : ''), dataset: { columnId: col.id, projectId: proj.id } });
      const menuWrap = el('div', { class: 'column-menu-wrap' });
      const menuBtn = el('button', {
        class: 'icon-btn', title: 'Column menu',
        onClick: (e) => { e.stopPropagation(); toggleColumnMenu(menuWrap, proj, col); },
      }, '⋯');
      menuWrap.appendChild(menuBtn);

      const header = el('div', { class: 'column-header' }, [
        el('span', {
          class: 'column-title', contenteditable: 'true',
          onBlur: (e) => {
            const v = e.target.textContent.trim();
            if (v && v !== col.name) renameColumn(proj.id, col.id, v);
            else e.target.textContent = col.name;
          },
          onKeydown: (e) => { if (e.key === 'Enter') { e.preventDefault(); e.target.blur(); } },
        }, col.name),
        isInfo ? el('span', { class: 'column-info-badge', title: 'Reference column — cards aren’t tasks' }, 'INFO') : null,
        el('span', { class: 'column-count' }, q && cards.length !== allCards.length ? cards.length + ' / ' + allCards.length : String(allCards.length)),
        menuWrap,
      ].filter(Boolean));
      node.appendChild(header);

      const cardList = el('div', { class: 'column-cards' });
      if (cards.length === 0) cardList.appendChild(el('div', { class: 'col-empty' }, EMPTY_COPY.column));
      else cards.forEach(c => cardList.appendChild(cardEl(c, proj)));
      node.appendChild(cardList);
      node.appendChild(el('button', {
        class: 'col-add-btn',
        onClick: () => addProjectTaskAndEdit(proj, col),
      }, '+ Add card'));
      return node;
    }

    function openNewCardModal(proj, col) {
      let title = '', notes = '', due = null, recurrence = null;
      const titleInput = el('input', { type: 'text', placeholder: 'Task title', onInput: (e) => title = e.target.value,
        onKeydown: (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } } });
      const notesArea = el('textarea', { placeholder: 'Notes (optional)', rows: 2, onInput: (e) => notes = e.target.value, style: { minHeight: '50px' } });
      const dateInput = el('input', { type: 'date', onChange: (e) => { if (e.target.value) { due = e.target.value; refreshDueButtons(); } } });
      const btnNone = el('button', { class: 'due-opt selected', onClick: () => { due = null; dateInput.value = ''; refreshDueButtons(); } }, 'none');
      const btnToday = el('button', { class: 'due-opt', onClick: () => { due = 'today'; dateInput.value = ''; refreshDueButtons(); } }, 'today');
      const btnTomorrow = el('button', { class: 'due-opt', onClick: () => { due = 'tomorrow'; dateInput.value = ''; refreshDueButtons(); } }, 'tomorrow');
      const refreshDueButtons = () => {
        btnNone.classList.toggle('selected', due == null);
        btnToday.classList.toggle('selected', due === 'today');
        btnTomorrow.classList.toggle('selected', due === 'tomorrow');
      };
      const recRow = el('div', { class: 'card-edit-row' });
      const mkRec = (val, label) => {
        const b = el('button', { class: 'due-opt' + (recurrence === val ? ' selected' : ''), onClick: () => {
          recurrence = val;
          recRow.querySelectorAll('.due-opt').forEach(x => x.classList.remove('selected'));
          b.classList.add('selected');
        } }, label);
        return b;
      };
      recRow.appendChild(el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Recurs'));
      recRow.appendChild(mkRec(null, 'never'));
      recRow.appendChild(mkRec('daily', 'daily'));
      recRow.appendChild(mkRec('weekly', 'weekly'));
      recRow.appendChild(mkRec('monthly', 'monthly'));
      // First button "never" starts selected
      recRow.querySelectorAll('.due-opt')[0].classList.add('selected');

      const submit = () => {
        if (!title.trim()) { titleInput.focus(); return; }
        const id = uid('card');
        setState(s => {
          const pos = s.cards.filter(c => c.project_id === proj.id && c.column_id === col.id && !c.archived).length;
          s.cards.push({
            id, project_id: proj.id, column_id: col.id, position: pos,
            title: title.trim(), notes: notes.trim(), due,
            today_slot: null, today_position: 0, plan_date: null,
            context: null, done_at: null, archived: false,
            recurrence, created_at: now(),
          });
          logActivity('card_created', 'Added task "' + title.trim() + '"', { project_id: proj.id, source_type: 'card', source_id: id, context: proj.context });
        });
        soundAdd();
        closeModal();
      };
      openModal([
        el('h3', {}, 'New card in ' + col.name),
        titleInput,
        notesArea,
        el('div', { class: 'card-edit-row' }, [
          el('span', { style: { fontSize: '11px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.05em' } }, 'Due'),
          btnNone, btnToday, btnTomorrow, dateInput,
        ]),
        recRow,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          el('button', { class: 'primary', onClick: submit }, 'Add'),
        ]),

    function duePillEl(due) {

      if (due === 'tomorrow') return el('div', { class: 'card-pill tomorrow' }, 'Tomorrow');

    // ---------- Drag-drop ----------
    function handleCardDrop(evt) {
      const cardId = evt.item.dataset.cardId;
      const targetColumn = evt.to.closest('[data-column-id]');
      const inBank = evt.to.classList.contains('bank-list');
      const fromBank = evt.from.classList.contains('bank-list');
      if (!cardId) return;
      // Within-bank reorder is a no-op: bank is sorted by due/created, not by drag position.
      // Re-render to revert any DOM reorder Sortable made.
      if (inBank && fromBank) { render(); return; }
      setState(s => {
        const c = s.cards.find(x => x.id === cardId);
        if (!c) return;
        const beforePid = c.project_id;
        const beforeCid = c.column_id;
        if (inBank) {
          c.project_id = 'inbox'; c.column_id = null;
          // Dropping into bank = unschedule. Bank is for unscheduled work.
          c.scheduled_time = null;
          c.today_slot = null; c.today_position = 0; c.plan_date = null;
        }
        else if (targetColumn) {
          c.project_id = targetColumn.dataset.projectId;
          c.column_id = targetColumn.dataset.columnId;
        }
        const siblings = [...evt.to.children].map(n => n.dataset.cardId).filter(Boolean);
        siblings.forEach((id, i) => {
          const cc = s.cards.find(x => x.id === id);
          if (cc) cc.position = i;
        });
        // Track done_at and log card_done if moved into a "Done" column
        if (c.project_id !== 'inbox' && c.column_id && (beforeCid !== c.column_id || beforePid !== c.project_id)) {
          const p = s.projects.find(x => x.id === c.project_id);
          if (p && isDoneColumn(p, c.column_id)) {
            c.done_at = now();
            logActivity('card_done', 'Completed "' + c.title + '"', { project_id: p.id, source_type: 'card', source_id: c.id, context: p.context });
            setTimeout(soundDone, 0);
            // Spawn a fresh copy for recurring cards
            if (c.recurrence) {
              const firstNonDone = p.columns.find(col => !isDoneColumn(p, col.id));
              if (firstNonDone) {
                const pos = s.cards.filter(x => x.project_id === p.id && x.column_id === firstNonDone.id && !x.archived).length;
                const clone = {
                  id: uid('card'), project_id: p.id, column_id: firstNonDone.id,
                  position: pos, title: c.title, notes: c.notes, due: null,
                  today_slot: null, today_position: 0, plan_date: null,
                  context: null, done_at: null, archived: false,
                  recurrence: c.recurrence, created_at: now(),
                };
                s.cards.push(clone);
                logActivity('card_created', 'Recurring "' + c.title + '" spawned (' + c.recurrence + ')', { project_id: p.id, source_type: 'card', source_id: clone.id, context: p.context });
              }
            }
          } else {
            if (c.done_at) c.done_at = null;
          }
        } else if (c.project_id === 'inbox') {
          c.done_at = null;
        }
      });
    }

    function setupFileDrop(container, ownerType, ownerId) {
      container.addEventListener('dragover', (e) => { e.preventDefault(); container.classList.add('drag-over'); });
      container.addEventListener('dragleave', (e) => { if (e.target === container) container.classList.remove('drag-over'); });
      container.addEventListener('drop', (e) => {
        e.preventDefault(); container.classList.remove('drag-over');
        if (!e.dataTransfer.files || e.dataTransfer.files.length === 0) return;
        for (const f of e.dataTransfer.files) addFile(ownerType, ownerId, f);
      });
    }

    // Attach a document-level paste handler that captures image clipboard items
    // and routes them to addFile(ownerType, ownerId). Text paste still works
    // normally (we only preventDefault when an image was found). Self-cleans
    // when `container` is removed from the DOM (e.g. modal closes).
    function setupFilePaste(container, ownerType, ownerId, onAdd) {
      const handler = (e) => {
        if (!container.isConnected) {
          document.removeEventListener('paste', handler);
          return;
        }
        if (!e.clipboardData || !e.clipboardData.items) return;
        const imageItems = Array.from(e.clipboardData.items)
          .filter(it => it.kind === 'file' && /^image\//.test(it.type));
        if (imageItems.length === 0) return;
        e.preventDefault();
        for (const it of imageItems) {
          const blob = it.getAsFile();
          if (!blob) continue;
          const ext = (blob.type.split('/')[1] || 'png').replace(/[^a-z0-9]/g, '');
          const stamp = new Date().toISOString().replace(/[-:T.]/g, '').slice(0, 14);
          const named = new File([blob], 'pasted-' + stamp + '.' + ext, { type: blob.type });
          addFile(ownerType, ownerId, named);
        }
        if (typeof onAdd === 'function') setTimeout(onAdd, 120);
      };
      document.addEventListener('paste', handler);
    }

    // ---------- Just Did: log completions inline on Today ----------
    function renderJustDidBlock() {
      const today = todayISO();
      const wins = state.cards.filter(c => {
        if (!c.done_at) return false;
        if (localDateOfISO(c.done_at) !== today) return false;
        if (!contextMatches(contextOf(c, 'card'))) return false;
        return true;
      }).sort((a, b) => (b.done_at || '').localeCompare(a.done_at || ''));

      const wrap = el('div', { class: 'just-did-wrap' });

      wrap.appendChild(el('div', { class: 'plan-section-title' }, [
        el('span', {}, 'Just Did'),
        el('span', { class: 'count' }, wins.length + ' today'),
      ]));

      const matches = el('div', { class: 'just-did-matches' });
      let highlighted = -1;
      let currentMatches = [];

      const input = el('input', {
        type: 'text',
        class: 'just-did-input',
        placeholder: 'What did you do? Type to match a task or create one already done.',
      });

      function updateMatches(query) {
        const q = (query || '').trim().toLowerCase();
        if (q.length < 2) {
          currentMatches = []; highlighted = -1;
          renderMatches();
          return;
        }
        currentMatches = state.cards.filter(c => {
          if (c.archived || c.done_at) return false;
          if (!contextMatches(contextOf(c, 'card'))) return false;
          return (c.title || '').toLowerCase().includes(q);
        }).slice(0, 5);
        highlighted = currentMatches.length > 0 ? 0 : -1;
        renderMatches();
      }

      function renderMatches() {
        clearNode(matches);
        currentMatches.forEach((c, i) => {
          const proj = c.project_id !== 'inbox' ? projectById(c.project_id) : null;
          matches.appendChild(el('div', {
            class: 'just-did-match' + (i === highlighted ? ' active' : ''),
            onClick: (e) => { e.preventDefault(); submit(input.value, c); },
          }, [
            el('span', { class: 'just-did-match-title' }, c.title),
            proj ? el('span', { class: 'just-did-match-proj' }, proj.name) : null,
          ]));
        });
        const q = input.value.trim();
        if (q.length >= 2 && currentMatches.length === 0) {
          matches.appendChild(el('div', {
            class: 'just-did-match new',
            onClick: (e) => { e.preventDefault(); submit(q, null); },
          }, [
            el('span', { class: 'just-did-match-new-icon' }, '+'),
            el('span', {}, 'Create "' + q + '" — already done'),
          ]));
        }
      }

      function submit(text, matchedCard) {
        text = (text || '').trim();
        if (!text && !matchedCard) return;
        if (matchedCard) {
          toggleCardDone(matchedCard.id);
        } else {
          createDoneCard(text);
        }
      }

      input.addEventListener('input', (e) => updateMatches(e.target.value));
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          if (highlighted >= 0 && currentMatches[highlighted]) {
            submit(input.value, currentMatches[highlighted]);
          } else {
            submit(input.value, null);
          }
        } else if (e.key === 'ArrowDown') {
          e.preventDefault();
          highlighted = Math.min(highlighted + 1, currentMatches.length - 1);
          renderMatches();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          highlighted = Math.max(highlighted - 1, -1);
          renderMatches();
        } else if (e.key === 'Escape') {
          input.value = '';
          currentMatches = []; highlighted = -1;
          renderMatches();
        }
      });

      wrap.appendChild(el('div', { class: 'just-did-input-wrap' }, [input, matches]));

      if (wins.length > 0) {
        const winsList = el('div', { class: 'just-did-wins' });
        wins.forEach(c => winsList.appendChild(winRowEl(c)));
        wrap.appendChild(winsList);
      }

      return wrap;
    }

    function winRowEl(c) {
      const timeLabel = c.done_at
        ? new Date(c.done_at).toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' })
        : '';
      const proj = c.project_id !== 'inbox' ? projectById(c.project_id) : null;
      return el('div', {
        class: 'just-did-win',
        onClick: () => openCardEditModal(c.id),
      }, [
        el('span', { class: 'just-did-win-check' }, '✓'),
        el('span', { class: 'just-did-win-title' }, c.title),
        proj ? el('span', { class: 'just-did-win-proj' }, proj.name) : null,
        timeLabel ? el('span', { class: 'just-did-win-time' }, timeLabel) : null,
        el('button', {
          class: 'just-did-win-undo',
          title: 'Undo',
          onClick: (e) => { e.stopPropagation(); toggleCardDone(c.id); },
        }, '×'),
      ]);
    }

    function createDoneCard(title) {
      setState(s => {
        // If currently on a project view, drop into its Done column (if it exists)
        const activeProj = s.projects.find(p => p.id === s.ui.active_view);
        let projectId = 'inbox';
        let columnId = null;
        if (activeProj && activeProj.columns && activeProj.columns.length) {
          const doneCol = activeProj.columns.find(col => /done|complete|finished|shipped/i.test(col.name));
          if (doneCol) {
            projectId = activeProj.id;
            columnId = doneCol.id;
          }
        }
        const ctx = s.ui.context_filter !== 'all' ? s.ui.context_filter : (activeProj ? activeProj.context : null);
        const card = {
          id: uid('card'),
          project_id: projectId,
          column_id: columnId,
          position: s.cards.filter(x => x.project_id === projectId && x.column_id === columnId).length,
          title: title,
          notes: '',
          due: null,
          today_slot: null, today_position: 0, plan_date: null,
          context: ctx,
          done_at: now(),
          archived: projectId === 'inbox',
          recurrence: null,
          created_at: now(),
          source: { kind: 'just-did' },
        };
        // If no Done column was found, also stamp scheduled_time so it shows on today's audit trail
        if (projectId === 'inbox') {
          const n = new Date();
          const hh = String(n.getHours()).padStart(2, '0');
          const mm = String(Math.floor(n.getMinutes() / 15) * 15).padStart(2, '0');
          card.scheduled_time = todayISO() + 'T' + hh + ':' + mm + ':00';
          card.duration_minutes = 15;
          card._auto_scheduled = true;
        }
        s.cards.push(card);
        logActivity('card_done', 'Logged "' + title + '"', {
          project_id: projectId === 'inbox' ? null : projectId,
          source_type: 'card', source_id: card.id, context: ctx,
        });
      });
      setTimeout(soundDone, 0);
    }

    // ---------- Bulk-log completions for a project ----------
    // Token-overlap match — robust against word reorder, minor edits.
    function tokenize(s) {
      return (s || '').toLowerCase()
        .replace(/[^a-z0-9\s]/g, ' ')
        .split(/\s+/)
        .filter(t => t.length >= 3);
    }
    function findBestCardMatch(query, candidates) {
      const qTokens = tokenize(query);
      if (qTokens.length === 0) return null;
      const qSet = new Set(qTokens);
      let best = null, bestScore = 0;
      for (const c of candidates) {
        const cTokens = tokenize(c.title);
        if (cTokens.length === 0) continue;
        const shared = cTokens.filter(t => qSet.has(t)).length;
        if (shared === 0) continue;
        // Jaccard-ish: shared / max(len) — favors high overlap regardless of order
        const score = shared / Math.max(qTokens.length, cTokens.length);
        // Substring boost — exact substring match is a strong signal
        const subBoost = c.title.toLowerCase().includes(query.toLowerCase().trim()) ? 0.3 : 0;
        const finalScore = score + subBoost;
        if (finalScore > bestScore) { bestScore = finalScore; best = c; }
      }
      // Threshold: require at least 50% token overlap OR substring match
      return bestScore >= 0.5 ? { card: best, score: bestScore } : null;
    }

    // Parse "TASK — 4/27/2026 9:30am" / "TASK at 9:30am" / "9am TASK"
    // Returns { text, time: { h, m } | null, date: { y, m, d } | null }.
    // Bare numbers without minutes or am/pm are NOT treated as times (too ambiguous).
    function parseLineWithTime(line) {
      let text = (line || '').replace(/^(?:[\-\*•>]+|\d{1,2}[.\)])\s+/, '').trim();
      if (!text) return { text: '', time: null, date: null };
      const applyTime = (h, mm, ap) => {
        h = parseInt(h, 10);
        const m = mm ? parseInt(mm, 10) : 0;
        if (!mm && !ap) return null;
        if (isNaN(h) || h > 23 || m > 59) return null;
        if (ap) {
          const apl = ap.toLowerCase();
          if ((apl === 'p' || apl === 'pm') && h < 12) h += 12;
          if ((apl === 'a' || apl === 'am') && h === 12) h = 0;
        }
        return { h, m };
      };
      const applyDate = (mo, d, y) => {
        mo = parseInt(mo, 10);
        d = parseInt(d, 10);
        if (!y) y = new Date().getFullYear();
        else { y = parseInt(y, 10); if (y < 100) y += 2000; }
        if (isNaN(mo) || mo < 1 || mo > 12) return null;
        if (isNaN(d) || d < 1 || d > 31) return null;
        if (isNaN(y) || y < 1970 || y > 2100) return null;
        return { y, m: mo, d };
      };

      // "TASK [— | at | @ | by | on] M/D[/YYYY] TIME"
      let m = text.match(/^(.+?)\s+(?:[@\-—–]\s*|at\s+|by\s+|on\s+)?(\d{1,2})[\/\-](\d{1,2})(?:[\/\-](\d{2,4}))?\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm|a|p)?\s*\.?\s*$/i);
      if (m) {
        const t = applyTime(m[5], m[6], m[7]);
        const d = applyDate(m[2], m[3], m[4]);
        if (t && d && m[1].trim()) return { text: m[1].trim(), time: t, date: d };
      }
      // "TASK [— | at | @ | by | on] YYYY-MM-DD TIME" (ISO date)
      m = text.match(/^(.+?)\s+(?:[@\-—–]\s*|at\s+|by\s+|on\s+)?(\d{4})-(\d{1,2})-(\d{1,2})\s+(\d{1,2})(?::(\d{2}))?\s*(am|pm|a|p)?\s*\.?\s*$/i);
      if (m) {
        const t = applyTime(m[5], m[6], m[7]);
        const d = applyDate(m[3], m[4], m[2]);
        if (t && d && m[1].trim()) return { text: m[1].trim(), time: t, date: d };
      }
      // Time-only: "TASK [— | at | @ | by] TIME" (today)
      m = text.match(/^(.+?)\s+(?:[@\-—–]\s*|at\s+|by\s+)?(\d{1,2})(?::(\d{2}))?\s*(am|pm|a|p)?\s*\.?\s*$/i);
      if (m) {
        const t = applyTime(m[2], m[3], m[4]);
        if (t && m[1].trim()) return { text: m[1].trim(), time: t, date: null };
      }
      // "TIME TASK"
      m = text.match(/^(\d{1,2})(?::(\d{2}))?\s*(am|pm|a|p)?\s+(?:[\-—–]\s+)?(.+)$/i);
      if (m) {
        const t = applyTime(m[1], m[2], m[3]);
        if (t && m[4].trim()) return { text: m[4].trim(), time: t, date: null };
      }
      return { text, time: null, date: null };
    }

    function formatLogTime(t, dt) {
      if (!t) return '';
      const d = dt
        ? new Date(dt.y, dt.m - 1, dt.d, t.h, t.m, 0, 0)
        : (() => { const x = new Date(); x.setHours(t.h, t.m, 0, 0); return x; })();
      const isToday = d.toDateString() === new Date().toDateString();
      const timeStr = d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
      if (isToday) return timeStr;
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' · ' + timeStr;
    }

    function openProjectBulkLogModal(proj) {
      const candidates = state.cards.filter(c => c.project_id === proj.id && !c.archived && !c.done_at);
      const doneCol = proj.columns.find(col => /done|complete|finished|shipped/i.test(col.name));
      const doneColName = doneCol ? doneCol.name : null;

      const textarea = el('textarea', {
        rows: 10,
        placeholder: 'Set up the Azure AD app at 8:30am\nUpdated the README — 4/27/2026 11am\nReviewed Q3 budget — 4/28 2:30pm\nLunch with Mary on 2026-04-29 12:45pm\nNo date? Today. No time? Right now.',
        style: {
          width: '100%', minHeight: '180px',
          fontFamily: 'inherit', fontSize: '13px', lineHeight: '1.55',
          padding: '10px 12px',
          background: 'var(--card)', border: '1px solid var(--border)',
          borderRadius: '8px', color: 'var(--text-primary)', resize: 'vertical',
        },
      });

      const previewBox = el('div', {
        style: {
          maxHeight: '260px', overflowY: 'auto',
          padding: '10px', borderRadius: '8px',
          background: 'var(--surface-sub)', border: '1px solid var(--border)',
        },
      });

      const applyBtn = el('button', { class: 'primary', disabled: true }, 'Apply');

      // Per-line state with skip toggle
      let rows = [];

      const renderPreview = () => {
        clearNode(previewBox);
        const active = rows.filter(r => !r.skip);
        const matchCount = active.filter(r => r.match).length;
        const newCount = active.filter(r => !r.match).length;

        if (rows.length === 0) {
          previewBox.appendChild(el('div', {
            style: { color: 'var(--text-tertiary)', fontStyle: 'italic', fontSize: '12px' },
          }, 'Paste a list above. Each line becomes one completion.'));
          applyBtn.disabled = true;
          applyBtn.textContent = 'Apply';
          return;
        }

        previewBox.appendChild(el('div', {
          style: { fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '8px', fontWeight: '600', fontFamily: 'JetBrains Mono, monospace' },
        }, 'Will complete ' + matchCount + ', create ' + newCount + (doneColName ? ' in ' + doneColName : ' as archived')));

        rows.forEach((r, idx) => {
          const isMatch = !!r.match;
          const isSkip = r.skip;
          const node = el('div', {
            style: {
              display: 'flex', gap: '8px', alignItems: 'flex-start',
              padding: '8px 10px', marginBottom: '4px',
              background: isSkip ? 'transparent' : 'var(--card)',
              border: '1px solid ' + (isSkip ? 'var(--border)' : (isMatch ? 'rgba(34, 197, 94, 0.3)' : 'rgba(124, 58, 237, 0.3)')),
              borderRadius: '6px',
              opacity: isSkip ? 0.4 : 1,
              fontSize: '12px',
            },
          });
          // Skip toggle
          const skipBtn = el('button', {
            style: { width: '20px', height: '20px', borderRadius: '4px', background: 'transparent', border: '1px solid var(--border)', color: 'var(--text-tertiary)', flexShrink: '0', cursor: 'pointer', fontSize: '12px' },
            title: isSkip ? 'Include' : 'Skip',
            onClick: () => { rows[idx].skip = !isSkip; renderPreview(); },
          }, isSkip ? '○' : '✓');
          node.appendChild(skipBtn);
          // Status icon + text
          const tag = isMatch
            ? el('span', { style: { color: '#22c55e', fontWeight: '700', fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', flexShrink: '0' } }, 'MATCH')
            : el('span', { style: { color: '#a78bfa', fontWeight: '700', fontFamily: 'JetBrains Mono, monospace', fontSize: '11px', flexShrink: '0' } }, 'NEW');
          node.appendChild(tag);
          const body = el('div', { style: { flex: '1', minWidth: '0' } });
          body.appendChild(el('div', {}, r.text));
          // Time chip — show parsed completion time (and date if not today) if any
          if (r.time) {
            body.appendChild(el('div', {
              style: { fontSize: '10px', color: '#22c55e', fontFamily: 'JetBrains Mono, monospace', marginTop: '2px' },
            }, '🕓 ' + formatLogTime(r.time, r.date)));
          }
          if (isMatch) {
            body.appendChild(el('div', {
              style: { fontSize: '10px', color: 'var(--text-tertiary)', fontFamily: 'JetBrains Mono, monospace', marginTop: '2px' },
            }, '→ ' + r.match.card.title + ' · ' + Math.round(r.match.score * 100) + '%'));
          }
          node.appendChild(body);
          previewBox.appendChild(node);
        });

        applyBtn.disabled = (matchCount + newCount) === 0;
        applyBtn.textContent = (matchCount + newCount) > 0
          ? 'Apply (' + (matchCount + newCount) + ')'
          : 'Apply';
      };

      const updateFromText = () => {
        const lines = textarea.value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
        rows = lines.map(line => {
          const { text, time, date } = parseLineWithTime(line);
          return {
            text,
            time,
            date,
            match: findBestCardMatch(text, candidates),
            skip: false,
          };
        }).filter(r => r.text);
        renderPreview();
      };

      textarea.addEventListener('input', updateFromText);

      applyBtn.addEventListener('click', () => {
        const active = rows.filter(r => !r.skip);
        if (active.length === 0) return;
        if (!confirm('Apply ' + active.length + ' completion' + (active.length === 1 ? '' : 's') + ' to ' + proj.name + '?\n\nIndividual cards stay in ' + (doneColName || 'archive') + '. The schedule gets one summary card with each completion as a subtask.')) return;

        setState(s => {
          const todayStr = todayISO();
          // Builds an ISO done_at + scheduled_time pair anchored to r.date (or today)
          // and r.time (or current time). scheduled_time is local-no-TZ format per
          // the schedule's existing convention; done_at is a real ISO timestamp.
          const stampFor = (r) => {
            if (r.time) {
              const dt = r.date || (() => { const x = new Date(); return { y: x.getFullYear(), m: x.getMonth() + 1, d: x.getDate() }; })();
              const dateISO = String(dt.y) + '-' + String(dt.m).padStart(2, '0') + '-' + String(dt.d).padStart(2, '0');
              const hh = String(r.time.h).padStart(2, '0');
              const mm = String(r.time.m).padStart(2, '0');
              const localISO = dateISO + 'T' + hh + ':' + mm + ':00';
              const d = new Date(dt.y, dt.m - 1, dt.d, r.time.h, r.time.m, 0, 0);
              return { done_at: d.toISOString(), scheduled_time: localISO };
            }
            const d = new Date();
            const hh = String(d.getHours()).padStart(2, '0');
            const mm = String(d.getMinutes()).padStart(2, '0');
            return { done_at: now(), scheduled_time: todayStr + 'T' + hh + ':' + mm + ':00' };
          };
          // Track which existing cards have been matched in this batch (avoid double-matching)
          const usedIds = new Set();
          // Collect data for the summary card so the schedule shows one entry, not N
          const subtasks = [];
          let earliestSched = null;
          let earliestDoneAt = null;
          active.forEach(r => {
            const stamp = stampFor(r);
            // Track earliest stamp for the summary card's anchor on the schedule
            if (!earliestSched || stamp.scheduled_time < earliestSched) earliestSched = stamp.scheduled_time;
            if (!earliestDoneAt || stamp.done_at < earliestDoneAt) earliestDoneAt = stamp.done_at;
            // Subtask label includes time for traceability — the original line text already
            // tends to carry the time the user typed; keep r.text intact so context survives.
            subtasks.push({ id: uid('st'), title: r.text, done: true, subtasks: [] });

            if (r.match && !usedIds.has(r.match.card.id)) {
              usedIds.add(r.match.card.id);
              const c = s.cards.find(x => x.id === r.match.card.id);
              if (!c) return;
              c.done_at = stamp.done_at;
              // Per user request: don't put individual completions on the schedule.
              // The summary card (created below) is the single schedule entry.
              if (doneCol) {
                c.column_id = doneCol.id;
                c.position = s.cards.filter(x => x.project_id === proj.id && x.column_id === doneCol.id).length;
              } else {
                c.archived = true;
              }
              logActivity('card_done', 'Completed "' + c.title + '"', { project_id: proj.id, source_type: 'card', source_id: c.id, context: proj.context });
            } else {
              // Create new card already done — no scheduled_time so it stays out of the schedule
              const targetCol = doneCol || proj.columns[proj.columns.length - 1];
              const card = {
                id: uid('card'),
                project_id: proj.id,
                column_id: targetCol ? targetCol.id : null,
                position: s.cards.filter(x => x.project_id === proj.id && x.column_id === (targetCol ? targetCol.id : null)).length,
                title: r.text,
                notes: '',
                due: null,
                today_slot: null, today_position: 0, plan_date: null,
                context: proj.context,
                done_at: stamp.done_at,
                archived: !doneCol,
                recurrence: null,
                created_at: now(),
                scheduled_time: null,
                duration_minutes: null,
                source: { kind: 'bulk-log' },
              };
              s.cards.push(card);
              logActivity('card_done', 'Logged "' + r.text + '"', { project_id: proj.id, source_type: 'card', source_id: card.id, context: proj.context });
            }
          });

          // Summary card — single entry on the schedule with each completion as a subtask.
          // Marked archived so it doesn't pollute the project's Done column; the schedule
          // still surfaces it for its scheduled day via scheduledOnDate's archived+done_at
          // special case, then it disappears once the day flips.
          if (subtasks.length > 0) {
            const summaryCard = {
              id: uid('card'),
              project_id: proj.id,
              column_id: null,
              position: 0,
              title: proj.name + ' — Bulk Completion (' + subtasks.length + ')',
              notes: '',
              due: null,
              today_slot: null, today_position: 0, plan_date: null,
              context: proj.context,
              done_at: earliestDoneAt,
              archived: true,
              recurrence: null,
              created_at: now(),
              scheduled_time: earliestSched,
              duration_minutes: Math.min(120, Math.max(15, subtasks.length * 5)),
              _auto_scheduled: true,
              subtasks,
              source: { kind: 'bulk-log-summary', count: subtasks.length },
            };
            s.cards.push(summaryCard);
          }
        });
        setTimeout(soundDone, 0);
        closeModal();
      });

      const subhead = (doneColName
        ? 'Cards will move to "' + doneColName + '" or be created there. '
        : 'No "Done" column found — completions will be archived. ')
        + 'Add a date and/or time on each line ("4/27/2026 9:30am", "at 9:30am", "9am ...") and the schedule stamp matches. Defaults: today, now.';

      openModal([
        el('h3', {}, 'Bulk log completions · ' + proj.name),
        el('div', {
          style: { fontSize: '12px', color: 'var(--text-tertiary)', marginBottom: '10px', fontStyle: 'italic' },
        }, subhead),
        el('div', { class: 'modal-label' }, 'Paste a list of things you did (one per line)'),
        textarea,
        el('div', { class: 'modal-label', style: { marginTop: '12px' } }, 'Preview'),
        previewBox,
        el('div', { class: 'modal-actions' }, [
          el('button', { onClick: closeModal }, 'Cancel'),
          applyBtn,
        ]),
      ]);
      setTimeout(() => textarea.focus(), 50);
      renderPreview();
    }

    // ---------- Right rail ----------

      const view = state.ui.active_view;

            delay: 120, delayOnTouchOnly: true, touchStartThreshold: 5, fallbackOnBody: true,

    function renderMiniTodayList() {
      const today = todayISO();
      const tomorrow = tomorrowISO();
      const ctxOk = (c) => contextMatches(contextOf(c, 'card'));
      const isDueTomorrow = (c) => c.due === 'tomorrow' || c.due === tomorrow;
      const plannerCards = [];
      const otherDueCards = state.cards.filter(c => {
        if (c.archived && !c.done_at) return false;
        if (c.archived && c.done_at && localDateOfISO(c.done_at) !== today) return false;
        if (!ctxOk(c)) return false;
        return isDueToday(c);
      });
      const tomorrowCards = state.cards.filter(c => {
        if (c.archived) return false;
        if (!ctxOk(c)) return false;
        return isDueTomorrow(c);
      });
      const todayAll = [...plannerCards, ...otherDueCards];
      const doneCount = todayAll.filter(c => c.done_at).length;

      const panel = el('div', { class: 'rail-panel' });
      panel.appendChild(el('div', { class: 'rail-panel-head' }, [
        el('div', { class: 'rail-panel-title' }, 'Today'),
        todayAll.length > 0 ? el('span', {
          style: { fontSize: '10px', padding: '2px 6px', borderRadius: '4px',
            background: 'linear-gradient(135deg, var(--accent-from), var(--accent-to))',
            color: 'white', fontWeight: '600', fontFamily: 'JetBrains Mono, monospace' },
        }, doneCount + ' / ' + todayAll.length) : null,
      ]));
      if (todayAll.length === 0) {
        panel.appendChild(el('div', { class: 'files-empty', style: { padding: '10px', fontSize: '12px' } }, 'No tasks for today yet.'));
      } else {
        const list = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px' } });
        todayAll.forEach(c => list.appendChild(miniTodayRowEl(c)));
        panel.appendChild(list);
      }
      if (tomorrowCards.length) {
        panel.appendChild(el('div', {
          style: { fontSize: '10px', fontFamily: 'JetBrains Mono, monospace', textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--text-tertiary)', marginTop: '10px', marginBottom: '4px' },
        }, 'Tomorrow · ' + tomorrowCards.length));
        const tlist = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '2px' } });
        tomorrowCards.forEach(c => tlist.appendChild(miniTodayRowEl(c)));
        panel.appendChild(tlist);
      }
      return panel;
    }

    // ---------- Today view: at-a-glance Pulse panels ----------
    function pulsePanelHead(title, count, accentColor) {

          background: accentColor || 'var(--overlay)',

    function relativeDayLabel(daysSince) {
      if (daysSince === 0) return 'today';
      if (daysSince === 1) return 'yesterday';
      if (daysSince < 30) return daysSince + 'd ago';
      if (daysSince < 365) return Math.floor(daysSince / 30) + 'mo ago';
      return Math.floor(daysSince / 365) + 'y ago';
    }

    function renderProjectsPulsePanel() {
      const projects = visibleActiveProjects();
      const panel = el('div', { class: 'rail-panel pulse-panel' });
      panel.appendChild(pulsePanelHead('Projects', projects.length));

      if (projects.length === 0) {
        panel.appendChild(el('div', { class: 'pulse-empty' }, 'No projects yet. Or your ambitions are undocumented.'));
        return panel;
      }

      const enriched = projects.map(p => {
        const cards = state.cards.filter(c => c.project_id === p.id);
        const open = cards.filter(c => !c.archived && !c.done_at).length;
        const lastDoneMs = cards
          .filter(c => c.done_at)
          .map(c => new Date(c.done_at).getTime())
          .reduce((a, b) => Math.max(a, b), 0);
        const doneThisWeek = cards.filter(c => {
          if (!c.done_at) return false;
          return (Date.now() - new Date(c.done_at).getTime()) / 86400000 < 7;
        }).length;
        const daysSince = lastDoneMs ? Math.floor((Date.now() - lastDoneMs) / 86400000) : null;

        let status, statusClass;
        if (open === 0) { status = 'Empty'; statusClass = 'empty'; }
        else if (daysSince === null) { status = 'New'; statusClass = 'active'; }
        else if (daysSince <= 3) { status = 'Active'; statusClass = 'active'; }
        else if (daysSince <= 14) { status = 'Stalled'; statusClass = 'stalled'; }
        else { status = 'Dormant'; statusClass = 'dormant'; }

        return { p, open, doneThisWeek, daysSince, status, statusClass };
      }).sort((a, b) => {
        const order = { active: 0, stalled: 1, dormant: 2, empty: 3 };
        if (order[a.statusClass] !== order[b.statusClass]) return order[a.statusClass] - order[b.statusClass];
        return b.open - a.open;
      });

      const list = el('div', { class: 'pulse-list' });
      enriched.forEach(({ p, open, doneThisWeek, daysSince, status, statusClass }) => {
        const accent = p.accent || { from: '#a855f7', to: '#ec4899' };
        const lastLabel = daysSince === null ? 'untouched' : relativeDayLabel(daysSince);

        list.appendChild(el('div', {
          class: 'pulse-row',
          onClick: () => { setState(s => { s.ui.active_view = p.id; }); },
        }, [
          el('div', { class: 'pulse-row-accent', style: {
            background: 'linear-gradient(180deg, ' + accent.from + ', ' + accent.to + ')' } }),
          el('div', { class: 'pulse-row-body' }, [
            el('div', { class: 'pulse-row-title' }, p.name),
            el('div', { class: 'pulse-row-meta' }, [
              el('span', { class: 'pulse-pill ' + statusClass }, status),
              el('span', {}, open + ' open'),
              doneThisWeek > 0 ? el('span', {}, '· ' + doneThisWeek + '/wk done') : null,
              el('span', { style: { marginLeft: 'auto' } }, lastLabel),
            ]),
          ]),
        ]));
      });
      panel.appendChild(list);
      return panel;
    }

    function renderNeedsAttentionPanel() {
      const today = todayISO();
      const todayMs = new Date(today + 'T00:00:00').getTime();

      const overdue = state.cards.filter(c => {
        if (c.archived || c.done_at) return false;
        if (!contextMatches(contextOf(c, 'card'))) return false;
        if (!c.due || c.due === 'today' || c.due === 'tomorrow') return false;
        if (!/^\d{4}-\d{2}-\d{2}$/.test(c.due)) return false;
        const dueMs = new Date(c.due + 'T00:00:00').getTime();
        return !isNaN(dueMs) && dueMs < todayMs;
      }).map(c => ({
        card: c,
        daysLate: Math.floor((todayMs - new Date(c.due + 'T00:00:00').getTime()) / 86400000),
      })).sort((a, b) => b.daysLate - a.daysLate);

      const stale = state.cards.filter(c => {
        if (c.project_id !== 'inbox' || c.archived || c.done_at) return false;
        if (!contextMatches(c.context)) return false;
        if (!c.created_at) return false;
        const ageDays = (Date.now() - new Date(c.created_at).getTime()) / 86400000;
        return ageDays >= 14;
      }).map(c => ({
        card: c,
        daysLate: Math.floor((Date.now() - new Date(c.created_at).getTime()) / 86400000),
      })).sort((a, b) => b.daysLate - a.daysLate);

      const total = overdue.length + stale.length;
      const panel = el('div', { class: 'rail-panel pulse-panel' });
      panel.appendChild(pulsePanelHead('Needs Attention', total, total > 0 ? 'rgba(239, 68, 68, 0.85)' : null));

      if (total === 0) {
        panel.appendChild(el('div', { class: 'pulse-empty' }, 'Nothing slipping. Suspicious.'));
        return panel;
      }

      const list = el('div', { class: 'pulse-list' });
      const overdueShown = overdue.slice(0, 8);
      overdueShown.forEach(({ card, daysLate }) => {
        const proj = card.project_id !== 'inbox' ? projectById(card.project_id) : null;
        list.appendChild(attentionRowEl(card, daysLate + 'd late', proj));
      });
      if (overdue.length > overdueShown.length) {
        list.appendChild(el('div', { class: 'pulse-more' }, '+' + (overdue.length - overdueShown.length) + ' more overdue'));
      }

      if (stale.length) {
        list.appendChild(el('div', { class: 'pulse-section-label' }, 'Bank rot · ' + stale.length));
        stale.slice(0, 5).forEach(({ card, daysLate }) => {
          list.appendChild(attentionRowEl(card, daysLate + 'd in bank', null));
        });
      }

      panel.appendChild(list);
      return panel;
    }

    function formatDueLabel(due) {
      if (!due) return '';
      if (due === 'today') return 'Today';
      if (due === 'tomorrow') return 'Tomorrow';
      if (!/^\d{4}-\d{2}-\d{2}$/.test(due)) return '';
      if (due === todayISO()) return 'Today';
      if (due === tomorrowISO()) return 'Tomorrow';
      return new Date(due + 'T00:00:00').toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
    }

    function formatScheduledTimeLabel(scheduled_time) {
      if (!scheduled_time) return '';
      const m = scheduled_time.match(/T(\d{2}):(\d{2})/);
      if (!m) return '';
      const h = parseInt(m[1], 10);
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12 = (h % 12) || 12;
      return h12 + ':' + m[2] + ' ' + ampm;
    }

    function composeScheduledTime(due, timeHHMM) {
      if (!timeHHMM || !/^\d{2}:\d{2}$/.test(timeHHMM)) return null;
      const dateISO = resolveDueISO(due);
      if (!dateISO) return null;
      return dateISO + 'T' + timeHHMM + ':00';
    }

    function extractTimeHHMM(scheduled_time) {
      if (!scheduled_time) return '';
      const m = scheduled_time.match(/T(\d{2}):(\d{2})/);
      return m ? m[1] + ':' + m[2] : '';
    }

    function openCalendarImportModal(sourceId) {
      const source = (state.ui.calendar_sources || []).find(s => s.id === sourceId);
      if (!source) { alert('Calendar source not found.'); return; }
      let stage = 'loading';
      let events = [];
      let selection = [];
      let errorMsg = '';

      const modal = el('div', { class: 'modal', style: { maxWidth: '680px' } });
      const backdrop = el('div', { class: 'modal-backdrop' });
      backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
      backdrop.appendChild(modal);
      const modals = document.getElementById('modals');
      clearNode(modals); modals.appendChild(backdrop);

      const rebuild = () => {
        clearNode(modal);
        modal.appendChild(el('h3', {}, 'Pull from calendar — ' + source.name));
        if (stage === 'loading') {
          modal.appendChild(el('p', { style: { color: 'var(--text-tertiary)' } }, 'Fetching events from Microsoft Graph…'));
          return;
        }
        if (stage === 'error') {
          modal.appendChild(el('p', { style: { color: '#f43f5e', fontFamily: 'JetBrains Mono, monospace', fontSize: '12px' } }, errorMsg));
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Close'),
            el('button', { class: 'primary', onClick: () => loadEvents() }, 'Retry'),
          ]));
          return;
        }
        if (stage === 'review') {
          if (events.length === 0) {
            modal.appendChild(el('p', { style: { color: 'var(--text-tertiary)' } }, 'No events in the selected range.'));
            modal.appendChild(el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Close')]));
            return;
          }
          modal.appendChild(el('p', { style: { fontSize: '12px', color: 'var(--text-tertiary)' } }, events.length + ' event' + (events.length === 1 ? '' : 's') + ' found. Uncheck anything you don\'t want imported.'));
          const list = el('div', { style: { display: 'flex', flexDirection: 'column', gap: '6px', maxHeight: '400px', overflowY: 'auto' } });
          events.forEach((evt, i) => {
            const existing = cardForCalendarEvent(source.id, evt.id);
            const cb = el('input', {
              type: 'checkbox',
              onChange: (e) => { selection[i] = e.target.checked; },
            });
            cb.checked = selection[i] && !existing;
            if (existing) cb.disabled = true;
            const start = new Date(evt.start_iso);
            const meta = start.toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' })
              + ' · ' + start.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
            const row = el('label', {
              style: {
                display: 'grid',
                gridTemplateColumns: '24px 1fr',
                gap: '10px',
                alignItems: 'start',
                padding: '8px 10px',
                borderRadius: '6px',
                border: '1px solid var(--border)',
                cursor: existing ? 'default' : 'pointer',
                opacity: existing ? '0.55' : '1',
              },
            }, [
              cb,
              el('div', { style: { minWidth: '0', overflow: 'hidden' } }, [
                el('div', { style: { fontSize: '14px', fontWeight: '600', color: 'var(--text-primary)', wordBreak: 'break-word' } }, evt.subject || '(no subject)'),
                el('div', { style: { fontSize: '11px', color: 'var(--text-secondary)', fontFamily: 'JetBrains Mono, monospace', marginTop: '3px', wordBreak: 'break-word' } },
                  meta + (evt.location ? ' · ' + evt.location : '') + (existing ? ' · already imported' : '')),
              ]),
            ]);
            list.appendChild(row);
          });
          modal.appendChild(list);
          modal.appendChild(el('div', { class: 'modal-actions' }, [
            el('button', { onClick: closeModal }, 'Cancel'),
            el('button', { class: 'primary', onClick: commit }, 'Import selected'),
          ]));
        }
      };

      const commit = () => {
        let created = 0;
        setState(s => {
          const src = (s.ui.calendar_sources || []).find(x => x.id === source.id);
          events.forEach((evt, i) => {
            if (!selection[i]) return;
            if (cardForCalendarEvent(source.id, evt.id)) return;
            const cardFields = mapEventToCard(evt, source);
            const pos = s.cards.filter(c => c.project_id === 'inbox').length;
            s.cards.push(Object.assign({
              id: uid('card'),
              project_id: 'inbox',
              column_id: null,
              position: pos,
              due: cardFields.scheduled_time.slice(0, 10),
              today_slot: null, today_position: 0, plan_date: null,
              done_at: null, archived: false,
              recurrence: null, recurrence_day: null, recurrence_interval: null, recurrence_unit: null,
              missed_count: 0, last_missed_at: null,
              subtasks: [],
              created_at: now(),
            }, cardFields));
            created++;
          });
          if (src) src.last_synced_at = new Date().toISOString();
        });
        closeModal();
        if (created) setTimeout(soundAdd, 0);
      };

      const loadEvents = async () => {
        stage = 'loading';
        rebuild();
        try {
          // Default window: now → end of tomorrow (local time)
          const now = new Date();
          const startISO = new Date(now.getFullYear(), now.getMonth(), now.getDate()).toISOString();
          const endDate = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 2);
          const endISO = endDate.toISOString();
          events = await graphFetchEvents(source, startISO, endISO);
          events = events.filter(e => !e.is_cancelled && !e.is_declined);
          selection = events.map(e => !cardForCalendarEvent(source.id, e.id));
          stage = 'review';
        } catch (e) {
          stage = 'error';
          errorMsg = e.message || String(e);
        }
        rebuild();
      };
      rebuild();
      loadEvents();
    }

    // Build the AI handoff prompt from the project's AI-lane cards.
    function buildAiPromptText(proj) {
      const aiCards = state.cards
        .filter(c => c.project_id === proj.id && !c.archived && c.lane === 'ai')
        .sort((a, b) => (a.position || 0) - (b.position || 0));

      const lines = [];
      lines.push('You are helping me work through the following tasks for project "' + proj.name + '" (context: ' + proj.context + ').');
      lines.push('');
      lines.push('Before you do ANY work or write ANY code, ask me clarifying questions about each numbered item below — one item at a time, in order. For each item, ask 2–4 specific questions covering:');
      lines.push('  • the goal / acceptance criteria (what does "done" look like?)');
      lines.push('  • any constraints I have not made explicit (file paths, libraries, conventions, scope)');
      lines.push('  • assumptions you would otherwise make that you want me to confirm');
      lines.push('  • edge cases, failure modes, or rollback considerations');
      lines.push('');
      lines.push('Wait for my answers on each item before moving to the next. Do not begin implementation until I have answered every clarifying question and explicitly said "go".');
      lines.push('');
      lines.push('Tasks:');
      lines.push('');
      aiCards.forEach((c, i) => {
        const num = i + 1;
        lines.push(num + '. ' + (c.title || '(untitled)'));
        if (c.notes && c.notes.trim()) {
          c.notes.split('\n').forEach(n => { if (n.trim()) lines.push('   Notes: ' + n.trim()); });
        }
        const subs = (c.subtasks || []).filter(s => s && s.title);
        if (subs.length) {
          lines.push('   Subtasks:');
          subs.forEach(s => {
            lines.push('     - [' + (s.done ? 'x' : ' ') + '] ' + s.title);
            (s.subtasks || []).forEach(s2 => {
              if (s2 && s2.title) lines.push('       - [' + (s2.done ? 'x' : ' ') + '] ' + s2.title);
            });
          });
        }
        if (c.due) lines.push('   Due: ' + (formatDueLabel(c.due) || c.due));
        lines.push('');
      });
      lines.push('Begin by asking your clarifying questions for task 1. Number them. Wait for my answers before proceeding to task 2.');
      return lines.join('\n');
    }

        previewBox.appendChild(el('iframe', {
          src: f.data,
          style: { width: '100%', height: '60vh', border: '1px solid var(--border)', borderRadius: '8px', background: '#fff' },

        previewBox.appendChild(el('div', {
          style: { padding: '20px', textAlign: 'center', color: 'var(--text-tertiary)', fontStyle: 'italic' },
        }, 'No inline preview for this file type. Use Download to open it.'));
      } else {
        previewBox.appendChild(el('div', {
          style: { padding: '20px', textAlign: 'center', color: 'var(--text-tertiary)', fontStyle: 'italic' },
        }, 'Metadata only — file bytes weren\'t stored (file too large or read failed).'));
      }
      const downloadBtn = f.data
        ? el('a', {
            href: f.data,
            download: f.name,
            class: 'text-btn primary',
            style: { textDecoration: 'none' },
          }, '↓ Download')
        : null;
      openModal([
        el('h3', {}, f.name),
        el('div', { style: { fontFamily: 'JetBrains Mono, monospace', fontSize: '12px', color: 'var(--text-secondary)', marginBottom: '12px' } }, [
          el('div', {}, 'Extension: .' + f.ext),
          el('div', {}, 'Size: ' + formatSize(f.size)),
          el('div', {}, 'Added: ' + new Date(f.added_at).toLocaleString()),
          f.data ? el('div', { style: { color: '#22c55e' } }, '✓ Bytes stored locally') : null,
        ]),
        previewBox,
        el('div', { class: 'modal-actions' }, [
          downloadBtn,
          el('div', { style: { flex: 1 } }),
          el('button', { class: 'primary', onClick: closeModal }, 'Close'),
        ]),
      ]);
    }

    // ---------- Card picker (for Today plan) ----------
    function openCardPickerModal(slot) {
      let search = '';
      const listEl = el('div', { class: 'picker-list' });
      const render = () => {
        clearNode(listEl);
        const q = search.toLowerCase().trim();
        const candidates = state.cards.filter(c => {
          if (c.archived || c.done_at) return false;
          if (!contextMatches(contextOf(c, 'card'))) return false;
          // Defensive: skip orphans (project_id points to a deleted project).
          // Migration normally re-parents these to 'inbox', but guard here too.
          if (c.project_id && c.project_id !== 'inbox' && !projectById(c.project_id)) return false;
          if (q && !c.title.toLowerCase().includes(q)) return false;
          return true;
        });
        const byGroup = {};
        candidates.forEach(c => {
          const key = c.project_id === 'inbox' ? 'bank' : c.project_id;
          (byGroup[key] = byGroup[key] || []).push(c);
        });
        const order = Object.keys(byGroup).sort((a, b) => a === 'bank' ? 1 : b === 'bank' ? -1 : 0);
        if (order.length === 0) {
          listEl.appendChild(el('div', { style: { padding: '20px', textAlign: 'center', color: 'var(--text-tertiary)', fontSize: '12px', fontStyle: 'italic' } }, 'No matching cards.'));
          return;
        }
        order.forEach(key => {
          const proj = key === 'bank' ? null : projectById(key);
          const label = key === 'bank' ? 'Task Bank' : (proj && proj.name) || 'Unknown';
          const color = proj ? proj.accent : null;
          listEl.appendChild(el('div', {
            class: 'picker-group-head',
            style: color ? { '--item-from': color.from, '--item-to': color.to } : {},
          }, [
            color ? el('span', { class: 'plan-card-dot' }) : null,
            el('span', {}, label),
          ]));
          byGroup[key].forEach(c => {
            const already = !!c.today_slot;
            const isScheduled = !!c.scheduled_time;
            // Build hint chips so the user sees WHY a card might look unfamiliar
            const hints = [];
            if (already) hints.push(el('span', { class: 'picker-item-hint' }, 'In plan'));
            else if (isScheduled) hints.push(el('span', { class: 'picker-item-hint', style: { color: 'var(--text-tertiary)' } }, 'Scheduled'));
            const item = el('div', {
              class: 'picker-item' + (already ? ' selected' : ''),
              onClick: () => { if (!already) { addCardToPlan(c.id, slot); closeModal(); } },
            }, [
              el('span', { class: 'picker-item-title' }, c.title),
              ...hints,
            ]);
            listEl.appendChild(item);
          });
        });
      };
      const searchInput = el('input', {
        class: 'picker-search', type: 'text', placeholder: 'Search cards...',
        onInput: (e) => { search = e.target.value; render(); },
      });
      const slotLabel = slot === 'priority' ? 'Top 3' : (TIME_BLOCKS.find(b => b.id === slot) && TIME_BLOCKS.find(b => b.id === slot).label) || slot;
      openModal([
        el('h3', {}, 'Add to ' + slotLabel),
        searchInput,
        listEl,
        el('div', { class: 'modal-actions' }, [el('button', { onClick: closeModal }, 'Cancel')]),
      ]);
      render();
      setTimeout(() => searchInput.focus(), 50);
    }
